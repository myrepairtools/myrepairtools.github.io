<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>myRepairTools</title>
<style>
  :root { --red:#E31837; --gray-100:#f1f3f5; --gray-400:#7a8494; --gray-900:#212529; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { width:250px; font-family:-apple-system,'Segoe UI',Arial,sans-serif; background:#fff; color:var(--gray-900); font-size:13px; }
  .hd { background:var(--red); color:#fff; font-weight:800; font-size:11px; letter-spacing:.08em; text-transform:uppercase; padding:10px 14px; }
  .item { display:flex; align-items:center; gap:11px; width:100%; padding:13px 14px; border:none; background:#fff; text-align:left; cursor:pointer; font:inherit; border-bottom:1px solid var(--gray-100); }
  .item:hover { background:var(--gray-100); }
  .item .ico { font-size:1.25rem; flex:none; width:26px; text-align:center; }
  .item b { display:block; font-size:13px; }
  .item .sub { color:var(--gray-400); font-size:11px; margin-top:1px; }
</style>
</head>
<body>
  <div class="hd">myRepairTools</div>
  <button class="item" id="calc">
    <span class="ico">🧮</span>
    <span><b>Price Calculator</b><span class="sub">Repair &amp; add-on pricing</span></span>
  </button>
  <button class="item" id="label">
    <span class="ico">🏷️</span>
    <span><b>Label Resizer</b><span class="sub">This tab's label → 4×6 print</span></span>
  </button>
  <script src="menu.js"></script>
</body>
</html>
