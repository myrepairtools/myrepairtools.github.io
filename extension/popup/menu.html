<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>myRepairTools</title>
<style>
  :root { --red:#E31837; --gray-100:#f1f3f5; --gray-400:#7a8494; --gray-900:#212529; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { width:250px; font-family:-apple-system,'Segoe UI',Arial,sans-serif; background:#fff; color:var(--gray-900); font-size:13px; }
  .hd { background:var(--red); color:#fff; font-weight:800; font-size:11px; letter-spacing:.08em; text-transform:uppercase; padding:10px 14px; }
  .item { display:flex; align-items:center; gap:11px; width:100%; padding:13px 14px; border:none; background:#fff; text-align:left; cursor:pointer; font:inherit; border-bottom:1px solid var(--gray-100); }
  .item:hover { background:var(--gray-100); }
  .item .ico { flex:none; width:26px; display:flex; align-items:center; justify-content:center; }
  .item b { display:block; font-size:13px; }
  .item .sub { color:var(--gray-400); font-size:11px; margin-top:1px; }
</style>
</head>
<body>
  <div class="hd">myRepairTools</div>
  <button class="item" id="calc">
    <span class="ico" style="color:#E31837"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="16" height="20" x="4" y="2" rx="2" /><line x1="8" x2="16" y1="6" y2="6" /><line x1="16" x2="16" y1="14" y2="18" /><path d="M16 10h.01" /><path d="M12 10h.01" /><path d="M8 10h.01" /><path d="M12 14h.01" /><path d="M8 14h.01" /><path d="M12 18h.01" /><path d="M8 18h.01" /></svg></span>
    <span><b>Price Calculator</b><span class="sub">Repair &amp; add-on pricing</span></span>
  </button>
  <button class="item" id="label">
    <span class="ico" style="color:#E31837"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6" /><rect x="6" y="14" width="12" height="8" rx="1" /></svg></span>
    <span><b>Label Resizer</b><span class="sub">This tab's label → 4×6 print</span></span>
  </button>
  <script src="menu.js"></script>
</body>
</html>
