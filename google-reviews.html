<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Google Reviews · CPR Oregon</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--border:#E0E2EA;--green:#2E9E5B;--amber:#C9820B;}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0}
body{font-family:'Nunito Sans',sans-serif;color:var(--dark);background:var(--light-grey)}
.wrap{padding:22px 26px 60px;max-width:980px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.6rem;letter-spacing:-.4px;margin:0}
.hd{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.hd .sp{margin-left:auto;display:flex;gap:8px;align-items:center}
.storesel{height:36px;min-width:160px;max-width:196px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.92rem;color:var(--dark);padding:0 10px}
.storesel:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,176,227,.15)}
.pillbtn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;padding:7px 13px;border:1px solid var(--border);background:#fff;color:var(--dark-grey);border-radius:999px;cursor:pointer}
.pillbtn.on{background:var(--dark);color:#fff;border-color:var(--dark)}
.pillbtn[disabled]{opacity:.5;cursor:default}
.pillbtn .p2{background:#EEF2FA;color:#5A6B93;font-size:.56rem;border-radius:999px;padding:1px 6px;margin-left:5px;vertical-align:1px}
.iconbtn{width:36px;height:36px;border:1px solid var(--border);background:#fff;border-radius:9px;cursor:pointer;font-size:1rem;color:var(--dark-grey)}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.autoban{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.78rem;color:var(--dark-grey);background:#fff;border:1px solid var(--border);border-radius:999px;padding:5px 13px}
.autoban b{font-family:'Nunito',sans-serif}
.autoban a{color:var(--blue);cursor:pointer;font-weight:800;text-decoration:none}
/* feed */
.rv{background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 16px;margin-bottom:10px;cursor:pointer}
.rv:hover{border-color:var(--grey)}
.rv.hl{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,176,227,.15)}
.rv .top{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.rv .stars{color:#E2A63C;font-size:.85rem;letter-spacing:1px}
.rv .who{font-family:'Nunito',sans-serif;font-weight:800;font-size:.86rem}
.rv .age{font-size:.72rem;color:var(--grey);font-weight:700}
.rv .txt{margin-top:6px;font-size:.86rem;line-height:1.5;color:var(--dark-grey);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.rv .reply{margin-top:9px;background:#F7F8FB;border-left:3px solid var(--blue);border-radius:0 8px 8px 0;padding:8px 12px;font-size:.8rem;color:var(--dark-grey)}
.spill{display:inline-block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.4px;border-radius:999px;padding:3px 9px;margin-left:auto;white-space:nowrap}
.s-ok{color:#1E7A45;background:#E9F6EE}
.s-wait{color:#9A6700;background:#FCF3E3}
.s-late{color:#B02329;background:#FCEDED}
.s-leg{color:#7A7F8F;background:#EFF0F4}
.stag{display:inline-block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;border-radius:999px;padding:2px 9px;color:#fff}
.starsel{height:32px;border:1px solid var(--border);border-radius:9px;background:#fff;font-family:inherit;font-size:.78rem;font-weight:700;padding:0 8px}
.empty{color:var(--grey);font-weight:700;padding:26px;text-align:center}
.note{font-size:.9rem;color:var(--dark-grey);background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:20px}
.foot{margin-top:16px;font-size:.72rem;color:var(--grey);font-weight:700;display:flex;gap:14px;flex-wrap:wrap}
.morebtn{display:block;margin:14px auto 0;font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;padding:9px 22px;border:1px solid var(--border);background:#fff;border-radius:999px;cursor:pointer;color:var(--dark-grey)}
/* drawer (desktop) / sheet (mobile) */
.scrim{position:fixed;inset:0;background:rgba(45,45,59,.35);z-index:1600;display:none}
.scrim.show{display:block}
.drawer{position:fixed;top:0;right:-460px;width:430px;max-width:100vw;height:100%;background:#fff;z-index:1610;box-shadow:-6px 0 30px rgba(0,0,0,.12);transition:right .22s ease;display:flex;flex-direction:column}
.drawer.show{right:0}
.drawer .dh{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border)}
.drawer .dh .t{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem}
.drawer .dh .x{margin-left:auto;width:32px;height:32px;border:none;background:none;font-size:1.1rem;cursor:pointer;color:var(--grey)}
.drawer .db{flex:1;overflow-y:auto;padding:16px 18px}
.drawer .df{padding:12px 18px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--border);display:flex;gap:9px;align-items:center}
.quote{background:#F7F8FB;border-radius:10px;padding:12px 14px;font-size:.86rem;line-height:1.55;color:var(--dark-grey)}
.quote .qt{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dlab{font-family:'Nunito',sans-serif;font-weight:900;font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);margin:16px 0 6px;display:flex;align-items:center;gap:8px}
.dlab .rg{margin-left:auto;font-size:.68rem;color:var(--blue);cursor:pointer;font-weight:800;text-transform:none;letter-spacing:0}
textarea.draft{width:100%;min-height:130px;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-family:'Nunito Sans',sans-serif;font-size:.88rem;line-height:1.5;resize:vertical}
textarea.draft:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,176,227,.15)}
.hint{font-size:.7rem;color:var(--grey);font-weight:700;margin-top:5px}
.btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;padding:10px 18px;border-radius:10px;border:none;cursor:pointer}
.btn.pri{background:var(--red);color:#fff}
.btn.pri[disabled]{opacity:.5;cursor:default}
.btn.sec{background:#fff;border:1.5px solid var(--border);color:var(--dark-grey)}
.stepper{font-weight:800;font-size:.72rem;color:var(--grey);margin-right:auto}
.snav{display:flex;gap:5px}
.snav button{width:30px;height:30px;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;color:var(--dark-grey)}
/* manage / settings sheets reuse the drawer shell */
.togrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--light-grey);font-size:.86rem;font-weight:700}
.togrow:last-child{border-bottom:none}
.togrow .tl{flex:1}
.togrow .sub{font-size:.7rem;color:var(--grey);font-weight:700}
.sw{position:relative;width:40px;height:22px;flex:none;cursor:pointer}
.sw input{opacity:0;width:0;height:0}
.sw i{position:absolute;inset:0;background:#D9DBE4;border-radius:999px;transition:.15s}
.sw i::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s}
.sw input:checked+i{background:var(--green)}
.sw input:checked+i::after{left:20px}
.sw input:disabled+i{opacity:.45}
.qrow{background:#F7F8FB;border-radius:10px;padding:11px 13px;margin-bottom:9px;font-size:.8rem}
.qrow .qh{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-weight:800}
.qrow textarea{width:100%;min-height:70px;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:.8rem;margin-top:6px}
.qrow .qa{display:flex;gap:7px;margin-top:7px}
.qrow .qa button{font-family:'Nunito',sans-serif;font-weight:800;font-size:.68rem;padding:5px 11px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer}
.qrow .qa .go{background:var(--dark);border-color:var(--dark);color:#fff}
.timein{width:86px;height:32px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:.8rem;padding:0 8px}
.toast{position:fixed;left:50%;bottom:calc(26px + var(--cpr-bb-h,0px));transform:translateX(-50%);background:var(--dark);color:#fff;font-weight:700;font-size:.82rem;padding:10px 18px;border-radius:999px;z-index:1700;opacity:0;transition:opacity .2s;pointer-events:none}
body.grv-sheet-open .cpra-fab{display:none!important}
.toast.show{opacity:1}
@media (max-width:640px){
  .wrap{padding:16px 12px 50px}
  .drawer{top:auto;bottom:0;right:0;left:0;width:100%;height:100dvh;border-radius:0;transition:transform .22s ease;transform:translateY(100%)}
  .drawer.show{transform:translateY(0)}
}
</style>
</head>
<body>

<div class="wrap" id="app">
  <div id="body"><div class="empty">Loading…</div></div>
  <div id="gate" class="note" hidden>Google Reviews is for managers and the owner.</div>
</div>

<div class="scrim" id="scrim"></div>
<div class="drawer" id="drawer"></div>
<div class="toast" id="toast"></div>

<script src="assets/pin-gate.js"></script>
<script src="assets/locations.js"></script>
<script src="assets/nav.js"></script>
<script type="module">
import { createClient } from "/assets/supabase-js.js";
const SB_URL='https://xuvsehrevxackuhmbmry.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY';
const FN=SB_URL+'/functions/v1/gbp-sync';
const sb=createClient(SB_URL,ANON);
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const isMgr=r=>['owner','admin','manager'].indexOf(r)>-1;
function shortStore(s){return window.CPRLocations?CPRLocations.display(s):String(s||'').replace(/^CPR\s*/,'');}
function storeOrder(s){try{var x=CPRLocations.find(s);return x?x.order:99;}catch(e){return 99;}}
const PALETTE={1:'#4FB0E3',2:'#DC282E',3:'#2D2D3B'};
function storeColor(s){ return PALETTE[storeOrder(s)]||'#2E9E5B'; }
function fmtAge(iso){ if(!iso)return ''; const ms=Date.now()-new Date(iso).getTime();
  const h=Math.floor(ms/3600000); if(h<1)return Math.max(1,Math.floor(ms/60000))+'m'; if(h<48)return h+'h'; return Math.floor(h/24)+'d'; }
function hrs(iso){ return (Date.now()-new Date(iso).getTime())/3600000; }
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }

let AUTH=null, BOOTED=false, JWT=null;
async function resolveMe(sess){
  if(!sess||BOOTED)return;
  JWT=sess.access_token;
  const sr=await sb.from('staff').select('id,display_name,role').eq('auth_uid',sess.user.id).maybeSingle();
  if(sr.data){ BOOTED=true; AUTH={id:sr.data.id,name:sr.data.display_name,role:sr.data.role}; boot(); }
}
sb.auth.onAuthStateChange((_e,sess)=>{ if(sess){ JWT=sess.access_token; resolveMe(sess); } });
async function fnCall(action,body){
  const r=await fetch(FN+'?action='+action,{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+JWT},
    body:JSON.stringify(body||{})});
  const d=await r.json().catch(()=>({}));
  if(!d.ok)throw new Error(d.error||('http_'+r.status));
  return d;
}
async function fnGet(action){
  const r=await fetch(FN+'?action='+action,{headers:{'Authorization':'Bearer '+JWT}});
  const d=await r.json().catch(()=>({}));
  if(!d.ok)throw new Error(d.error||('http_'+r.status));
  return d;
}

/* ===== state ===== */
let SEL=(function(){try{return localStorage.getItem('cprGrvStore')||'All';}catch(e){return 'All';}})();
let UNONLY=false, STARS=0, LIMIT=100;
let LOCS=[], REVS=[], QMAP={}, CFG={master:false,stores:{}};
let DEEP=null;                     // #r=<id> deep link target
let CONFIRMED=false;               // "public on Google" once per session
try{ CONFIRMED=sessionStorage.getItem('cprGrvConfirmed')==='1'; }catch(e){}

function parseHash(){ const m=(location.hash||'').match(/^#r=(.+)$/); DEEP=m?decodeURIComponent(m[1]):null; }
parseHash();
window.addEventListener('hashchange',()=>{ parseHash(); if(DEEP){ const r=REVS.find(x=>x.id===DEEP); if(r) openDrawer(r.id); } });

function boot(){
  if(!AUTH||!isMgr(AUTH.role)){ $('#body').innerHTML=''; $('#gate').hidden=false; return; }
  load();
}
async function load(){
  const [locR,rvR,qR,cR]=await Promise.all([
    sb.from('gbp_locations').select('store,rating,review_count,last_sync_at'),
    sb.from('gbp_reviews').select('id,store,stars,comment,reviewer_name,created_at,reply_text,replied_at,legacy_unanswered')
      .is('deleted_at',null).order('created_at',{ascending:false}).limit(600),
    sb.from('gbp_reply_queue').select('id,review_id,store,source,status,post_after,draft').in('status',['hold','posted']),
    sb.from('gbp_config').select('key,value').eq('key','auto_reply').maybeSingle()
  ]);
  LOCS=(locR.data||[]).sort((a,b)=>storeOrder(a.store)-storeOrder(b.store));
  REVS=rvR.data||[];
  QMAP={}; (qR.data||[]).forEach(q=>{ const cur=QMAP[q.review_id];
    if(!cur||q.status==='hold') QMAP[q.review_id]=q; });
  CFG=(cR.data&&cR.data.value)||{master:false,stores:{}};
  render();
  if(DEEP){ const r=REVS.find(x=>x.id===DEEP); if(r) openDrawer(r.id); }
}

/* ===== feed ===== */
// legacy_unanswered = the retired pre-engine backlog (owner decision, see
// docs/sql/2026-07-22-gbp-legacy-unanswered.sql): shown muted, never counted
// as actionable, but a hand-written reply from the drawer still works.
function unansweredList(){ return REVS.filter(r=>!r.reply_text&&!r.legacy_unanswered&&(SEL==='All'||r.store===SEL)); }
function statusPill(r){
  const q=QMAP[r.id];
  if(r.reply_text){
    const auto=q&&q.source==='auto'&&q.status==='posted';
    const t=r.replied_at?fmtAge(r.replied_at):'';
    return '<span class="spill s-ok">'+(auto?'✓ auto-replied · 🤖':'✓ replied'+(t?' '+t:''))+'</span>';
  }
  if(q&&q.status==='hold'){
    const mins=Math.max(0,Math.round((new Date(q.post_after)-Date.now())/60000));
    return '<span class="spill s-wait">🤖 auto in '+(mins>=60?Math.round(mins/60)+'h':mins+'m')+'</span>';
  }
  if(r.legacy_unanswered) return '<span class="spill s-leg">no reply</span>';
  const h=hrs(r.created_at);
  return '<span class="spill '+(h>=24?'s-late':'s-wait')+'">no reply · '+fmtAge(r.created_at)+(h>=24?' ⚠':'')+'</span>';
}
function render(){
  const unAll=unansweredList().length;
  let h='<div class="hd"><h1>⭐ Google Reviews</h1>'
    +'<div class="sp"><button class="iconbtn" data-gear title="Notification settings">⚙</button></div></div>';
  h+='<div class="bar">'
    +'<select class="storesel" data-sel><option value="All"'+(SEL==='All'?' selected':'')+'>All Stores</option>'
    +LOCS.map(l=>'<option value="'+esc(l.store)+'"'+(SEL===l.store?' selected':'')+'>CPR '+esc(shortStore(l.store))+'</option>').join('')+'</select>'
    +'<button class="pillbtn'+(UNONLY?' on':'')+'" data-un>Unanswered'+(unAll?' · '+unAll:'')+'</button>'
    +'<select class="starsel" data-st><option value="0">★ any</option>'+[5,4,3,2,1].map(n=>'<option value="'+n+'"'+(STARS===n?' selected':'')+'>'+'★'.repeat(n)+'</option>').join('')+'</select>'
    +'<button class="pillbtn" disabled>Send Asks…<span class="p2">Phase 2</span></button>'
    +'<span class="autoban">🤖 <b>Auto-Replies '+(CFG.master?'ON':'OFF')+'</b> · <a data-manage>Manage →</a></span>'
    +'</div>';
  let list=REVS.slice();
  if(SEL!=='All') list=list.filter(r=>r.store===SEL);
  if(UNONLY) list=list.filter(r=>!r.reply_text&&!r.legacy_unanswered);
  if(STARS) list=list.filter(r=>r.stars===STARS);
  const total=list.length;
  list=list.slice(0,LIMIT);
  if(!list.length) h+='<div class="empty">No reviews match these filters.</div>';
  list.forEach(r=>{
    h+='<div class="rv'+(DEEP===r.id?' hl':'')+'" data-rid="'+esc(encodeURIComponent(r.id))+'">'
      +'<div class="top"><span class="stars">'+'★'.repeat(r.stars||0)+'<span style="color:#EDE3D2">'+'★'.repeat(Math.max(0,5-(r.stars||0)))+'</span></span>'
      +'<span class="who">'+esc(r.reviewer_name||'Anonymous')+'</span>'
      +'<span class="stag" style="background:'+storeColor(r.store)+'">'+esc(shortStore(r.store))+'</span>'
      +'<span class="age">'+esc(fmtAge(r.created_at))+' ago</span>'+statusPill(r)+'</div>'
      +(r.comment?'<div class="txt">'+esc(r.comment)+'</div>':'<div class="txt" style="color:var(--grey)">(rating only — no text)</div>')
      +(r.reply_text?'<div class="reply"><b>Our reply'+(QMAP[r.id]&&QMAP[r.id].source==='auto'&&QMAP[r.id].status==='posted'?' · AUTO':'')+(r.replied_at?' · '+esc(fmtAge(r.replied_at))+' ago':'')+':</b><br>'+esc(r.reply_text)+'</div>':'')
      +'</div>';
  });
  if(total>LIMIT) h+='<button class="morebtn" data-more>Show more ('+(total-LIMIT)+' older)</button>';
  const sync=LOCS.map(l=>l.last_sync_at).filter(Boolean).sort().pop();
  h+='<div class="foot"><span>'+REVS.length+' synced reviews (lifetime).</span>'
    +(sync?'<span>Synced '+esc(new Date(sync).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}))+'</span>':'')+'</div>';
  $('#body').innerHTML=h; wire();
}
function wire(){
  const sel=$('#body').querySelector('[data-sel]');
  if(sel)sel.onchange=()=>{ SEL=sel.value; try{localStorage.setItem('cprGrvStore',SEL);}catch(e){} LIMIT=100; render(); };
  const un=$('#body').querySelector('[data-un]'); if(un)un.onclick=()=>{ UNONLY=!UNONLY; LIMIT=100; render(); };
  const st=$('#body').querySelector('[data-st]'); if(st)st.onchange=()=>{ STARS=Number(st.value)||0; LIMIT=100; render(); };
  const mo=$('#body').querySelector('[data-more]'); if(mo)mo.onclick=()=>{ LIMIT+=100; render(); };
  const mg=$('#body').querySelector('[data-manage]'); if(mg)mg.onclick=openManage;
  const gr=$('#body').querySelector('[data-gear]'); if(gr)gr.onclick=openSettings;
  document.querySelectorAll('.rv').forEach(el=>el.onclick=()=>openDrawer(decodeURIComponent(el.getAttribute('data-rid'))));
}

/* ===== reply drawer ===== */
let DRAWER={id:null,draft:'',busy:false};
function drawerEls(){ return {d:$('#drawer'),s:$('#scrim')}; }
function showSheet(){ const {d,s}=drawerEls(); d.classList.add('show'); s.classList.add('show');
  document.body.classList.add('grv-sheet-open'); }
function closeDrawer(){ const {d,s}=drawerEls(); d.classList.remove('show'); s.classList.remove('show');
  document.body.classList.remove('grv-sheet-open');
  DRAWER={id:null,draft:'',busy:false};
  if(DEEP){ DEEP=null; history.replaceState(null,'',location.pathname); render(); } }
$('#scrim').onclick=closeDrawer;
function openDrawer(id){
  const r=REVS.find(x=>x.id===id); if(!r)return;
  DRAWER={id:id,draft:(QMAP[id]&&QMAP[id].status==='hold')?QMAP[id].draft:'',busy:false};
  renderDrawer();
  showSheet();
  // legacy backlog: no auto-draft on open (↻ Regenerate still drafts on demand)
  if(!r.reply_text&&!DRAWER.draft&&!r.legacy_unanswered) genDraft();
}
function stepInfo(id){
  const un=unansweredList();
  const i=un.findIndex(r=>r.id===id);
  return {list:un,i:i,label:i>-1?((i+1)+' of '+un.length+' unanswered'):''};
}
function renderDrawer(){
  const r=REVS.find(x=>x.id===DRAWER.id); if(!r)return;
  const st=stepInfo(r.id);
  let h='<div class="dh"><span class="stars" style="color:#E2A63C;letter-spacing:1px">'+'★'.repeat(r.stars||0)+'</span>'
    +'<span class="t">'+esc(r.reviewer_name||'Anonymous')+'</span>'
    +'<span class="stag" style="background:'+storeColor(r.store)+'">'+esc(shortStore(r.store))+'</span>'
    +'<button class="x" data-x>✕</button></div>';
  h+='<div class="db">';
  h+='<div class="quote"><div class="qt"><span class="age" style="font-size:.72rem;color:var(--grey);font-weight:700">'+esc(fmtAge(r.created_at))+' ago</span></div>'
    +(r.comment?esc(r.comment):'<i>(rating only — no text)</i>')+'</div>';
  if(r.reply_text){
    h+='<div class="dlab">Our reply</div><div class="quote">'+esc(r.reply_text)+'</div>';
  } else {
    h+='<div class="dlab">AI draft — edit before posting'
      +'<span class="rg" data-regen>'+(DRAWER.busy?'Drafting…':'↻ Regenerate')+'</span></div>'
      +'<textarea class="draft" data-draft placeholder="'+(DRAWER.busy?'Writing a draft…':'Write a reply…')+'">'+esc(DRAWER.draft)+'</textarea>'
      +((r.stars||0)<=2?'<div class="hint">Low-star reply: keep the store phone / take-it-offline line in.</div>':'');
    if(QMAP[r.id]&&QMAP[r.id].status==='hold')
      h+='<div class="hint">🤖 This draft is queued to auto-post — posting here posts it now instead.</div>';
  }
  h+='</div>';
  h+='<div class="df">'
    +'<span class="stepper">'+esc(st.label)+'</span>'
    +(r.reply_text?'':'<button class="btn sec" data-skip>Skip</button>'
      +'<button class="btn pri" data-post'+(DRAWER.busy?' disabled':'')+'>✓ Approve &amp; Post</button>')
    +'<span class="snav"><button data-prev'+(st.i<=0?' disabled':'')+'>‹</button><button data-next'+(st.i<0||st.i>=st.list.length-1?' disabled':'')+'>›</button></span>'
    +'</div>';
  const d=$('#drawer'); d.innerHTML=h;
  d.querySelector('[data-x]').onclick=closeDrawer;
  const ta=d.querySelector('[data-draft]'); if(ta)ta.oninput=()=>{ DRAWER.draft=ta.value; };
  const rg=d.querySelector('[data-regen]'); if(rg)rg.onclick=genDraft;
  const sk=d.querySelector('[data-skip]'); if(sk)sk.onclick=()=>stepTo(1,true);
  const pv=d.querySelector('[data-prev]'); if(pv)pv.onclick=()=>stepTo(-1,false);
  const nx=d.querySelector('[data-next]'); if(nx)nx.onclick=()=>stepTo(1,false);
  const po=d.querySelector('[data-post]'); if(po)po.onclick=postCurrent;
}
function stepTo(dir,fromSkip){
  const st=stepInfo(DRAWER.id);
  let ni=st.i+dir;
  if(st.i<0&&fromSkip)ni=0;
  if(ni<0||ni>=st.list.length){ closeDrawer(); return; }
  openDrawer(st.list[ni].id);
}
async function genDraft(){
  const r=REVS.find(x=>x.id===DRAWER.id); if(!r||r.reply_text||DRAWER.busy)return;
  DRAWER.busy=true; renderDrawer();
  try{
    const d=await fnCall('draft',{review_id:r.id});
    DRAWER.busy=false; DRAWER.draft=d.draft||''; renderDrawer();
  }catch(e){ DRAWER.busy=false; renderDrawer(); toast('Draft failed: '+e.message); }
}
async function postCurrent(){
  const r=REVS.find(x=>x.id===DRAWER.id); if(!r||DRAWER.busy)return;
  const text=(DRAWER.draft||'').trim();
  if(!text){ toast('Write or generate a reply first'); return; }
  if(!CONFIRMED){
    if(!confirm('This reply is public on Google. Post it?'))return;
    CONFIRMED=true; try{sessionStorage.setItem('cprGrvConfirmed','1');}catch(e){}
  }
  DRAWER.busy=true; renderDrawer();
  try{
    await fnCall('reply',{review_id:r.id,text:text});
    r.reply_text=text; r.replied_at=new Date().toISOString();
    if(QMAP[r.id])delete QMAP[r.id];
    toast('Reply posted to Google');
    const st=stepInfo(DRAWER.id);   // recompute: this review just left the unanswered list
    DRAWER.busy=false;
    if(st.list.length){ openDrawer(st.list[Math.min(st.i<0?0:st.i,st.list.length-1)].id); }
    else closeDrawer();
    render();
  }catch(e){ DRAWER.busy=false; renderDrawer(); toast('Post failed: '+e.message); }
}

/* ===== auto-reply manage sheet ===== */
async function openManage(){
  showSheet(); const {d}=drawerEls();
  d.innerHTML='<div class="dh"><span class="t">🤖 Auto-Replies</span><button class="x" data-x>✕</button></div><div class="db"><div class="empty">Loading…</div></div>';
  d.querySelector('[data-x]').onclick=closeDrawer;
  let queue=[];
  try{ const q=await fnGet('queue'); queue=q.queue||[]; }catch(e){}
  let h='<div class="dh"><span class="t">🤖 Auto-Replies</span><button class="x" data-x>✕</button></div><div class="db">';
  h+='<div class="togrow"><span class="tl">Auto-reply to 4–5★ reviews<div class="sub">LLM reply after a 3h hold · 9 AM–7 PM store time · AUTO label</div></span>'
    +'<label class="sw"><input type="checkbox" data-master'+(CFG.master?' checked':'')+'><i></i></label></div>';
  LOCS.forEach(l=>{ const on=CFG.stores&&CFG.stores[l.store]!==false;
    h+='<div class="togrow"><span class="tl">'+esc(shortStore(l.store))+'</span>'
      +'<label class="sw"><input type="checkbox" data-store="'+esc(l.store)+'"'+(on?' checked':'')+(CFG.master?'':' disabled')+'><i></i></label></div>'; });
  h+='<div class="dlab" style="margin-top:20px">Hold queue'+(queue.length?' · '+queue.length:'')+'</div>';
  if(!queue.length) h+='<div class="hint">Nothing waiting. 1–3★ never auto-posts — a person approves every one.</div>';
  queue.forEach(q=>{
    const rv=q.review||{};
    const mins=Math.max(0,Math.round((new Date(q.post_after)-Date.now())/60000));
    h+='<div class="qrow" data-qid="'+q.id+'"><div class="qh">'
      +'<span class="stars" style="color:#E2A63C">'+'★'.repeat(rv.stars||0)+'</span>'
      +'<span>'+esc(rv.reviewer_name||'Anonymous')+'</span>'
      +'<span class="stag" style="background:'+storeColor(q.store)+'">'+esc(shortStore(q.store))+'</span>'
      +'<span class="sub" style="margin-left:auto">posts in '+(mins>=60?Math.round(mins/60)+'h':mins+'m')+'</span></div>'
      +(rv.comment?'<div style="color:var(--dark-grey)">'+esc(String(rv.comment).slice(0,140))+'</div>':'')
      +'<textarea data-qd>'+esc(q.draft)+'</textarea>'
      +'<div class="qa"><button class="go" data-qpost>Post Now</button><button data-qsave>Save Edit</button><button data-qcancel>Cancel</button></div></div>';
  });
  h+='</div>';
  d.innerHTML=h;
  d.querySelector('[data-x]').onclick=closeDrawer;
  const saveCfg=async()=>{ try{ await fnCall('config_set',CFG); toast('Saved'); }catch(e){ toast('Save failed: '+e.message); } render(); };
  const master=d.querySelector('[data-master]');
  if(master)master.onchange=()=>{ CFG.master=master.checked;
    d.querySelectorAll('[data-store]').forEach(i=>{ i.disabled=!CFG.master; }); saveCfg(); };
  d.querySelectorAll('[data-store]').forEach(i=>i.onchange=()=>{ CFG.stores=CFG.stores||{}; CFG.stores[i.getAttribute('data-store')]=i.checked; saveCfg(); });
  d.querySelectorAll('.qrow').forEach(row=>{
    const qid=Number(row.getAttribute('data-qid'));
    const ta=row.querySelector('[data-qd]');
    row.querySelector('[data-qsave]').onclick=async()=>{ try{ await fnCall('queue_op',{id:qid,op:'edit',text:ta.value}); toast('Draft updated'); }catch(e){ toast(e.message); } };
    row.querySelector('[data-qcancel]').onclick=async()=>{ try{ await fnCall('queue_op',{id:qid,op:'cancel'}); row.remove(); toast('Cancelled'); load(); }catch(e){ toast(e.message); } };
    row.querySelector('[data-qpost]').onclick=async()=>{
      if(!CONFIRMED){ if(!confirm('This reply is public on Google. Post it?'))return;
        CONFIRMED=true; try{sessionStorage.setItem('cprGrvConfirmed','1');}catch(e){} }
      try{ await fnCall('queue_op',{id:qid,op:'post_now',text:ta.value}); row.remove(); toast('Posted'); load(); }catch(e){ toast(e.message); } };
  });
}

/* ===== notification settings (gear) ===== */
async function openSettings(){
  showSheet(); const {d}=drawerEls();
  d.innerHTML='<div class="dh"><span class="t">⚙ Review Notifications</span><button class="x" data-x>✕</button></div><div class="db"><div class="empty">Loading…</div></div>';
  d.querySelector('[data-x]').onclick=closeDrawer;
  let p={methods:{push:true,sms:false,inapp:true},stores:[],triggers:{low_star:true,sla:true,auto_digest:false},quiet:null};
  const {data}=await sb.from('gbp_notify_prefs').select('*').eq('staff_id',AUTH.id).maybeSingle();
  if(data)p={methods:data.methods||p.methods,stores:Array.isArray(data.stores)?data.stores:[],triggers:data.triggers||p.triggers,quiet:data.quiet||null};
  const row=(label,sub,attr,checked,dis)=>'<div class="togrow"><span class="tl">'+label+(sub?'<div class="sub">'+sub+'</div>':'')+'</span>'
    +'<label class="sw"><input type="checkbox" '+attr+(checked?' checked':'')+(dis?' disabled':'')+'><i></i></label></div>';
  let h='<div class="dh"><span class="t">⚙ Review Notifications</span><button class="x" data-x>✕</button></div><div class="db">';
  h+='<div class="dlab">How</div>'
    +row('Text message (SMS)','uses the phone on your profile','data-m="sms"',p.methods.sms===true)
    +row('Push notification','','data-m="push"',p.methods.push!==false)
    +row('In-app bell','','data-m="inapp"',p.methods.inapp!==false)
    +row('Email','coming later','data-m="email"',false,true);
  h+='<div class="dlab">Stores</div>'
    +LOCS.map(l=>row(esc(shortStore(l.store)),'','data-s="'+esc(l.store)+'"',!p.stores.length||p.stores.indexOf(l.store)>-1)).join('')
    +'<div class="hint">All on = every store.</div>';
  h+='<div class="dlab">When</div>'
    +row('1–3★ new review','immediate','data-t="low_star"',p.triggers.low_star!==false)
    +row('SLA breach','12h and 24h unanswered','data-t="sla"',p.triggers.sla!==false)
    +row('Auto-reply digest','weekly summary of auto-posts','data-t="auto_digest"',p.triggers.auto_digest===true);
  h+='<div class="dlab">Quiet hours</div>'
    +'<div class="togrow"><span class="tl">Quiet hours<div class="sub">1–2★ still comes through</div></span>'
    +'<label class="sw"><input type="checkbox" data-qon'+(p.quiet?' checked':'')+'><i></i></label></div>'
    +'<div class="togrow" data-qtimes style="'+(p.quiet?'':'display:none')+'"><span class="tl">From <input type="time" class="timein" data-qs value="'+esc((p.quiet&&p.quiet.start)||'21:00')+'"> to <input type="time" class="timein" data-qe value="'+esc((p.quiet&&p.quiet.end)||'08:00')+'"></span></div>';
  h+='</div><div class="df"><button class="btn pri" data-save style="margin-left:auto">Save</button></div>';
  d.innerHTML=h;
  d.querySelector('[data-x]').onclick=closeDrawer;
  const qon=d.querySelector('[data-qon]');
  qon.onchange=()=>{ d.querySelector('[data-qtimes]').style.display=qon.checked?'flex':'none'; };
  d.querySelector('[data-save]').onclick=async()=>{
    const get=sel=>Array.prototype.slice.call(d.querySelectorAll(sel));
    const methods={}; get('[data-m]').forEach(i=>{ if(i.getAttribute('data-m')!=='email')methods[i.getAttribute('data-m')]=i.checked; });
    const allStores=get('[data-s]');
    const onStores=allStores.filter(i=>i.checked).map(i=>i.getAttribute('data-s'));
    const stores=onStores.length===allStores.length?[]:onStores;
    const triggers={}; get('[data-t]').forEach(i=>{ triggers[i.getAttribute('data-t')]=i.checked; });
    const quiet=qon.checked?{start:d.querySelector('[data-qs]').value||'21:00',end:d.querySelector('[data-qe]').value||'08:00'}:null;
    const {error}=await sb.from('gbp_notify_prefs').upsert(
      {staff_id:AUTH.id,methods:methods,stores:stores,triggers:triggers,quiet:quiet,updated_at:new Date().toISOString()},
      {onConflict:'staff_id'});
    if(error){ toast('Save failed: '+error.message); return; }
    toast('Notification settings saved');
    closeDrawer();
  };
}

(async()=>{ try{ const s=(await sb.auth.getSession()).data.session; if(s) resolveMe(s); }catch(e){} })();
</script>
