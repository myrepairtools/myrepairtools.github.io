<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Commission — CPR</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="assets/commission-engine.js"></script>
<style>
:root{--red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--border:#E0E2EA;--green:#2E9E5B;--amber:#C9820B;--purple:#7c3aed;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--light-grey);font-family:'Nunito Sans',sans-serif;color:var(--dark);min-height:100vh}
main{max-width:none;margin:0;padding:24px 28px 80px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:-.4px;line-height:1.05}
.sub{color:var(--dark-grey);font-size:.82rem;font-weight:600;margin-top:2px}
.hide{display:none!important}
.muted{color:var(--grey);font-weight:600}
.head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
input,select{font-family:'Nunito Sans',sans-serif;font-size:.86rem;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--dark)}
input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,176,227,.15)}
.row2{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.tabs{display:inline-flex;gap:3px;background:var(--dark);border-radius:11px;padding:3px}
.tab{font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;padding:8px 16px;border-radius:8px;background:none;border:none;color:#D5D8E0;cursor:pointer}
.tab.on{background:#fff;color:var(--dark);font-weight:900}
.status{margin-left:auto;font-size:.74rem;color:var(--grey);font-weight:700}
/* cards */
.card{background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 3px rgba(45,45,59,.05);margin-bottom:16px;overflow:hidden}
.card-hd{display:flex;align-items:center;gap:9px;padding:13px 18px;border-bottom:1px solid var(--border)}
.card-hd::before{content:'';width:4px;height:18px;border-radius:2px;background:var(--accent,var(--red))}
.card-t{font-family:'Nunito',sans-serif;font-weight:900;font-size:.96rem}
.card-bd{padding:16px 18px}
.acc-red{--accent:var(--red)}.acc-blue{--accent:var(--blue)}.acc-green{--accent:var(--green)}.acc-dark{--accent:var(--dark)}.acc-amber{--accent:var(--amber)}
/* KPI stat cards */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
@media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{position:relative;background:#fff;border:1px solid var(--border);border-radius:14px;padding:15px 17px;box-shadow:0 1px 3px rgba(45,45,59,.05);overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ac,var(--grey))}
.kpi.k-total{--ac:var(--green)}.kpi.k-amber{--ac:var(--amber)}.kpi.k-blue{--ac:var(--blue)}.kpi.k-dark{--ac:var(--dark)}
.kpi .l{font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;text-transform:uppercase;letter-spacing:.6px;color:var(--grey)}
.kpi .v{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.7rem;line-height:1.1;margin-top:4px}
.kpi .s{font-size:.72rem;color:var(--dark-grey);font-weight:600;margin-top:3px}
/* manager bar + profile header */
.mgrbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.mgrbadge{font-family:'Nunito',sans-serif;font-weight:900;font-size:.6rem;letter-spacing:.6px;background:var(--dark);color:#fff;padding:5px 10px;border-radius:7px}
.mgrnote{margin-left:auto;font-size:.74rem;color:var(--grey);font-weight:600}
.profilehd{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.profilehd .av{width:46px;height:46px;border-radius:13px;background:var(--dark);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;flex:none}
.profilehd .pn{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.5rem;line-height:1.05}
.profilehd .pm{font-size:.84rem;color:var(--dark-grey);font-weight:600;margin-top:1px}
.profilehd .pl{font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.6px;color:var(--grey);text-align:right}
.profilehd .pc{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.7rem;color:var(--green);line-height:1}
.profilehd .pr{font-family:'Nunito',sans-serif;font-weight:900;font-size:.86rem;color:var(--purple);white-space:nowrap}
/* unlock pills + left-on-table box */
.unlockwrap{display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start}
.unlockcol{flex:1;min-width:300px;display:flex;flex-direction:column;gap:14px}
.unlockgrp .gh{font-family:'Nunito',sans-serif;font-weight:800;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey);margin-bottom:7px}
.unlockgrp .gh span{color:var(--grey)}
.pills2{display:flex;gap:7px;flex-wrap:wrap}
.pill2{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;border:1px solid var(--border);background:#fff;color:var(--grey)}
.pill2.on{background:#EAF7EF;border-color:#BFE6CD;color:#1f7d45}
.pill2 .tag{font-size:.66rem}
.lott{width:240px;flex:none;background:#FFF8EE;border:1px solid #F3DBB4;border-radius:11px;padding:14px 16px}
.lott .lt{font-family:'Nunito',sans-serif;font-weight:800;font-size:.66rem;text-transform:uppercase;letter-spacing:.5px;color:var(--amber)}
.lott .lv{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.9rem;color:var(--amber);line-height:1.1}
.lott .ls{font-size:.76rem;color:var(--dark-grey);margin-top:4px;line-height:1.4}
/* mini stat tiles */
.minigrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
@media(max-width:760px){.minigrid{grid-template-columns:repeat(2,1fr)}}
.minicard{background:#fff;border:1px solid var(--border);border-radius:11px;padding:13px 15px}
.minicard .ml{font-family:'Nunito',sans-serif;font-weight:700;font-size:.66rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey)}
.minicard .mv{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.3rem;margin-top:2px}
/* two-col */
.twocol{display:grid;grid-template-columns:1.25fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:860px){.twocol{grid-template-columns:1fr}}
/* category rows */
.catrow{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.catname{width:140px;display:flex;align-items:center;gap:8px;flex:none;font-weight:600;font-size:.86rem}
.catdot{width:10px;height:10px;border-radius:3px;flex:none}
.catbarwrap{flex:1;min-width:0;height:16px;border-radius:5px;background:var(--light-grey);overflow:hidden}
.catbar{height:100%;border-radius:5px}
.catu{width:54px;text-align:right;font-family:'Nunito',sans-serif;font-weight:800;font-size:.84rem;flex:none}
.catsub{display:flex;align-items:center;gap:12px;padding:9px 0 2px}
/* services list */
.svc{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.svc:last-child{border-bottom:none}
.svc .sn{font-weight:700;font-size:.86rem;color:var(--dark-grey)}
.svc .sc{font-size:.74rem;color:var(--grey);font-weight:600}
.svc .sp{font-family:'Nunito',sans-serif;font-weight:900;color:var(--green)}
/* how it works */
.hw-tier{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.hw-tier:last-child{border-bottom:none}
.hw-when{font-size:.85rem;color:var(--dark-grey);font-weight:600}
.hw-earn{font-family:'Nunito',sans-serif;font-weight:900;color:var(--dark)}
/* goals */
.ghero{background:linear-gradient(120deg,#2E9E5B,#268a4f);border-radius:14px;padding:22px 24px;color:#fff;margin-bottom:16px}
.ghero .gh1{font-size:.9rem;font-weight:700;opacity:.92;margin-bottom:4px}
.ghero .gbig{font-family:'Nunito',sans-serif;font-weight:900;font-size:2.8rem;line-height:1}
.ghero .grow{display:flex;gap:28px;margin-top:16px;flex-wrap:wrap}
.ghero .gst{font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;opacity:.8;font-weight:800}
.ghero .gsv{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.4rem}
.ghero .sep{border-left:1px solid rgba(255,255,255,.3);padding-left:28px}
.callout{background:#FFF8EE;border:1px solid #F3DBB4;border-radius:12px;padding:15px 18px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.callout .cn{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.8rem;color:var(--amber);flex:none}
.callout .ct{flex:1;min-width:240px;font-size:.88rem;color:var(--dark-grey);line-height:1.45}
.pace{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:760px){.pace{grid-template-columns:repeat(2,1fr)}}
.pace .pl{font-family:'Nunito',sans-serif;font-weight:700;font-size:.62rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey)}
.pace .pv{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.5rem}
.pace .ps{font-size:.72rem;color:var(--grey)}
.statusbar{margin-top:14px;padding:9px 13px;border-radius:9px;background:var(--light-grey);font-size:.84rem;font-weight:700}
.goalbar{margin:10px 0}
.goalbar .gt{display:flex;justify-content:space-between;font-size:.84rem;font-weight:700;margin-bottom:5px}
.goalbar .gtrack{height:14px;border-radius:7px;background:var(--light-grey);overflow:hidden}
.goalbar .gfill{height:100%;border-radius:7px;background:var(--green)}
/* scoreboard */
.lbrow{display:flex;align-items:center;gap:12px;padding:10px 6px;border-bottom:1px solid var(--border)}
.lbrow:last-child{border-bottom:none}
.lbrow.me{background:#EAF6FD;border-radius:9px}
.lbrank{width:30px;font-family:'Nunito',sans-serif;font-weight:900;color:var(--grey);text-align:center;flex:none}
.lbname{flex:1;font-weight:700;font-size:.9rem}
.lbatt{width:90px;text-align:right;font-size:.8rem;color:var(--dark-grey);font-weight:700;flex:none}
.lbamt{width:96px;text-align:right;font-family:'Nunito',sans-serif;font-weight:900;flex:none}
.medal{font-size:.95rem}
.lbseg{margin-left:auto;display:inline-flex;gap:3px;background:var(--light-grey);border-radius:9px;padding:3px}
.lbbtn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;padding:5px 12px;border-radius:7px;background:none;border:none;color:var(--dark-grey);cursor:pointer}
.lbbtn.on{background:#fff;color:var(--dark);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--dark);color:#fff;font-family:'Nunito';font-weight:800;font-size:.84rem;padding:11px 18px;border-radius:10px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}.toast.err{background:var(--red)}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--light-grey);color:var(--grey);font-family:'Nunito';font-weight:800;z-index:50}
.avpick-back{position:fixed;inset:0;background:rgba(45,45,59,.45);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px}
.avpick{background:#fff;border-radius:16px;padding:18px 20px;width:100%;max-width:360px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.avpick-hd{display:flex;align-items:center;justify-content:space-between;font-family:'Nunito';font-size:1rem}
.avpick-x{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--grey);line-height:1}
.avpick-sub{font-size:.78rem;color:var(--grey);font-weight:600;margin:2px 0 12px}
.avc-row{display:flex;gap:8px;margin-bottom:12px}
.avc{width:28px;height:28px;border-radius:8px;border:2px solid transparent;cursor:pointer}
.avc.on{border-color:var(--dark)}
.ave-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
.ave{font-size:1.25rem;background:var(--light-grey);border:none;border-radius:9px;padding:6px 0;cursor:pointer;line-height:1}
.ave:hover{background:#E4EEF5}
.avpick-ft{margin-top:14px;display:flex;justify-content:flex-end}
</style>
</head>
<body>
<main id="app" class="hide">
  <div id="mgrbar"></div>
  <div id="profilehd"></div>

  <div class="row2">
    <div class="tabs" id="tabs">
      <button class="tab on" data-t="overview">Overview</button>
      <button class="tab" data-t="goals">Goals</button>
      <button class="tab" data-t="board">Scoreboard</button>
      <button class="tab" data-t="how">How it works</button>
    </div>
    <span class="status" id="status"></span>
  </div>

  <section id="view-overview"></section>
  <section id="view-goals" class="hide"></section>
  <section id="view-board" class="hide"></section>
  <section id="view-how" class="hide"></section>
</main>

<div id="loading">Loading…</div>
<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SB_URL='https://xuvsehrevxackuhmbmry.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY';
const sb=createClient(SB_URL,ANON);
const E=window.CommissionEngine, money=E.money, pct=E.pct;
const money0=n=>'$'+Math.round(Number(n)||0).toLocaleString('en-US');

const $=s=>document.querySelector(s), $all=s=>Array.prototype.slice.call(document.querySelectorAll(s));
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m,err){const t=$('#toast');t.textContent=m;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2400);}
function shortStore(s){return window.CPRLocations?CPRLocations.display(s):String(s||'').replace(/^CPR\s*/,'');}
function storeIdx(s){return (STATE.storeOrder&&STATE.storeOrder[s]!=null)?STATE.storeOrder[s]:9999;}

const ROLE_ALIAS={owner:'owner',admin:'admin',manager:'admin',employee:'team_member',team_member:'team_member'};
const normRole=r=>ROLE_ALIAS[r]||r;
const MGR=r=>r==='owner'||r==='admin'||r==='manager';
/* hard-coded out of the employee dashboard (owner doesn't earn commission) */
const EXCLUDE=s=>/^\s*britt\s+bay\s*$/i.test((s&&s.display_name)||'');

const STATE={me:null,target:null,tab:'overview',
  rates:{},rateLabels:{},storeRates:{},rules:{},roleEarns:{},roleOver:{},
  staffById:{},rosterById:{},staffList:[],tips:{}};

/* ---- session ---- */
async function ensureSession(){
  try{let s=(await sb.auth.getSession()).data.session;if(s)return s;
    const raw=localStorage.getItem('sb-xuvsehrevxackuhmbmry-auth-token');if(!raw)return null;
    const o=JSON.parse(raw);
    const at=o.access_token||(o.currentSession&&o.currentSession.access_token);
    const rt=o.refresh_token||(o.currentSession&&o.currentSession.refresh_token);
    if(at&&rt){await sb.auth.setSession({access_token:at,refresh_token:rt});return (await sb.auth.getSession()).data.session;}
  }catch(e){}
  return null;
}
async function currentStaff(){
  try{const s=(await sb.auth.getSession()).data.session;if(!s)return null;
    const r=await sb.from('staff').select('id,display_name,role,home_store,authorized_stores,avatar,avatar_color').eq('auth_uid',s.user.id).maybeSingle();
    return r.data||null;
  }catch(e){return null;}
}

/* ---- config (shared with the calculator) ---- */
async function loadConfig(){
  const curMonthISO=(function(){const n=new Date();return n.getFullYear()+'-'+('0'+(n.getMonth()+1)).slice(-2)+'-01';})();
  const [rt,rl,rs,st,rr,pm,rp,ro,so,sch,mg]=await Promise.all([
    sb.from('commission_rates').select('*').order('sort'),
    sb.from('commission_rules').select('*'),
    sb.from('commission_roster').select('*'),
    sb.from('staff').select('id,display_name,home_store,role,active,authorized_stores,avatar,avatar_color'),
    sb.from('roles').select('id,key'),
    sb.from('permissions').select('id,key').like('key','commission.earn.%'),
    sb.from('role_permissions').select('role_id,permission_id'),
    sb.from('commission_role_overrides').select('*'),
    sb.from('stores').select('store,display_order'),
    sb.from('staff_schedule').select('staff_id,work_days'),
    sb.from('commission_goals').select('staff_id,accy_goal').eq('month',curMonthISO)
  ]);
  STATE.monthGoals={};((mg&&mg.data)||[]).forEach(g=>{STATE.monthGoals[g.staff_id]=Number(g.accy_goal)||0;});
  STATE.storeOrder={};(so&&so.data||[]).forEach(s=>{STATE.storeOrder[s.store]=s.display_order==null?9990:s.display_order;});
  STATE.schedule={};(sch&&sch.data||[]).forEach(r=>{STATE.schedule[r.staff_id]=Array.isArray(r.work_days)?r.work_days:[];});
  STATE.rates={};STATE.rateLabels={};
  (rt.data||[]).forEach(r=>{STATE.rates[r.sku]=(r.tiers&&r.tiers.goal)?{goal:Number(r.tiers.goal)||0,lo:Number(r.tiers.lo)||0,hi:Number(r.tiers.hi)||0}:(Number(r.amount)||0);STATE.rateLabels[r.sku]=r.label||r.sku;});
  STATE.rules={};STATE.storeRates={};(rl.data||[]).forEach(r=>{STATE.rules[r.store]=r.rules||{};STATE.storeRates[r.store]=r.rates||{};});
  STATE.staffById={};STATE.staffList=[];(st.data||[]).forEach(s=>{STATE.staffById[s.id]=s;if(s.active!==false&&!EXCLUDE(s))STATE.staffList.push(s);});
  STATE.staffList.sort((a,b)=>(a.display_name||'')<(b.display_name||'')?-1:1);
  STATE.rosterById={};(rs.data||[]).forEach(r=>{STATE.rosterById[r.staff_id]=r;});
  const roleKeyById={};(rr.data||[]).forEach(r=>{roleKeyById[r.id]=r.key;});
  const permStream={};(pm.data||[]).forEach(p=>{permStream[p.id]=p.key.split('.').pop();});
  STATE.roleEarns={};(rr.data||[]).forEach(r=>{STATE.roleEarns[r.key]={accessory:false,device:false,services:false};});
  (rp.data||[]).forEach(x=>{const rk=roleKeyById[x.role_id],s=permStream[x.permission_id];if(rk&&s&&STATE.roleEarns[rk])STATE.roleEarns[rk][s]=true;});
  STATE.roleOver={};(ro.data||[]).forEach(x=>{const rk=roleKeyById[x.role_id];if(rk)STATE.roleOver[rk]={rules:x.rules||{},rates:x.rates||{}};});
}

/* ---- month range ---- */
function iso(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function monthInfo(){const n=new Date(),y=n.getFullYear(),m=n.getMonth();
  return {start:iso(new Date(y,m,1)),end:iso(n),period:y+'-'+('0'+(m+1)).slice(-2),
    dayOfMonth:n.getDate(),daysInMonth:new Date(y,m+1,0).getDate(),
    label:n.toLocaleString('en-US',{month:'long',year:'numeric'})};}

/* work-day pace: an employee's scheduled work days elapsed vs total this month.
   work_days = weekday ints [0..6] (0=Sun). Falls back to calendar days if unset. */
function workDayInfo(staffId){
  const arr=(STATE.schedule&&STATE.schedule[staffId])||null;
  const n=new Date(),y=n.getFullYear(),m=n.getMonth(),today=n.getDate(),dim=new Date(y,m+1,0).getDate();
  if(!arr||!arr.length)return {elapsed:today,total:dim,left:Math.max(0,dim-today),sched:false};
  const set=new Set(arr);let el=0,tot=0;
  for(let d=1;d<=dim;d++){const wd=new Date(y,m,d).getDay();if(set.has(wd)){tot++;if(d<=today)el++;}}
  return {elapsed:el,total:tot,left:Math.max(0,tot-el),sched:true};
}

function blankTotals(){return {Tickets:0,AccyUnits:0,NetAccySales:0,AccyGP:0,DeviceUnits:0,DeviceReturns:0,DeviceRev:0,DeviceGP:0,DeviceAttach:0,ServiceNet:0,services:{},categories:{}};}
function addInto(t,r){
  t.Tickets+=Number(r.tickets)||0;t.AccyUnits+=Number(r.accy_units)||0;t.NetAccySales+=Number(r.accy_net)||0;t.AccyGP+=Number(r.accy_gp)||0;
  t.DeviceUnits+=Number(r.device_units)||0;t.DeviceReturns+=Number(r.device_returns)||0;
  t.DeviceRev+=(Number(r.device_net)||0)+(Number(r.device_return_net)||0);
  t.DeviceGP+=(Number(r.device_gp)||0)+(Number(r.device_return_gp)||0);
  t.DeviceAttach+=(Number(r.device_attach)||0)-(Number(r.device_attach_return)||0);
  t.ServiceNet+=Number(r.service_net)||0;
  const sv=r.services||{};for(const k in sv){t.services[k]=(t.services[k]||0)+(Number(sv[k])||0);}
  const ct=r.categories||{};for(const k in ct){t.categories[k]=(t.categories[k]||0)+(Number(ct[k])||0);}
}
const CAT_ORDER=['Case','Screen Protector','Power','Misc','Other'];
const CAT_COLOR={'Case':'#4FB0E3','Screen Protector':'#2E9E5B','Power':'#C9820B','Misc':'#7c3aed','Other':'#B9BDCB'};

/* effective config for one staff member: Store(home) -> Role -> Person */
function effFor(staff){
  const roleKey=normRole(staff.role);
  const roleE=STATE.roleEarns[roleKey]||{accessory:true,device:true,services:true};
  const ros=STATE.rosterById[staff.id]||null;
  const earns=E.resolveEarns(roleE, ros&&ros.earns_override);
  const roleOver=STATE.roleOver[roleKey]||null;
  const home=staff.home_store;
  const rules=E.mergeRules(STATE.rules[home], roleOver&&roleOver.rules, ros&&ros.rules_override);
  const rates=E.mergeRates(STATE.rates, STATE.storeRates[home], roleOver&&roleOver.rates, ros&&ros.rates_override);
  // this month's meeting-set goal wins; falls back to the standing roster default
  const mg=STATE.monthGoals&&STATE.monthGoals[staff.id];
  const goal=(mg!=null)?mg:(ros?Number(ros.accy_goal)||0:0);
  return {earns,rules,rates,goal};
}

/* tip share for a name from loaded commission_tips (hours/total * pool, summed over stores) */
function tipFor(name){let total=0;for(const store in STATE.tips){const d=STATE.tips[store]||{},pool=+d.pool||0,hrs=d.hours||{};if(!pool)continue;
  let totHrs=0;for(const nm in hrs){const h=hrs[nm]||{};totHrs+=(+h.pp1||0)+(+h.pp2||0);}
  const h=hrs[name]||{},my=(+h.pp1||0)+(+h.pp2||0);if(totHrs>0&&my>0)total+=(my/totHrs)*pool;}
  return total;}

/* ---- load + compute for the current target ---- */
async function loadTarget(){
  const mi=monthInfo(), t=STATE.target;
  $('#status').textContent='Loading…';
  const sales=await sb.from('commission_sales').select('*').eq('staff_id',t.id).gte('biz_date',mi.start).lte('biz_date',mi.end);
  const totals=blankTotals();(sales.data||[]).forEach(r=>addInto(totals,r));
  const tp=await sb.from('commission_tips').select('*').eq('period',mi.period);
  STATE.tips={};(tp.data||[]).forEach(x=>{STATE.tips[x.store]={hours:x.hours||{},pool:Number(x.pool)||0};});
  const cfg=effFor(t);
  const c=E.computeCommission(totals,{accessoryGoal:cfg.goal,accDeviceUnits:totals.DeviceAttach,rates:cfg.rates,earns:cfg.earns,rules:cfg.rules});
  // trailing 12 months: aggregate per month, run the engine with current config
  const h0=new Date();h0.setDate(1);h0.setMonth(h0.getMonth()-11);
  const hist=await sb.from('commission_sales').select('*').eq('staff_id',t.id).gte('biz_date',iso(h0)).lte('biz_date',mi.end);
  const byMon={};(hist.data||[]).forEach(r=>{const k=String(r.biz_date).slice(0,7);(byMon[k]=byMon[k]||blankTotals());addInto(byMon[k],r);});
  const months=[];for(let i=0;i<12;i++){const d=new Date(h0.getFullYear(),h0.getMonth()+i,1);const k=d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2);
    const tt=byMon[k]||blankTotals();const cc=E.computeCommission(tt,{accessoryGoal:cfg.goal,accDeviceUnits:tt.DeviceAttach,rates:cfg.rates,earns:cfg.earns,rules:cfg.rules});
    months.push({key:k,label:d.toLocaleString('en-US',{month:'short'}),total:cc.total});}
  STATE.calc={totals,cfg,c,tip:tipFor(t.display_name),mi,months,wd:workDayInfo(t.id)};
  $('#status').textContent='';
  renderHeader();render();
}

/* ---- render ---- */
function render(){
  $all('#tabs .tab').forEach(b=>b.classList.toggle('on',b.dataset.t===STATE.tab));
  $('#view-overview').classList.toggle('hide',STATE.tab!=='overview');
  $('#view-goals').classList.toggle('hide',STATE.tab!=='goals');
  $('#view-board').classList.toggle('hide',STATE.tab!=='board');

function trendSvg(months){
  const max=Math.max(1,...months.map(m=>m.total));
  const X=i=>10+i/11*540, Y=v=>130-(v/max)*112;
  const pts=months.map((m,i)=>X(i).toFixed(1)+','+Y(m.total).toFixed(1)).join(' ');
  const area='M'+X(0).toFixed(1)+',130 L'+months.map((m,i)=>X(i).toFixed(1)+','+Y(m.total).toFixed(1)).join(' L')+' L'+X(11).toFixed(1)+',130 Z';
  let dots='';months.forEach((m,i)=>{dots+='<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(m.total).toFixed(1)+'" r="3" fill="#fff" stroke="var(--blue)" stroke-width="2"></circle>'
    +'<text x="'+X(i).toFixed(1)+'" y="146" text-anchor="middle" font-size="8" fill="#9a9aa6">'+esc(m.label)+'</text>';});
  return '<svg viewBox="0 0 560 152" style="width:100%;height:auto;display:block"><path d="'+area+'" fill="rgba(79,176,227,.12)"></path>'
    +'<polyline points="'+pts+'" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"></polyline>'+dots+'</svg>';
}

  if(STATE.board)return STATE.board;
  const mi=monthInfo();
  const sales=await sb.from('commission_sales').select('*').gte('biz_date',mi.start).lte('biz_date',mi.end);
  const byStaff={};(sales.data||[]).forEach(r=>{if(r.staff_id==null)return;(byStaff[r.staff_id]=byStaff[r.staff_id]||blankTotals());addInto(byStaff[r.staff_id],r);});
  const techs=[];
  for(const sid in byStaff){const st=STATE.staffById[sid];if(!st||EXCLUDE(st))continue;
    const cfg=effFor(st),tot=byStaff[sid];
    const c=E.computeCommission(tot,{accessoryGoal:cfg.goal,accDeviceUnits:tot.DeviceAttach,rates:cfg.rates,earns:cfg.earns,rules:cfg.rules});
    techs.push({id:+sid,name:st.display_name,store:st.home_store||'—',tot,c,
      attach:tot.Tickets>0?tot.AccyUnits/tot.Tickets:0,tickets:tot.Tickets,
      accySales:tot.NetAccySales||0,deviceRev:tot.DeviceRev||0,deviceUnits:tot.DeviceUnits||0,
      svcCount:c.svcUnits,svcNet:tot.ServiceNet||0,retail:(tot.NetAccySales||0)+(tot.DeviceRev||0),ranked:!!(cfg.earns.accessory||cfg.earns.device)});
  }
  techs.sort((a,b)=>b.c.total-a.c.total);
  STATE.board={techs,mi};return STATE.board;
}

    +(svcSkus.length?'<span style="width:'+svcW+'px;text-align:center;flex:none;font-family:Nunito;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.6px;color:var(--green);border-bottom:2px solid rgba(46,158,91,.4);padding-bottom:3px">Services</span>':'')+'</div>';
  const catHead=catGroups+'<div style="display:flex;align-items:center;gap:8px;padding:0 4px 8px;font-family:Nunito;font-weight:800;font-size:.58rem;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);border-bottom:1px solid var(--border)">'
    +'<span style="flex:1;min-width:110px">Employee</span>'+CAT_ORDER.map(k=>'<span style="width:52px;text-align:right;flex:none">'+esc(k.split(' ')[0])+'</span>').join('')+'<span style="width:52px;text-align:right;flex:none">Total</span>'
    +svcSkus.map(k=>'<span style="width:60px;text-align:right;flex:none">'+esc((STATE.rateLabels[k]||k).split(' ')[0])+'</span>').join('')+'</div>';
  const catRows=mates.map(t=>{const tot=CAT_ORDER.reduce((a,k)=>a+(t.tot.categories[k]||0),0);
    return '<div style="display:flex;align-items:center;gap:8px;padding:9px 4px;border-radius:8px;background:'+(t.id===meId?'#EAF6FD':'#fff')+'">'
      +'<span style="flex:1;min-width:110px;font-family:Nunito;font-weight:800;font-size:.88rem">'+esc(t.name)+(t.id===meId?'<span style="font-weight:700;font-size:.66rem;color:var(--blue);margin-left:6px">YOU</span>':'')+'</span>'
      +CAT_ORDER.map(k=>cell(t.tot.categories[k]||0,(t.tot.categories[k]||0)===colMax[k],52)).join('')
      +'<span style="width:52px;text-align:right;flex:none;font-family:Nunito;font-weight:900;font-size:.9rem">'+tot+'</span>'
      +svcSkus.map(k=>cell(t.tot.services[k]||0,(t.tot.services[k]||0)===svcMax[k],60)).join('')+'</div>';}).join('');
  const catTable=mates.length?('<div class="card acc-green"><div class="card-hd"><span class="card-t">Units by category · '+esc(shortStore(myStore))+'</span></div><div class="card-bd"><div style="overflow-x:auto"><div style="min-width:'+(220+CAT_ORDER.length*52+52+svcSkus.length*60)+'px">'+catHead+catRows
    +'<div style="font-size:.72rem;color:var(--grey);margin-top:8px">Green = column leader · sorted by total accessory units.</div></div></div></div></div>'):'';

  // ---- store standings tiles ----
  const stores={};techs.forEach(t=>{const s=(stores[t.store]=stores[t.store]||{accy:0,dev:0,svc:0,units:0,tickets:0,top:null});
    s.accy+=t.accySales;s.dev+=t.deviceRev;s.svc+=t.c.repairComm;s.units+=t.tot.AccyUnits||0;s.tickets+=t.tickets;if(!s.top||t.retail>s.top.retail)s.top=t;});
  const storeRank=Object.keys(stores).sort((a,b)=>storeIdx(a)-storeIdx(b));
  const tiles=storeRank.map((s,i)=>{const d=stores[s];const att=d.tickets>0?d.units/d.tickets:0;const you=s===myStore;
    return '<div style="border:1px solid '+(you?'#CDEAF8':'var(--border)')+';background:'+(you?'#F5FBFE':'#fff')+';border-radius:12px;padding:14px 15px;display:flex;flex-direction:column;gap:10px">'
      +'<div style="display:flex;align-items:center;gap:9px"><div style="width:26px;height:26px;border-radius:999px;background:'+medalBg(i)+';color:'+medalTx(i)+';display:flex;align-items:center;justify-content:center;font-family:Nunito;font-weight:900;font-size:.85rem;flex:none">'+(i+1)+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-family:Nunito;font-weight:800;font-size:.92rem;line-height:1.1">'+esc(shortStore(s))+'</div>'+(you?'<div style="font-size:.62rem;font-weight:800;color:var(--blue);letter-spacing:.4px">YOUR STORE</div>':'')+'</div></div>'
      +'<div><div style="font-family:Nunito;font-weight:900;font-size:1.35rem;line-height:1.05">'+money0(d.accy)+'</div><div style="font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;color:var(--blue);font-weight:800">Accessory sales</div></div>'
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px 12px;border-top:1px solid var(--border);padding-top:9px">'
        +'<div style="display:flex;justify-content:space-between"><span style="font-size:.72rem;color:var(--dark-grey)">Dev $</span><span style="font-family:Nunito;font-weight:800;font-size:.78rem;color:var(--red)">'+money0(d.dev)+'</span></div>'
        +'<div style="display:flex;justify-content:space-between"><span style="font-size:.72rem;color:var(--dark-grey)">Svc</span><span style="font-family:Nunito;font-weight:800;font-size:.78rem;color:var(--green)">'+money0(d.svc)+'</span></div>'
        +'<div style="display:flex;justify-content:space-between"><span style="font-size:.72rem;color:var(--dark-grey)">Attach</span><span style="font-family:Nunito;font-weight:800;font-size:.78rem">'+pct(att)+'</span></div></div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:8px"><span style="font-size:.66rem;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);font-weight:800">Top tech</span><span style="font-family:Nunito;font-weight:800;font-size:.82rem">'+esc(d.top?d.top.name.split(' ')[0]:'—')+'</span></div></div>';}).join('');
  const standings=storeRank.length>1?('<div class="card acc-blue"><div class="card-hd"><span class="card-t">Store standings</span></div><div class="card-bd"><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px">'+tiles+'</div>'
    +'<div style="font-size:.72rem;color:var(--grey);margin-top:10px">Comparing accessory $, device $, and services across stores.</div></div></div>'):'';

  $('#view-board').innerHTML=hero+bonus+storeBoards+catTable+standings;
  $all('#view-board [data-lbm]').forEach(b=>b.onclick=()=>{STATE.lbMetric=b.getAttribute('data-lbm');renderBoard();});
}

/* ---- avatar personalization (employee sets their own emoji + color) ---- */
const AV_EMOJIS=['😀','😎','🤓','🥳','🤠','😺','🦊','🐯','🦁','🐼','🐧','🦄','🐲','⚡','🔥','⭐','💎','🚀','🎯','🏆','👑','🎸','🎮','📱','🔧','💪','🧠','🦅','🐺','🌮','🍕','☕'];
const AV_COLORS=['#DC282E','#2E9E5B','#4FB0E3','#C9820B','#7A6FD0','#2D2D3B','#1E7AA8','#C24E8E'];
async function saveAvatar(emoji,color){
  const {error}=await sb.rpc('set_my_avatar',{p_avatar:emoji,p_color:color});
  if(error){toast(error.message,true);return;}
  const apply=o=>{if(o){o.avatar=emoji;o.avatar_color=color;}};
  apply(STATE.me);apply(STATE.staffById[STATE.me.id]);if(STATE.target&&STATE.target.id===STATE.me.id)apply(STATE.target);
  toast(emoji?'Avatar updated':'Back to initials');renderHeader();
}
function openAvatarPicker(){
  const me=STATE.me; let color=me.avatar_color||AV_COLORS[0];
  const back=document.createElement('div');back.className='avpick-back';
  const colorRow=()=>AV_COLORS.map(c=>'<button class="avc'+(c===color?' on':'')+'" data-c="'+c+'" style="background:'+c+'"></button>').join('');
  back.innerHTML='<div class="avpick" role="dialog">'
    +'<div class="avpick-hd"><b>Personalize your avatar</b><button class="avpick-x" data-x>×</button></div>'
    +'<div class="avpick-sub">Pick a color, then tap an emoji.</div>'
    +'<div class="avc-row">'+colorRow()+'</div>'
    +'<div class="ave-grid">'+AV_EMOJIS.map(e=>'<button class="ave" data-e="'+e+'">'+e+'</button>').join('')+'</div>'
    +'<div class="avpick-ft"><button data-clear style="font-family:Nunito;font-weight:800;font-size:.78rem;border:1.5px solid var(--border);background:#fff;color:var(--dark-grey);border-radius:8px;padding:8px 14px;cursor:pointer">Use initials</button></div></div>';
  document.body.appendChild(back);
  const close=()=>back.remove();
  back.addEventListener('click',ev=>{if(ev.target===back)close();});
  back.querySelector('[data-x]').onclick=close;
  back.querySelector('[data-clear]').onclick=()=>{saveAvatar(null,color);close();};
  back.querySelectorAll('[data-c]').forEach(b=>b.onclick=()=>{color=b.getAttribute('data-c');back.querySelectorAll('.avc').forEach(x=>x.classList.toggle('on',x===b));});
  back.querySelectorAll('[data-e]').forEach(b=>b.onclick=()=>{saveAvatar(b.getAttribute('data-e'),color);close();});
}

/* ---- header (manager bar + profile) ---- */
function boardRank(id){if(!STATE.board)return null;const ranked=STATE.board.techs.filter(t=>t.ranked);const i=ranked.findIndex(t=>t.id===id);return i>=0?{n:i+1,of:ranked.length}:null;}
function renderHeader(){
  const me=STATE.me, t=STATE.target, calc=STATE.calc;
  if(MGR(normRole(me.role))){
    const opts=STATE.staffList.map(s=>'<option value="'+s.id+'"'+(s.id===t.id?' selected':'')+'>'+esc(s.display_name)+(s.id===me.id?' (you)':'')+'</option>').join('');
    $('#mgrbar').innerHTML='<div class="mgrbar"><span class="mgrbadge">MANAGER VIEW</span><span style="font-weight:700;color:var(--dark-grey);font-size:.84rem">Viewing</span>'
      +'<select id="viewAs" style="min-width:190px">'+opts+'</select><span class="mgrnote">Managers switch employees · employees see only their own</span></div>';
    const sel=$('#viewAs');if(sel)sel.onchange=()=>{STATE.target=STATE.staffById[+sel.value]||STATE.me;loadTarget();};
  }else $('#mgrbar').innerHTML='';
  const ini=(t.display_name||'?').split(/\s+/).map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'?';
  const rk=normRole(t.role), roleLabel=rk==='team_member'?'Tech':(rk==='admin'?'Manager':(rk==='owner'?'Owner':(t.role||'')));
  const mi=calc&&calc.mi, rank=boardRank(t.id);
  const own=t.id===me.id, face=t.avatar?esc(t.avatar):esc(ini);
  const avStyle=(t.avatar_color?'background:'+esc(t.avatar_color)+';':'')+(t.avatar?'font-size:1.65rem;':'')+(own?'cursor:pointer':'');
  $('#profilehd').innerHTML='<div class="profilehd"><div class="av"'+(own?' id="myAv" title="Personalize your avatar"':'')+(avStyle?' style="'+avStyle+'"':'')+'>'+face+'</div>'
    +'<div style="flex:1;min-width:0"><div class="pn">'+esc(t.display_name)+(own?' <span style="font-size:.62rem;font-weight:800;color:var(--blue);cursor:pointer;vertical-align:middle" id="myAvLink">✎ avatar</span>':'')+'</div>'
    +'<div class="pm">'+esc(shortStore(t.home_store))+' · '+esc(roleLabel)+(mi?' · '+esc(mi.label)+' · Day '+mi.dayOfMonth+' of '+mi.daysInMonth:'')+'</div></div>'
    +'<div><div class="pl">Commission · MTD</div><div class="pc">'+money(calc?calc.c.total:0)+'</div></div>'
    +(rank?'<div class="pr">RANK #'+rank.n+' / '+rank.of+'</div>':'')+'</div>';
  if(own){const a=$('#myAv');if(a)a.onclick=openAvatarPicker;const l=$('#myAvLink');if(l)l.onclick=openAvatarPicker;}
}

/* ---- boot ---- */
async function boot(){
  await ensureSession();
  STATE.me=await currentStaff();
  if(!STATE.me){$('#loading').textContent='Sign in from the menu to see your commission.';return;}
  await loadConfig();
  // make sure self is resolvable from the staff map
  if(!STATE.staffById[STATE.me.id])STATE.staffById[STATE.me.id]=STATE.me;
  // default to self; if self is excluded (owner), fall back to the first tech
  STATE.target=(!EXCLUDE(STATE.me)&&STATE.staffById[STATE.me.id])?STATE.staffById[STATE.me.id]:(STATE.staffList[0]||STATE.me);
  $('#loading').classList.add('hide');$('#app').classList.remove('hide');
  $all('#tabs .tab').forEach(b=>b.onclick=()=>{STATE.tab=b.dataset.t;render();});
  await loadTarget();
  loadBoard().then(()=>renderHeader()); // fill in the header rank once the board is ready
}
boot().catch(e=>{$('#loading').textContent='Could not load: '+(e&&e.message||e);});
</script>
