<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repair Agreement — CPR Cell Phone Repair</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* Customer-facing page: no site gate, no nav — the contract token is the credential. */
:root{--red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--border:#E0E2EA;--green:#2E9E5B;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--light-grey);font-family:'Nunito Sans',sans-serif;color:var(--dark);min-height:100vh}
.top{background:var(--dark);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px}
.top .logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem}
.top .logo b{color:var(--red)}
.wrap{max-width:760px;margin:0 auto;padding:18px 14px 80px}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 3px rgba(45,45,59,.05);margin-bottom:14px;overflow:hidden}
.card-bd{padding:18px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.3rem;letter-spacing:-.3px;line-height:1.15}
h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;margin:16px 0 5px}
h2:first-child{margin-top:0}
.sub{color:var(--dark-grey);font-size:.84rem;font-weight:600;margin-top:3px}
p,.body{font-size:.9rem;line-height:1.6;color:var(--dark-grey)}
.steps{display:flex;gap:8px;margin:14px 0 4px}
.step{flex:1;display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;color:var(--grey)}
.step .n{width:22px;height:22px;border-radius:999px;background:var(--light-grey);display:flex;align-items:center;justify-content:center;font-size:.74rem;flex:none}
.step.on{border-color:var(--dark);color:var(--dark)}
.step.on .n{background:var(--dark);color:#fff}
.step.done{border-color:#BFE3CC;color:#1f7d45;background:#F4FBF6}
.step.done .n{background:var(--green);color:#fff}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;background:var(--light-grey);border-radius:11px;padding:13px 15px;margin-top:12px}
.meta .l{font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey)}
.meta .v{font-family:'Nunito',sans-serif;font-weight:800;font-size:.92rem}
.meta .full{grid-column:1/-1}
.price{color:var(--red)}
.opt{display:flex;align-items:flex-start;gap:10px;border:1.5px solid var(--border);border-radius:11px;padding:12px 14px;margin-top:8px;cursor:pointer}
.opt input{margin-top:3px;width:17px;height:17px;accent-color:var(--red)}
.opt.on{border-color:var(--red);background:#FEF6F6}
.opt b{font-family:'Nunito',sans-serif;font-size:.9rem}
label.fld{display:block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey);margin:14px 0 5px}
input[type=text]{width:100%;font-family:'Nunito Sans',sans-serif;font-size:1rem;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--dark)}
input[type=text]:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,176,227,.15)}
.sigwrap{position:relative;border:1.5px dashed var(--grey);border-radius:11px;background:#fff;height:160px;touch-action:none}
.sigwrap canvas{width:100%;height:100%;display:block;border-radius:11px}
.sigwrap .hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--grey);font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;pointer-events:none}
.sigline{position:absolute;left:8%;right:8%;bottom:34px;border-bottom:1.5px solid var(--border);pointer-events:none}
.sigclear{position:absolute;top:8px;right:8px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.7rem;border:1px solid var(--border);background:#fff;color:var(--dark-grey);border-radius:8px;padding:5px 10px;cursor:pointer}
.agree{display:flex;align-items:flex-start;gap:10px;margin-top:14px;font-size:.86rem;color:var(--dark-grey);line-height:1.5}
.agree input{margin-top:3px;width:17px;height:17px;accent-color:var(--red);flex:none}
.cta{width:100%;margin-top:16px;background:var(--red);color:#fff;border:none;border-radius:12px;padding:15px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1.02rem;cursor:pointer}
.cta:disabled{opacity:.5;cursor:default}
.cta.dark{background:var(--dark)}
.err{color:var(--red);font-weight:700;font-size:.84rem;margin-top:10px;min-height:18px}
.done-ico{width:64px;height:64px;border-radius:999px;background:#EAF7EF;display:flex;align-items:center;justify-content:center;font-size:1.9rem;margin:6px auto 12px}
.center{text-align:center}
.pill{display:inline-flex;align-items:center;gap:7px;background:#EAF7EF;border:1px solid #BFE3CC;border-radius:999px;padding:6px 14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;color:#1f7d45}
.printbtn{margin-top:14px;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:10px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;color:var(--dark-grey);cursor:pointer}
.sigimg{max-width:280px;border:1px solid var(--border);border-radius:9px;background:#fff;display:block;margin-top:6px}
.ft{text-align:center;color:var(--grey);font-size:.72rem;font-weight:600;margin-top:20px}
#loading{padding:60px 0;text-align:center;color:var(--grey);font-family:'Nunito',sans-serif;font-weight:800}
@media print{.top,.steps,.cta,.sigclear,.printbtn,.ft{display:none!important}body{background:#fff}.card{border:none;box-shadow:none}}
</style>
</head>
<body>
<div class="top"><span class="logo"><b>CPR</b> Cell Phone Repair</span></div>
<div class="wrap">
  <div id="loading">Loading your agreement…</div>
  <div id="app" style="display:none"></div>
  <div class="ft">CPR Cell Phone Repair · This page is private to you — the link works only with your agreement code.</div>
</div>

<script>
(function(){
  'use strict';
  var FN='https://xuvsehrevxackuhmbmry.supabase.co/functions/v1/contracts';
  var $=function(s){return document.querySelector(s);};
  var esc=function(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});};
  var money=function(n){return '$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});};
  var qs=new URLSearchParams(location.search), TOKEN=qs.get('t')||'', RET=qs.get('ret')==='1';
  var C=null, SIGNED_STROKES=false;

  function api(action, body){
    return fetch(FN+'?action='+action+(body?'':'&t='+encodeURIComponent(TOKEN)),
      body?{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.assign({t:TOKEN},body))}:{})
      .then(function(r){return r.json();});
  }

  function steps(cur){ // 1=sign, 2=pay; cur: 1|2|3(done)
    var pay=Number(C.collect)>0;
    if(!pay)return '';
    var s1=cur>1?'done':'on', s2=cur===2?'on':(cur>2?'done':'');
    return '<div class="steps">'
      +'<div class="step '+s1+'"><span class="n">'+(cur>1?'✓':'1')+'</span>Review &amp; sign</div>'
      +'<div class="step '+s2+'"><span class="n">'+(cur>2?'✓':'2')+'</span>Payment</div></div>';
  }
  function metaCard(){
    var t=C.terms||{};
    return '<div class="meta">'
      +'<div><div class="l">Customer</div><div class="v">'+esc(C.customer_name)+'</div></div>'
      +'<div><div class="l">Store</div><div class="v">'+esc(C.store)+'</div></div>'
      +(C.device?'<div><div class="l">Device</div><div class="v">'+esc(C.device)+'</div></div>':'')
      +(C.ticket_ref?'<div><div class="l">Ticket</div><div class="v">'+esc(C.ticket_ref)+'</div></div>':'')
      +(C.service_name?'<div class="full"><div class="l">Service</div><div class="v" style="font-size:.9rem">'+esc(C.service_name)+'</div></div>':'')
      +'<div><div class="l">Repair price</div><div class="v price">'+money(C.price)+'</div></div>'
      +(Number(C.diag_fee)>0?'<div><div class="l">Diagnostic — already paid</div><div class="v" style="color:var(--green)">−'+money(C.diag_fee)+'</div></div>':'')
      +(Number(C.collect)>0
        ?'<div><div class="l">Due at signing</div><div class="v price">'+money(C.collect)+'</div></div>'
        :(C.pay_mode==='instore'&&(Number(C.price)-Number(C.diag_fee||0))>0?'<div><div class="l">Balance at the counter</div><div class="v price">'+money(Number(C.price)-Number(C.diag_fee||0))+'</div></div>':''))
      +(C.scope?'<div class="full"><div class="l">Repair details</div><div class="v" style="font-weight:700;font-size:.86rem;line-height:1.5">'+esc(C.scope)+'</div></div>':'')
      +'</div>';
  }
  function fill(s){ // template placeholders -> this contract's values
    return String(s||'')
      .replace(/\{business\}/g,'CPR Cell Phone Repair '+(C.store?String(C.store).replace(/^CPR\s*/,''):''))
      .replace(/\{customer\}/g,C.customer_name||'the Client')
      .replace(/\{date\}/g,String(C.created_at||'').slice(0,10));
  }
  function termsHtml(){
    var t=C.terms||{}, out='';
    if(t.intro)out+='<p style="margin-top:12px">'+esc(fill(t.intro))+'</p>';
    (t.sections||[]).forEach(function(s){out+='<h2>'+esc(s.h)+'</h2><div class="body">'+esc(fill(s.body))+'</div>';});
    return out;
  }

  /* ---------- states ---------- */
  function drawSignState(){
    var t=C.terms||{};
    var outList=t.outcomes||[];
    var outs=outList.map(function(o,i){
      return '<label class="opt" data-opt><input type="radio" name="outcome" value="'+esc(o)+'"><div><b>'+esc(o)+'</b></div></label>';}).join('');
    $('#app').innerHTML=
      '<div class="card"><div class="card-bd">'
      +'<h1>'+esc(t.name||'Repair Agreement')+'</h1>'
      +'<div class="sub">CPR Cell Phone Repair · '+esc(C.store)+'</div>'
      +steps(1)+metaCard()+termsHtml()
      +(outList.length?'<h2>Your repair goal</h2><div class="sub" style="margin-bottom:4px">Pick the outcome you’re looking for</div>'+outs:'')
      +'<label class="fld">Your full legal name</label><input type="text" id="nm" autocomplete="name" placeholder="Type your full name">'
      +'<label class="fld">Signature — sign with your finger or mouse</label>'
      +'<div class="sigwrap"><canvas id="sig"></canvas><div class="sigline"></div><div class="hint" id="sigHint">Sign here</div><button class="sigclear" id="sigClear" type="button">Clear</button></div>'
      +'<label class="agree"><input type="checkbox" id="agree"><span>I have read and agree to this agreement — including the repair scope, costs, refund policy, warranty, time frame, and data terms above.</span></label>'
      +'<button class="cta" id="go">'+(Number(C.collect)>0?'Agree, sign & continue to payment':'Agree & sign')+'</button>'
      +'<div class="err" id="err"></div>'
      +'</div></div>';
    wireSig();
    document.querySelectorAll('[data-opt]').forEach(function(l){l.addEventListener('click',function(){
      document.querySelectorAll('[data-opt]').forEach(function(x){x.classList.toggle('on',x===l&&x.querySelector('input').checked||x.querySelector('input').checked&&x===l);});
      setTimeout(function(){document.querySelectorAll('[data-opt]').forEach(function(x){x.classList.toggle('on',x.querySelector('input').checked);});},0);
    });});
    $('#go').onclick=submit;
  }

  function drawPayState(payUrl){
    $('#app').innerHTML=
      '<div class="card"><div class="card-bd center">'
      +steps(2)
      +'<div class="done-ico">🖊️</div>'
      +'<h1>Signed — one more step</h1>'
      +'<p style="margin-top:8px">Thanks, '+esc(C.signed_name||C.customer_name)+'. Your agreement is signed and saved. Here’s the payment:</p>'
      +'<div style="max-width:340px;margin:14px auto 0;text-align:left;background:var(--light-grey);border-radius:12px;padding:14px 17px;font-size:.9rem">'
        +'<div style="display:flex;justify-content:space-between;padding:3px 0"><span>Repair price</span><b>'+money(C.price)+'</b></div>'
        +(Number(C.diag_fee)>0?'<div style="display:flex;justify-content:space-between;padding:3px 0;color:#1f7d45"><span>Diagnostic — already paid</span><b>−'+money(C.diag_fee)+'</b></div>':'')
        +'<div style="display:flex;justify-content:space-between;padding:8px 0 2px;margin-top:6px;border-top:1.5px solid var(--border);font-family:Nunito,sans-serif"><span style="font-weight:800">Due now</span><b style="color:var(--red);font-size:1.1rem">'+money(C.collect)+'</b></div>'
      +'</div>'
      +'<p style="margin-top:10px;font-size:.84rem;color:var(--grey)">Square’s secure page takes about a minute — you’ll come right back here.</p>'
      +'<button class="cta" id="pay">Pay '+money(C.collect)+' securely with Square →</button>'
      +'<div class="err" id="err"></div>'
      +'</div></div>';
    $('#pay').onclick=function(){location.href=payUrl;};
    setTimeout(function(){location.href=payUrl;},2500);
  }

  function drawDoneState(){
    var paid=C.status==='paid';
    $('#app').innerHTML=
      '<div class="card"><div class="card-bd center">'
      +(Number(C.collect)>0?steps(3):'')
      +'<div class="done-ico">'+(paid?'✅':'🖊️')+'</div>'
      +'<h1>'+(paid?'You’re all set!':'Agreement signed')+'</h1>'
      +'<p style="margin-top:8px">'+(paid
        ?(C.pay_mode==='instore'?'Thank you!':'Payment of <b>'+money(C.paid_amount||C.collect)+'</b> received — thank you! Square emails your receipt.')
        :'Your agreement is signed and saved.'+(C.pay_mode==='instore'?' Our tech will take your payment at the counter.':''))
        +'<br>We’ll take it from here and keep you posted on your repair.</p>'
      +(paid?'<div class="pill" style="margin-top:10px">Paid '+esc(String(C.paid_at||'').slice(0,10))+'</div>':'')
      +'<button class="printbtn" onclick="window.print()">🖨 Print / save a copy</button>'
      +'</div></div>'
      +'<div class="card"><div class="card-bd">'
      +'<h1 style="font-size:1.05rem">'+esc((C.terms||{}).name||'Repair Agreement')+'</h1>'
      +'<div class="sub">Signed by '+esc(C.signed_name||'')+' on '+esc(String(C.signed_at||'').slice(0,10))+(C.outcome?' · goal: '+esc(C.outcome):'')+'</div>'
      +metaCard()+termsHtml()
      +(C.signature?'<h2>Signature</h2><img class="sigimg" src="'+C.signature+'" alt="signature">':'')
      +'</div></div>';
  }

  function drawGone(msg){
    $('#app').innerHTML='<div class="card"><div class="card-bd center"><h1>'+esc(msg)+'</h1><p style="margin-top:8px">Please contact the store if you think this is a mistake.</p></div></div>';
  }

  /* ---------- signature canvas ---------- */
  var canvas,ctx,drawing=false,last=null;
  function wireSig(){
    canvas=$('#sig');ctx=canvas.getContext('2d');
    var scale=window.devicePixelRatio||1, r=canvas.getBoundingClientRect();
    canvas.width=r.width*scale;canvas.height=r.height*scale;ctx.scale(scale,scale);
    ctx.lineWidth=2.2;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#2D2D3B';
    var pos=function(e){var b=canvas.getBoundingClientRect();return {x:e.clientX-b.left,y:e.clientY-b.top};};
    canvas.addEventListener('pointerdown',function(e){e.preventDefault();canvas.setPointerCapture(e.pointerId);drawing=true;last=pos(e);SIGNED_STROKES=true;$('#sigHint').style.display='none';});
    canvas.addEventListener('pointermove',function(e){if(!drawing)return;e.preventDefault();var p=pos(e);
      ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;});
    ['pointerup','pointercancel','pointerleave'].forEach(function(ev){canvas.addEventListener(ev,function(){drawing=false;});});
    $('#sigClear').onclick=function(){ctx.clearRect(0,0,canvas.width,canvas.height);SIGNED_STROKES=false;$('#sigHint').style.display='flex';};
  }

  function submit(){
    var err=$('#err');err.textContent='';
    var nm=($('#nm').value||'').trim();
    var hasOuts=((C.terms||{}).outcomes||[]).length>0;
    var out=document.querySelector('input[name=outcome]:checked');
    if(hasOuts&&!out){err.textContent='Pick your repair goal first.';return;}
    if(nm.length<2){err.textContent='Type your full name.';return;}
    if(!SIGNED_STROKES){err.textContent='Sign in the signature box.';return;}
    if(!$('#agree').checked){err.textContent='Check the agreement box to continue.';return;}
    var btn=$('#go');btn.disabled=true;btn.textContent='Saving…';
    api('sign',{signed_name:nm,outcome:out?out.value:'',signature:canvas.toDataURL('image/png')}).then(function(d){
      if(!d.ok){btn.disabled=false;btn.textContent='Try again';err.textContent=d.error==='already_signed'?'This agreement was already signed — refresh the page.':'Could not save ('+ (d.error||'error') +'). Try again.';return;}
      C.status='signed';C.signed_name=nm;
      if(d.pay_url){drawPayState(d.pay_url);}
      else{load();}
    }).catch(function(){btn.disabled=false;btn.textContent='Try again';err.textContent='Network hiccup — try again.';});
  }

  /* ---------- boot ---------- */
  function load(){
    api('view').then(function(d){
      $('#loading').style.display='none';$('#app').style.display='block';
      if(!d.ok){drawGone('This agreement link isn’t valid');return;}
      C=d.contract;
      if(C.status==='void'){drawGone('This agreement was cancelled');return;}
      if(C.status==='paid'){drawDoneState();return;}
      if(C.status==='signed'){
        if(Number(C.collect)>0&&C.pay_url&&!RET){drawPayState(C.pay_url);}
        else if(Number(C.collect)>0&&RET){
          // just came back from Square — poll a few times while their order settles
          var tries=0;
          var poll=function(){api('paystatus').then(function(p){
            if(p.status==='paid'){C.status='paid';C.paid_at=p.paid_at;C.paid_amount=p.paid_amount;drawDoneState();}
            else if(++tries<6){setTimeout(poll,2000);}
            else{C.pay_url=C.pay_url||null;drawPayState(C.pay_url);}
          });};
          $('#app').innerHTML='<div class="card"><div class="card-bd center"><h1>Confirming your payment…</h1><p style="margin-top:8px">One moment.</p></div></div>';
          poll();
        }
        else{drawDoneState();}
        return;
      }
      drawSignState();
    }).catch(function(){$('#loading').textContent='Couldn’t load — check your connection and refresh.';});
  }
  if(!TOKEN){$('#loading').style.display='none';$('#app').style.display='block';drawGone('This agreement link isn’t valid');}
  else load();
})();
</script>
</body>
</html>
