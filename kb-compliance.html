<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Compliance · CPR Oregon</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--border:#E0E2EA;--row:#F0F1F4;--green:#2E9E5B;--greend:#0f6e56;--greenbg:#E1F5EE;--card:0 1px 3px rgba(45,45,59,.05)}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0}
body{font-family:'Nunito Sans',sans-serif;color:var(--dark);background:var(--light-grey)}
.wrap{max-width:1240px;margin:0 auto;padding:24px 20px 60px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.45rem;margin:0}
.sub{color:var(--dark-grey);font-size:.85rem;font-weight:700;margin-top:2px}
.hd{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.rolechip{font-family:'Nunito',sans-serif;font-weight:800;font-size:.55rem;letter-spacing:.4px;text-transform:uppercase;color:var(--red);border:1px solid #F6C9CA;background:#FFF1F1;border-radius:5px;padding:2px 6px}
.fl{display:block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.66rem;text-transform:uppercase;letter-spacing:.4px;color:var(--dark-grey);margin-bottom:4px}
.storesel{width:196px;height:36px;padding:6px 11px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.92rem;color:var(--dark)}
.storesel:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,176,227,.15)}
.tiles{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:#fff;border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:10px;box-shadow:var(--card);padding:10px 14px;flex:1;min-width:180px;max-width:260px}
.stat .l{font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.6px;color:var(--grey)}
.stat .v{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.15rem;margin-top:2px}
.stat.red{border-left-color:var(--red);background:#FFF7F7}
.stat.red .v{color:var(--red)}
.tcard{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--card);overflow:auto}
table{width:100%;border-collapse:collapse;min-width:760px}
th{font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);text-align:left;padding:11px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--row);font-size:.86rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
.bar{width:92px;height:7px;border-radius:999px;background:#ECEDF1;overflow:hidden;flex:none}
.bar i{display:block;height:100%;border-radius:999px}
.pill{display:inline-block;min-width:26px;text-align:center;font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;padding:2px 8px;border-radius:999px}
.pill.ok{background:var(--greenbg);color:var(--greend)}
.pill.no{background:#FDEBEC;color:var(--red)}
.viewbtn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--dark);padding:5px 10px;cursor:pointer;white-space:nowrap}
.viewbtn:hover{border-color:var(--blue);color:var(--blue)}
.footnote{font-size:.74rem;font-weight:700;color:var(--grey);margin-top:10px}
.empty{padding:40px;text-align:center;color:var(--grey);font-weight:700}
.gate{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px;font-weight:700;color:var(--dark-grey)}
.ovl{position:fixed;inset:0;background:rgba(45,45,59,.45);z-index:1200;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow:auto}
.mdl{width:560px;max-width:100%;background:#fff;border-radius:16px;box-shadow:0 18px 50px rgba(45,45,59,.3);overflow:hidden}
.mdl-hd{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mdl-bd{padding:16px 22px;max-height:64vh;overflow:auto}
.mdl-x{background:none;border:none;cursor:pointer;font-size:1.15rem;color:var(--grey)}
.drow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--row);font-size:.85rem;font-weight:700}
.drow:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="wrap" id="page"><div class="empty">Loading…</div></div>
<div id="mdlWrap"></div>

<script src="assets/pin-gate.js"></script>
<script src="assets/nav.js"></script>
<script src="assets/locations.js"></script>
<script type="module">
import { createClient } from "/assets/supabase-js.js";
const SB_URL='https://xuvsehrevxackuhmbmry.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY';
const sb=createClient(SB_URL,ANON);
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const isMgr=r=>['owner','admin','manager'].indexOf(r)>-1;
function fmtD(x){ if(!x)return ''; const d=new Date(x); if(isNaN(d))return '';
  return ('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2)+'/'+String(d.getFullYear()).slice(-2); }
const OVERDUE_DAYS=7;   // required read counts overdue this many days after publish

let AUTH=null,BOOTED=false;
async function resolveMe(sess){
  if(!sess||BOOTED)return;
  const sr=await sb.from('staff').select('id,display_name,role').eq('auth_uid',sess.user.id).maybeSingle();
  if(sr.data){ BOOTED=true; AUTH={id:sr.data.id,name:sr.data.display_name,role:sr.data.role}; boot(); }
}
sb.auth.onAuthStateChange((_e,sess)=>{ if(sess) resolveMe(sess); });
(async()=>{ try{ const s=(await sb.auth.getSession()).data.session; if(s) resolveMe(s); }catch(e){} })();

let STAFF=[],ARTS=[],MODULES=[],READS=[],ASSIGN={},QUIZ={},ATT=[],STEPS=[],SDONE={},SBN={},SEL='all';
async function boot(){
  if(!isMgr(AUTH.role)){ $('#page').innerHTML='<div class="gate">Compliance is for managers &amp; owners.</div>'; return; }
  const [st,a,m,r,asn,qz,att,sp,sd]=await Promise.all([
    sb.from('staff').select('id,display_name,role,home_store,active').eq('active',true).order('display_name'),
    sb.from('kb_articles').select('id,title,slug,require_ack,module_id,sort_order,status,published_at').eq('status','published'),
    sb.from('onboarding_modules').select('*').eq('active',true).order('sort'),
    sb.from('kb_reads').select('article_id,staff_id,acknowledged_at'),
    sb.from('onboarding_assignments').select('staff_id,started_at'),
    sb.from('kb_quizzes').select('id,article_id,kb_quiz_questions(id)').eq('active',true),
    sb.from('kb_quiz_attempts').select('quiz_id,staff_id,passed'),
    sb.from('onboarding_steps').select('*').eq('active',true).order('sort_order'),
    sb.from('onboarding_step_done').select('id,step_id,staff_id,done_by,done_at')
  ]);
  STAFF=(st.data||[]).filter(s=>s.role!=='owner');
  SBN={}; (st.data||[]).forEach(s=>SBN[s.id]=s.display_name);
  ARTS=a.data||[]; MODULES=m.data||[]; READS=r.data||[];
  ASSIGN={}; (asn.data||[]).forEach(x=>ASSIGN[x.staff_id]=x);
  QUIZ={}; (qz.data||[]).forEach(q=>{ if((q.kb_quiz_questions||[]).length)QUIZ[q.article_id]={id:q.id,nq:q.kb_quiz_questions.length}; });
  ATT=att.data||[];
  const modIds=MODULES.map(m2=>m2.id);
  STEPS=(sp.data||[]).filter(s=>modIds.indexOf(s.module_id)>-1);
  SDONE={}; (sd.data||[]).forEach(x=>{ SDONE[x.step_id+':'+x.staff_id]=x; });
  draw();
}
const ackOf=(sid,aid)=>READS.some(x=>x.staff_id===sid&&x.article_id===aid&&x.acknowledged_at);
const passOf=(sid,qid)=>ATT.some(x=>x.staff_id===sid&&x.quiz_id===qid&&x.passed);
const stepOf=(sid,stepId)=>SDONE[stepId+':'+sid]||null;
const artDoneFor=(sid,a)=>{ const q=QUIZ[a.id]; return ackOf(sid,a.id)&&(!q||passOf(sid,q.id)); };
/* merged per-module items, ordered like knowledge.html's moduleItems() */
function itemsOf(modId){
  return ARTS.filter(a=>a.module_id===modId).map(a=>({kind:'a',a,sort:a.sort_order||0}))
    .concat(STEPS.filter(s=>s.module_id===modId).map(s=>({kind:'s',s,sort:s.sort_order||0})))
    .sort((x,y)=>x.sort-y.sort);
}

function draw(){
  const staff=STAFF.filter(s=>SEL==='all'||s.home_store===SEL);
  const modArts=MODULES.map(m=>ARTS.filter(x=>x.module_id===m.id).sort((p,q)=>(p.sort_order-q.sort_order)||(p.id-q.id))).flat();
  const moduleQuizzes=modArts.filter(x=>QUIZ[x.id]);
  const totalItems=modArts.length+STEPS.length;   // articles + task steps = the track
  const reqArts=ARTS.filter(x=>x.require_ack).sort((p,q)=>new Date(q.published_at||0)-new Date(p.published_at||0));
  const reqCols=reqArts.slice(0,4);
  const now=Date.now();
  const isOverdue=a=>a.published_at&&(now-new Date(a.published_at))>OVERDUE_DAYS*86400000;
  // per-person rollup (articles done + task steps done, same math as My Onboarding)
  const rows=staff.map(s=>{
    const done=modArts.filter(a=>artDoneFor(s.id,a)).length
      +STEPS.filter(st=>stepOf(s.id,st.id)).length;
    const pct=totalItems?Math.round(done/totalItems*100):null;
    const quizPassed=moduleQuizzes.filter(a=>passOf(s.id,QUIZ[a.id].id)).length;
    const overdue=reqArts.filter(a=>isOverdue(a)&&!ackOf(s.id,a.id)).length;
    return {s,pct,done,quizPassed,overdue,started:(ASSIGN[s.id]||{}).started_at};
  });
  const nComplete=rows.filter(r=>r.pct===100).length;
  const totQuiz=moduleQuizzes.length*staff.length;
  const nQuiz=rows.reduce((n,r)=>n+r.quizPassed,0);
  const nOver=rows.reduce((n,r)=>n+r.overdue,0);
  const stores=window.CPRLocations?CPRLocations.names():[];
  const disp=n=>'CPR '+(window.CPRLocations?CPRLocations.display(n):n);
  $('#page').innerHTML=''
  +'<div class="hd"><div><div style="display:flex;align-items:center;gap:9px"><h1>📋 Compliance</h1><span class="rolechip">'+esc(AUTH.role)+'</span></div>'
    +'<div class="sub">Onboarding progress, required reads &amp; quiz results</div></div>'
    +'<div style="flex:1"></div>'
    +'<div><label class="fl">Store</label><select class="storesel" id="selStore"><option value="all">All stores</option>'
      +stores.map(n=>'<option value="'+esc(n)+'"'+(SEL===n?' selected':'')+'>'+esc(disp(n))+'</option>').join('')+'</select></div>'
  +'</div>'
  +'<div class="tiles">'
    +'<div class="stat"><div class="l">Staff Onboarding</div><div class="v">'+nComplete+' / '+staff.length+' complete</div></div>'
    +'<div class="stat"><div class="l">Quizzes Passed</div><div class="v">'+nQuiz+' / '+(totQuiz||0)+'</div></div>'
    +'<div class="stat red"><div class="l">Overdue Required Reads</div><div class="v">'+nOver+'</div></div>'
  +'</div>'
  +'<div class="tcard"><table><thead><tr><th>Team member</th><th>Store</th><th>Onboarding</th><th>Quizzes</th>'
    +reqCols.map(a=>'<th style="text-align:center" title="'+esc(a.title)+'">'+esc(a.title.length>22?a.title.slice(0,21)+'…':a.title)+'</th>').join('')
    +'<th></th></tr></thead><tbody>'
  +rows.map(r=>{
    const barCol=r.pct===100?'var(--green)':r.overdue?'var(--red)':'var(--blue)';
    return '<tr>'
    +'<td><div style="font-weight:800">'+esc(r.s.display_name)+'</div><div style="font-size:.72rem;color:var(--grey);font-weight:700">'+esc(r.s.role)+(r.started?' · started '+fmtD(r.started):'')+'</div></td>'
    +'<td style="font-weight:700">'+esc(disp(r.s.home_store||''))+'</td>'
    +'<td>'+(r.pct==null?'<span style="color:var(--grey);font-weight:700">—</span>'
      :'<div style="display:flex;align-items:center;gap:9px"><div class="bar"><i style="width:'+r.pct+'%;background:'+barCol+'"></i></div><span style="font-family:Nunito,sans-serif;font-weight:800;font-size:.78rem">'+r.pct+'%</span></div>')
      +(r.overdue?'<div style="font-size:.7rem;font-weight:800;color:var(--red);margin-top:2px">⚠ '+r.overdue+' overdue</div>':'')+'</td>'
    +'<td style="font-weight:700">'+r.quizPassed+' / '+moduleQuizzes.length+' passed</td>'
    +reqCols.map(a=>'<td style="text-align:center"><span class="pill '+(ackOf(r.s.id,a.id)?'ok">✓':'no">—')+'</span></td>').join('')
    +'<td style="text-align:right"><button class="viewbtn" data-view="'+r.s.id+'">View ›</button></td>'
    +'</tr>';
  }).join('')
  +'</tbody></table>'+(rows.length?'':'<div class="empty">No staff at this store.</div>')+'</div>'
  +'<div class="footnote">Required-read columns show the '+reqCols.length+' most recent required articles'+(reqArts.length>reqCols.length?' (of '+reqArts.length+')':'')+'; ✓ = read receipt on file. Overdue = required read still open '+OVERDUE_DAYS+'+ days after publish. Nudge reminders send via the notifications settings.</div>';
  $('#selStore').addEventListener('change',e=>{ SEL=e.target.value; draw(); });
  document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>openDetail(+b.dataset.view,modArts,reqArts)));
}
function openDetail(sid,modArts,reqArts){
  const s=STAFF.find(x=>x.id===sid); if(!s)return;
  const rows=[];
  MODULES.forEach(m=>{
    const items=itemsOf(m.id);
    if(!items.length)return;
    rows.push('<div style="font-family:Nunito,sans-serif;font-weight:800;font-size:.62rem;text-transform:uppercase;letter-spacing:.6px;color:var(--grey);padding:10px 0 4px">'+esc(m.name)+'</div>');
    items.forEach(it=>{
      if(it.kind==='a'){
        const a=it.a,q=QUIZ[a.id],ok=artDoneFor(sid,a);
        rows.push('<div class="drow"><span class="pill '+(ok?'ok">✓':'no">—')+'</span><span style="flex:1">'+esc(a.title)+'</span>'
          +(q?'<span style="font-size:.72rem;color:var(--grey)">'+(passOf(sid,q.id)?'quiz ✓':'quiz —')+'</span>':'')
          +'<span style="font-size:.72rem;color:var(--grey)">article</span></div>');
      }else{
        const st=it.s,d=stepOf(sid,st.id);
        rows.push('<div class="drow"><button class="pill '+(d?'ok':'no')+'" data-tgl="'+st.id+'" style="border:none;cursor:pointer" title="Click to '+(d?'un-mark':'mark done')+'">'+(d?'✓':'—')+'</button>'
          +'<span style="flex:1">'+esc(st.title)
          +(d?'<div style="font-size:.7rem;font-weight:600;color:var(--grey)">'+(d.done_by&&SBN[d.done_by]?esc(SBN[d.done_by])+' · ':'')+fmtD(d.done_at)+'</div>':'')+'</span>'
          +'<span style="font-size:.72rem;color:var(--grey)">'+(st.who==='manager'?'manager step':'employee step')+'</span></div>');
      }
    });
  });
  const loose=reqArts.filter(a=>!a.module_id);
  if(loose.length)rows.push('<div style="font-family:Nunito,sans-serif;font-weight:800;font-size:.62rem;text-transform:uppercase;letter-spacing:.6px;color:var(--grey);padding:10px 0 4px">Required reading</div>');
  loose.forEach(a=>{
    rows.push('<div class="drow"><span class="pill '+(ackOf(sid,a.id)?'ok">✓':'no">—')+'</span><span style="flex:1">'+esc(a.title)+'</span><span style="font-size:.72rem;color:var(--grey)">required</span></div>');
  });
  $('#mdlWrap').innerHTML='<div class="ovl"><div class="mdl">'
    +'<div class="mdl-hd"><div style="font-family:Nunito,sans-serif;font-weight:900;font-size:1.05rem">'+esc(s.display_name)+'</div><button class="mdl-x" id="mx">✕</button></div>'
    +'<div class="mdl-bd">'+(rows.join('')||'<div class="empty">Nothing assigned.</div>')+'</div>'
    +'</div></div>';
  $('#mx').addEventListener('click',()=>{ $('#mdlWrap').innerHTML=''; });
  document.querySelector('#mdlWrap .ovl').addEventListener('mousedown',e=>{ if(e.target.classList.contains('ovl'))$('#mdlWrap').innerHTML=''; });
  // manager tick-offs: toggle a step done row for THIS person, then repaint
  document.querySelectorAll('#mdlWrap [data-tgl]').forEach(b=>b.addEventListener('click',async()=>{
    const stepId=+b.dataset.tgl, cur=stepOf(sid,stepId);
    b.disabled=true;
    if(cur){
      const r=await sb.from('onboarding_step_done').delete().eq('id',cur.id);
      if(r.error){ b.disabled=false; return; }
      delete SDONE[stepId+':'+sid];
    }else{
      const r=await sb.from('onboarding_step_done').insert({step_id:stepId,staff_id:sid,done_by:AUTH.id}).select().single();
      if(r.error){ b.disabled=false; return; }
      SDONE[stepId+':'+sid]=r.data;
    }
    draw(); openDetail(sid,modArts,reqArts);
  }));
}
</script>
</body>
</html>
