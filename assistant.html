<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CPR Assistant</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* Embed host for the CPR Assistant — the myRepairTools extension shows this page
   in an iframe overlay inside RepairQ. No nav, no gates: the widget reads the
   shared Supabase session from this origin's localStorage (sign in on any MRT
   page once per browser and it works here too). */
html,body{margin:0;height:100%;background:#fff}
.cpra-signin{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#F3F2F2;z-index:5000;font-family:'Nunito Sans',sans-serif;color:#2D2D3B;text-align:center;padding:24px}
.cpra-signin .card{background:#fff;border:1.5px solid #E0E2EA;border-radius:16px;padding:28px 30px;max-width:360px;box-shadow:0 8px 30px rgba(45,45,59,.12)}
.cpra-signin h2{font-family:'Nunito',sans-serif;font-weight:900;margin:0 0 8px;font-size:1.1rem}
.cpra-signin p{font-size:.88rem;line-height:1.5;color:#4E4E50;margin:0 0 14px}
.cpra-signin a{display:inline-block;background:#DC282E;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;padding:10px 18px;border-radius:10px;text-decoration:none}
</style>
</head>
<body>
<div class="cpra-signin" id="signin"><div class="card">
  <h2>✨ CPR Assistant</h2>
  <p>You're not signed in yet on this browser. Open myRepairTools, sign in with your PIN, then come back — the assistant will remember you.</p>
  <a href="https://myrepairtools.github.io" target="_blank" rel="noopener">Open myRepairTools →</a>
</div></div>
<script>
  window.CPR_ASSISTANT_EMBED = true;
  // signed-out hint: the widget also guards on send, but this makes it obvious
  (function(){
    try{
      var raw = localStorage.getItem('sb-xuvsehrevxackuhmbmry-auth-token');
      if(!raw) document.getElementById('signin').style.display='flex';
    }catch(e){}
  })();
</script>
<script src="assets/cpr-assistant.js"></script>
</body>
</html>
