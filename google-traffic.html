<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Google Traffic · CPR Oregon</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--border:#E0E2EA;--green:#2E9E5B;--amber:#C9820B;--bench:#FFF8EE;}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0}
body{font-family:'Nunito Sans',sans-serif;color:var(--dark);background:var(--light-grey)}
.wrap{padding:22px 26px 60px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.6rem;letter-spacing:-.4px;margin:0}
.hd{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.syncline{font-weight:700;font-size:.74rem;color:var(--grey);margin:0 0 12px}
/* joined month control — one control, no gaps */
.monav{display:flex;align-items:stretch;margin-left:auto;border:1.5px solid var(--border);border-radius:9px;background:#fff;overflow:hidden}
.monav button{height:34px;border:none;background:#fff;cursor:pointer;color:var(--dark-grey);padding:0}
.monav .arr{width:32px;font-size:1rem}
.monav .arr[disabled]{opacity:.35;cursor:default}
.monav .lbl{font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;min-width:126px;padding:0 10px;border-left:1px solid var(--border);border-right:1px solid var(--border)}
.monav .lbl.hist{color:var(--amber)}
.storesel{height:36px;min-width:170px;max-width:196px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.92rem;color:var(--dark);padding:0 10px}
.storesel:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,176,227,.15)}
/* dark segmented tabs */
.tabs{display:inline-flex;border:1.5px solid var(--dark);border-radius:11px;overflow:hidden;margin:0 0 14px;background:#fff}
.tabs button{font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;padding:9px 18px;border:none;background:#fff;color:var(--dark-grey);cursor:pointer}
.tabs button+button{border-left:1.5px solid var(--dark)}
.tabs button.on{background:var(--dark);color:#fff}
/* compare layout */
.cmpwrap{display:flex;gap:14px;align-items:flex-start}
.cmpmain{flex:1;min-width:0}
.rail{width:300px;flex:none;display:flex;flex-direction:column;gap:12px}
.railbox{background:#fff;border:1px solid var(--border);border-radius:13px;padding:14px 16px}
.railbox .rt{font-family:'Nunito',sans-serif;font-weight:900;font-size:.8rem;margin-bottom:8px}
.railbox ol,.railbox ul{margin:0;padding-left:18px;font-size:.82rem;line-height:1.55;color:var(--dark-grey)}
.railbox li{margin-bottom:7px}
.railfoot{font-size:.7rem;color:var(--grey);font-weight:700}
.scrollx{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:#fff}
table.gt{width:100%;border-collapse:collapse}
table.gt th{font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);background:#F0F1F4;white-space:nowrap}
table.gt td{padding:9px 14px;border-bottom:1px solid var(--light-grey);font-size:.85rem}
table.gt tr:last-child td{border-bottom:none}
table.gt td.num,table.gt th.num{text-align:right;font-variant-numeric:tabular-nums}
td.miss{color:#d3d6df;text-align:right}
/* matrix */
th.sth{text-align:right;min-width:118px}
th.sth .sn{display:flex;align-items:center;justify-content:flex-end;gap:6px;font-size:.72rem;letter-spacing:0;text-transform:none}
th.sth .dot{width:8px;height:8px;border-radius:50%;flex:none}
th.sth .bpl{background:#B07A08;color:#fff;font-size:.54rem;border-radius:999px;padding:1px 6px;letter-spacing:.3px}
th.sth svg{display:block;margin:5px 0 0 auto}
td.mv{text-align:right;white-space:nowrap}
td.mv .big{font-family:'Nunito',sans-serif;font-weight:900;font-size:.92rem;font-variant-numeric:tabular-nums}
td.mv .d{font-family:'Nunito',sans-serif;font-weight:800;font-size:.64rem;margin-left:6px}
.d.up{color:var(--green)}.d.dn{color:var(--red)}.d.fl{color:var(--grey)}
td.bcol,th.bcol{background:var(--bench)}
.mstar{color:#B07A08;font-size:.76rem;margin-left:3px}
td.rk{font-weight:700;font-size:.76rem;color:var(--dark-grey);white-space:nowrap}
td.rk a{color:inherit;text-decoration:none;border-bottom:1px dotted var(--grey)}
td.rk a:hover{color:var(--blue)}
.dotnul{color:#c9ccd6}
/* gap badges */
.gaps{margin-top:14px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 16px}
.gaps .gl{font-family:'Nunito',sans-serif;font-weight:900;font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);margin-bottom:8px}
.gaprow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:5px 0}
.gaprow .gs{font-family:'Nunito',sans-serif;font-weight:900;font-size:.8rem;min-width:120px}
.pill{display:inline-block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.66rem;border-radius:999px;padding:3px 10px}
.pill.a{color:#9A6700;background:#FCF3E3}
.pill.r{color:#B02329;background:#FCEDED}
.pill.g{color:#1E7A45;background:#E9F6EE}
/* trends */
.chips{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 12px}
.chips button{font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;padding:6px 12px;border:1px solid var(--border);background:#fff;color:var(--dark-grey);border-radius:999px;cursor:pointer}
.chips button.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.chartbox{background:#fff;border:1px solid var(--border);border-radius:13px;padding:16px 14px 8px}
.chartbox svg{width:100%;height:auto;display:block}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin:8px 4px 6px;font-size:.76rem;color:var(--dark-grey);font-weight:700}
.legend .sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.legend .yy{font-size:.68rem;color:var(--grey);margin-left:4px}
/* keywords */
.kbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.kbar input{font-family:'Nunito Sans',sans-serif;font-size:.84rem;padding:8px 12px;border:1px solid var(--border);border-radius:9px;min-width:200px}
.pillbtn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;padding:6px 12px;border:1px solid var(--border);background:#fff;color:var(--dark-grey);border-radius:999px;cursor:pointer}
.pillbtn.on{background:var(--dark);color:#fff;border-color:var(--dark)}
.bpill{display:inline-block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;text-transform:uppercase;letter-spacing:.4px;border-radius:999px;padding:2px 7px;background:#EEF2FA;color:#5A6B93;margin-left:6px}
.empty{color:var(--grey);font-weight:700;padding:26px;text-align:center}
.note{font-size:.9rem;color:var(--dark-grey);background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:20px}
.banner{background:#EAF4FB;border:1px solid #CBE5F5;color:#28618A;border-radius:10px;padding:9px 13px;font-size:.78rem;font-weight:700;margin:0 0 12px}
.errbar{background:#FCEDED;border:1px solid #F2C6C8;color:#B02329;border-radius:10px;padding:9px 13px;font-size:.78rem;font-weight:700;margin:0 0 12px}
.foot{margin-top:16px;font-size:.72rem;color:var(--grey);font-weight:700;display:flex;gap:14px;flex-wrap:wrap}
.hero{background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px;max-width:680px}
.hero h2{font-family:'Nunito',sans-serif;font-weight:900;margin:0 0 8px}
.hero p{font-size:.9rem;line-height:1.6;color:var(--dark-grey)}
@media (max-width:900px){ .cmpwrap{flex-direction:column} .rail{width:100%} }
@media (max-width:640px){
  .wrap{padding:16px 12px 50px}
  .monav .lbl{min-width:100px}
  .tabs{display:flex;width:100%}
  .tabs button{flex:1;padding:9px 4px}
  .hd{gap:8px}
  .storesel{min-width:140px}
}
</style>
</head>
<body>

<div class="wrap" id="app">
  <div id="body"><div class="empty">Loading…</div></div>
  <div id="gate" class="note" hidden>Google Traffic is for managers and the owner.</div>
</div>

<script src="assets/pin-gate.js"></script>
<script src="assets/pickers.js"></script>
<script src="assets/locations.js"></script>
<script src="assets/nav.js"></script>
<script type="module">
import { createClient } from "/assets/supabase-js.js";
const SB_URL='https://xuvsehrevxackuhmbmry.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY';
const sb=createClient(SB_URL,ANON);
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const isMgr=r=>['owner','admin','manager'].indexOf(r)>-1;
const MONL=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function shortStore(s){return window.CPRLocations?CPRLocations.display(s):String(s||'').replace(/^CPR\s*/,'');}
function storeOrder(s){try{var x=CPRLocations.find(s);return x?x.order:99;}catch(e){return 99;}}
// store colors come from the stores table (Settings → Locations); palette is the fallback
const PALETTE={1:'#4FB0E3',2:'#DC282E',3:'#2D2D3B'};
let SCOLORS={};
function storeColor(s){ return SCOLORS[s]||PALETTE[storeOrder(s)]||'#2E9E5B'; }
function ymKey(d){ return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2); }
function ymAdd(ym,n){ const p=ym.split('-').map(Number); const d=new Date(p[0],p[1]-1+n,1); return ymKey(d); }
function ymLabel(ym){ const p=ym.split('-').map(Number); return MONL[p[1]-1]+' '+p[0]; }
function fmtN(n){ if(n==null)return '<span class="dotnul">·</span>'; return Number(n).toLocaleString('en-US'); }
function fmtAge(iso){ if(!iso)return ''; const ms=Date.now()-new Date(iso).getTime();
  const h=Math.floor(ms/3600000); if(h<1)return Math.max(1,Math.floor(ms/60000))+'m'; if(h<48)return h+'h'; return Math.floor(h/24)+'d'; }
function fmtDur(hrs){ if(hrs==null)return null; if(hrs<1)return '<1h'; if(hrs<48)return Math.round(hrs)+'h'; return Math.round(hrs/24)+'d'; }
function delta(cur,prev){ if(prev==null||cur==null||prev===0)return '<span class="d fl">·</span>';
  const p=Math.round((cur-prev)/prev*100); if(p===0)return '<span class="d fl">·</span>';
  return p>0?'<span class="d up">▲'+p+'%</span>':'<span class="d dn">▼'+Math.abs(p)+'%</span>'; }

/* Auth: pin-gate.js is the sole gate. Read the shared session. */
let AUTH=null, BOOTED=false;
async function resolveMe(sess){
  if(!sess||BOOTED)return;
  const sr=await sb.from('staff').select('id,display_name,role').eq('auth_uid',sess.user.id).maybeSingle();
  if(sr.data){ BOOTED=true; AUTH={id:sr.data.id,name:sr.data.display_name,role:sr.data.role}; boot(); }
}
sb.auth.onAuthStateChange((_e,sess)=>{ if(sess) resolveMe(sess); });

/* ===== state (persisted + hash deep-linked) ===== */
const IMP_METRICS=['BUSINESS_IMPRESSIONS_DESKTOP_MAPS','BUSINESS_IMPRESSIONS_DESKTOP_SEARCH','BUSINESS_IMPRESSIONS_MOBILE_MAPS','BUSINESS_IMPRESSIONS_MOBILE_SEARCH'];
const TRENDS=[
  {id:'imp',   label:'Impressions',    metrics:IMP_METRICS},
  {id:'calls', label:'Calls',          metrics:['CALL_CLICKS']},
  {id:'dir',   label:'Directions',     metrics:['BUSINESS_DIRECTION_REQUESTS']},
  {id:'web',   label:'Website clicks', metrics:['WEBSITE_CLICKS']},
  {id:'rev',   label:'New reviews',    metrics:null},
  {id:'stars', label:'Rating',         metrics:null}
];
const TABS=['compare','trends','keywords'];
let TAB=(function(){ const h=(location.hash||'').replace('#','');
  if(TABS.indexOf(h)>-1)return h;
  try{const s=localStorage.getItem('cprGbpTab'); if(TABS.indexOf(s)>-1)return s;}catch(e){}
  return 'compare';})();
let TMET  =(function(){try{return localStorage.getItem('cprGbpTrendMetric')||'imp';}catch(e){return 'imp';}})();
let SEL   =(function(){try{return localStorage.getItem('cprGbpStore')||'All';}catch(e){return 'All';}})();
let MON   =(function(){try{const s=localStorage.getItem('cprGbpMonth'); if(s){const p=s.split('-').map(Number); const d=new Date(p[0],p[1]-1,1); if(d<=new Date()) return d;}}catch(e){} const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),1);})();
let KFILT='all', KSEARCH='';
function setTab(t){ if(TABS.indexOf(t)<0)return; TAB=t;
  try{localStorage.setItem('cprGbpTab',t);}catch(e){}
  history.replaceState(null,'','#'+t); render(); }
window.addEventListener('hashchange',()=>{ const h=(location.hash||'').replace('#','');
  if(TABS.indexOf(h)>-1&&h!==TAB){ TAB=h; try{localStorage.setItem('cprGbpTab',h);}catch(e){} render(); }});

/* ===== data ===== */
let LOCS=[], RMONTH=[], MROWS=[], KWS={}, MREVS=[], OPENREVS=[], THROUGH=null, LOADTOKEN=0;

function boot(){
  if(!AUTH||!isMgr(AUTH.role)){ $('#body').innerHTML=''; $('#gate').hidden=false; return; }
  loadStatic();
}
async function loadStatic(){
  const [locR,rmR,thR,opR,scR]=await Promise.all([
    sb.from('gbp_locations').select('*'),
    sb.from('gbp_reviews_monthly').select('*'),
    sb.from('gbp_metrics_daily').select('date').order('date',{ascending:false}).limit(1),
    sb.from('gbp_reviews').select('store,created_at').is('reply_text',null).is('deleted_at',null).eq('legacy_unanswered',false),
    sb.from('stores').select('store,color')
  ]);
  SCOLORS={}; (scR.data||[]).forEach(r=>{ if(r.color)SCOLORS[r.store]=r.color; });
  LOCS=(locR.data||[]).sort((a,b)=>storeOrder(a.store)-storeOrder(b.store));
  RMONTH=rmR.data||[];
  THROUGH=(thR.data&&thR.data[0])?String(thR.data[0].date).slice(0,10):null;
  OPENREVS=opR.data||[];
  if(!LOCS.length){ renderNotConnected(); return; }
  loadMonth();
}
async function loadMonth(){
  const token=++LOADTOKEN, mk=ymKey(MON);
  const mStart=mk+'-01', mEnd=ymAdd(mk,1)+'-01';
  const [mR,rvR,...kRs]=await Promise.all([
    sb.from('gbp_metrics_monthly').select('*').gte('month',ymAdd(mk,-23)).lte('month',mk),
    sb.from('gbp_reviews').select('store,stars,created_at,reply_text,replied_at')
      .gte('created_at',mStart).lt('created_at',mEnd).is('deleted_at',null),
    ...LOCS.map(l=>sb.from('gbp_keywords_monthly').select('keyword,impressions,is_threshold,is_branded').eq('store',l.store).eq('month',mk).order('impressions',{ascending:false}).limit(500))
  ]);
  if(token!==LOADTOKEN)return;
  MROWS=mR.data||[];
  MREVS=rvR.data||[];
  KWS={}; LOCS.forEach((l,i)=>{ KWS[l.store]=kRs[i].data||[]; });
  render();
}

/* ===== aggregation ===== */
function visLocs(){ return SEL==='All'?LOCS:LOCS.filter(l=>l.store===SEL); }
function mTotal(store,ym,metrics){ let t=0,found=false;
  for(const r of MROWS){ if(r.store===store&&r.month===ym&&metrics.indexOf(r.metric)>-1){ t+=Number(r.total)||0; found=true; } }
  return found?t:null; }
function rMonth(store,ym){ for(const r of RMONTH){ if(r.store===store&&r.month===ym) return r; } return null; }
function unanswered(store){ return OPENREVS.filter(r=>r.store===store); }
function discShare(store){ const rows=(KWS[store]||[]).filter(r=>!r.is_threshold);
  const d=rows.filter(r=>!r.is_branded).reduce((a,r)=>a+Number(r.impressions),0);
  const b=rows.filter(r=>r.is_branded).reduce((a,r)=>a+Number(r.impressions),0);
  return (d+b)>0?Math.round(d/(d+b)*100):null; }
function medianReplyH(store){
  const hs=MREVS.filter(r=>r.store===store&&r.reply_text&&r.replied_at)
    .map(r=>(new Date(r.replied_at)-new Date(r.created_at))/3600000).filter(h=>h>=0).sort((a,b)=>a-b);
  if(!hs.length)return null;
  return hs.length%2?hs[(hs.length-1)/2]:(hs[hs.length/2-1]+hs[hs.length/2])/2; }
function replyRate(store){
  const rs=MREVS.filter(r=>r.store===store);
  if(!rs.length)return null;
  return Math.round(rs.filter(r=>r.reply_text).length/rs.length*100); }
function photoAgeD(loc){ if(!loc.last_photo_at)return null;
  return Math.floor((Date.now()-new Date(loc.last_photo_at).getTime())/86400000); }
function benchStore(mk){
  let best=null,bv=-1;
  for(const l of LOCS){ const v=mTotal(l.store,mk,IMP_METRICS);
    if(v!=null&&v>bv){bv=v;best=l.store;} }
  if(best)return best;
  for(const l of LOCS){ const v=Number(l.review_count)||0; if(v>bv){bv=v;best=l.store;} }
  return best; }

/* row stats per store for the matrix + rules */
function storeStats(l,mk){
  const pk=ymAdd(mk,-1), rm=rMonth(l.store,mk)||{}, rp=rMonth(l.store,pk)||{};
  const un=unanswered(l.store);
  const oldestH=un.length?Math.max(...un.map(r=>(Date.now()-new Date(r.created_at).getTime())/3600000)):0;
  return { store:l.store, loc:l,
    imp:mTotal(l.store,mk,IMP_METRICS), impP:mTotal(l.store,pk,IMP_METRICS),
    disc:discShare(l.store),
    calls:mTotal(l.store,mk,['CALL_CLICKS']), callsP:mTotal(l.store,pk,['CALL_CLICKS']),
    dir:mTotal(l.store,mk,['BUSINESS_DIRECTION_REQUESTS']), dirP:mTotal(l.store,pk,['BUSINESS_DIRECTION_REQUESTS']),
    web:mTotal(l.store,mk,['WEBSITE_CLICKS']), webP:mTotal(l.store,pk,['WEBSITE_CLICKS']),
    vel:(rm.reviews!=null?Number(rm.reviews):null), velP:(rp.reviews!=null?Number(rp.reviews):null),
    rating:(l.rating!=null?Number(l.rating):null), rcount:(l.review_count!=null?Number(l.review_count):null),
    rrate:replyRate(l.store), med:medianReplyH(l.store),
    un:un.length, unOldH:Math.round(oldestH),
    photoD:photoAgeD(l) };
}

/* ===== shell ===== */
function render(){
  const mk=ymKey(MON), nowMk=ymKey(new Date()), isNow=mk===nowMk;
  const errs=LOCS.filter(l=>l.last_error);
  const sync=LOCS.map(l=>l.last_sync_at).filter(Boolean).sort().pop();
  let h='<div class="hd"><h1>📈 Google Traffic</h1>'
    +'<select class="storesel" data-sel><option value="All"'+(SEL==='All'?' selected':'')+'>All Stores</option>'
    +LOCS.map(l=>'<option value="'+esc(l.store)+'"'+(SEL===l.store?' selected':'')+'>CPR '+esc(shortStore(l.store))+'</option>').join('')+'</select>'
    +'<div class="monav"><button class="arr" data-mo="-1">‹</button>'
    +'<button class="lbl'+(isNow?'':' hist')+'" data-mopick title="Pick a month">'+ymLabel(mk)+' <span style="font-size:.6rem;color:var(--grey)">▾</span></button>'
    +'<button class="arr" data-mo="1"'+(isNow?' disabled':'')+'>›</button></div></div>';
  h+='<div class="syncline">'+(THROUGH?'Data through '+esc(new Date(THROUGH+'T12:00:00').toLocaleString('en-US',{month:'short',day:'numeric'})):'First sync pending')
    +(sync?' · synced '+esc(new Date(sync).toLocaleString('en-US',{hour:'numeric',minute:'2-digit'})):'')+'</div>';
  h+='<div class="tabs">'
    +'<button data-tab="compare" class="'+(TAB==='compare'?'on':'')+'">Compare</button>'
    +'<button data-tab="trends" class="'+(TAB==='trends'?'on':'')+'">Trends</button>'
    +'<button data-tab="keywords" class="'+(TAB==='keywords'?'on':'')+'">Keywords</button></div>';
  errs.forEach(l=>{ h+='<div class="errbar">⚠ '+esc(shortStore(l.store))+' sync error: '+esc(l.last_error)+'</div>'; });
  if(!THROUGH) h+='<div class="banner">First sync running — Google reports lag 3–5 days.</div>';
  h+= TAB==='compare'?renderCompare(mk):TAB==='trends'?renderTrends(mk):renderKeywords(mk);
  $('#body').innerHTML=h; wire();
}

/* ===== Compare: the scoreboard matrix ===== */
function spark(store,mk){
  const months=[]; for(let i=11;i>=0;i--) months.push(ymAdd(mk,-i));
  const vals=months.map(m=>mTotal(store,m,IMP_METRICS));
  const nn=vals.filter(v=>v!=null);
  if(nn.length<2)return '';
  const max=Math.max(...nn,1);
  const W=96,H=22;
  const pts=vals.map((v,i)=>v==null?null:( (i/(vals.length-1))*W ).toFixed(1)+','+((H-2)-(v/max*(H-4))).toFixed(1)).filter(Boolean).join(' ');
  return '<svg width="96" height="22" viewBox="0 0 '+W+' '+H+'"><polyline points="'+pts+'" fill="none" stroke="'+storeColor(store)+'" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" opacity=".85"/></svg>';
}
function renderCompare(mk){
  const bench=benchStore(mk);
  const stats=visLocs().map(l=>storeStats(l,mk));
  if(!stats.length)return '<div class="empty">No stores.</div>';
  const bs=LOCS.length?storeStats(LOCS.filter(l=>l.store===bench)[0]||LOCS[0],mk):null;
  const star=(v,best,higher)=>{ if(v==null||best==null)return '';
    const lead=higher?v>=best:v<=best; return lead&&stats.length>1?'<span class="mstar">★</span>':''; };
  // best value across VISIBLE stores per row key (higher-is-better unless noted)
  const bestOf=(k,higher)=>{ let m=null; stats.forEach(r=>{ const v=r[k]; if(v==null)return;
    if(m==null||(higher?v>m:v<m))m=v; }); return m; };
  const B={imp:bestOf('imp',1),disc:bestOf('disc',1),calls:bestOf('calls',1),dir:bestOf('dir',1),web:bestOf('web',1),
    vel:bestOf('vel',1),rating:bestOf('rating',1),rrate:bestOf('rrate',1),med:bestOf('med',0)};
  const bc=s=>s.store===bench?' bcol':'';
  const cell=(s,html)=>'<td class="mv'+bc(s)+'">'+html+'</td>';
  const num=(s,v,p,bk,higher)=>cell(s,'<span class="big">'+fmtN(v)+'</span>'+(s.store===bench?star(v,B[bk],higher!==false):'')+(p!==undefined?delta(v,p):''));
  let h='<div class="cmpwrap"><div class="cmpmain"><div class="scrollx"><table class="gt"><thead><tr><th></th>';
  stats.forEach(s=>{ h+='<th class="sth'+bc(s)+'"><div class="sn"><span class="dot" style="background:'+storeColor(s.store)+'"></span>'
    +esc(shortStore(s.store))+(s.store===bench?'<span class="bpl">★ Benchmark</span>':'')+'</div>'+spark(s.store,mk)+'</th>'; });
  h+='</tr></thead><tbody>';
  const row=(label,cells,link)=>{ h+='<tr><td class="rk">'+(link?'<a href="'+link+'">'+label+'</a>':label)+'</td>'+cells+'</tr>'; };
  row('Impressions',       stats.map(s=>num(s,s.imp,s.impP,'imp')).join(''));
  row('Discovery share',   stats.map(s=>cell(s,'<span class="big">'+(s.disc==null?'<span class="dotnul">·</span>':s.disc+'%')+'</span>'+(s.store===bench?star(s.disc,B.disc,true):''))).join(''));
  row('Calls',             stats.map(s=>num(s,s.calls,s.callsP,'calls')).join(''));
  row('Direction requests',stats.map(s=>num(s,s.dir,s.dirP,'dir')).join(''));
  row('Website clicks',    stats.map(s=>num(s,s.web,s.webP,'web')).join(''));
  row('New reviews',       stats.map(s=>num(s,s.vel,s.velP,'vel')).join(''));
  row('Rating (lifetime)', stats.map(s=>cell(s,'<span class="big">'+(s.rating!=null?'⭐ '+s.rating.toFixed(1):'<span class="dotnul">·</span>')+'</span>'
    +(s.store===bench?star(s.rating,B.rating,true):'')+(s.rcount!=null?'<span class="d fl">'+fmtN(s.rcount)+'</span>':''))).join(''));
  row('Reply rate',        stats.map(s=>cell(s,'<span class="big">'+(s.rrate==null?'<span class="dotnul">·</span>':s.rrate+'%')+'</span>'+(s.store===bench?star(s.rrate,B.rrate,true):''))).join(''),'google-reviews.html');
  row('Median reply time', stats.map(s=>cell(s,'<span class="big">'+(s.med==null?'<span class="dotnul">·</span>':fmtDur(s.med))+'</span>'
    +(s.store===bench?star(s.med,B.med,false):'')+(s.med!=null&&s.med>24?'<span class="d dn">SLA</span>':''))).join(''),'google-reviews.html');
  row('Unanswered now',    stats.map(s=>cell(s,s.un?'<span class="big" style="color:'+(s.unOldH>=24?'var(--red)':'var(--amber)')+'">'+s.un+'</span><span class="d fl">oldest '+fmtDur(s.unOldH)+'</span>':'<span class="big" style="color:var(--green)">0</span>')).join(''),'google-reviews.html');
  row('Last photo posted', stats.map(s=>cell(s,'<span class="big">'+(s.photoD==null?'<span class="dotnul">·</span>':s.photoD+'d ago')+'</span>')).join(''));
  h+='</tbody></table></div>';
  // gap badges vs benchmark
  if(bs&&stats.length>1){
    let rows='';
    stats.forEach(s=>{ if(s.store===bench)return;
      const pills=[];
      if(bs.disc!=null&&s.disc!=null&&bs.disc>s.disc) pills.push(['a','discovery −'+(bs.disc-s.disc)+'pt']);
      if(bs.vel!=null&&s.vel!=null&&bs.vel>s.vel) pills.push(['a','reviews −'+(bs.vel-s.vel)+'/mo']);
      if(bs.imp!=null&&s.imp!=null&&bs.imp>s.imp&&bs.imp>0) pills.push(['a','impressions −'+Math.round((bs.imp-s.imp)/bs.imp*100)+'%']);
      if(s.photoD!=null&&bs.photoD!=null&&s.photoD>bs.photoD) pills.push(['a','photos '+(s.photoD-bs.photoD)+'d staler']);
      if(s.med!=null&&bs.med!=null&&s.med>bs.med) pills.push(['a','replies '+fmtDur(s.med-bs.med)+' slower']);
      if(s.un>0) pills.push([s.unOldH>=24?'r':'a',s.un+' unanswered']);
      if(!pills.length) pills.push(['g','no gaps vs '+shortStore(bench)]);
      rows+='<div class="gaprow"><span class="gs">'+esc(shortStore(s.store))+'</span>'
        +pills.slice(0,5).map(p=>'<span class="pill '+p[0]+'">'+esc(p[1])+'</span>').join('')+'</div>';
    });
    h+='<div class="gaps"><div class="gl">Where each store trails '+esc(shortStore(bench))+' · '+esc(ymLabel(mk))+'</div>'+rows+'</div>';
  }
  h+='</div>';                                        // /cmpmain
  h+=renderRail(bench,mk);
  h+='</div>';                                        // /cmpwrap
  return h;
}

/* ===== right rail: rule-generated ===== */
function renderRail(bench,mk){
  if(!bench||LOCS.length<2)return '';
  const bs=storeStats(LOCS.filter(l=>l.store===bench)[0],mk);
  const others=LOCS.filter(l=>l.store!==bench).map(l=>storeStats(l,mk));
  const avg=k=>{ const vs=others.map(o=>o[k]).filter(v=>v!=null); return vs.length?vs.reduce((a,b)=>a+b,0)/vs.length:null; };
  const whys=[];
  const aDisc=avg('disc'); if(bs.disc!=null&&aDisc!=null&&bs.disc>aDisc)
    whys.push('Discovery share '+bs.disc+'% vs '+Math.round(aDisc)+'% elsewhere — non-branded searches find '+shortStore(bench)+'.');
  const aVel=avg('vel'); if(bs.vel!=null&&aVel!=null&&bs.vel>aVel)
    whys.push(bs.vel+' new reviews this month vs '+Math.round(aVel)+' elsewhere — velocity feeds ranking.');
  const aMed=avg('med'); if(bs.med!=null&&aMed!=null&&bs.med<aMed)
    whys.push('Replies land in '+fmtDur(bs.med)+' median vs '+fmtDur(aMed)+' elsewhere.');
  if(bs.rcount!=null){ const aC=avg('rcount'); if(aC!=null&&bs.rcount>aC)
    whys.push(fmtN(bs.rcount)+' lifetime reviews vs '+fmtN(Math.round(aC))+' average — depth Google trusts.'); }
  const dos=[];
  others.forEach(o=>{ if(o.un>0) dos.push('Answer '+o.un+' open review'+(o.un>1?'s':'')+' at '+shortStore(o.store)+(o.unOldH>=24?' — oldest past 24h':'')+'.'); });
  others.forEach(o=>{ if(o.photoD!=null&&o.photoD>30) dos.push('Post a fresh photo at '+shortStore(o.store)+' ('+o.photoD+'d old).'); });
  others.forEach(o=>{ if(bs.vel!=null&&o.vel!=null&&bs.vel>o.vel+2) dos.push('Ask for reviews at '+shortStore(o.store)+' — '+o.vel+'/mo vs '+bs.vel+' at '+shortStore(bench)+'.'); });
  const sync=LOCS.map(l=>l.last_sync_at).filter(Boolean).sort().pop();
  let h='<div class="rail">';
  if(whys.length) h+='<div class="railbox"><div class="rt">Why '+esc(shortStore(bench))+' wins</div><ol>'
    +whys.slice(0,3).map(w=>'<li>'+esc(w)+'</li>').join('')+'</ol></div>';
  if(dos.length) h+='<div class="railbox"><div class="rt">Do next</div><ul>'
    +dos.slice(0,3).map(d=>'<li>'+esc(d)+'</li>').join('')+'</ul></div>';
  h+='<div class="railfoot">'+(sync?'Synced '+esc(new Date(sync).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}))+' · ':'')+'nightly from your Business Profiles</div></div>';
  return h;
}

/* ===== Trends ===== */
function trendVal(store,m,def){
  if(def.metrics)return mTotal(store,m,def.metrics);
  const r=rMonth(store,m); if(!r)return null;
  if(def.id==='rev')return r.reviews!=null?Number(r.reviews):null;
  return r.avg_stars!=null?Number(r.avg_stars):null;
}
function renderTrends(mk){
  const def=TRENDS.find(t=>t.id===TMET)||TRENDS[0];
  const months=[]; for(let i=11;i>=0;i--) months.push(ymAdd(mk,-i));
  const monthsWithData=new Set(); MROWS.forEach(r=>monthsWithData.add(r.month)); RMONTH.forEach(r=>monthsWithData.add(r.month));
  if(monthsWithData.size<2)
    return '<div class="empty">History accumulates from first sync — check back next month.</div>';
  const series=visLocs().map(l=>({ store:l.store, color:storeColor(l.store),
    vals:months.map(m=>trendVal(l.store,m,def)),
    yoy:(function(){ const cur=trendVal(l.store,mk,def), old=trendVal(l.store,ymAdd(mk,-12),def);
      if(cur==null||old==null||old===0)return null; return Math.round((cur-old)/old*100); })() }));
  let max=0; series.forEach(s=>s.vals.forEach(v=>{ if(v!=null&&v>max)max=v; }));
  const isStars=def.id==='stars';
  const MAX=isStars?5:(function(v){ if(v<=10)return 10; const p=Math.pow(10,String(Math.floor(v)).length-1); return Math.ceil(v/p)*p; })(max||10);
  const W=720,H=240,L=46,R=12,T=14,B=28, iw=W-L-R, ih=H-T-B;
  const x=i=>L+(months.length<2?0:i*(iw/(months.length-1)));
  const y=v=>T+ih-(v/MAX*ih);
  let svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="'+esc(def.label)+' trend">';
  for(let g=0;g<=4;g++){ const gy=T+ih-(g/4*ih), gv=MAX*g/4;
    svg+='<line x1="'+L+'" y1="'+gy+'" x2="'+(W-R)+'" y2="'+gy+'" stroke="#EDEFF3" stroke-width="1"/>'
      +'<text x="'+(L-7)+'" y="'+(gy+3.5)+'" text-anchor="end" font-size="9.5" fill="#B9BDCB" font-family="Nunito Sans">'+(isStars?gv.toFixed(1):Number(gv).toLocaleString('en-US'))+'</text>'; }
  months.forEach((m,i)=>{ if(i%2===(months.length%2===0?1:0)) return;
    const p=m.split('-').map(Number);
    svg+='<text x="'+x(i)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9.5" fill="#B9BDCB" font-family="Nunito Sans">'+MONS[p[1]-1]+(p[1]===1?' '+String(p[0]).slice(2):'')+'</text>'; });
  series.forEach(s=>{
    const pts=s.vals.map((v,i)=>v==null?null:x(i)+','+y(v)).filter(Boolean).join(' ');
    if(pts) svg+='<polyline points="'+pts+'" fill="none" stroke="'+s.color+'" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>';
    s.vals.forEach((v,i)=>{ if(v==null)return;
      svg+='<circle cx="'+x(i)+'" cy="'+y(v)+'" r="3.1" fill="'+s.color+'"><title>'+esc(shortStore(s.store))+' · '+esc(ymLabel(months[i]))+' · '+(isStars?v.toFixed(2):Number(v).toLocaleString('en-US'))+'</title></circle>'; });
  });
  svg+='</svg>';
  let h='<div class="chips">'+TRENDS.map(t=>'<button data-tm="'+t.id+'" class="'+(t.id===TMET?'on':'')+'">'+t.label+'</button>').join('')+'</div>';
  h+='<div class="chartbox">'+svg+'<div class="legend">'
    +series.map(s=>'<span><span class="sw" style="background:'+s.color+'"></span>'+esc(shortStore(s.store))
      +(s.yoy!=null?'<span class="yy">'+(s.yoy>=0?'▲':'▼')+Math.abs(s.yoy)+'% YoY</span>':'')+'</span>').join('')
    +(ymKey(new Date())===mk?'<span style="color:var(--grey)">current month is partial</span>':'')+'</div></div>';
  return h;
}

/* ===== Keywords ===== */
function renderKeywords(mk){
  const stores=visLocs().map(l=>l.store);
  const map={};
  stores.forEach(s=>(KWS[s]||[]).forEach(r=>{ (map[r.keyword]=map[r.keyword]||{})[s]=r; }));
  let kws=Object.keys(map);
  const pub=ymAdd(mk,1).split('-').map(Number);
  const pubLabel=MONS[pub[1]-1]+' 3';
  if(!kws.length){
    return '<div class="empty">No keyword data for '+esc(ymLabel(mk))+' yet.<br><span style="font-size:.78rem">Google publishes a month’s keywords after it ends — expected around '+esc(pubLabel)+'.</span></div>';
  }
  let h='<div class="kbar"><button class="pillbtn '+(KFILT==='all'?'on':'')+'" data-kf="all">All keywords</button>'
    +(stores.length>1?stores.map(s=>'<button class="pillbtn '+(KFILT===s?'on':'')+'" data-kf="'+esc(s)+'">Missing at '+esc(shortStore(s))+'</button>').join(''):'')
    +'<input type="search" placeholder="Search keywords…" value="'+esc(KSEARCH)+'" data-ks></div>';
  if(KFILT!=='all'&&stores.indexOf(KFILT)>-1) kws=kws.filter(k=>!map[k][KFILT]);
  if(KSEARCH) kws=kws.filter(k=>k.indexOf(KSEARCH.toLowerCase())>-1);
  kws.sort((a,b)=>{ const mx=k=>Math.max(...stores.map(s=>map[k][s]&&!map[k][s].is_threshold?Number(map[k][s].impressions):0)); return mx(b)-mx(a)||a.localeCompare(b); });
  const total=kws.length, CAP=150; kws=kws.slice(0,CAP);
  const cell=r=>{ if(!r)return '<td class="miss">—</td>';
    return '<td class="num" style="font-weight:700">'+(r.is_threshold?'<span style="color:var(--grey)">&lt;15</span>':Number(r.impressions).toLocaleString('en-US'))+'</td>'; };
  h+='<div class="scrollx"><table class="gt"><thead><tr><th>Search keyword · '+esc(ymLabel(mk))+' · published '+esc(pubLabel)+'</th>'
    + stores.map(s=>'<th class="num">'+esc(shortStore(s))+'</th>').join('')+'</tr></thead><tbody>';
  kws.forEach(k=>{
    const branded=stores.some(s=>map[k][s]&&map[k][s].is_branded);
    h+='<tr><td>'+esc(k)+(branded?'<span class="bpill">brand</span>':'')+'</td>'+stores.map(s=>cell(map[k][s])).join('')+'</tr>';
  });
  h+='</tbody></table></div>';
  h+='<div class="foot"><span>'+(total>CAP?'Showing top '+CAP+' of '+Number(total).toLocaleString('en-US')+' — use search to narrow.':Number(total).toLocaleString('en-US')+' keywords.')+'</span><span>&lt;15 = below Google’s reporting threshold · — = never appeared.</span><span>“brand” = contains CPR.</span><span>Keyword gaps usually trace to profile services — services sync lands in Phase 3.</span></div>';
  return h;
}

/* ===== not connected ===== */
function renderNotConnected(){
  $('#body').innerHTML='<div class="hd"><h1>📈 Google Traffic</h1></div>'
   +'<div class="hero"><h2>Not connected yet</h2>'
   +'<p>The <b>gbp-sync</b> edge function hasn’t pulled any data. Deploy steps: <b>docs/GBP_SESSION_HANDOFF.md</b>.</p></div>';
}

/* ===== wiring ===== */
function wire(){
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>setTab(b.getAttribute('data-tab')));
  const sel=$('#body').querySelector('[data-sel]');
  if(sel)sel.onchange=()=>{ SEL=sel.value; try{localStorage.setItem('cprGbpStore',SEL);}catch(e){} render(); };
  const nowFirst=new Date(new Date().getFullYear(),new Date().getMonth(),1);
  document.querySelectorAll('[data-mo]').forEach(b=>b.onclick=()=>{ if(b.disabled)return;
    const d=new Date(MON.getFullYear(),MON.getMonth()+Number(b.getAttribute('data-mo')),1);
    if(d>nowFirst)return; MON=d; try{localStorage.setItem('cprGbpMonth',ymKey(MON));}catch(e){} loadMonth(); });
  const mp=$('#body').querySelector('[data-mopick]');
  if(mp&&window.CPRPickers)mp.onclick=ev=>{ev.stopPropagation();
    CPRPickers.month(mp,{get:()=>MON,set:d=>{ if(d>nowFirst)return; MON=d;
      try{localStorage.setItem('cprGbpMonth',ymKey(MON));}catch(e){} loadMonth(); }});};
  document.querySelectorAll('[data-tm]').forEach(b=>b.onclick=()=>{ TMET=b.getAttribute('data-tm');
    try{localStorage.setItem('cprGbpTrendMetric',TMET);}catch(e){} render(); });
  document.querySelectorAll('[data-kf]').forEach(b=>b.onclick=()=>{ KFILT=b.getAttribute('data-kf'); render(); });
  const ks=$('#body').querySelector('[data-ks]');
  if(ks){ ks.oninput=()=>{ KSEARCH=ks.value; clearTimeout(ks._t); ks._t=setTimeout(()=>{ render();
    const k2=$('#body').querySelector('[data-ks]'); if(k2){ k2.focus(); k2.setSelectionRange(k2.value.length,k2.value.length); } },250); }; }
}

(async()=>{ try{ const s=(await sb.auth.getSession()).data.session; if(s) resolveMe(s); }catch(e){} })();
