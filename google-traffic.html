<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Google Traffic · CPR Oregon</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--border:#E0E2EA;--green:#2E9E5B;--amber:#C9820B;}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0}
body{font-family:'Nunito Sans',sans-serif;color:var(--dark);background:var(--light-grey)}
.wrap{padding:22px 26px 60px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.6rem;letter-spacing:-.4px;margin:0}
.sub{font-weight:700;font-size:.85rem;color:var(--grey);margin-top:4px}
.hd{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:12px}
.monav{display:flex;align-items:center;gap:6px;margin-left:auto}
.monav button{height:34px;border:1px solid var(--border);background:#fff;border-radius:9px;cursor:pointer;color:var(--dark-grey)}
.monav .arr{width:34px;font-size:1rem}
.monav .arr[disabled]{opacity:.4;cursor:default}
.monav .lbl{font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;min-width:130px;padding:0 14px}
.monav .lbl.hist{color:var(--amber)}
.tabs{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 14px}
.tabs button{font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;padding:8px 15px;border:1px solid var(--border);background:#fff;color:var(--dark-grey);border-radius:999px;cursor:pointer}
.tabs button.on{background:var(--dark);color:#fff;border-color:var(--dark)}
.tabs .bdg{display:inline-block;background:var(--red);color:#fff;font-size:.62rem;font-weight:900;border-radius:999px;padding:1px 6px;margin-left:5px;vertical-align:1px}
.tabs button.on .bdg{background:#fff;color:var(--red)}
/* compare cards */
.cards{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch}
.card{flex:1;min-width:250px;background:#fff;border:1px solid var(--border);border-radius:13px;padding:14px 16px}
.card .ttl{display:flex;align-items:center;gap:8px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;margin-bottom:8px}
.card .dot{width:9px;height:9px;border-radius:50%;flex:none}
.stat{display:flex;align-items:baseline;gap:8px;padding:5px 0;border-bottom:1px solid var(--light-grey)}
.stat:last-child{border-bottom:none}
.stat .k{flex:1;font-weight:700;font-size:.74rem;color:var(--dark-grey)}
.stat .v{font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;font-variant-numeric:tabular-nums}
.stat .d{font-family:'Nunito',sans-serif;font-weight:800;font-size:.66rem;min-width:44px;text-align:right}
.d.up{color:var(--green)}.d.dn{color:var(--red)}.d.fl{color:var(--grey)}
.best{color:#B07A08}
.gap{margin-top:14px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 16px;font-size:.84rem;line-height:1.55}
.gap b{font-family:'Nunito',sans-serif}
.gap .gl{font-family:'Nunito',sans-serif;font-weight:900;font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);margin-bottom:4px}
/* trends */
.chips{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 12px}
.chips button{font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;padding:6px 12px;border:1px solid var(--border);background:#fff;color:var(--dark-grey);border-radius:999px;cursor:pointer}
.chips button.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.chartbox{background:#fff;border:1px solid var(--border);border-radius:13px;padding:16px 14px 8px}
.chartbox svg{width:100%;height:auto;display:block}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin:8px 4px 6px;font-size:.76rem;color:var(--dark-grey);font-weight:700}
.legend .sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
/* keywords */
.kbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.kbar input{font-family:'Nunito Sans',sans-serif;font-size:.84rem;padding:8px 12px;border:1px solid var(--border);border-radius:9px;min-width:200px}
.scrollx{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:#fff}
table.gt{width:100%;border-collapse:collapse}
table.gt th{font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);background:#F0F1F4;white-space:nowrap}
table.gt td{padding:9px 14px;border-bottom:1px solid var(--light-grey);font-size:.85rem}
table.gt td.num,table.gt th.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
td.miss{color:#d3d6df;text-align:right}
.bpill{display:inline-block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;text-transform:uppercase;letter-spacing:.4px;border-radius:999px;padding:2px 7px;background:#EEF2FA;color:#5A6B93;margin-left:6px}
/* reviews */
.rvbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.rv{background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 16px;margin-bottom:10px;cursor:pointer}
.rv .top{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.rv .stars{color:#E2A63C;font-size:.85rem;letter-spacing:1px}
.rv .who{font-family:'Nunito',sans-serif;font-weight:800;font-size:.86rem}
.rv .age{font-size:.72rem;color:var(--grey);font-weight:700}
.rv .txt{margin-top:6px;font-size:.86rem;line-height:1.5;color:var(--dark-grey);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.rv.open .txt{display:block}
.rv .reply{margin-top:9px;background:#F7F8FB;border-left:3px solid var(--blue);border-radius:0 8px 8px 0;padding:8px 12px;font-size:.8rem;color:var(--dark-grey);display:none}
.rv.open .reply{display:block}
.spill{display:inline-block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.4px;border-radius:999px;padding:3px 9px;margin-left:auto}
.s-ok{color:#1E7A45;background:#E9F6EE}
.s-wait{color:#9A6700;background:#FCF3E3}
.s-late{color:#B02329;background:#FCEDED}
.stag{display:inline-block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;border-radius:999px;padding:2px 9px;color:#fff}
.pillbtn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;padding:6px 12px;border:1px solid var(--border);background:#fff;color:var(--dark-grey);border-radius:999px;cursor:pointer}
.pillbtn.on{background:var(--dark);color:#fff;border-color:var(--dark)}
.empty{color:var(--grey);font-weight:700;padding:26px;text-align:center}
.note{font-size:.9rem;color:var(--dark-grey);background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:20px}
.foot{margin-top:16px;font-size:.72rem;color:var(--grey);font-weight:700;display:flex;gap:14px;flex-wrap:wrap}
.errbar{background:#FCEDED;border:1px solid #F2C6C8;color:#B02329;border-radius:10px;padding:9px 13px;font-size:.78rem;font-weight:700;margin:0 0 12px}
.hero{background:#fff;border:1px solid var(--border);border-radius:14px;padding:28px;max-width:680px}
.hero h2{font-family:'Nunito',sans-serif;font-weight:900;margin:0 0 8px}
.hero p{font-size:.9rem;line-height:1.6;color:var(--dark-grey)}
.hero code{display:block;background:#F7F8FB;border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-size:.74rem;overflow-x:auto;white-space:pre;margin:8px 0}
@media (max-width:640px){ .wrap{padding:16px 12px 50px} .cards{flex-direction:column} .monav .lbl{min-width:104px} }
</style>
</head>
<body>

<div class="wrap" id="app">
  <div id="body"><div class="empty">Loading…</div></div>
  <div id="gate" class="note" hidden>Google Traffic is for managers and the owner.</div>
</div>

<script src="assets/pin-gate.js"></script>
<script src="assets/pickers.js"></script>
<script src="assets/locations.js"></script>
<script src="assets/nav.js"></script>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SB_URL='https://xuvsehrevxackuhmbmry.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY';
const sb=createClient(SB_URL,ANON);
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const isMgr=r=>['owner','admin','manager'].indexOf(r)>-1;
const MONL=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function shortStore(s){return window.CPRLocations?CPRLocations.display(s):String(s||'').replace(/^CPR\s*/,'');}
function storeOrder(s){try{var x=CPRLocations.find(s);return x?x.order:99;}catch(e){return 99;}}
const PALETTE=['#4FB0E3','#DC282E','#2D2D3B','#2E9E5B','#C9820B'];
function storeColor(s){ return PALETTE[(storeOrder(s)-1+PALETTE.length)%PALETTE.length]; }
function ymKey(d){ return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2); }
function ymAdd(ym,n){ const p=ym.split('-').map(Number); const d=new Date(p[0],p[1]-1+n,1); return ymKey(d); }
function ymLabel(ym){ const p=ym.split('-').map(Number); return MONL[p[1]-1]+' '+p[0]; }
function fmtN(n){ if(n==null)return '—'; return Number(n).toLocaleString('en-US'); }
function fmtAge(iso){ if(!iso)return ''; const ms=Date.now()-new Date(iso).getTime();
  const h=Math.floor(ms/3600000); if(h<1)return Math.max(1,Math.floor(ms/60000))+'m'; if(h<48)return h+'h'; return Math.floor(h/24)+'d'; }
function delta(cur,prev){ if(prev==null||cur==null||prev===0)return '<span class="d fl">—</span>';
  const p=Math.round((cur-prev)/prev*100); if(p===0)return '<span class="d fl">·</span>';
  return p>0?'<span class="d up">▲'+p+'%</span>':'<span class="d dn">▼'+Math.abs(p)+'%</span>'; }

/* Auth: pin-gate.js is the sole gate. Read the shared session. */
let AUTH=null, BOOTED=false;
async function resolveMe(sess){
  if(!sess||BOOTED)return;
  const sr=await sb.from('staff').select('id,display_name,role').eq('auth_uid',sess.user.id).maybeSingle();
  if(sr.data){ BOOTED=true; AUTH={id:sr.data.id,name:sr.data.display_name,role:sr.data.role}; boot(); }
}
sb.auth.onAuthStateChange((_e,sess)=>{ if(sess) resolveMe(sess); });

/* ===== state ===== */
const IMP_METRICS=['BUSINESS_IMPRESSIONS_DESKTOP_MAPS','BUSINESS_IMPRESSIONS_DESKTOP_SEARCH','BUSINESS_IMPRESSIONS_MOBILE_MAPS','BUSINESS_IMPRESSIONS_MOBILE_SEARCH'];
const TRENDS=[
  {id:'imp',   label:'Impressions',    metrics:IMP_METRICS},
  {id:'calls', label:'Calls',          metrics:['CALL_CLICKS']},
  {id:'dir',   label:'Directions',     metrics:['BUSINESS_DIRECTION_REQUESTS']},
  {id:'web',   label:'Website clicks', metrics:['WEBSITE_CLICKS']},
  {id:'rev',   label:'New reviews',    metrics:null}   // from gbp_reviews_monthly
];
let TAB   =(function(){try{return localStorage.getItem('cprGbpTab')||'compare';}catch(e){return 'compare';}})();
let TMET  =(function(){try{return localStorage.getItem('cprGbpTrendMetric')||'imp';}catch(e){return 'imp';}})();
let MON   =(function(){try{const s=localStorage.getItem('cprGbpMonth'); if(s){const p=s.split('-').map(Number); const d=new Date(p[0],p[1]-1,1); if(d<=new Date()) return d;}}catch(e){} const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),1);})();
let KFILT='all', KSEARCH='', RSTORE='All', RUN=false, RSTARS=0, ROPEN=null;

/* ===== data ===== */
let LOCS=[], RMONTH=[], MROWS=[], KWS={}, REVS=[], THROUGH=null, LOADTOKEN=0;

function boot(){
  if(!AUTH||!isMgr(AUTH.role)){ $('#body').innerHTML=''; $('#gate').hidden=false; return; }
  loadStatic();
}
async function loadStatic(){
  const [locR,rmR,thR,rvR]=await Promise.all([
    sb.from('gbp_locations').select('*'),
    sb.from('gbp_reviews_monthly').select('*'),
    sb.from('gbp_metrics_daily').select('date').order('date',{ascending:false}).limit(1),
    sb.from('gbp_reviews').select('id,store,stars,comment,reviewer_name,created_at,reply_text,replied_at').is('deleted_at',null).order('created_at',{ascending:false}).limit(300)
  ]);
  LOCS=(locR.data||[]).sort((a,b)=>storeOrder(a.store)-storeOrder(b.store));
  RMONTH=rmR.data||[];
  THROUGH=(thR.data&&thR.data[0])?String(thR.data[0].date).slice(0,10):null;
  REVS=rvR.data||[];
  if(!LOCS.length){ renderNotConnected(); return; }
  loadMonth();
}
async function loadMonth(){
  const token=++LOADTOKEN, mk=ymKey(MON);
  const [mR,...kRs]=await Promise.all([
    sb.from('gbp_metrics_monthly').select('*').gte('month',ymAdd(mk,-11)).lte('month',mk),
    ...LOCS.map(l=>sb.from('gbp_keywords_monthly').select('keyword,impressions,is_threshold,is_branded').eq('store',l.store).eq('month',mk).order('impressions',{ascending:false}).limit(500))
  ]);
  if(token!==LOADTOKEN)return;
  MROWS=mR.data||[];
  KWS={}; LOCS.forEach((l,i)=>{ KWS[l.store]=kRs[i].data||[]; });
  render();
}

/* ===== aggregation helpers ===== */
function mTotal(store,ym,metrics){ let t=0,found=false;
  for(const r of MROWS){ if(r.store===store&&r.month===ym&&metrics.indexOf(r.metric)>-1){ t+=Number(r.total)||0; found=true; } }
  return found?t:null; }
function rMonth(store,ym){ for(const r of RMONTH){ if(r.store===store&&r.month===ym) return r; } return null; }
function unansweredBy(store){ return REVS.filter(r=>!r.reply_text&&(store?r.store===store:true)).length; }
function discShare(store){ const rows=(KWS[store]||[]).filter(r=>!r.is_threshold);
  const d=rows.filter(r=>!r.is_branded).reduce((a,r)=>a+Number(r.impressions),0);
  const b=rows.filter(r=>r.is_branded).reduce((a,r)=>a+Number(r.impressions),0);
  return (d+b)>0?Math.round(d/(d+b)*100):null; }

/* ===== shell ===== */
function render(){
  const mk=ymKey(MON), nowMk=ymKey(new Date()), isNow=mk===nowMk;
  const unTot=unansweredBy(null);
  const errs=LOCS.filter(l=>l.last_error);
  let h='<div class="hd"><div><h1>📈 Google Traffic</h1><div class="sub">How each store performs on Google — synced nightly from your Business Profiles</div></div>'
    +'<div class="monav"><button class="arr" data-mo="-1">‹</button>'
    +'<button class="lbl'+(isNow?'':' hist')+'" data-mopick title="Pick a month">'+ymLabel(mk)+' <span style="font-size:.6rem;color:var(--grey)">▾</span></button>'
    +'<button class="arr" data-mo="1"'+(isNow?' disabled':'')+'>›</button></div></div>';
  h+='<div class="tabs">'
    +'<button data-tab="compare" class="'+(TAB==='compare'?'on':'')+'">Compare</button>'
    +'<button data-tab="trends" class="'+(TAB==='trends'?'on':'')+'">Trends</button>'
    +'<button data-tab="keywords" class="'+(TAB==='keywords'?'on':'')+'">Keywords</button>'
    +'<button data-tab="reviews" class="'+(TAB==='reviews'?'on':'')+'">Reviews'+(unTot?'<span class="bdg">'+unTot+'</span>':'')+'</button></div>';
  errs.forEach(l=>{ h+='<div class="errbar">⚠ '+esc(shortStore(l.store))+' sync error: '+esc(l.last_error)+'</div>'; });
  h+= TAB==='compare'?renderCompare(mk):TAB==='trends'?renderTrends(mk):TAB==='keywords'?renderKeywords(mk):renderReviews();
  const sync=LOCS.map(l=>l.last_sync_at).filter(Boolean).sort().pop();
  h+='<div class="foot">'+(sync?'<span>Last sync '+esc(new Date(sync).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}))+'</span>':'')
    +(THROUGH?'<span>Google data through '+esc(THROUGH)+' (metrics lag a few days)</span>':'')+'</div>';
  $('#body').innerHTML=h; wire();
}

/* ===== Compare tab ===== */
function renderCompare(mk){
  const pk=ymAdd(mk,-1);
  const rows=LOCS.map(l=>{
    const rm=rMonth(l.store,mk)||{}, rp=rMonth(l.store,pk)||{};
    return { store:l.store, rating:l.rating, rcount:l.review_count,
      imp:mTotal(l.store,mk,IMP_METRICS), impP:mTotal(l.store,pk,IMP_METRICS),
      calls:mTotal(l.store,mk,['CALL_CLICKS']), callsP:mTotal(l.store,pk,['CALL_CLICKS']),
      dir:mTotal(l.store,mk,['BUSINESS_DIRECTION_REQUESTS']), dirP:mTotal(l.store,pk,['BUSINESS_DIRECTION_REQUESTS']),
      web:mTotal(l.store,mk,['WEBSITE_CLICKS']), webP:mTotal(l.store,pk,['WEBSITE_CLICKS']),
      disc:discShare(l.store),
      vel:rm.reviews||0, velP:rp.reviews||0,
      reply:(rm.reviews>0)?Math.round((rm.replied||0)/rm.reviews*100):null,
      un:unansweredBy(l.store) };
  });
  const best=k=>{ let m=null; rows.forEach(r=>{ if(r[k]!=null&&(m==null||r[k]>m)) m=r[k]; }); return m; };
  const B={imp:best('imp'),calls:best('calls'),dir:best('dir'),web:best('web'),disc:best('disc'),vel:best('vel'),rating:best('rating'),reply:best('reply')};
  const star=(v,b)=>(v!=null&&b!=null&&v===b&&rows.length>1)?' <span class="best">★</span>':'';
  let h='<div class="cards">';
  rows.forEach(r=>{
    h+='<div class="card"><div class="ttl"><span class="dot" style="background:'+storeColor(r.store)+'"></span>'+esc(shortStore(r.store))+'</div>'
     +'<div class="stat"><span class="k">Impressions</span><span class="v">'+fmtN(r.imp)+star(r.imp,B.imp)+'</span>'+delta(r.imp,r.impP)+'</div>'
     +'<div class="stat"><span class="k">Discovery share</span><span class="v">'+(r.disc==null?'—':r.disc+'%')+star(r.disc,B.disc)+'</span><span class="d fl"></span></div>'
     +'<div class="stat"><span class="k">Calls</span><span class="v">'+fmtN(r.calls)+star(r.calls,B.calls)+'</span>'+delta(r.calls,r.callsP)+'</div>'
     +'<div class="stat"><span class="k">Directions</span><span class="v">'+fmtN(r.dir)+star(r.dir,B.dir)+'</span>'+delta(r.dir,r.dirP)+'</div>'
     +'<div class="stat"><span class="k">Website clicks</span><span class="v">'+fmtN(r.web)+star(r.web,B.web)+'</span>'+delta(r.web,r.webP)+'</div>'
     +'<div class="stat"><span class="k">New reviews</span><span class="v">'+fmtN(r.vel)+star(r.vel,B.vel)+'</span>'+delta(r.vel,r.velP)+'</div>'
     +'<div class="stat"><span class="k">Rating (lifetime)</span><span class="v">'+(r.rating!=null?'⭐ '+Number(r.rating).toFixed(1):'—')+star(r.rating,B.rating)+'</span><span class="d fl">'+(r.rcount!=null?fmtN(r.rcount):'')+'</span></div>'
     +'<div class="stat"><span class="k">Reply rate (month)</span><span class="v">'+(r.reply==null?'—':r.reply+'%')+star(r.reply,B.reply)+'</span>'
     +(r.un?'<span class="d dn">'+r.un+' open</span>':'<span class="d up">✓</span>')+'</div>'
     +'</div>';
  });
  h+='</div>';
  // gap analysis vs the impressions leader
  const lead=rows.filter(r=>r.imp!=null).sort((a,b)=>b.imp-a.imp)[0];
  if(lead&&rows.length>1){
    let lines='';
    rows.forEach(r=>{ if(r.store===lead.store||r.imp==null)return;
      const bits=[];
      if(lead.imp>0) bits.push(Math.round((lead.imp-r.imp)/lead.imp*100)+'% fewer impressions');
      if(lead.disc!=null&&r.disc!=null&&lead.disc>r.disc) bits.push((lead.disc-r.disc)+'pt lower discovery share');
      if(lead.vel>r.vel) bits.push((lead.vel-r.vel)+' fewer reviews this month');
      if(r.un>0) bits.push(r.un+' unanswered review'+(r.un>1?'s':''));
      if(bits.length) lines+='<div><b>'+esc(shortStore(r.store))+'</b> vs '+esc(shortStore(lead.store))+': '+bits.join(' · ')+'.</div>';
    });
    if(lines) h+='<div class="gap"><div class="gl">Gap analysis · '+esc(ymLabel(mk))+'</div>'+lines+'</div>';
  }
  return h;
}

/* ===== Trends tab ===== */
function renderTrends(mk){
  const def=TRENDS.find(t=>t.id===TMET)||TRENDS[0];
  const months=[]; for(let i=11;i>=0;i--) months.push(ymAdd(mk,-i));
  const series=LOCS.map(l=>({ store:l.store, color:storeColor(l.store),
    vals:months.map(m=> def.metrics ? mTotal(l.store,m,def.metrics) : (rMonth(l.store,m)||{}).reviews||0 ) }));
  let max=0; series.forEach(s=>s.vals.forEach(v=>{ if(v!=null&&v>max)max=v; }));
  const nice=v=>{ if(v<=10)return 10; const p=Math.pow(10,String(Math.floor(v)).length-1); return Math.ceil(v/p)*p; };
  const MAX=nice(max||10);
  const W=720,H=240,L=46,R=12,T=14,B=28, iw=W-L-R, ih=H-T-B;
  const x=i=>L+(months.length<2?0:i*(iw/(months.length-1)));
  const y=v=>T+ih-(v/MAX*ih);
  let svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="'+esc(def.label)+' trend">';
  for(let g=0;g<=4;g++){ const gy=T+ih-(g/4*ih), gv=Math.round(MAX*g/4);
    svg+='<line x1="'+L+'" y1="'+gy+'" x2="'+(W-R)+'" y2="'+gy+'" stroke="#EDEFF3" stroke-width="1"/>'
      +'<text x="'+(L-7)+'" y="'+(gy+3.5)+'" text-anchor="end" font-size="9.5" fill="#B9BDCB" font-family="Nunito Sans">'+fmtN(gv)+'</text>'; }
  months.forEach((m,i)=>{ if(i%2===(months.length%2===0?1:0)) return;
    const p=m.split('-').map(Number);
    svg+='<text x="'+x(i)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9.5" fill="#B9BDCB" font-family="Nunito Sans">'+MONS[p[1]-1]+(p[1]===1?' '+String(p[0]).slice(2):'')+'</text>'; });
  series.forEach(s=>{
    const pts=s.vals.map((v,i)=>v==null?null:x(i)+','+y(v)).filter(Boolean).join(' ');
    if(pts) svg+='<polyline points="'+pts+'" fill="none" stroke="'+s.color+'" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>';
    s.vals.forEach((v,i)=>{ if(v==null)return;
      svg+='<circle cx="'+x(i)+'" cy="'+y(v)+'" r="3.1" fill="'+s.color+'"><title>'+esc(shortStore(s.store))+' · '+esc(ymLabel(months[i]))+' · '+fmtN(v)+'</title></circle>'; });
  });
  svg+='</svg>';
  let h='<div class="chips">'+TRENDS.map(t=>'<button data-tm="'+t.id+'" class="'+(t.id===TMET?'on':'')+'">'+t.label+'</button>').join('')+'</div>';
  h+='<div class="chartbox">'+svg+'<div class="legend">'
    +series.map(s=>'<span><span class="sw" style="background:'+s.color+'"></span>'+esc(shortStore(s.store))+'</span>').join('')
    +(ymKey(new Date())===mk?'<span style="color:var(--grey)">current month is partial</span>':'')+'</div></div>';
  return h;
}

/* ===== Keywords tab ===== */
function renderKeywords(mk){
  const stores=LOCS.map(l=>l.store);
  const map={}; // keyword -> {store: row}
  stores.forEach(s=>(KWS[s]||[]).forEach(r=>{ (map[r.keyword]=map[r.keyword]||{})[s]=r; }));
  let kws=Object.keys(map);
  if(!kws.length){
    return '<div class="empty">No keyword data for '+esc(ymLabel(mk))+' yet.<br><span style="font-size:.78rem">Google publishes a month’s search keywords after the month ends — pick an earlier month, or wait for the monthly sync.</span></div>';
  }
  let h='<div class="kbar"><button class="pillbtn '+(KFILT==='all'?'on':'')+'" data-kf="all">All keywords</button>'
    + stores.map(s=>'<button class="pillbtn '+(KFILT===s?'on':'')+'" data-kf="'+esc(s)+'">Missing at '+esc(shortStore(s))+'</button>').join('')
    +'<input type="search" placeholder="Search keywords…" value="'+esc(KSEARCH)+'" data-ks></div>';
  if(KFILT!=='all') kws=kws.filter(k=>!map[k][KFILT]);
  if(KSEARCH) kws=kws.filter(k=>k.indexOf(KSEARCH.toLowerCase())>-1);
  kws.sort((a,b)=>{ const mx=k=>Math.max(...stores.map(s=>map[k][s]&&!map[k][s].is_threshold?Number(map[k][s].impressions):0)); return mx(b)-mx(a)||a.localeCompare(b); });
  const total=kws.length, CAP=150; kws=kws.slice(0,CAP);
  const cell=r=>{ if(!r)return '<td class="miss">—</td>';
    return '<td class="num">'+(r.is_threshold?'<span style="color:var(--grey)">&lt;15</span>':fmtN(r.impressions))+'</td>'; };
  h+='<div class="scrollx"><table class="gt"><thead><tr><th>Search keyword · '+esc(ymLabel(mk))+'</th>'
    + stores.map(s=>'<th class="num">'+esc(shortStore(s))+'</th>').join('')+'</tr></thead><tbody>';
  kws.forEach(k=>{
    const branded=stores.some(s=>map[k][s]&&map[k][s].is_branded);
    h+='<tr><td>'+esc(k)+(branded?'<span class="bpill">brand</span>':'')+'</td>'+stores.map(s=>cell(map[k][s])).join('')+'</tr>';
  });
  h+='</tbody></table></div>';
  h+='<div class="foot"><span>'+(total>CAP?'Showing top '+CAP+' of '+fmtN(total)+' — use search to narrow.':fmtN(total)+' keywords.')+'</span><span>&lt;15 = below Google’s reporting threshold.</span><span>“brand” = contains CPR; the rest is discovery traffic.</span></div>';
  return h;
}

/* ===== Reviews tab ===== */
function renderReviews(){
  const stores=LOCS.map(l=>l.store);
  let list=REVS.slice();
  const unTot=unansweredBy(RSTORE==='All'?null:RSTORE);
  if(RSTORE!=='All') list=list.filter(r=>r.store===RSTORE);
  if(RUN) list=list.filter(r=>!r.reply_text);
  if(RSTARS) list=list.filter(r=>r.stars===RSTARS);
  let h='<div class="rvbar"><button class="pillbtn '+(RSTORE==='All'?'on':'')+'" data-rs="All">All stores</button>'
    + stores.map(s=>'<button class="pillbtn '+(RSTORE===s?'on':'')+'" data-rs="'+esc(s)+'">'+esc(shortStore(s))+'</button>').join('')
    +'<button class="pillbtn '+(RUN?'on':'')+'" data-run>Unanswered'+(unTot?' · '+unTot:'')+'</button>'
    +'<select data-rst style="font-family:inherit;font-size:.78rem;font-weight:700;padding:6px 8px;border:1px solid var(--border);border-radius:9px;background:#fff">'
    +'<option value="0">★ any</option>'+[5,4,3,2,1].map(n=>'<option value="'+n+'"'+(RSTARS===n?' selected':'')+'>'+'★'.repeat(n)+'</option>').join('')+'</select></div>';
  if(!list.length) return h+'<div class="empty">No reviews match these filters.</div>';
  list.forEach(r=>{
    const open=ROPEN===r.id;
    const age=fmtAge(r.created_at);
    let status;
    if(r.reply_text) status='<span class="spill s-ok">✓ replied</span>';
    else { const hrs=(Date.now()-new Date(r.created_at).getTime())/3600000;
      status='<span class="spill '+(hrs>24?'s-late':'s-wait')+'">no reply · '+fmtAge(r.created_at)+'</span>'; }
    h+='<div class="rv'+(open?' open':'')+'" data-rid="'+esc(r.id)+'">'
      +'<div class="top"><span class="stars">'+'★'.repeat(r.stars||0)+'<span style="color:#EDE3D2">'+'★'.repeat(Math.max(0,5-(r.stars||0)))+'</span></span>'
      +'<span class="who">'+esc(r.reviewer_name||'Anonymous')+'</span>'
      +'<span class="stag" style="background:'+storeColor(r.store)+'">'+esc(shortStore(r.store))+'</span>'
      +'<span class="age">'+esc(age)+' ago</span>'+status+'</div>'
      +(r.comment?'<div class="txt">'+esc(r.comment)+'</div>':'<div class="txt" style="color:var(--grey)">(rating only — no text)</div>')
      +(r.reply_text?'<div class="reply"><b>Our reply'+(r.replied_at?' · '+esc(fmtAge(r.replied_at))+' ago':'')+':</b><br>'+esc(r.reply_text)+'</div>':'')
      +'</div>';
  });
  h+='<div class="foot"><span>Showing '+list.length+' of the '+REVS.length+' most recent synced reviews.</span><span>Reply actions arrive with Phase 2 — for now, answer from the Google Business Profile app.</span></div>';
  return h;
}

/* ===== wiring ===== */
function wire(){
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{ TAB=b.getAttribute('data-tab');
    try{localStorage.setItem('cprGbpTab',TAB);}catch(e){} render(); });
  const nowFirst=new Date(new Date().getFullYear(),new Date().getMonth(),1);
  document.querySelectorAll('[data-mo]').forEach(b=>b.onclick=()=>{ if(b.disabled)return;
    const d=new Date(MON.getFullYear(),MON.getMonth()+Number(b.getAttribute('data-mo')),1);
    if(d>nowFirst)return; MON=d; try{localStorage.setItem('cprGbpMonth',ymKey(MON));}catch(e){} loadMonth(); });
  const mp=$('#body').querySelector('[data-mopick]');
  if(mp&&window.CPRPickers)mp.onclick=ev=>{ev.stopPropagation();
    CPRPickers.month(mp,{get:()=>MON,set:d=>{ if(d>nowFirst)return; MON=d;
      try{localStorage.setItem('cprGbpMonth',ymKey(MON));}catch(e){} loadMonth(); }});};
  document.querySelectorAll('[data-tm]').forEach(b=>b.onclick=()=>{ TMET=b.getAttribute('data-tm');
    try{localStorage.setItem('cprGbpTrendMetric',TMET);}catch(e){} render(); });
  document.querySelectorAll('[data-kf]').forEach(b=>b.onclick=()=>{ KFILT=b.getAttribute('data-kf'); render(); });
  const ks=$('#body').querySelector('[data-ks]');
  if(ks){ ks.oninput=()=>{ KSEARCH=ks.value; clearTimeout(ks._t); ks._t=setTimeout(()=>{ render();
    const k2=$('#body').querySelector('[data-ks]'); if(k2){ k2.focus(); k2.setSelectionRange(k2.value.length,k2.value.length); } },250); }; }
  document.querySelectorAll('[data-rs]').forEach(b=>b.onclick=()=>{ RSTORE=b.getAttribute('data-rs'); render(); });
  const ru=$('#body').querySelector('[data-run]'); if(ru)ru.onclick=()=>{ RUN=!RUN; render(); };
  const rs=$('#body').querySelector('[data-rst]'); if(rs)rs.onchange=()=>{ RSTARS=Number(rs.value)||0; render(); };
  document.querySelectorAll('.rv').forEach(el=>el.onclick=()=>{ const id=el.getAttribute('data-rid');
    ROPEN=(ROPEN===id)?null:id; render(); });
}

(async()=>{ try{ const s=(await sb.auth.getSession()).data.session; if(s) resolveMe(s); }catch(e){} })();
