<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Knowledge Base · CPR Oregon</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--border:#E0E2EA;--row:#F0F1F4;--green:#2E9E5B;--greend:#0f6e56;--greenbg:#E1F5EE;--amber:#B87A00;--card:0 1px 3px rgba(45,45,59,.05)}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0}
body{font-family:'Nunito Sans',sans-serif;color:var(--dark);background:var(--light-grey)}
.wrap{max-width:1240px;margin:0 auto;padding:24px 20px 60px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.45rem;letter-spacing:-.3px;margin:0}
.sub{color:var(--dark-grey);font-size:.85rem;font-weight:700;margin-top:2px}
.hd{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;padding:9px 16px;border:1.5px solid var(--border);background:#fff;color:var(--dark);border-radius:10px;cursor:pointer}
.btn.pri{background:var(--red);border-color:var(--red);color:#fff}
.btn.dk{background:var(--dark);border-color:var(--dark);color:#fff}
.btn.sm{padding:7px 13px;font-size:.76rem}
.btn:disabled{opacity:.45;cursor:not-allowed}
.searchbox{position:relative;margin-bottom:14px}
.searchbox input{width:100%;font-family:'Nunito Sans',sans-serif;font-size:.98rem;padding:13px 16px 13px 44px;border:1.5px solid var(--border);border-radius:12px;background:#fff;box-shadow:var(--card);color:var(--dark)}
.searchbox input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,176,227,.15)}
.searchbox .ic{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1rem;opacity:.5}
/* two-col shell */
.cols{display:grid;grid-template-columns:230px minmax(0,1fr);gap:16px;align-items:start}
@media(max-width:860px){.cols{grid-template-columns:1fr}}
.sidecard{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--card);padding:6px 0 8px}
.sgh{font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.9px;color:var(--grey);padding:10px 15px 5px}
.srowbtn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 15px 8px 12px;border:none;border-left:3px solid transparent;background:transparent;color:var(--dark-grey);font-family:'Nunito',sans-serif;font-weight:700;font-size:.84rem;cursor:pointer;text-align:left}
.srowbtn:hover{background:var(--light-grey)}
.srowbtn.on{background:#EAF6FD;border-left-color:var(--blue);color:#1E7AA8;font-weight:800}
.srowbtn .sic{width:18px;text-align:center;flex:none}
.srowbtn .slb{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srowbtn .sbadge{min-width:18px;text-align:center;background:var(--red);color:#fff;border-radius:999px;font-size:.62rem;font-weight:800;padding:1px 6px}
.srowbtn .scount{font-size:.68rem;font-weight:800;color:var(--grey)}
.sdiv{height:1px;background:var(--border);margin:8px 15px}
/* required banner */
.reqbanner{display:flex;align-items:center;gap:12px;background:#FDF6E7;border:1.5px solid #F2DFAE;border-radius:12px;padding:11px 16px;margin-bottom:12px;flex-wrap:wrap}
.reqbanner .t{flex:1;font-size:.84rem;font-weight:700;color:#7A5A08;min-width:200px}
/* article rows */
.listcard{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--card);overflow:hidden}
.arow{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--row);cursor:pointer}
.arow:hover{background:#F8FAFD}
.arow:last-child{border-bottom:none}
.atile{width:34px;height:34px;border-radius:9px;background:#F3F6FA;display:flex;align-items:center;justify-content:center;font-size:1rem;flex:none}
.amain{flex:1;min-width:0}
.atitlerow{display:flex;align-items:center;gap:8px}
.adot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex:none}
.atitle{font-family:'Nunito',sans-serif;font-weight:700;font-size:.92rem;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.atitle.unread{font-weight:900}
.achip{font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.3px;padding:2px 8px;border-radius:999px;white-space:nowrap;flex:none}
.achip.req{background:#FDEBEC;color:var(--red)}
.achip.ack{background:var(--greenbg);color:var(--greend)}
.achip.new{background:#EAF6FD;color:#1E7AA8}
.achip.draft{background:#FBF1DC;color:#7A5B10}
.asum{font-size:.78rem;color:#8A8FA0;font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ameta{text-align:right;flex:none;width:110px}
.ameta .c1,.aviewed .c1{font-family:'Nunito',sans-serif;font-size:.62rem;font-weight:800;color:var(--grey);text-transform:uppercase;letter-spacing:.4px}
.ameta .c2,.aviewed .c2{font-size:.7rem;font-weight:700;color:var(--grey);margin-top:2px}
.aviewed{text-align:right;flex:none;width:78px}
@media(max-width:700px){.aviewed,.ameta{display:none}}
/* search results */
.sres{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--card);overflow:hidden;margin-bottom:12px}
.sresrow{padding:12px 17px;border-bottom:1px solid var(--row);cursor:pointer}
.sresrow:hover{background:#F8FAFD}
.sresrow:last-child{border-bottom:none}
.sresrow .st{font-family:'Nunito',sans-serif;font-weight:900;font-size:.92rem}
.sresrow .sn{font-size:.8rem;color:var(--dark-grey);margin-top:3px}
.sresrow .sn b{background:#FFF3C4;border-radius:3px;padding:0 2px}
/* breadcrumb */
.crumb{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.crumb a{font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;color:var(--dark-grey);text-decoration:none;cursor:pointer}
.crumb .sep{color:#C7CAD4;font-size:.78rem}
.crumb .cat{font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;color:var(--grey)}
/* reading card */
.artcard{background:#fff;border:1px solid var(--border);border-top:3px solid var(--blue);border-radius:12px;box-shadow:var(--card);overflow:hidden}
.artcard .ahd{padding:30px 38px 0}
@media(max-width:700px){.artcard .ahd{padding:22px 20px 0}}
.artcard h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.55rem;line-height:1.3;margin:0;text-wrap:pretty;letter-spacing:0}
.artmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:10px 0 0;font-size:.76rem;font-weight:700;color:var(--grey)}
.artbody{padding:24px 38px 8px;font-family:'Nunito Sans',sans-serif;font-size:.95rem;line-height:1.75;color:#3A3A45}
@media(max-width:700px){.artbody{padding:18px 20px 8px}}
.artbody h3{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem;color:var(--dark);margin:22px 0 10px}
.artbody h4{font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;color:var(--dark);margin:18px 0 8px}
.artbody ul,.artbody ol{margin:0 0 16px;padding-left:22px}
.artbody li{margin:4px 0}
.artbody img{max-width:100%;border-radius:12px;border:1px solid var(--border);margin:10px 0;display:block}
.artbody a{color:#1E7AA8;font-weight:700}
.artbody hr{border:none;border-top:1.5px solid var(--border);margin:18px 0}
.artbody code{background:var(--row);border-radius:5px;padding:1px 6px;font-size:.86em}
.callout{display:flex;gap:12px;background:#FDF6E7;border:1.5px solid #F2DFAE;border-radius:10px;padding:13px 16px;margin:0 0 16px}
.callout .ci{font-size:1rem;flex:none}
.callout .ct{font-size:.85rem;font-weight:700;color:#7A5A08;line-height:1.55}
.artfoot{display:flex;align-items:center;gap:12px;padding:16px 38px;background:#F8FAFD;border-top:1.5px solid var(--border);flex-wrap:wrap}
@media(max-width:700px){.artfoot{padding:14px 20px}}
.readbtn{display:inline-flex;align-items:center;gap:8px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;border:1.5px solid var(--border);border-radius:9px;background:#fff;color:var(--dark);padding:8px 14px;cursor:pointer}
.readbtn:hover{border-color:var(--green);color:var(--green)}
.readbtn.done{border-color:#BFE8D0;background:var(--greenbg);color:var(--greend);cursor:default}
.footnote{font-size:.72rem;font-weight:700;color:var(--grey)}
.nextrow{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
.nextrow a{font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;color:var(--blue);text-decoration:none;cursor:pointer}
/* onboarding */
.obhero{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--card);padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.obtile{width:42px;height:42px;border-radius:11px;background:#EAF6FD;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex:none}
.obbar{width:160px;height:8px;border-radius:999px;background:#ECEDF1;overflow:hidden}
.obbar i{display:block;height:100%;border-radius:999px;background:var(--blue)}
.obpct{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem;color:#1E7AA8}
.modcard{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--card);margin-bottom:14px;overflow:hidden}
.modhd{display:flex;align-items:center;gap:10px;padding:12px 16px;flex-wrap:wrap}
.modhd .mn{font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem}
.modhd .ms{font-size:.72rem;font-weight:700;color:var(--grey)}
.modbar{width:110px;height:7px;border-radius:999px;background:#ECEDF1;overflow:hidden}
.modbar i{display:block;height:100%;border-radius:999px;background:var(--green)}
.steprow{display:flex;align-items:center;gap:12px;padding:11px 16px;border-top:1px solid var(--row);border-left:3px solid transparent}
.steprow.next{background:#F3F9FD;border-left-color:var(--blue)}
.steprow.lock{opacity:.55}
.stepic{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;flex:none}
.stepmain{flex:1;min-width:0}
.steptitle{font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stepmeta{font-size:.72rem;font-weight:700;color:var(--grey);margin-top:1px}
.quizchip{font-family:'Nunito',sans-serif;font-weight:800;font-size:.66rem;padding:3px 9px;border-radius:999px;background:var(--row);color:var(--dark-grey);white-space:nowrap;flex:none}
.quizchip.pass{background:var(--greenbg);color:var(--greend)}
/* quiz */
.qwrap{width:640px;max-width:100%;margin:0 auto}
.qcard{background:#fff;border:1px solid var(--border);border-top:3px solid var(--blue);border-radius:12px;box-shadow:var(--card);padding:26px 30px 24px}
@media(max-width:700px){.qcard{padding:20px 18px}}
.qcard.fail{border-top-color:var(--red)}
.qcard.pass{border-top-color:var(--green)}
.qk{font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.9px;color:var(--grey)}
.qdots{display:flex;align-items:center;gap:8px;margin:12px 0 18px}
.qdot{width:11px;height:11px;border-radius:50%;box-sizing:border-box}
.qq{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.18rem;line-height:1.4;text-wrap:pretty}
.qopt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:13px 15px;border:1.5px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;font-family:'Nunito Sans',sans-serif;font-size:.9rem;font-weight:700;color:var(--dark);line-height:1.4}
.qopt:hover{border-color:var(--blue)}
.qopt.sel{border-color:var(--blue);background:#F3F9FD}
.qoptdot{width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid #C7CAD4;box-sizing:border-box;flex:none}
.qopt.sel .qoptdot{background:var(--blue);border-color:var(--blue)}
.scorecircle{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem;flex:none}
.qrev{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.qrevok{display:flex;align-items:center;gap:11px;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;background:#fff}
.qrevmiss{display:flex;gap:11px;padding:11px 13px;border:1.5px solid #F6C9CA;border-radius:10px;background:#FFF7F7}
.qrevic{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.66rem;font-weight:900;flex:none}
/* editor */
/* main card stretches to the sidebar's height (bottom of More Actions),
   and the textarea fills whatever the card has — so both columns end level */
.edgrid{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:16px}
@media(max-width:900px){.edgrid{grid-template-columns:1fr}}
.edmain{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--card);overflow:hidden;display:flex;flex-direction:column}
.edtitle{width:100%;border:none;font-family:'Nunito',sans-serif;font-weight:900;font-size:1.35rem;color:var(--dark);padding:0}
.edtitle:focus{outline:none}
.edtools{display:flex;align-items:center;gap:4px;flex-wrap:wrap;border-top:1px solid var(--row);border-bottom:1px solid var(--row);padding:8px 28px;margin-top:16px}
.edtools button{font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;border:1px solid transparent;border-radius:7px;background:none;color:var(--dark-grey);padding:5px 9px;cursor:pointer;white-space:nowrap}
.edtools button:hover{background:var(--light-grey);border-color:var(--border)}
.edbody{width:100%;border:none;resize:vertical;flex:1;min-height:340px;padding:20px 28px 26px;font-family:'Nunito Sans',sans-serif;font-size:.95rem;line-height:1.75;color:#3A3A45}
.edbody:focus{outline:none}
.sdc{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--card);padding:14px 16px;margin-bottom:12px}
.edgrid .sdc:last-child{margin-bottom:0}
.sdc .k{font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.9px;color:var(--grey);margin-bottom:10px}
.sdc label.fl{display:block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.66rem;text-transform:uppercase;letter-spacing:.4px;color:var(--dark-grey);margin:0 0 4px}
.sdc select,.sdc input[type=text],.sdc input[type=number]{width:100%;height:34px;padding:5px 10px;font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.85rem;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--dark);margin-bottom:12px}
.sdc select:focus,.sdc input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,176,227,.13)}
.switch{width:34px;height:20px;border-radius:999px;background:#C7CAD4;position:relative;flex:none;cursor:pointer;border:none;padding:0}
.switch.on{background:var(--green)}
.switch i{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:left .15s}
.switch.on i{left:16px}
.quizbox{display:flex;align-items:center;gap:8px;padding:9px 11px;background:#F3F9FD;border:1.5px solid #CDE8F7;border-radius:9px}
.quizbox .qt{flex:1;font-size:.76rem;font-weight:700;color:#1E7AA8}
.quizbox a{font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;color:var(--blue);text-decoration:none;cursor:pointer}
.statuschip{font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.3px;padding:2px 8px;border-radius:999px}
.statuschip.draft{background:#FBF1DC;color:#7A5B10}
.statuschip.pub{background:var(--greenbg);color:var(--greend)}
.linkbtn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.76rem;color:var(--blue);text-decoration:none;cursor:pointer;background:none;border:none;padding:0}
.linkdel{font-family:'Nunito',sans-serif;font-weight:800;font-size:.76rem;color:var(--red);background:none;border:none;cursor:pointer;padding:0}
/* modal */
.ovl{position:fixed;inset:0;background:rgba(45,45,59,.45);z-index:1200;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow:auto}
.mdl{width:680px;max-width:100%;background:#fff;border-radius:16px;box-shadow:0 18px 50px rgba(45,45,59,.3);overflow:hidden}
.mdl-hd{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:14px}
.mdl-bd{padding:18px 22px;max-height:64vh;overflow:auto}
.mdl-ft{padding:14px 22px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:10px;background:#fafafa}
.mdl-x{background:none;border:none;cursor:pointer;font-size:1.15rem;color:var(--grey)}
.qed{border:1.5px solid var(--border);border-radius:11px;padding:13px 14px;margin-bottom:12px}
.qed textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-family:'Nunito Sans',sans-serif;font-size:.86rem;font-weight:700;resize:vertical;min-height:44px}
.qed .optrow{display:flex;align-items:center;gap:8px;margin-top:7px}
.qed .optrow input[type=text]{flex:1;height:32px;padding:4px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'Nunito Sans',sans-serif;font-size:.84rem;font-weight:600}
.qed .optrow input[type=radio]{accent-color:var(--green);width:15px;height:15px}
.empty{padding:40px;text-align:center;color:var(--grey);font-weight:700}
.gate{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px;font-weight:700;color:var(--dark-grey)}
.toast{position:fixed;left:50%;bottom:calc(26px + var(--cpr-bb-h,0px));transform:translate(-50%,16px);opacity:0;pointer-events:none;background:var(--dark);color:#fff;border-left:4px solid var(--green);padding:11px 18px;border-radius:10px;font-size:.85rem;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,.3);transition:opacity .25s,transform .25s;z-index:1500}
.toast.show{opacity:1;transform:translate(-50%,0)}
.toast.err{border-left-color:var(--red)}
</style>
</head>

  return ('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2)+'/'+String(d.getFullYear()).slice(-2); }
function readMins(body){ const w=String(body||'').split(/\s+/).length; return Math.max(1,Math.round(w/200)); }
function slugify(t){ return String(t).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,60)||('a-'+Date.now()); }

/* ---------- light markup → safe HTML (house renderer + !> amber callouts) ---------- */
function render(text){
  let s=esc(text);
  s=s.replace(/!\[([^\]]*)\]\((https?:[^)\s]+)\)/g,'<img src="$2" alt="$1" loading="lazy">');
  s=s.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.replace(/(^|[\s>])(https?:\/\/[^\s<]+)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  s=s.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*([^*\n]+)\*\*/g,'<b>$1</b>');
  s=s.replace(/__([^_\n]+)__/g,'<u>$1</u>');
  s=s.replace(/(^|[\s(>])\*([^*\n]+)\*/g,'$1<i>$2</i>');
  const lines=s.split('\n'); let out='',ul=false,ol=false;
  const close=()=>{ if(ul){out+='</ul>';ul=false;} if(ol){out+='</ol>';ol=false;} };
  for(const ln of lines){
    let m;
    if(/^\s*---+\s*$/.test(ln)){ close(); out+='<hr>'; }
    else if((m=/^!&gt;\s+(.*)$/.exec(ln))){ close(); out+='<div class="callout"><span class="ci">⚠️</span><div class="ct">'+m[1]+'</div></div>'; }
    else if((m=/^##\s+(.*)$/.exec(ln))){ close(); out+='<h4>'+m[1]+'</h4>'; }
    else if((m=/^#\s+(.*)$/.exec(ln))){ close(); out+='<h3>'+m[1]+'</h3>'; }
    else if((m=/^\s*[-•]\s+(.*)$/.exec(ln))){ if(ol){out+='</ol>';ol=false;} if(!ul){out+='<ul>';ul=true;} out+='<li>'+m[1]+'</li>'; }
    else if((m=/^\s*\d+[.)]\s+(.*)$/.exec(ln))){ if(ul){out+='</ul>';ul=false;} if(!ol){out+='<ol>';ol=true;} out+='<li>'+m[1]+'</li>'; }
    else if(ln.trim()===''){ close(); out+='<div style="height:8px"></div>'; }
    else { close(); out+=ln+'<br>'; }
  }
  close();
  return out;
}

/* ---------- state ---------- */
let CATS=[],ARTS=[],READS={},MODULES=[],ASSIGN=null,QUIZ={},MYATT={},STAFF=[],SBN={},STEPS=[],SDONE={};

  READS={}; (r.data||[]).forEach(x=>READS[x.article_id]=x);

  MYATT={}; (att.data||[]).forEach(x=>{ const cur=MYATT[x.quiz_id]||{best:0,passed:false,attempts:0};

/* ---------- derived ---------- */
function catById(id){ return CATS.find(x=>x.id===id); }
function catName(id){ const c=catById(id); return c?c.name:'—'; }
function artIcon(a){ return a.emoji||((catById(a.category_id)||{}).icon)||'📄'; }
function acked(a){ const r=READS[a.id]; return r&&r.acknowledged_at; }
function viewedAt(a){ const r=READS[a.id]; return r?(r.last_viewed_at||r.first_read_at):null; }
function pubArts(){ return ARTS.filter(a=>a.status==='published'); }
function reqOutstanding(){ return pubArts().filter(a=>a.require_ack&&!acked(a)); }
/* onboarding items: a module's track = its ARTICLES (kb_articles.module_id)
   merged with its TASK STEPS (onboarding_steps — HR paperwork, account setups),
   ordered together by sort_order. */
function moduleItems(modId){
  const items=pubArts().filter(a=>a.module_id===modId).map(a=>({kind:'a',a,sort:a.sort_order||0,id:'a'+a.id}))
    .concat(STEPS.filter(s=>s.module_id===modId).map(s=>({kind:'s',s,sort:s.sort_order||0,id:'s'+s.id})));
  return items.sort(itemCmp);
}
/* canonical order for mixed module items: sort_order, then articles before
   steps, then numeric id — IDENTICAL in Setup, My Onboarding & Compliance */
function itemCmp(x,y){ return (x.sort-y.sort)
  || (x.kind===y.kind?0:(x.kind==='a'?-1:1))
  || (x.kind==='a'?(x.a.id-y.a.id):(x.s.id-y.s.id)); }
function articleDone(a){ const q=QUIZ[a.id]; return !!acked(a)&&(!q||!q.nq||(MYATT[q.id]&&MYATT[q.id].passed)); }
function itemDone(it){ return it.kind==='a'?articleDone(it.a):!!SDONE[it.s.id]; }
/* full track: modules with their merged items; global sequential unlock */
function track(){
  const mods=MODULES.map(mod=>({mod,items:moduleItems(mod.id)})).filter(x=>x.items.length);
  let nextFound=false;
  mods.forEach((mx,mi)=>{
    mx.done=mx.items.filter(itemDone).length;
    mx.total=mx.items.length;
    mx.quizzes=mx.items.filter(it=>it.kind==='a'&&QUIZ[it.a.id]&&QUIZ[it.a.id].nq).length;
    mx.states=mx.items.map(it=>{
      if(itemDone(it))return 'done';
      if(!nextFound){ nextFound=true; return 'next'; }
      return 'lock';
    });
    mx.complete=mx.done===mx.total;
    mx.lockedModule=mi>0&&!mods.slice(0,mi).every(p=>p.complete)&&mx.done===0;
  });
  return mods;
}
function obOutstanding(){ const t=track(); return t.reduce((n,mx)=>n+(mx.total-mx.done),0); }

/* ---------- hash routing: #a=slug · #c=cat · #onboarding · #quiz=slug · #edit=id · #new ---------- */
function applyHash(){
  const h=location.hash.replace('#','');
  let m;
  if((m=h.match(/^a=([\w-]+)/))){ const art=ARTS.find(x=>x.slug===m[1]); if(art){ openArticle(art.id); return true; } }
  if(h==='onboarding'){ MODE='onboarding'; draw(); return true; }
  if(h==='modules'&&isMgr(AUTH.role)){ MODE='modules'; draw(); return true; }
  if((m=h.match(/^quiz=([\w-]+)/))){ const art=ARTS.find(x=>x.slug===m[1]); if(art&&QUIZ[art.id]){ startQuiz(art); return true; } }
  if((m=h.match(/^edit=(\d+)/))&&isMgr(AUTH.role)){ const art=ARTS.find(x=>x.id===+m[1]); if(art){ OPEN=art; MODE='edit'; draw(); return true; } }
  if(h==='new'&&isMgr(AUTH.role)){ OPEN=null; MODE='edit'; draw(); return true; }
  if((m=h.match(/^c=([\w-]+)$/))){
    const v=m[1];
    if(['all','req','drafts','archived'].indexOf(v)>-1){ if((v==='drafts'||v==='archived')&&!isMgr(AUTH.role))return false;
      CAT=v; save(); MODE='list'; draw(); return true; }
    const cc=CATS.find(x=>String(x.id)===v||slugify(x.name)===v);
    if(cc){ CAT=String(cc.id); save(); MODE='list'; draw(); return true; }
  }
  return false;
  function save(){ try{localStorage.setItem('cprKbCat',CAT);}catch(e){} }
}
function setHash(h){ try{ if(location.hash.replace('#','')!==h) history.replaceState(null,'','#'+h); }catch(e){} }
function catHash(){ if(['all','req','drafts','archived'].indexOf(String(CAT))>-1)return 'c='+CAT;
  const c=catById(+CAT); return 'c='+(c?slugify(c.name):CAT); }
window.addEventListener('hashchange',()=>{ if(!AUTH)return;
  if(!applyHash()&&!location.hash){ MODE='list'; OPEN=null; draw(); } });

function boot(){
  if(!AUTH){ $('#page').innerHTML='<div class="gate">Sign in to read the Knowledge Base.</div>'; return; }
  refresh(true);
}
async function refresh(first){
  await loadAll();
  if(first&&location.hash&&applyHash())return;
  draw();
}

/* ---------- Browse lives in the NAV pane, not the page. Publish the row list
   (with live counts/badges) for nav.js's kb area, then ask it to re-render. */
function publishNav(){
  const items=[];
  const onb=obOutstanding(), reqN=reqOutstanding().length;
  if(track().length)items.push({h:'onboarding',i:'🎓',l:'My onboarding',b:onb||''});
  items.push({h:'c=all',i:'📚',l:'All articles',c:pubArts().length});
  if(reqN)items.push({h:'c=req',i:'⭐',l:'Required reading',b:reqN});
  CATS.forEach(c=>{
    const n=pubArts().filter(a=>a.category_id===c.id).length;
    if(n)items.push({h:'c='+slugify(c.name),i:c.icon||'📄',l:c.name,c:n});
  });
  if(isMgr(AUTH.role)){
    const nd=ARTS.filter(a=>a.status==='draft').length, na=ARTS.filter(a=>a.status==='archived').length;
    items.push({grp:'Manage'});
    items.push({h:'c=drafts',i:'✏️',l:'Drafts',c:nd||''});
    if(na)items.push({h:'c=archived',i:'🗄️',l:'Archived',c:na});
    items.push({h:'modules',i:'🧩',l:'Onboarding Setup'});
    items.push({u:'kb-compliance.html',i:'📋',l:'Compliance'});
  }
  try{ localStorage.setItem('cprKbNav',JSON.stringify(items)); }catch(e){}
  if(window.CPRKbNav)window.CPRKbNav.refresh();
}
function shell(inner){
  return ''
  +'<div class="hd"><div><h1>📚 Knowledge Base</h1><div class="sub">SOPs, repair knowledge, training &amp; how-tos</div></div>'
  +'<div style="margin-left:auto">'+(isMgr(AUTH.role)?'<button class="btn dk sm" id="btnNew">＋ New article</button>':'')+'</div></div>'
  +'<div class="searchbox"><span class="ic">🔎</span><input id="q" value="'+esc(SEARCHQ)+'" placeholder="Search everything — “warranty”, “S24 back glass”, “opening checklist”…" autocomplete="off"></div>'
  +inner;
}
function wireShell(){
  const bn=$('#btnNew'); if(bn)bn.addEventListener('click',()=>{ OPEN=null; MODE='edit'; setHash('new'); draw(); });
  const q=$('#q'); if(q){
    q.addEventListener('input',()=>{ SEARCHQ=q.value.trim();
      clearTimeout(SEARCH_T); SEARCH_T=setTimeout(runSearch,250); });
    if(document.activeElement!==q&&SEARCHQ)q.focus();
  }
}
async function runSearch(){
  if(!SEARCHQ){ SRES=null; draw(); return; }
  const {data}=await sb.rpc('kb_search',{q:SEARCHQ,max_results:10});
  SRES=data||[]; if(MODE!=='list'){ MODE='list'; } draw();
}

/* ---------- library list ---------- */
function listRows(){

function chipFor(a){

function drawList(){

/* ---------- article reading view ---------- */
async function openArticle(id){
  const a=ARTS.find(x=>x.id===id); if(!a)return;
  OPEN=a; MODE='article'; SRES=null; SEARCHQ='';
  setHash('a='+(a.slug||''));
  // record the view (Viewed column); first_read_at fills on first insert
  if(a.status==='published'){
    const now=new Date().toISOString();
    const r=await sb.from('kb_reads').upsert({article_id:a.id,staff_id:AUTH.id,last_viewed_at:now},{onConflict:'article_id,staff_id'}).select().single();
    if(r.data)READS[a.id]=r.data;
  }
  draw();
}
function moduleOf(a){ return MODULES.find(m=>m.id===a.module_id)||null; }
function weekLabel(mod){ if(!mod)return ''; const m=/week\s*(\d+)/i.exec(mod.name); return m?('Week '+m[1]):mod.name; }
function drawArticle(){
  const a=OPEN;
  const mod=moduleOf(a);
  const q=QUIZ[a.id];
  const isAcked=acked(a);
  const author=SBN[a.updated_by]||SBN[a.created_by]||'';
  // next step in the same module
  let next=null;
  if(mod){ const items=moduleItems(mod.id); const i=items.findIndex(x=>x.kind==='a'&&x.a.id===a.id);
    if(i>-1&&items[i+1])next=items[i+1].kind==='a'?items[i+1].a:null; }
  const inner=''
  +'<div class="crumb"><a data-nav="list">‹ Knowledge Base</a><span class="sep">/</span><span class="cat">'+esc(catName(a.category_id))+'</span>'
    +'<span style="flex:1"></span>'
    +(isMgr(AUTH.role)?'<a data-nav="edit" style="color:var(--blue)">✏️ Edit</a>':'')
    +(a.require_ack?'<span class="achip req">Required'+(mod?' · '+esc(weekLabel(mod)):'')+'</span>':'')
  +'</div>'
  +'<div class="artcard">'
    +'<div class="ahd"><h2>'+esc(artIcon(a))+' '+esc(a.title)+'</h2>'
    +'<div class="artmeta"><span>'+readMins(a.body)+' min read</span><span>·</span><span>updated '+fmtD(a.updated_at)+'</span>'
      +(author?'<span>·</span><span>by '+esc(author)+'</span>':'')+'<span>·</span><span style="color:#8A8FA0">Applies to: all stores</span></div>'
    +'<div style="height:1px;background:var(--row);margin:20px 0 0"></div></div>'
    +'<div class="artbody">'+render(a.body)+'</div>'
    +'<div class="artfoot">'
      +(isAcked
        ?'<button class="readbtn done">✓ Read '+fmtD(READS[a.id].acknowledged_at)+'</button>'
        :'<button class="readbtn" id="markRead">✓ Mark as read</button>')
      +'<span class="footnote">logs your read receipt — required for onboarding</span>'
      +'<span style="flex:1"></span>'
      +(q&&q.nq?'<button class="btn pri sm" id="takeQuiz">Take the quiz · '+q.nq+' question'+(q.nq===1?'':'s')+' ›</button>':'')
    +'</div>'
  +'</div>'
  +(next?'<div class="nextrow"><span class="footnote">Next in '+esc(weekLabel(mod))+':</span><a data-nav="next">'+esc(next.title)+' ›</a></div>':'');
  $('#page').innerHTML=inner;
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>{
    const k=el.dataset.nav;
    if(k==='list'){ MODE='list'; OPEN=null; setHash(catHash()); draw(); }
    else if(k==='edit'){ MODE='edit'; setHash('edit='+a.id); draw(); }
    else if(k==='next'&&next){ openArticle(next.id); }
  }));
  const mr=$('#markRead'); if(mr)mr.addEventListener('click',async()=>{
    const now=new Date().toISOString();
    const r=await sb.from('kb_reads').upsert({article_id:a.id,staff_id:AUTH.id,acknowledged_at:now,last_viewed_at:now},{onConflict:'article_id,staff_id'}).select().single();
    if(r.error){ toast('Could not save: '+r.error.message,true); return; }
    READS[a.id]=r.data; toast('Read receipt logged ✓'); draw();
  });
  const tq=$('#takeQuiz'); if(tq)tq.addEventListener('click',()=>startQuiz(a));
}

/* ---------- onboarding ---------- */
async function ensureAssignment(){

}
async function drawOnboarding(){

  const t=track();

  const pct=total?Math.round(done/total*100):0;

  const curWeek=Math.min(t.findIndex(m=>!m.complete)+1||t.length,t.length)||1;

  else{
    inner+='<div class="obhero"><div class="obtile">🎓</div><div style="min-width:0">'

        +(ASSIGN?'Started '+fmtD(ASSIGN.started_at)+' · ':'')+'Week '+curWeek+' of '+t.length+' · '+quizPassed+' quiz'+(quizPassed===1?'':'zes')+' passed</div>'
      +'</div><div style="flex:1"></div><div class="obbar"><i style="width:'+pct+'%"></i></div><span class="obpct">'+pct+'%</span></div>';
    t.forEach((mx,mi)=>{
      const locked=mx.lockedModule;
      inner+='<div class="modcard" style="opacity:'+(locked?'.6':'1')+'"><div class="modhd">'
        +'<span class="mn">'+esc(mx.mod.name)+'</span>'
        +(mx.mod.subtitle?'<span class="ms">'+esc(mx.mod.subtitle)+'</span>':'')
        +'<span style="flex:1"></span>'
        +(locked
          ?'<span class="ms">🔒 Unlocks when '+esc((t[mi-1]||{}).mod?t[mi-1].mod.name.split('—')[0].trim():'the previous week')+' is complete · '+mx.total+' item'+(mx.total===1?'':'s')+(mx.quizzes?' · '+mx.quizzes+' quiz'+(mx.quizzes===1?'':'zes'):'')+'</span>'
          :'<div class="modbar"><i style="width:'+Math.round(mx.done/mx.total*100)+'%"></i></div><span style="font-size:.72rem;font-weight:800;color:var(--dark-grey)">'+mx.done+' / '+mx.total+'</span>')
        +'</div>';
      if(!locked)mx.items.forEach((it,si)=>{
        const st=mx.states[si];
        const ics=st==='done'?['✓','var(--greenbg)','var(--greend)']:st==='next'?['▶','var(--blue)','#fff']:['🔒','var(--light-grey)','var(--grey)'];
        if(it.kind==='a'){
          const a=it.a, q=QUIZ[a.id], my=q?MYATT[q.id]:null;
          const chip=q&&q.nq?(my&&my.passed
            ?'<span class="quizchip pass">✓ Quiz '+my.best+'%</span>'
            :'<span class="quizchip">Quiz · '+q.nq+' question'+(q.nq===1?'':'s')+'</span>'):'';
          inner+='<div class="steprow '+st+'">'
            +'<div class="stepic" style="background:'+ics[1]+';color:'+ics[2]+'">'+ics[0]+'</div>'
            +'<div class="stepmain"><div class="steptitle">'+esc(a.title)+'</div>'
            +'<div class="stepmeta">'+readMins(a.body)+' min · '+esc(catName(a.category_id))+'</div></div>'
            +chip
            +(st==='done'&&acked(a)?'<span class="footnote">'+fmtD(READS[a.id].acknowledged_at)+'</span>':'')
            +(st==='next'?'<button class="btn pri sm" data-start="'+a.id+'">Start reading</button>':'')
          +'</div>';
        }else{
          const s=it.s, d=SDONE[s.id], mine=s.who==='employee';
          inner+='<div class="steprow '+st+'">'
            +'<div class="stepic" style="background:'+ics[1]+';color:'+ics[2]+'">'+ics[0]+'</div>'
            +'<div class="stepmain"><div class="steptitle">'+esc(s.title)+'</div>'
            +'<div class="stepmeta">'+(mine?'Your step':'Done with your manager')+(s.note?' · '+esc(s.note):'')+'</div></div>'
            +(st==='done'&&d?'<span class="footnote">'+(d.done_by&&SBN[d.done_by]?esc(SBN[d.done_by])+' · ':'')+fmtD(d.done_at)+'</span>':'')
            +(st==='next'&&s.link_url?'<a class="btn sm" style="text-decoration:none" href="'+esc(s.link_url)+'">Open</a>':'')
            +(st==='next'?(mine
              ?'<button class="btn pri sm" data-stepdone="'+s.id+'">Mark done ✓</button>'
              :'<span class="quizchip" style="background:#FDF6E7;color:#7A5A08">Waiting on your manager</span>'):'')
          +'</div>';
        }
      });
      inner+='</div>';
    });
  }
  $('#page').innerHTML=''
    +'<div class="hd"><div><h1>🎓 My Onboarding</h1><div class="sub">Assigned reading, setup steps &amp; quizzes — complete in order</div></div></div>'
    +inner;
  document.querySelectorAll('[data-start]').forEach(b=>b.addEventListener('click',()=>openArticle(+b.dataset.start)));
  document.querySelectorAll('[data-stepdone]').forEach(b=>b.addEventListener('click',async()=>{
    b.disabled=true;
    const r=await sb.from('onboarding_step_done').insert({step_id:+b.dataset.stepdone,staff_id:AUTH.id,done_by:AUTH.id}).select().single();
    if(r.error){ toast('Could not save: '+r.error.message,true); b.disabled=false; return; }
    SDONE[+b.dataset.stepdone]=r.data; toast('Step complete ✓'); draw();
  }));
}

/* ---------- Onboarding Setup (managers): modules + their mixed item lists ---------- */
let MODSEL=null,REORDERING=false;
function setupItems(modId){   // setup view includes drafts (flagged), unlike the live track
  const arts=ARTS.filter(a=>a.module_id===modId&&a.status!=='archived').map(a=>({kind:'a',a,sort:a.sort_order||0}));
  const steps=STEPS.filter(s=>s.module_id===modId).map(s=>({kind:'s',s,sort:s.sort_order||0}));
  return arts.concat(steps).sort(itemCmp);
}
async function renumber(modId,items){   // persist merged order as 10,20,30…
  for(let i=0;i<items.length;i++){
    const want=(i+1)*10, it=items[i];
    if(it.sort===want)continue;
    if(it.kind==='a')await sb.from('kb_articles').update({sort_order:want}).eq('id',it.a.id);
    else await sb.from('onboarding_steps').update({sort_order:want}).eq('id',it.s.id);
  }
}
function drawModules(){
  const mods=MODULES.slice().sort((a,b)=>a.sort-b.sort);
  if(!mods.some(m=>m.id===MODSEL))MODSEL=mods.length?mods[0].id:null;
  const cur=mods.find(m=>m.id===MODSEL)||null;
  const items=cur?setupItems(cur.id):[];
  const left='<div class="sidecard"><div class="sgh">Modules</div>'
    +mods.map(m=>'<button class="srowbtn'+(cur&&m.id===cur.id?' on':'')+'" data-msel="'+m.id+'"><span class="sic">'+(m.sort===0?'🧑‍💼':'📖')+'</span><span class="slb">'+esc(m.name)+'</span><span class="scount">'+setupItems(m.id).length+'</span></button>').join('')
    +'<div class="sdiv"></div><button class="srowbtn" id="mAdd"><span class="sic">＋</span><span class="slb">Add a module</span></button></div>';
  let right='';
  if(!cur)right='<div class="empty">Add your first module — e.g. “Week 1 — Bench basics”.</div>';
  else{
    const rows=items.map((it,i)=>{
      const ud='<span style="display:inline-flex;gap:4px;flex:none">'
        +'<button class="btn sm" data-up="'+i+'"'+(i===0?' disabled':'')+' style="padding:4px 9px">↑</button>'
        +'<button class="btn sm" data-dn="'+i+'"'+(i===items.length-1?' disabled':'')+' style="padding:4px 9px">↓</button></span>';

          +'<div class="stepmain"><div class="steptitle">'+esc(a.title)+(a.status==='draft'?' <span class="achip draft">Draft</span>':'')+'</div>'
          +'<div class="stepmeta">Article · '+esc(catName(a.category_id))+(q&&q.nq?' · quiz ('+q.nq+')':'')+(a.require_ack?' · required':'')+'</div></div>'
          +ud+'<button class="btn sm" data-aedit="'+a.id+'">Open</button><button class="btn sm" data-arem="'+a.id+'" title="Remove from module">✕</button></div>';
      }
      const s=it.s;
      return '<div class="steprow"><div class="atile" style="width:28px;height:28px;font-size:.85rem">'+(s.who==='manager'?'🧑‍💼':'☑️')+'</div>'
        +'<div class="stepmain"><div class="steptitle">'+esc(s.title)+'</div>'
        +'<div class="stepmeta">'+(s.who==='manager'?'Manager completes':'Employee completes')+(s.note?' · '+esc(s.note):'')+'</div></div>'
        +ud+'<button class="btn sm" data-sedit="'+s.id+'">Edit</button><button class="btn sm" data-sdel="'+s.id+'">✕</button></div>';
    }).join('');
    const addable=ARTS.filter(a=>a.status!=='archived'&&a.module_id!==cur.id);
    right='<div class="modcard"><div class="modhd" style="gap:12px;flex-wrap:wrap">'
      +'<input class="btn sm" id="mName" value="'+esc(cur.name)+'" style="font-weight:900;min-width:230px;flex:1;text-align:left">'
      +'<input class="btn sm" id="mSub" value="'+esc(cur.subtitle||'')+'" placeholder="Subtitle (optional)" style="min-width:200px;flex:1;text-align:left;font-weight:600">'
      +'<button class="btn sm" id="mSave">Save</button>'
      +'<button class="btn sm" id="mUp">↑</button><button class="btn sm" id="mDn">↓</button>'
      +'<button class="btn sm" id="mArch" style="color:var(--red)">Archive</button></div>'
      +(rows||'<div class="empty" style="padding:22px">Nothing in this module yet.</div>')
      +'<div style="display:flex;gap:10px;padding:12px 16px;border-top:1px solid var(--row);flex-wrap:wrap;align-items:center">'
        +'<button class="btn pri sm" id="stAdd">＋ Add a task step</button>'
        +(addable.length?'<select id="artAdd" class="btn sm" style="max-width:280px"><option value="">＋ Add an article…</option>'
          +addable.map(a=>'<option value="'+a.id+'">'+esc(a.title)+(a.module_id?' (in '+esc((MODULES.find(m=>m.id===a.module_id)||{}).name||'another module')+')':'')+(a.status==='draft'?' — draft':'')+'</option>').join('')+'</select>':'')
      +'</div></div>'
      +'<div class="footnote">Order is the order employees complete it — articles and task steps mix freely. Task steps marked “Manager completes” are ticked off per person from Compliance.</div>';
  }
  $('#page').innerHTML=''
    +'<div class="hd"><div><h1>🧩 Onboarding Setup</h1><div class="sub">Build the new-hire track — modules, reading, HR &amp; account steps</div></div></div>'
    +'<div class="cols">'+left+'<div style="min-width:0">'+right+'</div></div>';
  document.querySelectorAll('[data-msel]').forEach(b=>b.onclick=()=>{ MODSEL=+b.dataset.msel; draw(); });
  $('#mAdd')&&($('#mAdd').onclick=async()=>{
    const name=prompt('Module name (e.g. "Week 3 — Advanced repairs"):'); if(!name)return;
    const maxSort=Math.max.apply(null,[0].concat(MODULES.map(m=>m.sort)));
    const r=await sb.from('onboarding_modules').insert({name:name.trim(),sort:maxSort+1}).select().single();
    if(r.error){ toast(r.error.message,true); return; }
    MODSEL=r.data.id; await refresh();
  });
  if(!cur)return;
  $('#mSave').onclick=async()=>{
    const r=await sb.from('onboarding_modules').update({name:$('#mName').value.trim()||cur.name,subtitle:$('#mSub').value.trim()||null}).eq('id',cur.id);
    if(r.error){ toast(r.error.message,true); return; }
    toast('Module saved'); await refresh();
  };
  const bump=async dir=>{
    const i=mods.findIndex(m=>m.id===cur.id), j=i+dir;
    if(j<0||j>=mods.length)return;
    await sb.from('onboarding_modules').update({sort:mods[j].sort}).eq('id',cur.id);
    await sb.from('onboarding_modules').update({sort:cur.sort}).eq('id',mods[j].id);
    await refresh();
  };
  $('#mUp').onclick=()=>bump(-1); $('#mDn').onclick=()=>bump(1);
  $('#mArch').onclick=async()=>{
    if(!confirm('Archive "'+cur.name+'"? Its articles stay in the KB; its task steps stop appearing.'))return;
    await sb.from('onboarding_modules').update({active:false}).eq('id',cur.id);
    MODSEL=null; await refresh();
  };
  const move=async(i,dir)=>{
    if(REORDERING)return; REORDERING=true;
    try{
      const j=i+dir; if(j<0||j>=items.length)return;
      const sw=items[i]; items[i]=items[j]; items[j]=sw;
      await renumber(cur.id,items); await refresh();
    }finally{ REORDERING=false; }
  };
  document.querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>move(+b.dataset.up,-1));
  document.querySelectorAll('[data-dn]').forEach(b=>b.onclick=()=>move(+b.dataset.dn,1));
  document.querySelectorAll('[data-aedit]').forEach(b=>b.onclick=()=>{ const a=ARTS.find(x=>x.id===+b.dataset.aedit); if(a){ OPEN=a; MODE='edit'; setHash('edit='+a.id); draw(); } });
  document.querySelectorAll('[data-arem]').forEach(b=>b.onclick=async()=>{
    await sb.from('kb_articles').update({module_id:null}).eq('id',+b.dataset.arem); await refresh();
  });
  document.querySelectorAll('[data-sedit]').forEach(b=>b.onclick=()=>openStepEditor(cur,STEPS.find(s=>s.id===+b.dataset.sedit)));
  document.querySelectorAll('[data-sdel]').forEach(b=>b.onclick=async()=>{
    if(!confirm('Delete this step? Completion history for it is removed too.'))return;
    await sb.from('onboarding_steps').delete().eq('id',+b.dataset.sdel); await refresh();
  });
  $('#stAdd').onclick=()=>openStepEditor(cur,null);
  const aa=$('#artAdd'); if(aa)aa.onchange=async()=>{
    const id=+aa.value; if(!id)return;
    const maxSort=Math.max.apply(null,[0].concat(items.map(it=>it.sort)));
    await sb.from('kb_articles').update({module_id:cur.id,sort_order:maxSort+10}).eq('id',id);
    await refresh();
  };
}

/* ---------- quiz ---------- */
async function startQuiz(a){
  const q=QUIZ[a.id]; if(!q||!q.nq){ toast('No quiz on this article.',true); return; }
  const {data,error}=await sb.from('kb_quiz_questions').select('id,sort,question,options,section_hint').eq('quiz_id',q.id).order('sort').order('id');
  if(error||!data||!data.length){ toast('Could not load the quiz.',true); return; }
  QZ={art:a,quiz:q,questions:data,idx:0,answers:new Array(data.length).fill(null),result:null};
  MODE='quiz'; setHash('quiz='+(a.slug||'')); draw();
}
function drawQuiz(){
  const z=QZ; const n=z.questions.length; const cur=z.questions[z.idx];
  const dots=z.questions.map((_,i)=>{
    if(i===z.idx)return '<span class="qdot" style="background:var(--blue);border:2px solid var(--blue)"></span>';
    if(z.answers[i]!=null)return '<span class="qdot" style="background:var(--green);border:2px solid var(--green)"></span>';
    return '<span class="qdot" style="background:#fff;border:2px solid #C7CAD4"></span>';
  }).join('');
  const opts=(cur.options||[]).map((o,i)=>'<button class="qopt'+(z.answers[z.idx]===i?' sel':'')+'" data-opt="'+i+'"><span class="qoptdot"></span>'+esc(o)+'</button>').join('');
  const last=z.idx===n-1;
  $('#page').innerHTML='<div class="qwrap">'
    +'<div class="crumb"><a data-nav="back">‹ Back to article</a><span style="flex:1"></span>'+(z.art.require_ack?'<span class="achip req">Required</span>':'')+'</div>'
    +'<div class="qcard">'
    +'<div class="qk">Quiz — '+esc(z.art.title)+'</div>'
    +'<div class="qdots">'+dots+'<span style="font-size:.72rem;font-weight:800;color:var(--grey);margin-left:4px">Question '+(z.idx+1)+' of '+n+'</span></div>'
    +'<div class="qq">'+esc(cur.question)+'</div>'
    +'<div style="display:flex;flex-direction:column;gap:9px;margin-top:18px">'+opts+'</div>'
    +'<div style="display:flex;align-items:center;gap:10px;margin-top:22px">'
      +'<button class="btn sm" id="qPrev"'+(z.idx===0?' disabled':'')+'>‹ Previous</button>'
      +'<span style="flex:1"></span><span class="footnote">Pass mark '+z.quiz.pass_pct+'% · retake anytime</span>'
      +'<button class="btn pri sm" id="qNext"'+(z.answers[z.idx]==null?' disabled':'')+'>'+(last?'Finish quiz ›':'Next question ›')+'</button>'
    +'</div></div></div>';
  document.querySelector('[data-nav="back"]').addEventListener('click',()=>{ openArticle(z.art.id); });
  document.querySelectorAll('[data-opt]').forEach(b=>b.addEventListener('click',()=>{ z.answers[z.idx]=+b.dataset.opt; draw(); }));
  $('#qPrev').addEventListener('click',()=>{ if(z.idx>0){z.idx--;draw();} });
  $('#qNext').addEventListener('click',async()=>{
    if(z.answers[z.idx]==null)return;
    if(!last){ z.idx++; draw(); return; }
    const {data,error}=await sb.rpc('kb_quiz_grade',{p_quiz_id:z.quiz.id,p_answers:z.answers});
    if(error){ toast('Grading failed: '+error.message,true); return; }
    z.result=data; MODE='quizresult';
    // refresh attempts so best/pass state is current everywhere
    const att=await sb.from('kb_quiz_attempts').select('quiz_id,score_pct,passed,attempt_no').eq('staff_id',AUTH.id);
    MYATT={}; (att.data||[]).forEach(x=>{ const c=MYATT[x.quiz_id]||{best:0,passed:false,attempts:0};
      c.best=Math.max(c.best,x.score_pct); c.passed=c.passed||x.passed; c.attempts=Math.max(c.attempts,x.attempt_no); MYATT[x.quiz_id]=c; });
    draw();
  });
}
function drawQuizResult(){
  const z=QZ,r=z.result; const pass=r.passed;
  const rows=z.questions.map((q,i)=>{
    const res=(r.results||[])[i]||{};
    if(res.ok)return '<div class="qrevok"><span class="qrevic" style="background:var(--greenbg);color:var(--greend)">✓</span>'
      +'<span style="font-size:.84rem;font-weight:700;color:#8A8FA0;line-height:1.45"><b style="color:var(--grey)">Q'+(i+1)+'.</b> '+esc(q.question)+'</span></div>';
    return '<div class="qrevmiss"><span class="qrevic" style="background:#FDEBEC;color:var(--red)">✕</span>'
      +'<div style="min-width:0"><div style="font-size:.84rem;font-weight:700;color:var(--dark);line-height:1.45"><b style="color:var(--red)">Q'+(i+1)+'.</b> '+esc(q.question)+'</div>'
      +(res.hint?'<div style="font-size:.78rem;font-weight:700;color:#8A8FA0;margin-top:3px">Covered in: <a data-nav="back" style="color:var(--blue);text-decoration:none;font-weight:800;cursor:pointer">'+esc(res.hint)+'</a></div>':'')
      +'</div></div>';
  }).join('');
  $('#page').innerHTML='<div class="qwrap">'
    +'<div class="crumb"><a data-nav="back">‹ Back to article</a><span style="flex:1"></span>'+(z.art.require_ack?'<span class="achip req">Required</span>':'')+'</div>'
    +'<div class="qcard '+(pass?'pass':'fail')+'">'
    +'<div class="qk">Quiz — '+esc(z.art.title)+'</div>'
    +'<div style="display:flex;align-items:center;gap:16px;margin:14px 0 4px">'
      +'<div class="scorecircle" style="background:'+(pass?'var(--greenbg)':'#FDEBEC')+';color:'+(pass?'var(--greend)':'var(--red)')+'">'+r.score+'%</div>'
      +'<div><div style="font-family:Nunito,sans-serif;font-weight:900;font-size:1.15rem">'+(pass?'Nice — '+r.right+' of '+r.total+' correct':'Not quite — '+r.right+' of '+r.total+' correct')+'</div>'
      +'<div style="font-size:.8rem;font-weight:700;color:#8A8FA0;margin-top:2px">'+(pass?'You passed — this step is checked off your track.':'Pass mark is '+r.pass_pct+'%. Review the ones you missed, then retake — attempts are unlimited.')+'</div></div>'
    +'</div>'
    +'<div class="qrev">'+rows+'</div>'
    +'<div style="display:flex;align-items:center;gap:10px;margin-top:20px;flex-wrap:wrap">'
      +(pass
        ?'<span class="footnote">Attempt '+r.attempt+' · best score kept</span><span style="flex:1"></span><button class="btn pri sm" id="qDone">Back to My Onboarding</button>'
        :'<button class="btn sm" id="qReread">↩ Re-read the article</button><span style="flex:1"></span><span class="footnote">Attempt '+r.attempt+' · best score kept</span><button class="btn pri sm" id="qRetake">Retake quiz ›</button>')
    +'</div></div></div>';
  document.querySelectorAll('[data-nav="back"]').forEach(el=>el.addEventListener('click',()=>openArticle(z.art.id)));
  const rr=$('#qReread'); if(rr)rr.addEventListener('click',()=>openArticle(z.art.id));
  const rt=$('#qRetake'); if(rt)rt.addEventListener('click',()=>startQuiz(z.art));
  const dn=$('#qDone'); if(dn)dn.addEventListener('click',()=>{ MODE='onboarding'; setHash('onboarding'); draw(); });
}

/* ---------- editor ---------- */
let ED=null;   // draft state while editing
function drawEditor(){
  const a=OPEN;
  if(!ED)ED={title:a?a.title:'',summary:a?a.summary||'':'',category_id:a?a.category_id:(CATS[0]||{}).id,
    min_role:a?a.min_role:'employee',require_ack:a?!!a.require_ack:false,emoji:a?a.emoji||'':'',
    module_id:a?a.module_id:null,sort_order:a?a.sort_order||0:0,body:a?a.body:'',announce:true};
  const q=a?QUIZ[a.id]:null;
  const status=a?a.status:'draft';
  const inner=''
  +'<div class="crumb"><a data-nav="back">‹ Knowledge Base</a><span class="sep">/</span><span class="cat">'+(a?'Edit article':'New article')+'</span>'
    +'<span style="flex:1"></span>'
    +'<span class="statuschip '+(status==='published'?'pub':'draft')+'">'+(status==='published'?'Published':'Draft — unpublished'+(a?' edits':''))+'</span>'
    +'<button class="btn sm" id="edPrev">Preview</button>'
    +'<button class="btn sm" id="edDraft">Save draft</button>'
    +'<button class="btn pri sm" id="edPub">'+(status==='published'?'Save &amp; publish':'Publish')+'</button>'
  +'</div>'
  +'<div class="edgrid">'
    +'<div class="edmain">'
      +'<div style="padding:22px 28px 0">'
        +'<input class="edtitle" id="eTitle" value="'+esc(ED.title)+'" placeholder="Article title…">'
        +'<div class="footnote" style="margin-top:4px">'+(a?'Last saved '+fmtD(a.updated_at):'Not saved yet')+' · editing as '+esc(AUTH.name)+'</div>'
      +'</div>'
      +'<div class="edtools">'
        +'<button data-md="b" style="font-weight:900">B</button><button data-md="i" style="font-style:italic">I</button>'
        +'<button data-md="h2">H2</button><button data-md="ul">• List</button><button data-md="ol">1. List</button>'
        +'<button data-md="callout">⚠️ Callout</button><button data-md="link">🔗 Link</button><button id="edImg">🖼️ Image</button>'
        +'<input type="file" id="edImgFile" accept="image/*" hidden>'
      +'</div>'
      +'<textarea class="edbody" id="eBody" placeholder="# Heading&#10;&#10;Write it how you’d explain it to a new hire. **Bold** the must-knows.&#10;&#10;- bullets&#10;- like this&#10;&#10;!> Amber warning callout">'+esc(ED.body)+'</textarea>'
      +'<div id="edPrevBox" class="artbody" style="display:none;border-top:1.5px dashed var(--border)"></div>'
    +'</div>'
    +'<div>'
      +'<div class="sdc"><div class="k">Article settings</div>'
        +'<label class="fl">Category</label><select id="eCat">'+CATS.map(c=>'<option value="'+c.id+'"'+(ED.category_id===c.id?' selected':'')+'>'+esc(c.icon+' '+c.name)+'</option>').join('')+'</select>'
        +'<label class="fl">Visible to</label><select id="eVis"><option value="employee"'+(ED.min_role!=='manager'?' selected':'')+'>Everyone</option><option value="manager"'+(ED.min_role==='manager'?' selected':'')+'>Managers &amp; up</option></select>'
        +'<label class="fl">Emoji (row icon)</label><input type="text" id="eEmoji" value="'+esc(ED.emoji)+'" placeholder="e.g. 💧 (falls back to category icon)">'
        +'<label class="fl">One-line summary</label><input type="text" id="eSummary" value="'+esc(ED.summary)+'" placeholder="Shows on the list row">'
      +'</div>'
      +'<div class="sdc"><div class="k">Onboarding</div>'
        +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'
          +'<button class="switch'+(ED.require_ack?' on':'')+'" id="eReq" type="button"><i></i></button>'
          +'<span style="font-size:.82rem;font-weight:700">Required read</span>'
        +'</div>'
        +'<label class="fl">Assigned module</label><select id="eMod"><option value="">— none —</option>'+MODULES.map(m=>'<option value="'+m.id+'"'+(ED.module_id===m.id?' selected':'')+'>'+esc(m.name)+'</option>').join('')+'</select>'
        +'<label class="fl">Order in module</label><input type="number" id="eSort" value="'+(+ED.sort_order||0)+'" min="0" step="1">'
        +(a
          ?'<div class="quizbox"><span style="font-size:.9rem">❓</span><div class="qt">'+(q&&q.nq?'Quiz attached · '+q.nq+' question'+(q.nq===1?'':'s'):'No quiz yet')+'</div><a id="eQuiz">'+(q&&q.nq?'Edit':'＋ Add')+'</a></div>'
          :'<div class="footnote">Save the article first to attach a quiz.</div>')
      +'</div>'
      +(a?'<div class="sdc" id="edReaders"><div class="k">Readers</div><div class="footnote">Loading…</div></div>':'')
      +(a?'<div class="sdc"><div class="k">More actions</div>'
        +'<div style="display:flex;flex-direction:column;gap:9px;align-items:flex-start">'
        +(a.require_ack&&a.status==='published'?'<button class="linkbtn" id="eRecert">🔁 Reset acknowledgments (re-certify)</button>':'')
        +(a.status==='published'?'<button class="linkbtn" id="eUnpub">Unpublish → draft</button>':'')
        +(a.status==='archived'?'<button class="linkbtn" id="eRestore">Restore to draft</button>':'<button class="linkdel" id="eArchive">Archive article</button>')
        +'</div></div>':'')
    +'</div>'
  +'</div>';
  $('#page').innerHTML=inner;
  // ---- wiring ----
  const grab=()=>{ ED.title=$('#eTitle').value; ED.body=$('#eBody').value; ED.summary=$('#eSummary').value;
    ED.category_id=+$('#eCat').value||null; ED.min_role=$('#eVis').value; ED.emoji=$('#eEmoji').value.trim();
    ED.module_id=$('#eMod').value?+$('#eMod').value:null; ED.sort_order=+$('#eSort').value||0; };
  document.querySelector('[data-nav="back"]').addEventListener('click',()=>{ ED=null; MODE=a?'article':'list'; setHash(a?'a='+a.slug:catHash()); draw(); });
  $('#eReq').addEventListener('click',()=>{ ED.require_ack=!ED.require_ack; grab(); drawEditor(); });
  const ta=$('#eBody');
  function wrap(pre,post,ph){ const s=ta.selectionStart,e=ta.selectionEnd,vv=ta.value,sel=vv.slice(s,e)||ph;
    ta.value=vv.slice(0,s)+pre+sel+post+vv.slice(e); ta.focus();
    ta.selectionStart=s+pre.length; ta.selectionEnd=s+pre.length+sel.length; }
  function linePrefix(pfx){ const s=ta.selectionStart,vv=ta.value; const a0=vv.lastIndexOf('\n',s-1)+1;
    ta.value=vv.slice(0,a0)+pfx+vv.slice(a0); ta.focus(); ta.selectionStart=ta.selectionEnd=s+pfx.length; }
  document.querySelectorAll('[data-md]').forEach(b=>b.addEventListener('click',()=>{
    const k=b.dataset.md;
    if(k==='b')wrap('**','**','bold text'); else if(k==='i')wrap('*','*','italic text');
    else if(k==='h2')linePrefix('# '); else if(k==='ul')linePrefix('- '); else if(k==='ol')linePrefix('1. ');
    else if(k==='callout')linePrefix('!> ');
    else if(k==='link'){ const u=prompt('Link URL:','https://'); if(u)wrap('[',']('+u+')','link text'); }
  }));
  $('#edImg').addEventListener('click',()=>$('#edImgFile').click());
  $('#edImgFile').addEventListener('change',async()=>{
    const f=$('#edImgFile').files[0]; if(!f)return;
    toast('Uploading image…');
    const path=Date.now()+'-'+f.name.toLowerCase().replace(/[^a-z0-9.]+/g,'-');
    const {error}=await sb.storage.from('kb-media').upload(path,f,{contentType:f.type});
    if(error){ toast('Upload failed: '+error.message,true); return; }
    wrap('\n![image]('+SB_URL+'/storage/v1/object/public/kb-media/'+path+')\n','','');
    toast('Image added.');
  });
  $('#edPrev').addEventListener('click',()=>{
    const box=$('#edPrevBox');
    if(box.style.display==='none'){ box.innerHTML=render(ta.value); box.style.display='block'; }
    else box.style.display='none';
  });
  async function save(status){
    grab();
    if(!ED.title.trim()){ toast('Give it a title.',true); return; }
    const row={title:ED.title.trim(),summary:ED.summary.trim()||null,category_id:ED.category_id,
      body:ED.body,status,min_role:ED.min_role,require_ack:ED.require_ack,emoji:ED.emoji||null,
      module_id:ED.module_id,sort_order:ED.sort_order,updated_by:AUTH.id};
    if(status==='published'&&!(a&&a.published_at))row.published_at=new Date().toISOString();
    let saved;
    if(a){
      row.version=(a.version||1)+1;
      const res=await sb.from('kb_articles').update(row).eq('id',a.id).select().single();
      if(res.error){ toast('Save failed: '+res.error.message,true); return; }
      saved=res.data;
    }else{
      row.slug=slugify(ED.title); row.created_by=AUTH.id;
      let res=await sb.from('kb_articles').insert(row).select().single();
      if(res.error&&/duplicate/.test(res.error.message)){ row.slug=row.slug+'-'+Date.now()%1000;
        res=await sb.from('kb_articles').insert(row).select().single(); }
      if(res.error){ toast('Save failed: '+res.error.message,true); return; }
      saved=res.data;
    }
    await sb.from('kb_article_versions').insert({article_id:saved.id,version:saved.version,
      title:saved.title,summary:saved.summary,body:saved.body,tags:saved.tags,edited_by:AUTH.id});
    if(status==='published'&&!(a&&a.published_at)&&ED.announce)announcePublish(saved,true);
    toast(status==='published'?'Published ✔':'Draft saved.');
    ED=null; OPEN=saved; MODE=status==='published'?'article':'edit';
    await refresh();
    if(MODE==='article')setHash('a='+saved.slug);
    else{ OPEN=ARTS.find(x=>x.id===saved.id)||saved; setHash('edit='+saved.id); draw(); }
  }
  $('#edDraft').addEventListener('click',()=>save(a&&a.status==='published'?'published':'draft'));
  $('#edPub').addEventListener('click',()=>save('published'));
  const up=$('#eUnpub'); if(up)up.addEventListener('click',()=>save('draft'));
  const rec=$('#eRecert'); if(rec)rec.addEventListener('click',async()=>{
    if(!confirm('Reset acknowledgments? Everyone must re-read and re-acknowledge. (Read history is kept.)'))return;
    const {error}=await sb.from('kb_reads').update({acknowledged_at:null}).eq('article_id',a.id);
    if(error){ toast('Reset failed: '+error.message,true); return; }
    announcePublish(a,false);
    toast('Acknowledgments reset — re-certification announced.'); refresh();
  });
  const arch=$('#eArchive'); if(arch)arch.addEventListener('click',async()=>{
    if(!confirm('Archive this article? It disappears from the library (restorable from Manage → Archived).'))return;
    await sb.from('kb_articles').update({status:'archived',updated_by:AUTH.id}).eq('id',a.id);
    toast('Archived.'); ED=null; OPEN=null; MODE='list'; refresh();
  });
  const rest=$('#eRestore'); if(rest)rest.addEventListener('click',async()=>{
    await sb.from('kb_articles').update({status:'draft',updated_by:AUTH.id}).eq('id',a.id);
    toast('Restored to draft.'); ED=null; refresh();
  });
  const eq=$('#eQuiz'); if(eq)eq.addEventListener('click',()=>openQuizEditor(a));
  // readers card
  if(a){(async()=>{
    const el=$('#edReaders'); if(!el)return;
    const [{count:ackN},att]=await Promise.all([
      sb.from('kb_reads').select('id',{count:'exact',head:true}).eq('article_id',a.id).not('acknowledged_at','is',null),
      q?sb.from('kb_quiz_attempts').select('staff_id,passed').eq('quiz_id',q.id):Promise.resolve({data:null})
    ]);
    let quizLine='';
    if(att&&att.data){
      const by={}; att.data.forEach(x=>{ by[x.staff_id]=by[x.staff_id]||x.passed; });
      const tried=Object.keys(by).length, passed=Object.values(by).filter(Boolean).length;
      quizLine='<br>Quiz pass rate <b>'+(tried?Math.round(passed/tried*100)+'%':'—')+'</b>';
    }
    el.innerHTML='<div class="k">Readers</div><div style="font-size:.8rem;font-weight:700;color:var(--dark-grey);line-height:1.6">Read by <b>'+(ackN||0)+' of '+STAFF.length+'</b> staff'+quizLine+'</div>'
      +'<a class="linkbtn" href="kb-compliance.html" style="display:inline-block;margin-top:6px">View in Compliance ›</a>';
  })();}
}

/* ---------- quiz editor (managers, modal) ---------- */
async function openQuizEditor(a){
  let quiz=QUIZ[a.id];
  if(!quiz){
    const r=await sb.from('kb_quizzes').insert({article_id:a.id}).select().single();
    if(r.error){ toast('Could not create quiz: '+r.error.message,true); return; }
    quiz={id:r.data.id,pass_pct:r.data.pass_pct,nq:0}; QUIZ[a.id]=quiz;
  }
  const [{data:qs},ans]=await Promise.all([
    sb.from('kb_quiz_questions').select('*').eq('quiz_id',quiz.id).order('sort').order('id'),
    sb.rpc('kb_quiz_get_answers',{p_quiz_id:quiz.id})
  ]);
  const correct={}; (ans.data||[]).forEach(x=>correct[x.question_id]=x.correct_idx);
  let list=(qs||[]).map(x=>({id:x.id,question:x.question,options:(x.options||[]).slice(),hint:x.section_hint||'',correct:correct[x.id]!=null?correct[x.id]:0}));
  if(!list.length)list.push({id:null,question:'',options:['',''],hint:'',correct:0});
  const wrapEl=$('#mdlWrap');
  function paint(){
    wrapEl.innerHTML='<div class="ovl"><div class="mdl">'
      +'<div class="mdl-hd"><div style="font-family:Nunito,sans-serif;font-weight:900;font-size:1.05rem">❓ Quiz — '+esc(a.title)+'</div><button class="mdl-x" data-close>✕</button></div>'
      +'<div class="mdl-bd">'
      +list.map((qq,qi)=>'<div class="qed" data-qi="'+qi+'">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><b style="font-family:Nunito,sans-serif;font-size:.8rem">Q'+(qi+1)+'</b><span style="flex:1"></span><button class="linkdel" data-delq="'+qi+'">remove</button></div>'
        +'<textarea data-q="'+qi+'" placeholder="Question…">'+esc(qq.question)+'</textarea>'
        +qq.options.map((o,oi)=>'<div class="optrow"><input type="radio" name="cq'+qi+'" data-cor="'+qi+':'+oi+'"'+(qq.correct===oi?' checked':'')+' title="Correct answer"><input type="text" data-opt="'+qi+':'+oi+'" value="'+esc(o)+'" placeholder="Option '+(oi+1)+'">'
          +(qq.options.length>2?'<button class="linkdel" data-delopt="'+qi+':'+oi+'">✕</button>':'')+'</div>').join('')
        +'<div style="display:flex;gap:12px;align-items:center;margin-top:8px;flex-wrap:wrap">'
          +'<button class="linkbtn" data-addopt="'+qi+'">＋ option</button>'
          +'<input type="text" data-hint="'+qi+'" value="'+esc(qq.hint)+'" placeholder="Covered in… (section hint shown on a miss)" style="flex:1;min-width:180px;height:30px;padding:4px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:.78rem;font-weight:600;font-family:\'Nunito Sans\',sans-serif">'
        +'</div></div>').join('')
      +'<button class="linkbtn" id="qAdd">＋ Add a question</button>'
      +'<div class="footnote" style="margin-top:10px">Pass mark 80% · the correct answers never leave the server — employees only ever see “covered in” hints.</div>'
      +'</div>'
      +'<div class="mdl-ft"><button class="btn sm" data-close>Cancel</button><button class="btn pri sm" id="qSave">Save quiz</button></div>'
      +'</div></div>';
    const grabQ=()=>{ list.forEach((qq,qi)=>{
      const t=wrapEl.querySelector('[data-q="'+qi+'"]'); if(t)qq.question=t.value;
      qq.options.forEach((_,oi)=>{ const o=wrapEl.querySelector('[data-opt="'+qi+':'+oi+'"]'); if(o)qq.options[oi]=o.value; });
      const h=wrapEl.querySelector('[data-hint="'+qi+'"]'); if(h)qq.hint=h.value;
      const c=wrapEl.querySelector('input[name="cq'+qi+'"]:checked'); if(c)qq.correct=+c.dataset.cor.split(':')[1];
    });};
    wrapEl.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>{ wrapEl.innerHTML=''; });
    wrapEl.querySelectorAll('[data-delq]').forEach(b=>b.onclick=()=>{ grabQ(); list.splice(+b.dataset.delq,1); if(!list.length)list.push({id:null,question:'',options:['',''],hint:'',correct:0}); paint(); });
    wrapEl.querySelectorAll('[data-addopt]').forEach(b=>b.onclick=()=>{ grabQ(); list[+b.dataset.addopt].options.push(''); paint(); });
    wrapEl.querySelectorAll('[data-delopt]').forEach(b=>b.onclick=()=>{ grabQ(); const [qi,oi]=b.dataset.delopt.split(':').map(Number);
      list[qi].options.splice(oi,1); if(list[qi].correct>=list[qi].options.length)list[qi].correct=0; paint(); });
    $('#qAdd').onclick=()=>{ grabQ(); list.push({id:null,question:'',options:['',''],hint:'',correct:0}); paint(); };
    $('#qSave').onclick=async()=>{
      grabQ();
      const clean=list.filter(qq=>qq.question.trim()&&qq.options.filter(o=>o.trim()).length>=2);
      if(!clean.length){ toast('Add at least one question with two options.',true); return; }
      try{
        const keep=[];
        for(let i=0;i<clean.length;i++){
          const qq=clean[i];
          const row={quiz_id:quiz.id,sort:i,question:qq.question.trim(),options:qq.options.map(o=>o.trim()).filter(Boolean),section_hint:qq.hint.trim()||null};
          let qid=qq.id;
          if(qid){ const r=await sb.from('kb_quiz_questions').update(row).eq('id',qid); if(r.error)throw r.error; }
          else{ const r=await sb.from('kb_quiz_questions').insert(row).select().single(); if(r.error)throw r.error; qid=r.data.id; }
          keep.push(qid);
          const ra=await sb.rpc('kb_quiz_set_answer',{p_question_id:qid,p_correct:Math.min(qq.correct,row.options.length-1)});
          if(ra.error)throw ra.error;
        }
        // remove deleted questions
        const {data:allq}=await sb.from('kb_quiz_questions').select('id').eq('quiz_id',quiz.id);
        for(const x of (allq||[]))if(keep.indexOf(x.id)<0)await sb.from('kb_quiz_questions').delete().eq('id',x.id);
        QUIZ[a.id]={id:quiz.id,pass_pct:quiz.pass_pct||80,nq:keep.length};
        wrapEl.innerHTML=''; toast('Quiz saved · '+keep.length+' question'+(keep.length===1?'':'s'));
        if(MODE==='edit')drawEditor();
      }catch(e){ toast('Save failed: '+(e.message||e),true); }
    };
  }
  paint();
}

/* ---------- publish → Communications + alerts (unchanged behavior) ---------- */
async function announcePublish(a,isNew){
  try{
    const req=a.require_ack;
    await sb.from('communications').insert({
      kind:req?'training':'announcement',
      title:(req?'🎓 Required reading: ':'📚 New in the Knowledge Base: ')+a.title,
      body:(a.summary?a.summary+'\n\n':'')
        +(req?'This one needs a read **and** an acknowledgment — it\'s tracked.\n\n':'')
        +'Read it here: https://myrepairtools.github.io/knowledge.html#a='+(a.slug||''),
      source_key:'kb:'+a.id+':'+(isNew?'publish':'recert-'+a.version),
      created_by:AUTH.id
    });
    if(req){
      const s=(await sb.auth.getSession()).data.session;
      if(s)fetch(SB_URL+'/functions/v1/alerts',{method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.access_token,'apikey':ANON},
        body:JSON.stringify({action:'send',kind:'kb',all_active:true,
          title:'Required reading: '+a.title,
          body:(a.summary||'New policy article — read and acknowledge it.').slice(0,300),
          link:'knowledge.html#a='+(a.slug||'')})}).catch(()=>{});
    }
  }catch(e){ /* best-effort */ }
}

/* ---------- draw ---------- */
function draw(){
  publishNav();   // keep the nav pane's counts/badges/active row current
  if(MODE==='article'&&OPEN)drawArticle();
  else if(MODE==='modules'&&isMgr(AUTH.role))drawModules();
  else if(MODE==='onboarding')drawOnboarding();
  else if(MODE==='quiz'&&QZ)drawQuiz();
  else if(MODE==='quizresult'&&QZ&&QZ.result)drawQuizResult();
  else if(MODE==='edit'&&isMgr(AUTH.role))drawEditor();
  else{ MODE='list'; drawList(); }
}
</script>
</body>
