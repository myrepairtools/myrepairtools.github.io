<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Knowledge Base · CPR Oregon</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--border:#E0E2EA;--green:#2E9E5B;--amber:#C9820B;}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0}
body{font-family:'Nunito Sans',sans-serif;color:var(--dark);background:var(--light-grey)}
.wrap{padding:22px 26px 60px;max-width:1150px;margin:0 auto}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.6rem;letter-spacing:-.4px;margin:0}
.sub{font-weight:700;font-size:.85rem;color:var(--grey);margin-top:4px}
.hd{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.hd .sp{margin-left:auto;display:flex;gap:8px}
.btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;padding:9px 16px;border:1.5px solid var(--border);background:#fff;color:var(--dark);border-radius:10px;cursor:pointer}
.btn.pri{background:var(--red);border-color:var(--red);color:#fff}
.btn.dk{background:var(--dark);border-color:var(--dark);color:#fff}
.btn:disabled{opacity:.45;cursor:not-allowed}
/* search hero */
.searchbox{position:relative;margin-bottom:14px}
.searchbox input{width:100%;font-family:'Nunito Sans',sans-serif;font-size:1.02rem;padding:15px 18px 15px 48px;border:1.5px solid var(--border);border-radius:14px;background:#fff;box-shadow:0 1px 3px rgba(45,45,59,.05)}
.searchbox input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,176,227,.15)}
.searchbox .ic{position:absolute;left:17px;top:50%;transform:translateY(-50%);font-size:1.05rem;color:var(--grey)}
/* filter pills */
.filter{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 16px}
.filter button{font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;padding:7px 14px;border:1.5px solid var(--border);background:#fff;color:var(--dark-grey);border-radius:999px;cursor:pointer}
.filter button.on{background:#EAF6FD;border-color:#CDEAF8;color:#1E7AA8}
.filter .cnt{display:inline-block;min-width:17px;padding:0 5px;margin-left:5px;border-radius:999px;background:var(--red);color:#fff;font-size:.66rem;line-height:1.5}
/* cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:15px 17px;cursor:pointer;position:relative;box-shadow:0 1px 3px rgba(45,45,59,.04)}
.card:hover{border-color:var(--blue)}
.card .ct{font-family:'Nunito',sans-serif;font-weight:900;font-size:.98rem;line-height:1.3;padding-right:16px}
.card .cs{font-size:.8rem;color:var(--dark-grey);margin-top:5px;line-height:1.45;min-height:1.4em}
.card .cm{display:flex;gap:7px;align-items:center;margin-top:10px;flex-wrap:wrap}
.chip{display:inline-block;font-size:.66rem;font-weight:800;padding:2.5px 9px;border-radius:999px;background:#EEF0F5;color:var(--dark-grey)}
.chip.req{background:#FDEBEC;color:var(--red)}
.chip.draft{background:#FFF4E0;color:var(--amber)}
.chip.mgr{background:#EAF6FD;color:#1E7AA8}
.card .dt{margin-left:auto;font-size:.68rem;color:var(--grey);font-weight:700}
.dot{position:absolute;top:14px;right:14px;width:9px;height:9px;border-radius:50%;background:var(--blue)}
.empty{padding:40px;text-align:center;color:var(--grey);font-weight:700}
.gate{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px;font-weight:700;color:var(--dark-grey)}
/* search results */
.sres{background:#fff;border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px}
.srow{padding:12px 17px;border-bottom:1px solid var(--light-grey);cursor:pointer}
.srow:hover{background:#F8FAFD}
.srow:last-child{border-bottom:none}
.srow .st{font-family:'Nunito',sans-serif;font-weight:900;font-size:.92rem}
.srow .sn{font-size:.8rem;color:var(--dark-grey);margin-top:3px}
.srow .sn b{background:#FFF3C4;border-radius:3px;padding:0 2px}
/* article view */
.art{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:26px 30px;box-shadow:0 1px 3px rgba(45,45,59,.05)}
.art .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.art h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.45rem;margin:6px 0 4px;letter-spacing:-.3px}
.art .meta{font-size:.76rem;color:var(--grey);font-weight:700;margin-bottom:16px;display:flex;gap:14px;flex-wrap:wrap}
.body{font-size:.95rem;line-height:1.65;color:var(--dark)}
.body h3{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.15rem;margin:22px 0 8px}
.body h4{font-family:'Nunito',sans-serif;font-weight:900;font-size:.98rem;margin:18px 0 6px}
.body ul,.body ol{margin:6px 0 12px;padding-left:24px}
.body li{margin:3px 0}
.body img{max-width:100%;border-radius:12px;border:1px solid var(--border);margin:10px 0;display:block}
.body a{color:#1E7AA8;font-weight:700}
.body hr{border:none;border-top:1.5px solid var(--border);margin:18px 0}
.body code{background:#F0F1F4;border-radius:5px;padding:1px 6px;font-size:.86em}
.ackbar{display:flex;align-items:center;gap:12px;background:#FDF6E7;border:1.5px solid #F2DFAE;border-radius:12px;padding:13px 16px;margin:18px 0 4px;font-weight:700;font-size:.86rem;color:#7A5A08}
.ackbar.done{background:#EDF9F2;border-color:#BFE8D0;color:var(--green)}
.fbbar{display:flex;align-items:center;gap:10px;margin-top:22px;padding-top:16px;border-top:1px solid var(--light-grey);font-size:.83rem;color:var(--dark-grey);font-weight:700;flex-wrap:wrap}
.fbbar button{font-size:.95rem;border:1.5px solid var(--border);background:#fff;border-radius:9px;padding:6px 12px;cursor:pointer}
.fbbar button.on{background:#EAF6FD;border-color:#CDEAF8}
/* editor */
.ed{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:22px 24px}
.ed label{display:block;font-weight:800;font-size:.72rem;text-transform:uppercase;letter-spacing:.4px;color:var(--dark-grey);margin:14px 0 5px}
.ed input[type=text],.ed select,.ed textarea{width:100%;font-family:'Nunito Sans',sans-serif;font-size:.9rem;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;background:#fff}
.ed input[type=text],.ed select{height:39px}
.ed textarea{min-height:340px;line-height:1.55;resize:vertical;font-size:.92rem}
.ed input:focus,.ed select:focus,.ed textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,176,227,.13)}
.edrow{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px}
@media(max-width:760px){.edrow{grid-template-columns:1fr}}
.toolbar{display:flex;gap:5px;margin:8px 0 7px;flex-wrap:wrap}
.toolbar button{min-width:32px;height:30px;border:1.5px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:900;font-size:.78rem;color:var(--dark-grey);padding:0 9px}
.toolbar button:hover{background:#F6F8FC}
.togglerow{display:flex;gap:20px;align-items:center;margin-top:14px;flex-wrap:wrap}
.togglerow label{display:flex;align-items:center;gap:8px;margin:0;font-size:.83rem;font-weight:700;text-transform:none;letter-spacing:0;color:var(--dark);cursor:pointer}
.togglerow input{width:16px;height:16px;accent-color:var(--red)}
.ed .ft{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
.preview{border:1.5px dashed var(--border);border-radius:12px;padding:16px 18px;margin-top:8px}
.toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,16px);opacity:0;pointer-events:none;background:var(--dark);color:#fff;border-left:4px solid var(--green);padding:11px 18px;border-radius:10px;font-size:.85rem;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,.3);transition:opacity .25s,transform .25s;z-index:500}
.toast.show{opacity:1;transform:translate(-50%,0)}
.toast.err{border-left-color:var(--red)}
.backbtn{margin-bottom:12px}
.receipts{font-size:.78rem;color:var(--dark-grey);background:#F7F8FB;border-radius:10px;padding:10px 14px;margin-top:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div>
      <h1>📚 Knowledge Base</h1>
      <div class="sub">The brain — SOPs, repair knowledge, training &amp; how-tos. Searchable by you, cited by the assistant.</div>
    </div>
    <div class="sp">
      <button class="btn dk" id="btnNew" hidden>＋ New article</button>
    </div>
  </div>

  <div class="searchbox"><span class="ic">🔎</span>
    <input id="q" placeholder="Search everything — “warranty”, “S24 back glass”, “opening checklist”…" autocomplete="off">
  </div>

  <div class="filter" id="chips"></div>

  <div id="view"><div class="empty">Loading…</div></div>
  <div id="gate" class="gate" hidden>Sign in to read the Knowledge Base.</div>
</div>
<div class="toast" id="toast"></div>

<script src="assets/pin-gate.js"></script>
<script src="assets/nav.js"></script>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SB_URL='https://xuvsehrevxackuhmbmry.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY';
const sb=createClient(SB_URL,ANON);
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const isMgr=r=>['owner','admin','manager'].indexOf(r)>-1;
function toast(m,err){ const t=$('#toast'); t.textContent=m; t.classList.toggle('err',!!err); t.classList.add('show');
  clearTimeout(toast._h); toast._h=setTimeout(()=>t.classList.remove('show'),4200); }
function fmtD(x){ if(!x)return ''; const d=new Date(x); if(isNaN(d))return '';
  return ('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2)+'/'+String(d.getFullYear()).slice(-2); }

/* ---------- light markup → safe HTML ----------
   escape first, then: # / ## headings, **b**, *i*, __u__, `code`,
   ![alt](url) images, [text](url) links, bare URLs, - bullets, 1. numbered, --- rule */
function render(text){
  let s=esc(text);
  s=s.replace(/!\[([^\]]*)\]\((https?:[^)\s]+)\)/g,'<img src="$2" alt="$1" loading="lazy">');
  s=s.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.replace(/(^|[\s>])(https?:\/\/[^\s<]+)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  s=s.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*([^*\n]+)\*\*/g,'<b>$1</b>');
  s=s.replace(/__([^_\n]+)__/g,'<u>$1</u>');
  s=s.replace(/(^|[\s(>])\*([^*\n]+)\*/g,'$1<i>$2</i>');
  const lines=s.split('\n'); let out='',ul=false,ol=false;
  const close=()=>{ if(ul){out+='</ul>';ul=false;} if(ol){out+='</ol>';ol=false;} };
  for(const ln of lines){
    let m;
    if(/^\s*---+\s*$/.test(ln)){ close(); out+='<hr>'; }
    else if((m=/^##\s+(.*)$/.exec(ln))){ close(); out+='<h4>'+m[1]+'</h4>'; }
    else if((m=/^#\s+(.*)$/.exec(ln))){ close(); out+='<h3>'+m[1]+'</h3>'; }
    else if((m=/^\s*[-•]\s+(.*)$/.exec(ln))){ if(ol){out+='</ol>';ol=false;} if(!ul){out+='<ul>';ul=true;} out+='<li>'+m[1]+'</li>'; }
    else if((m=/^\s*\d+[.)]\s+(.*)$/.exec(ln))){ if(ul){out+='</ul>';ul=false;} if(!ol){out+='<ol>';ol=true;} out+='<li>'+m[1]+'</li>'; }
    else if(ln.trim()===''){ close(); out+='<div style="height:8px"></div>'; }
    else { close(); out+=ln+'<br>'; }
  }
  close();
  return out;
}
function slugify(t){ return String(t).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,60)||('a-'+Date.now()); }

/* ---------- auth ---------- */
let AUTH=null, BOOTED=false;
async function resolveMe(sess){
  if(!sess||BOOTED)return;
  const sr=await sb.from('staff').select('id,display_name,role').eq('auth_uid',sess.user.id).maybeSingle();
  if(sr.data){ BOOTED=true; AUTH={id:sr.data.id,name:sr.data.display_name,role:sr.data.role}; boot(); }
}
sb.auth.onAuthStateChange((_e,sess)=>{ if(sess) resolveMe(sess); });
(async()=>{ try{ const s=(await sb.auth.getSession()).data.session; if(s) resolveMe(s); }catch(e){} })();

/* ---------- state ---------- */
let CATS=[], ARTS=[], READS={}, FB={};
let MODE='list';            // list | article | edit
let CAT=(function(){try{return localStorage.getItem('cprKbCat')||'all';}catch(e){return 'all';}})();
let OPEN=null;              // article row being viewed / edited
let SEARCHQ='', SRES=null, SEARCH_T=null;

function boot(){
  if(!AUTH){ $('#gate').hidden=false; return; }
  if(isMgr(AUTH.role)) $('#btnNew').hidden=false;
  $('#btnNew').addEventListener('click',()=>{ OPEN=null; MODE='edit'; draw(); });
  $('#q').addEventListener('input',()=>{ SEARCHQ=$('#q').value.trim();
    clearTimeout(SEARCH_T); SEARCH_T=setTimeout(runSearch,250); });
  refresh();
}
async function refresh(){
  const [c,a,r,f]=await Promise.all([
    sb.from('kb_categories').select('*').order('sort'),
    sb.from('kb_articles').select('id,slug,title,category_id,tags,summary,status,min_role,require_ack,version,updated_at,published_at,created_by,updated_by').order('updated_at',{ascending:false}),
    sb.from('kb_reads').select('article_id,first_read_at,acknowledged_at').eq('staff_id',AUTH.id),
    sb.from('kb_feedback').select('article_id,helpful').eq('staff_id',AUTH.id)
  ]);
  CATS=c.data||[]; ARTS=a.data||[];
  READS={}; (r.data||[]).forEach(x=>READS[x.article_id]=x);
  FB={}; (f.data||[]).forEach(x=>FB[x.article_id]=x);
  // deep link #a=slug
  const m=location.hash.match(/#a=([\w-]+)/);
  if(m&&MODE==='list'){ const art=ARTS.find(x=>x.slug===m[1]); if(art){ openArticle(art.id); return; } }
  draw();
}
function catName(id){ const c=CATS.find(x=>x.id===id); return c?c.name:'—'; }
function catIcon(id){ const c=CATS.find(x=>x.id===id); return c?c.icon:'📄'; }
function ackPending(){ return ARTS.filter(a=>a.status==='published'&&a.require_ack&&!(READS[a.id]&&READS[a.id].acknowledged_at)); }

/* ---------- chips ---------- */
function drawChips(){
  const pend=ackPending().length;
  let html='<button data-c="all" class="'+(CAT==='all'?'on':'')+'">All</button>';
  html+='<button data-c="req" class="'+(CAT==='req'?'on':'')+'">🎓 Required'+(pend?'<span class="cnt">'+pend+'</span>':'')+'</button>';
  CATS.forEach(c=>{ html+='<button data-c="'+c.id+'" class="'+(String(CAT)===String(c.id)?'on':'')+'">'+esc(c.icon+' '+c.name)+'</button>'; });
  if(isMgr(AUTH.role)){
    html+='<button data-c="drafts" class="'+(CAT==='drafts'?'on':'')+'">✏️ Drafts</button>';
    html+='<button data-c="compliance" class="'+(CAT==='compliance'?'on':'')+'">📋 Compliance</button>';
  }
  $('#chips').innerHTML=html;
  document.querySelectorAll('#chips button').forEach(b=>b.addEventListener('click',()=>{
    CAT=b.dataset.c; try{localStorage.setItem('cprKbCat',CAT);}catch(e){} MODE='list'; OPEN=null; draw();
  }));
}

/* ---------- search ---------- */
async function runSearch(){
  if(!SEARCHQ){ SRES=null; draw(); return; }
  const {data}=await sb.rpc('kb_search',{q:SEARCHQ,max_results:10});
  SRES=data||[];
  draw();
}

/* ---------- list ---------- */
function listRows(){
  let rows=ARTS;
  if(CAT==='drafts') rows=rows.filter(a=>a.status!=='published');
  else{
    rows=rows.filter(a=>a.status==='published');
    if(CAT==='req') rows=rows.filter(a=>a.require_ack);
    else if(CAT!=='all') rows=rows.filter(a=>String(a.category_id)===String(CAT));
  }
  return rows;
}
function drawList(){
  const v=$('#view');
  let html='';
  if(SRES){
    html+=SRES.length
      ? '<div class="sres">'+SRES.map(r=>'<div class="srow" data-open="'+r.id+'"><div class="st">'+esc(catIcon(r.category_id))+' '+esc(r.title)+'</div><div class="sn">'+String(esc(r.snippet||r.summary||'')).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>')+'</div></div>').join('')+'</div>'
      : '<div class="sres"><div class="srow"><div class="sn">No matches for “'+esc(SEARCHQ)+'” — try different words, or ask the assistant (✨ bottom right).</div></div></div>';
  }
  const rows=listRows();
  html+=rows.length?'<div class="cards">'+rows.map(a=>{
    const read=READS[a.id];
    const acked=read&&read.acknowledged_at;
    return '<div class="card" data-open="'+a.id+'">'
      +(a.status==='published'&&!read?'<span class="dot" title="unread"></span>':'')
      +'<div class="ct">'+esc(catIcon(a.category_id))+' '+esc(a.title)+'</div>'
      +'<div class="cs">'+esc(a.summary||'')+'</div>'
      +'<div class="cm">'
        +'<span class="chip">'+esc(catName(a.category_id))+'</span>'
        +(a.require_ack?'<span class="chip req">'+(acked?'✓ acknowledged':'Required')+'</span>':'')
        +(a.status!=='published'?'<span class="chip draft">'+esc(a.status)+'</span>':'')
        +(a.min_role==='manager'?'<span class="chip mgr">managers</span>':'')
        +'<span class="dt">'+fmtD(a.updated_at)+'</span>'
      +'</div></div>';
  }).join('')+'</div>'
  :'<div class="empty">'+(ARTS.length?'Nothing here yet.':'No articles yet — managers hit ＋ New article, or ask Claude to import your existing docs.')+'</div>';
  v.innerHTML=html;
  document.querySelectorAll('[data-open]').forEach(el=>el.addEventListener('click',()=>openArticle(Number(el.dataset.open))));
}

/* ---------- article view ---------- */
async function openArticle(id){
  const a=ARTS.find(x=>x.id===id); if(!a)return;
  // fetch full body
  const {data}=await sb.from('kb_articles').select('*').eq('id',id).maybeSingle();
  if(!data){ toast('Could not load article.',true); return; }
  OPEN=data; MODE='article';
  try{ history.replaceState(null,'','#a='+(data.slug||'')); }catch(e){}
  draw();
}
async function recordRead(a){
  if(a.status!=='published'||READS[a.id])return;
  const ins=await sb.from('kb_reads').upsert({article_id:a.id,staff_id:AUTH.id},{onConflict:'article_id,staff_id'}).select().single();
  if(ins.data) READS[a.id]=ins.data;
}
async function drawArticle(){
  const a=OPEN, v=$('#view');
  await recordRead(a);   // every render of a published article counts as a read
  const read=READS[a.id], acked=read&&read.acknowledged_at;
  const fb=FB[a.id];
  let receipts='';
  if(isMgr(AUTH.role)){
    const [{count:reads},{count:acks},{data:fbs}]=await Promise.all([
      sb.from('kb_reads').select('id',{count:'exact',head:true}).eq('article_id',a.id),
      sb.from('kb_reads').select('id',{count:'exact',head:true}).eq('article_id',a.id).not('acknowledged_at','is',null),
      sb.from('kb_feedback').select('helpful').eq('article_id',a.id)
    ]);
    const up=(fbs||[]).filter(x=>x.helpful).length, down=(fbs||[]).length-up;
    receipts='<div class="receipts">👀 '+(reads||0)+' read'+(a.require_ack?' · ✅ '+(acks||0)+' acknowledged':'')+' · 👍 '+up+' · 👎 '+down+' · v'+a.version+'</div>';
  }
  v.innerHTML=''
    +'<button class="btn backbtn" id="back">‹ All articles</button>'
    +'<div class="art">'
    +'<div class="top">'
      +'<span class="chip">'+esc(catIcon(a.category_id)+' '+catName(a.category_id))+'</span>'
      +(a.require_ack?'<span class="chip req">Required reading</span>':'')
      +(a.status!=='published'?'<span class="chip draft">'+esc(a.status)+'</span>':'')
      +(a.min_role==='manager'?'<span class="chip mgr">managers only</span>':'')
      +(isMgr(AUTH.role)?'<span style="margin-left:auto"><button class="btn" id="edit">✏️ Edit</button></span>':'')
    +'</div>'
    +'<h2>'+esc(a.title)+'</h2>'
    +'<div class="meta"><span>Updated '+fmtD(a.updated_at)+'</span>'+(a.tags&&a.tags.length?'<span>'+a.tags.map(t=>'#'+esc(t)).join(' · ')+'</span>':'')+'</div>'
    +'<div class="body">'+render(a.body)+'</div>'
    +(a.require_ack&&a.status==='published'
      ? (acked
        ?'<div class="ackbar done">✅ You acknowledged this on '+fmtD(acked)+'.</div>'
        :'<div class="ackbar">🎓 This is required reading. <button class="btn pri" id="ack">I’ve read &amp; understood</button></div>')
      :'')
    +'<div class="fbbar">Was this helpful?'
      +'<button id="fbUp" class="'+(fb&&fb.helpful?'on':'')+'">👍</button>'
      +'<button id="fbDn" class="'+(fb&&fb.helpful===false?'on':'')+'">👎</button>'
      +'<span id="fbMsg" style="font-weight:600;color:var(--grey)"></span>'
    +'</div>'
    +receipts
    +'</div>';
  $('#back').addEventListener('click',()=>{ MODE='list'; OPEN=null; try{history.replaceState(null,'',' ');}catch(e){} draw(); });
  const ed=$('#edit'); if(ed)ed.addEventListener('click',()=>{ MODE='edit'; draw(); });
  const ack=$('#ack'); if(ack)ack.addEventListener('click',async()=>{
    const now=new Date().toISOString();
    const {data,error}=await sb.from('kb_reads')
      .upsert({article_id:a.id,staff_id:AUTH.id,acknowledged_at:now},{onConflict:'article_id,staff_id'})
      .select().single();
    if(error||!data){ toast('Could not save: '+(error?error.message:'no row'),true); return; }
    READS[a.id]=data;
    toast('Acknowledged — thank you!'); draw();
  });
  async function vote(h){
    const cur=FB[a.id];
    const res=cur
      ?await sb.from('kb_feedback').update({helpful:h}).eq('article_id',a.id).eq('staff_id',AUTH.id).select().single()
      :await sb.from('kb_feedback').insert({article_id:a.id,staff_id:AUTH.id,helpful:h}).select().single();
    if(res.error){ toast('Could not save feedback.',true); return; }
    FB[a.id]=res.data; $('#fbMsg').textContent='Thanks — noted.'; drawArticle();
  }
  $('#fbUp').addEventListener('click',()=>vote(true));
  $('#fbDn').addEventListener('click',()=>vote(false));
}

/* ---------- editor (managers) ---------- */
function drawEditor(){
  const a=OPEN, v=$('#view');
  v.innerHTML=''
    +'<button class="btn backbtn" id="back">‹ Cancel</button>'
    +'<div class="ed">'
    +'<label>Title</label><input type="text" id="eTitle" value="'+esc(a?a.title:'')+'" placeholder="e.g. Water-damage intake &amp; customer expectations">'
    +'<div class="edrow"><div><label>Summary (one line — shows on cards &amp; feeds the assistant)</label><input type="text" id="eSummary" value="'+esc(a?a.summary||'':'')+'"></div>'
    +'<div><label>Category</label><select id="eCat">'+CATS.map(c=>'<option value="'+c.id+'"'+(a&&a.category_id===c.id?' selected':'')+'>'+esc(c.icon+' '+c.name)+'</option>').join('')+'</select></div>'
    +'<div><label>Tags (comma separated)</label><input type="text" id="eTags" value="'+esc(a&&a.tags?a.tags.join(', '):'')+'" placeholder="warranty, iphone, policy"></div></div>'
    +'<label>Article</label>'
    +'<div class="toolbar">'
      +'<button data-md="h1" title="Heading">H1</button><button data-md="h2" title="Subheading">H2</button>'
      +'<button data-md="b" style="font-weight:900">B</button><button data-md="i" style="font-style:italic">I</button><button data-md="u" style="text-decoration:underline">U</button>'
      +'<button data-md="ul">• list</button><button data-md="ol">1. list</button>'
      +'<button data-md="link">🔗 link</button><button data-md="hr">— rule</button>'
      +'<button id="eImg">🖼 image</button><input type="file" id="eImgFile" accept="image/*" hidden>'
      +'<button id="ePrev" style="margin-left:auto">👁 preview</button>'
    +'</div>'
    +'<textarea id="eBody" placeholder="# Heading&#10;&#10;Write it how you’d explain it to a new hire. **Bold** the must-knows.&#10;&#10;- bullets&#10;- like this&#10;&#10;Paste an image with the 🖼 button.">'+esc(a?a.body:'')+'</textarea>'
    +'<div id="ePrevBox" class="preview" hidden></div>'
    +'<div class="togglerow">'
      +'<label><input type="checkbox" id="eReq" '+(a&&a.require_ack?'checked':'')+'> 🎓 Required reading (read &amp; acknowledge)</label>'
      +'<label><input type="checkbox" id="eMgr" '+(a&&a.min_role==='manager'?'checked':'')+'> 🔒 Managers only</label>'
    +'</div>'
    +'<div class="ft">'
      +(a&&a.require_ack&&a.status==='published'?'<button class="btn" id="eRecert" title="Everyone must re-read and re-acknowledge">🔁 Reset acknowledgments</button>':'')
      +(a&&a.status==='published'?'<button class="btn" id="eUnpub">Unpublish → draft</button>':'')
      +(a?'<button class="btn" id="eArchive">Archive</button>':'')
      +'<button class="btn" id="eDraft">Save draft</button>'
      +'<button class="btn pri" id="ePub">'+(a&&a.status==='published'?'Save &amp; publish':'Publish')+'</button>'
    +'</div>'
    +'</div>';
  $('#back').addEventListener('click',()=>{ MODE=OPEN?'article':'list'; draw(); });
  // toolbar
  const ta=$('#eBody');
  function wrap(pre,post,ph){ const s=ta.selectionStart,e=ta.selectionEnd,vv=ta.value,sel=vv.slice(s,e)||ph;
    ta.value=vv.slice(0,s)+pre+sel+post+vv.slice(e); ta.focus();
    ta.selectionStart=s+pre.length; ta.selectionEnd=s+pre.length+sel.length; }
  function linePrefix(pfx){ const s=ta.selectionStart,vv=ta.value; const a0=vv.lastIndexOf('\n',s-1)+1;
    ta.value=vv.slice(0,a0)+pfx+vv.slice(a0); ta.focus(); ta.selectionStart=ta.selectionEnd=s+pfx.length; }
  document.querySelectorAll('[data-md]').forEach(b=>b.addEventListener('click',()=>{
    const k=b.dataset.md;
    if(k==='b')wrap('**','**','bold text'); else if(k==='i')wrap('*','*','italic text');
    else if(k==='u')wrap('__','__','underlined'); else if(k==='h1')linePrefix('# ');
    else if(k==='h2')linePrefix('## '); else if(k==='ul')linePrefix('- ');
    else if(k==='ol')linePrefix('1. '); else if(k==='hr')wrap('\n---\n','','');
    else if(k==='link'){ const u=prompt('Link URL:','https://'); if(u)wrap('[',']('+u+')','link text'); }
  }));
  $('#eImg').addEventListener('click',()=>$('#eImgFile').click());
  $('#eImgFile').addEventListener('change',async()=>{
    const f=$('#eImgFile').files[0]; if(!f)return;
    toast('Uploading image…');
    const path=Date.now()+'-'+f.name.toLowerCase().replace(/[^a-z0-9.]+/g,'-');
    const {error}=await sb.storage.from('kb-media').upload(path,f,{contentType:f.type});
    if(error){ toast('Upload failed: '+error.message,true); return; }
    const url=SB_URL+'/storage/v1/object/public/kb-media/'+path;
    wrap('\n![image]('+url+')\n','','');
    toast('Image added.');
  });
  $('#ePrev').addEventListener('click',()=>{
    const box=$('#ePrevBox');
    if(box.hidden){ box.innerHTML='<div class="body">'+render(ta.value)+'</div>'; box.hidden=false; }
    else box.hidden=true;
  });
  async function save(status){
    const title=$('#eTitle').value.trim();
    if(!title){ toast('Give it a title.',true); return; }
    const row={
      title, summary:$('#eSummary').value.trim()||null,
      category_id:Number($('#eCat').value)||null,
      tags:$('#eTags').value.split(',').map(s=>s.trim()).filter(Boolean),
      body:ta.value, status,
      min_role:$('#eMgr').checked?'manager':'employee',
      require_ack:$('#eReq').checked,
      updated_by:AUTH.id
    };
    if(status==='published'&&!(a&&a.published_at)) row.published_at=new Date().toISOString();
    let saved;
    if(a){
      row.version=(a.version||1)+1;
      const res=await sb.from('kb_articles').update(row).eq('id',a.id).select().single();
      if(res.error){ toast('Save failed: '+res.error.message,true); return; }
      saved=res.data;
    }else{
      row.slug=slugify(title); row.created_by=AUTH.id;
      let res=await sb.from('kb_articles').insert(row).select().single();
      if(res.error&&/duplicate/.test(res.error.message)){ row.slug=row.slug+'-'+Date.now()%1000;
        res=await sb.from('kb_articles').insert(row).select().single(); }
      if(res.error){ toast('Save failed: '+res.error.message,true); return; }
      saved=res.data;
    }
    await sb.from('kb_article_versions').insert({article_id:saved.id,version:saved.version,
      title:saved.title,summary:saved.summary,body:saved.body,tags:saved.tags,edited_by:AUTH.id});
    if(status==='published'&&!(a&&a.published_at)) announcePublish(saved,true);  // first publish → team feed
    toast(status==='published'?'Published ✔ — announced to the team.':'Draft saved.');
    OPEN=saved; MODE='article';
    await refresh();
  }
  $('#eDraft').addEventListener('click',()=>save('draft'));
  $('#ePub').addEventListener('click',()=>save('published'));
  const up=$('#eUnpub'); if(up)up.addEventListener('click',()=>save('draft'));
  const rec=$('#eRecert'); if(rec)rec.addEventListener('click',async()=>{
    if(!confirm('Reset acknowledgments? Everyone will see this as required reading again and must re-acknowledge. (Read history is kept.)'))return;
    const {error}=await sb.from('kb_reads').update({acknowledged_at:null}).eq('article_id',a.id);
    if(error){ toast('Reset failed: '+error.message,true); return; }
    announcePublish(a,false);
    toast('Acknowledgments reset — re-certification announced.');
    refresh();
  });
  const arch=$('#eArchive'); if(arch)arch.addEventListener('click',async()=>{
    if(!confirm('Archive this article? It disappears from everyone (recoverable by editing status in the DB).'))return;
    await sb.from('kb_articles').update({status:'archived',updated_by:AUTH.id}).eq('id',a.id);
    toast('Archived.'); OPEN=null; MODE='list'; refresh();
  });
}

/* ---------- compliance (managers): who read, who acknowledged, who's overdue ---------- */
async function drawCompliance(){
  const v=$('#view');
  v.innerHTML='<div class="empty">Loading compliance…</div>';
  const req=ARTS.filter(a=>a.status==='published'&&a.require_ack);
  const [stf,rds]=await Promise.all([
    sb.from('staff').select('id,display_name,home_store,role').eq('active',true).order('display_name'),
    req.length?sb.from('kb_reads').select('article_id,staff_id,first_read_at,acknowledged_at').in('article_id',req.map(a=>a.id)):Promise.resolve({data:[]})
  ]);
  const staff=(stf.data||[]).filter(s=>s.role!=='owner'||true);
  const reads={}; (rds.data||[]).forEach(r=>{ reads[r.article_id+':'+r.staff_id]=r; });
  if(!req.length){ v.innerHTML='<div class="empty">No required-reading articles yet. Tick “🎓 Required reading” on an article to start tracking compliance.</div>'; return; }
  let total=0, done=0;
  const cards=req.map(a=>{
    const acked=[], out=[];
    staff.forEach(s=>{
      const r=reads[a.id+':'+s.id]; total++;
      if(r&&r.acknowledged_at){ done++; acked.push({s,at:r.acknowledged_at}); }
      else out.push({s,read:r?r.first_read_at:null});
    });
    const pct=staff.length?Math.round(acked.length/staff.length*100):0;
    return '<div class="art" style="margin-bottom:12px;padding:18px 22px">'
      +'<div class="top"><span class="chip req">Required</span><h2 style="font-size:1.05rem;margin:0">'+esc(a.title)+'</h2>'
      +'<span style="margin-left:auto;font-family:Nunito,sans-serif;font-weight:900;color:'+(pct===100?'var(--green)':pct>=60?'var(--amber)':'var(--red)')+'">'+pct+'%</span></div>'
      +'<div style="height:8px;background:#F0F1F4;border-radius:99px;overflow:hidden;margin:8px 0 12px"><div style="height:100%;width:'+pct+'%;background:'+(pct===100?'var(--green)':'var(--blue)')+'"></div></div>'
      +'<div class="twoc" style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'
      +'<div><div style="font-weight:800;font-size:.72rem;text-transform:uppercase;letter-spacing:.4px;color:var(--green);margin-bottom:6px">✅ Acknowledged ('+acked.length+')</div>'
        +(acked.map(x=>'<div style="font-size:.83rem;padding:3px 0">'+esc(x.s.display_name)+' <span style="color:var(--grey);font-size:.72rem">'+fmtD(x.at)+'</span></div>').join('')||'<div style="color:var(--grey);font-size:.8rem">Nobody yet.</div>')+'</div>'
      +'<div><div style="font-weight:800;font-size:.72rem;text-transform:uppercase;letter-spacing:.4px;color:var(--red);margin-bottom:6px">⏳ Outstanding ('+out.length+')</div>'
        +(out.map(x=>'<div style="font-size:.83rem;padding:3px 0">'+esc(x.s.display_name)
          +(x.read?' <span class="chip" title="opened but not acknowledged">read '+fmtD(x.read)+'</span>':' <span class="chip err" style="background:#FDEBEC;color:var(--red)">never opened</span>')
          +'</div>').join('')||'<div style="color:var(--grey);font-size:.8rem">All clear. 🎉</div>')+'</div>'
      +'</div></div>';
  }).join('');
  const overall=total?Math.round(done/total*100):100;
  v.innerHTML='<div class="tiles" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px">'
    +'<div class="art" style="padding:13px 18px;flex:1;min-width:140px"><div style="font-family:Nunito,sans-serif;font-weight:900;font-size:1.5rem">'+overall+'%</div><div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--grey)">Overall compliance</div></div>'
    +'<div class="art" style="padding:13px 18px;flex:1;min-width:140px"><div style="font-family:Nunito,sans-serif;font-weight:900;font-size:1.5rem">'+req.length+'</div><div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--grey)">Required articles</div></div>'
    +'<div class="art" style="padding:13px 18px;flex:1;min-width:140px"><div style="font-family:Nunito,sans-serif;font-weight:900;font-size:1.5rem">'+staff.length+'</div><div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--grey)">Active staff</div></div>'
    +'</div>'+cards;
}

/* ---------- publish → Communications announcement ---------- */
async function announcePublish(a,isNew){
  try{
    const req=a.require_ack;
    await sb.from('communications').insert({
      kind:req?'training':'announcement',
      title:(req?'🎓 Required reading: ':'📚 New in the Knowledge Base: ')+a.title,
      body:(a.summary?a.summary+'\n\n':'')
        +(req?'This one needs a read **and** an acknowledgment — it\'s tracked.\n\n':'')
        +'Read it here: https://myrepairtools.github.io/knowledge.html#a='+(a.slug||''),
      source_key:'kb:'+a.id+':'+(isNew?'publish':'recert-'+a.version),
      created_by:AUTH.id
    });
  }catch(e){ /* announcement is best-effort */ }
}

/* ---------- draw ---------- */
function draw(){
  drawChips();
  if(MODE==='article'&&OPEN) drawArticle();
  else if(MODE==='edit') drawEditor();
  else if(CAT==='compliance'&&isMgr(AUTH.role)) drawCompliance();
  else drawList();
}
</script>
</body>
</html>
