<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reports · CPR Oregon</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;
  --grey:#B9BDCB;--light-grey:#F3F2F2;--border:#E0E2EA;--green:#2E9E5B;--amber:#C9820B;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0}
body{font-family:'Nunito Sans',sans-serif;color:var(--dark);background:var(--light-grey)}
a{color:inherit}
.wrap{max-width:1000px;margin:0 auto;padding:22px 20px 60px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.6rem;letter-spacing:-.4px;margin:0}
.sub{font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.85rem;color:var(--grey);margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-top:20px}
.card{position:relative;padding:18px;border:1px solid var(--border);border-radius:14px;background:#fff;cursor:pointer;transition:border-color .12s,box-shadow .12s}
.card:hover{border-color:var(--blue);box-shadow:0 4px 14px rgba(45,45,59,.07)}
.card .ic{font-size:1.7rem;margin-bottom:8px}
.card .t{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.02rem}
.card .d{font-family:'Nunito Sans',sans-serif;font-size:.8rem;color:var(--grey);font-weight:700;margin-top:3px;line-height:1.4}
.back{display:inline-flex;align-items:center;gap:6px;font-family:'Nunito',sans-serif;font-weight:800;color:var(--blue);text-decoration:none;font-size:.9rem;margin-bottom:14px;cursor:pointer}
.rephd{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.wknav{display:flex;align-items:center;gap:6px;margin-left:auto}
.wknav button{width:34px;height:34px;border:1px solid var(--border);background:#fff;border-radius:9px;cursor:pointer;font-size:1rem;color:var(--dark-grey)}
.wknav .lbl{font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;min-width:150px;text-align:center}
.tiles{display:flex;gap:12px;flex-wrap:wrap;margin:14px 0 18px}
.tile{flex:1;min-width:120px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 15px}
.tile .n{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.5rem}
.tile .l{font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.4px;color:var(--grey);margin-top:2px}
table.rep{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
table.rep th{font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);background:#fafafa}
table.rep td{padding:11px 14px;border-bottom:1px solid var(--light-grey);font-size:.88rem}
table.rep td.num,table.rep th.num{text-align:right;font-variant-numeric:tabular-nums}
table.rep tr:last-child td{border-bottom:none}
.grphd td{background:#F7F8FB;font-family:'Nunito',sans-serif;font-weight:900;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey)}
.pill{display:inline-block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.4px;border-radius:999px;padding:3px 9px}
.p-ok{color:#1E7A45;background:#E9F6EE}
.p-watch{color:#9A6700;background:#FCF3E3}
.p-ot{color:#B02329;background:#FCEDED}
.empty{color:var(--grey);font-weight:700;padding:24px;text-align:center}
/* lock */
.lock{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:3000;padding:20px}
.lkcard{width:320px;max-width:100%;background:#fff;border-radius:16px;padding:26px 24px;box-shadow:0 22px 60px rgba(0,0,0,.4)}
.lkcard h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.15rem;margin:0 0 4px}
.lkcard p{font-size:.82rem;color:var(--dark-grey);margin:0 0 16px}
.lkcard input{width:100%;font-family:'Nunito',sans-serif;font-size:1.1rem;letter-spacing:.3em;text-align:center;padding:12px;border:1.5px solid var(--border);border-radius:10px;outline:none}
.lkcard input:focus{border-color:var(--blue)}
.lkcard button{width:100%;margin-top:12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;border:none;border-radius:10px;padding:12px;background:var(--red);color:#fff;cursor:pointer}
.lkerr{color:var(--red);font-size:.76rem;font-weight:700;margin-top:9px;min-height:1em;text-align:center}
.note{font-family:'Nunito Sans',sans-serif;font-size:.9rem;color:var(--dark-grey);background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:20px}
</style>
</head>
<body>

<div class="lock" id="lock" hidden>
  <div class="lkcard">
    <h2>Reports</h2>
    <p>Enter your PIN to continue.</p>
    <input id="lkPin" inputmode="numeric" autocomplete="off" placeholder="••••" maxlength="8">
    <button id="lkGo">Sign in</button>
    <div class="lkerr" id="lkErr"></div>
  </div>
</div>

<div class="wrap" id="app" hidden>
  <!-- LIBRARY -->
  <div id="libView">
    <h1>Reports</h1>
    <div class="sub">Read-only reports across the business. Pick one to open it.</div>
    <div class="grid" id="repGrid"></div>
    <div id="repGate" class="note" hidden>Reports are for managers and the owner. Ask an owner if you need access.</div>
  </div>
  <!-- REPORT DETAIL -->
  <div id="repView" hidden></div>
</div>

<script src="assets/pin-gate.js"></script>
<script src="assets/locations.js"></script>
<script src="assets/nav.js"></script>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SB_URL='https://xuvsehrevxackuhmbmry.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY';
const FN=SB_URL+'/functions/v1/cpr-auth';
const sb=createClient(SB_URL,ANON);
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function deviceId(){try{let d=localStorage.getItem('cpr_device_id');if(!d){d=(crypto.randomUUID?crypto.randomUUID():'dev-'+Date.now());localStorage.setItem('cpr_device_id',d);}return d;}catch(e){return 'dev-x';}}
function fn(body){return fetch(FN,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ANON,'apikey':ANON},body:JSON.stringify(body)}).then(r=>r.json().then(d=>({status:r.status,data:d}),()=>({status:r.status,data:{}})));}
const isMgr=r=>['owner','admin','manager'].indexOf(r)>-1;
function shortStore(s){return window.CPRLocations?CPRLocations.display(s):String(s||'').replace(/^CPR\s*/,'');}
function storeRank(s){try{var x=window.CPRLocations&&CPRLocations.find&&CPRLocations.find(s);return x?x.order:99;}catch(e){return 99;}}
function iso(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}

let AUTH=null;

/* ===== auth ===== */
async function doLogin(){
  const pin=$('#lkPin').value, err=$('#lkErr');
  if(!pin){err.textContent='Enter your PIN';return;}
  $('#lkGo').disabled=true;err.textContent='Signing in…';
  try{
    const r=await fn({action:'login',pin,device_id:deviceId()});
    if(r.status!==200){const d=r.data||{};err.textContent=(r.status===423||d.locked)?'Locked — an owner must reset this device.':(d.error==='invalid'?('Wrong PIN.'+(d.remaining!=null?(' '+d.remaining+' left.'):'')):(d.error||'Login failed.'));$('#lkGo').disabled=false;return;}
    await sb.auth.setSession({access_token:r.data.access_token,refresh_token:r.data.refresh_token});
    const st=r.data.staff||{};AUTH={name:st.display_name,role:st.role};
    err.textContent='';$('#lkGo').disabled=false;unlock();
  }catch(e){$('#lkGo').disabled=false;err.textContent=String(e&&e.message||e);}
}
function unlock(){$('#lock').setAttribute('hidden','');$('#app').removeAttribute('hidden');boot();}
/* Shared single sign-on: getSession can intermittently return null when several Supabase
   clients share storage, so fall back to the token nav.js / other tools persisted. */
async function restoreSession(){
  try{ const s=(await sb.auth.getSession()).data.session; if(s) return s; }catch(e){}
  try{ const raw=localStorage.getItem('sb-xuvsehrevxackuhmbmry-auth-token'); if(!raw) return null;
    const o=JSON.parse(raw);
    const at=o.access_token||(o.currentSession&&o.currentSession.access_token),
          rt=o.refresh_token||(o.currentSession&&o.currentSession.refresh_token);
    if(at&&rt){ await sb.auth.setSession({access_token:at,refresh_token:rt});
      const r2=(await sb.auth.getSession()).data.session; return r2||null; }
  }catch(e){}
  return null;
}
async function initAuth(){
  $('#lkGo').onclick=doLogin;
  $('#lkPin').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  const sess=await restoreSession();
  if(sess){
    const sr=await sb.from('staff').select('display_name,role').eq('auth_uid',sess.user.id).maybeSingle();
    if(sr.data){AUTH={name:sr.data.display_name,role:sr.data.role};unlock();return;}
  }
  $('#lock').removeAttribute('hidden');$('#lkPin').focus();
}

/* ===== report registry ===== */
const REPORTS=[
  { id:'overtime', icon:'⏱️', title:'Overtime & pace', desc:'Hours worked this week vs the 40-hour line, with a projected end-of-week pace.', render:renderOvertime }
];

function boot(){
  if(!AUTH||!isMgr(AUTH.role)){ $('#repGrid').hidden=true; $('#repGate').hidden=false; return; }
  $('#repGrid').innerHTML=REPORTS.map(r=>'<div class="card" data-rep="'+r.id+'"><div class="ic">'+r.icon+'</div><div class="t">'+esc(r.title)+'</div><div class="d">'+esc(r.desc)+'</div></div>').join('');
  $('#repGrid').querySelectorAll('[data-rep]').forEach(c=>c.onclick=()=>openReport(c.getAttribute('data-rep')));
  // deep-link / restore last report
  const want=new URLSearchParams(location.search).get('r')||localStorage.getItem('cprRepOpen');
  if(want&&REPORTS.some(r=>r.id===want))openReport(want); else showLibrary();
}
function showLibrary(){ $('#repView').hidden=true; $('#libView').hidden=false; localStorage.removeItem('cprRepOpen'); history.replaceState(null,'',location.pathname); }
function openReport(id){
  const rep=REPORTS.filter(r=>r.id===id)[0]; if(!rep)return;
  localStorage.setItem('cprRepOpen',id);
  $('#libView').hidden=true; $('#repView').hidden=false;
  $('#repView').innerHTML='<a class="back" id="repBack">← All reports</a><div id="repBody"><div class="empty">Loading…</div></div>';
  $('#repBack').onclick=showLibrary;
  rep.render($('#repBody'));
}

/* ===== Overtime & pace report ===== */
let OT_WK=null; // Sunday of the viewed week
function weekSunday(d){ const x=new Date(d.getFullYear(),d.getMonth(),d.getDate()); return new Date(x.getFullYear(),x.getMonth(),x.getDate()-x.getDay()); }
function fmtWk(sun){ const sat=new Date(sun.getFullYear(),sun.getMonth(),sun.getDate()+6);
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return mo[sun.getMonth()]+' '+sun.getDate()+' – '+mo[sat.getMonth()]+' '+sat.getDate(); }

async function renderOvertime(host){
  if(!OT_WK)OT_WK=weekSunday(new Date());
  const sun=OT_WK, sat=new Date(sun.getFullYear(),sun.getMonth(),sun.getDate()+6);
  const wkStart=iso(sun), wkEnd=iso(sat);
  const [tsR,stR]=await Promise.all([
    sb.from('qbtime_timesheets').select('staff_id,seconds,on_the_clock,biz_date').gte('biz_date',wkStart).lte('biz_date',wkEnd).not('staff_id','is',null),
    sb.from('staff').select('id,display_name,home_store,role,active')
  ]);
  const staff={}; (stR.data||[]).forEach(s=>staff[s.id]=s);
  const agg={};
  (tsR.data||[]).forEach(r=>{ const a=agg[r.staff_id]||(agg[r.staff_id]={sec:0,days:{},onclock:false});
    a.sec+=(+r.seconds||0); if(r.biz_date)a.days[r.biz_date]=1; if(r.on_the_clock)a.onclock=true; });

  const today=iso(new Date()), isThisWeek=(iso(weekSunday(new Date()))===wkStart);
  const rows=Object.keys(agg).map(id=>{
    const a=agg[id], s=staff[id]||{display_name:'Unknown',home_store:'',role:''};
    const hrs=Math.round(a.sec/360)/10, dw=Object.keys(a.days).length;
    // projected end-of-week: extend the per-day average over a 5-day work week (only mid-week)
    let proj=hrs;
    if(isThisWeek && dw>0 && dw<5 && today<=wkEnd){ proj=Math.round((hrs+(hrs/dw)*(5-dw))*10)/10; }
    const status=hrs>40?'ot':(proj>=40?'watch':'ok');
    return { id, name:s.display_name, store:s.home_store, role:s.role, hrs, dw, proj, onclock:a.onclock, status };
  }).sort((a,b)=>storeRank(a.store)-storeRank(b.store)||b.proj-a.proj);

  const otNow=rows.filter(r=>r.hrs>40).length, watch=rows.filter(r=>r.status==='watch').length, live=rows.filter(r=>r.onclock).length;
  const totHrs=Math.round(rows.reduce((s,r)=>s+r.hrs,0)*10)/10;

  let body='<div class="rephd"><div><h1>Overtime &amp; pace</h1><div class="sub">Worked hours this week (Sun–Sat) vs the 40-hour line'+(isThisWeek?' · pace = 5-day estimate':'')+'</div></div>'
    +'<div class="wknav"><button data-wk="-1">‹</button><div class="lbl">'+fmtWk(sun)+'</div><button data-wk="1"'+(isThisWeek?' disabled style="opacity:.4;cursor:default"':'')+'>›</button></div></div>'
    +'<div class="tiles">'
    +'<div class="tile"><div class="n" style="color:var(--red)">'+otNow+'</div><div class="l">Over 40 now</div></div>'
    +'<div class="tile"><div class="n" style="color:var(--amber)">'+watch+'</div><div class="l">On pace for OT</div></div>'
    +'<div class="tile"><div class="n" style="color:var(--green)">'+live+'</div><div class="l">On the clock</div></div>'
    +'<div class="tile"><div class="n">'+totHrs+'</div><div class="l">Total hours</div></div>'
    +'</div>';

  if(!rows.length){ body+='<div class="empty">No clocked hours for this week yet.</div>'; host.innerHTML=body; wireWk(host); return; }

  let lastStore=null, trows='';
  rows.forEach(r=>{
    if(r.store!==lastStore){ lastStore=r.store; trows+='<tr class="grphd"><td colspan="5">'+esc(shortStore(r.store)||'—')+'</td></tr>'; }
    const pc=r.status==='ot'?'p-ot':(r.status==='watch'?'p-watch':'p-ok');
    const pl=r.status==='ot'?'OT':(r.status==='watch'?'Watch':'OK');
    trows+='<tr><td>'+esc(r.name)+(r.onclock?' <span class="pill p-ok">● on clock</span>':'')+'</td>'
      +'<td class="num">'+r.dw+'</td>'
      +'<td class="num"><b>'+r.hrs.toFixed(1)+'</b></td>'
      +'<td class="num">'+(r.proj>r.hrs?r.proj.toFixed(1):'—')+'</td>'
      +'<td><span class="pill '+pc+'">'+pl+'</span></td></tr>';
  });
  body+='<table class="rep"><thead><tr><th>Employee</th><th class="num">Days</th><th class="num">Hours</th><th class="num">Projected</th><th>Status</th></tr></thead><tbody>'+trows+'</tbody></table>';
  host.innerHTML=body; wireWk(host);
}
function wireWk(host){
  host.querySelectorAll('[data-wk]').forEach(b=>b.onclick=()=>{
    if(b.disabled)return;
    OT_WK=new Date(OT_WK.getFullYear(),OT_WK.getMonth(),OT_WK.getDate()+7*Number(b.getAttribute('data-wk')));
    renderOvertime($('#repBody'));
  });
}

initAuth();
</script>
</body>
</html>
