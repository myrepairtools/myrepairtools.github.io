<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Journal — CPR</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#DC282E;--dark:#2D2D3B;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;
--dark-grey:#4E4E50;--border:#E0E2EA;--green:#2E9E5B;--qbo:#1B7A12;--amber:#C98A00;--white:#fff;
--ring:0 0 0 3px rgba(79,176,227,.15);--shadow:0 1px 3px rgba(45,45,59,.05)}
*{box-sizing:border-box;margin:0;padding:0}
/* nav.js v2 offsets content itself (body margin-left) — no page-level padding,
   or the layout double-shifts off center (design handoff bug fix #1) */
body{font-family:'Nunito Sans','Segoe UI',sans-serif;background:var(--light-grey);color:var(--dark)}
main{max-width:none;margin:0;padding:24px 28px 70px}   /* full-width like cash-admin / claim-payouts */
.titlerow{display:flex;align-items:center;gap:9px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.45rem}
.ownertag{font-family:'Nunito',sans-serif;font-weight:800;font-size:.55rem;letter-spacing:.4px;text-transform:uppercase;
color:var(--red);border:1px solid #F6C9CA;background:#FFF1F1;border-radius:5px;padding:2px 6px}
.sub{color:var(--dark-grey);font-size:.85rem;font-weight:700;margin-top:2px}

/* header controls: Store dropdown + joined year segmented control */
.hd{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.hd .spacer{flex:1}
.fldl{font-family:'Nunito',sans-serif;font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.4px;
color:var(--dark-grey);margin-bottom:4px}
.storesel{width:196px;height:36px;padding:6px 11px;border:1.5px solid var(--border);border-radius:8px;background:#fff;
font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.92rem;color:var(--dark);cursor:pointer}
.storesel:focus{outline:none;border-color:var(--blue);box-shadow:var(--ring)}
.ynwrap{display:flex;align-items:center;gap:8px}
.yearnav{display:inline-flex;align-items:stretch;height:36px;background:#fff;border:1.5px solid var(--border);
border-radius:10px;overflow:hidden}
.ybtn{width:34px;border:none;background:transparent;font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem;
line-height:1;color:var(--dark-grey);cursor:pointer}
#yPrev{border-right:1.5px solid var(--border)}
#yNext{border-left:1.5px solid var(--border)}
.ybtn:hover{background:rgba(79,176,227,.1);color:var(--blue)}
.ylbl{display:flex;align-items:center;font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;color:var(--dark);
padding:0 13px;cursor:pointer}
.ylbl:hover{background:rgba(79,176,227,.08)}
.btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;border:none;border-radius:10px;
padding:8px 13px;cursor:pointer;background:var(--dark);color:#fff}
.btn.alt{background:#fff;color:var(--dark);border:1.5px solid var(--border)}

/* year summary tiles (compact StatCards) */
.tiles{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.tile{flex:1;min-width:180px;max-width:260px;background:#fff;border:1px solid var(--border);
border-left:4px solid var(--blue);border-radius:12px;padding:10px 14px;box-shadow:var(--shadow)}
.tile .l{font-family:'Nunito',sans-serif;font-weight:800;font-size:.66rem;text-transform:uppercase;letter-spacing:.6px;color:var(--dark-grey)}
.tile .n{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.15rem;color:var(--dark);margin-top:2px}
.tile.total{border-left-color:var(--green);background:#f3fbf6}
.tile.total .n{color:var(--green)}

/* month grid */
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
@media(max-width:1150px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:640px){.grid{grid-template-columns:1fr}}
.mcard{background:#fff;border:1px solid var(--border);border-left:4px solid var(--border);border-radius:12px;
padding:12px 13px;box-shadow:var(--shadow)}
.mcard.complete{border-left-color:var(--blue)}
.mcard.cur{border-left-color:var(--red)}
.mcard.future{opacity:.55}
.mhead{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.mname{font-family:'Nunito',sans-serif;font-weight:900;font-size:.92rem}
.mend{font-size:.66rem;color:var(--grey);font-weight:700;white-space:nowrap}
.mstat{margin-left:auto;font-family:'Nunito',sans-serif;font-size:.68rem;font-weight:800;white-space:nowrap;color:var(--grey)}
.mstat.ok{color:var(--green)}
.mstat.err{color:var(--red);cursor:pointer}
.notebtn{border:none;background:none;cursor:pointer;font-size:.85rem;opacity:.4;padding:0 0 0 2px}
.notebtn:hover{opacity:.9}
.notebtn.has{opacity:1}

.mrow{display:flex;align-items:center;gap:6px;padding:2px 0}
.mrow label{font-family:'Nunito',sans-serif;font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
color:var(--dark-grey);flex:1;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.iwrap{position:relative;display:inline-flex}
.iwrap .dol{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--grey);font-weight:700;
font-size:.72rem;pointer-events:none}
.mrow input[type=number]{width:98px;text-align:right;padding:5px 8px 5px 18px;border:1.5px solid var(--border);border-radius:8px;
font-family:'Nunito Sans',sans-serif;font-size:.8rem;font-weight:700;color:var(--dark);background:#fff}
.mrow input[type=number]:focus{outline:none;border-color:var(--blue);box-shadow:var(--ring)}
.mrow input[type=number]::-webkit-outer-spin-button,.mrow input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.mrow input[type=number]{-moz-appearance:textfield;appearance:textfield}

/* computed strip: REVENUE | ON HAND */
.cstrip{margin-top:8px;background:#F6F7F9;border-radius:8px;padding:7px 10px;display:grid;grid-template-columns:1fr 1fr;gap:4px}
.cstrip .rcol{text-align:right}
.cstrip .cl{font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;text-transform:uppercase;letter-spacing:.5px;color:var(--grey)}
.cstrip .val{font-family:'Nunito',sans-serif;font-weight:900;font-size:.92rem;color:var(--dark);display:inline-block;
padding:1px 4px;border-radius:6px}
.cstrip .val.ok{color:var(--green)}
.val.neg{color:var(--red);background:#FBE9E9;cursor:help}

.adjchip{font-family:'Nunito',sans-serif;font-weight:800;font-size:.54rem;text-transform:uppercase;letter-spacing:.4px;
padding:1px 6px;border-radius:999px;background:#FBF1DC;color:#7A5B10;cursor:pointer;white-space:nowrap}
.hint{font-size:.68rem;font-weight:700;color:var(--grey);text-align:right;margin:-1px 0 2px}
.hint .mini{font-family:'Nunito',sans-serif;font-weight:800;font-size:.64rem;border:1.5px solid var(--border);
border-radius:7px;background:#fff;color:var(--blue);padding:1px 7px;cursor:pointer;margin-left:4px}
.hint .mini:hover{border-color:var(--blue)}

.noterow{margin:6px 0 2px}
.noterow input{width:100%;padding:6px 9px;border:1.5px solid var(--border);border-radius:8px;
font-family:'Nunito Sans',sans-serif;font-size:.76rem;font-weight:600;color:var(--dark)}
.noterow input:focus{outline:none;border-color:var(--blue);box-shadow:var(--ring)}

.jefoot{display:flex;align-items:center;gap:6px;margin-top:8px}
.jebtn{flex:1;font-family:'Nunito',sans-serif;font-weight:800;font-size:.66rem;border:1.5px solid var(--border);
border-radius:7px;background:#fff;color:var(--dark);padding:4px 8px;cursor:pointer;white-space:nowrap}
.jebtn:hover{border-color:var(--blue);color:var(--blue)}
.jebtn.qbo{color:var(--qbo);border-color:#CFE9D8}
.jebtn.qbo:hover{border-color:#2CA01C;color:#2CA01C}
.jebtn:disabled{opacity:.5;cursor:default}
.qboctl{flex:1;display:flex}
.qboctl .jebtn,.qboctl .qbochip{flex:1;width:100%}

/* QBO posted chip */
.qbochip{font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;border:1px solid #CFE9D8;
border-radius:999px;background:#E9F6EE;color:var(--qbo);padding:4px 9px;cursor:pointer;white-space:nowrap}
.qbochip.warn{border-color:#F0E2B6;background:#FDF6E3;color:#9A6B00}

/* QBO modal (house overlay style) */
.qmask{position:fixed;inset:0;background:rgba(45,45,59,.5);z-index:940;display:flex;
align-items:center;justify-content:center;padding:18px}
.qmodal{background:#fff;border-radius:16px;width:min(480px,100%);padding:20px 22px;
box-shadow:0 18px 60px rgba(0,0,0,.28);max-height:92vh;overflow:auto}
.qm-h{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.02rem;margin-bottom:12px}
.qm-je{width:100%;border-collapse:collapse;margin:2px 0 8px}
.qm-je td{padding:8px 6px;border-top:1px solid var(--border);font-size:.84rem;font-weight:700;color:var(--dark)}
.qm-je tr:first-child td{border-top:none}
.qm-je td.r{text-align:right;font-family:'Nunito',sans-serif;font-weight:900;white-space:nowrap}
.qm-meta{font-size:.76rem;font-weight:700;color:var(--dark-grey);margin:2px 0 8px}
.qm-note{font-size:.71rem;font-weight:600;color:var(--grey);margin-bottom:10px}
.qm-dep{font-size:.78rem;font-weight:700;color:var(--dark-grey);background:var(--light-grey);
border-radius:9px;padding:9px 11px;margin-bottom:10px}
.qm-receipt{font-size:.79rem;font-weight:800;color:var(--green);background:#E9F6EE;
border:1px solid #CFE9D8;border-radius:9px;padding:9px 11px;margin-bottom:10px}
.qm-warn{font-size:.74rem;font-weight:700;color:#9A6B00;background:#FDF6E3;
border:1px solid #F0E2B6;border-radius:9px;padding:8px 11px;margin-bottom:10px}
.qm-err{font-size:.78rem;font-weight:700;color:var(--red);margin-bottom:6px}
.qm-err a{color:var(--blue)}
.qm-ft{display:flex;align-items:center;gap:10px;margin-top:8px}
.qm-ft .spacer{flex:1}
.btn.danger{background:var(--red)}

.empty{padding:60px 20px;text-align:center;color:var(--grey);font-weight:700}
.empty.err{color:var(--dark-grey)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;
padding:12px 18px;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;
opacity:0;pointer-events:none;transition:opacity .18s;z-index:900}
.toast.show{opacity:1}.toast.err{background:var(--red)}
</style>
</head>
<body>
<main>
  <div class="hd" style="margin-bottom:16px">
    <div>
      <div class="titlerow"><h1>📒 Cash Journal</h1><span class="ownertag">Owner</span></div>
      <div class="sub">Cash on Hand · Store Revenue · QBO Journal Entries</div>
    </div>
    <div class="spacer"></div>
    <div>
      <div class="fldl">Store</div>
      <select class="storesel" id="storeSel" aria-label="Store"></select>
    </div>
    <div class="ynwrap">
      <div class="yearnav">
        <button class="ybtn" id="yPrev" title="Previous year">‹</button>
        <span class="ylbl" id="yLbl" title="Pick a year"></span>
        <button class="ybtn" id="yNext" title="Next year">›</button>
      </div>
      <button class="btn alt" id="yNow" style="display:none">This Year</button>
    </div>
  </div>

  <div class="tiles" id="tiles"></div>
  <div class="empty" id="gate" style="display:none"></div>
  <div class="grid" id="grid"></div>
</main>
<div class="qmask" id="qboMask" style="display:none"></div>
<div class="toast" id="toast"></div>

<script src="assets/locations.js"></script>
<script src="assets/pickers.js"></script>
<script src="assets/pin-gate.js"></script>
<script src="assets/nav.js" data-section="admin"></script>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
/* ============================================================
   Cash Journal — the owner's month-end bookkeeping calculator.
   Table: cash_journal (store, month 'YYYY-MM', starting_cash,
   ending_cash, cash_deposited, note; store_revenue + ending_on_hand
   are Postgres GENERATED columns — never send them in an upsert).
   RLS is owner-only; pin-gate covers the page, RLS governs the data.
   Deposit suggestions come from closed cash_audits rows (read-only).
   ============================================================ */
var $=function(s,c){return (c||document).querySelector(s);};
var SB_URL='https://xuvsehrevxackuhmbmry.supabase.co';
var ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY';
var sb=createClient(SB_URL,ANON);

/* locations.js failing to load must degrade to a message, not a TypeError blank page */
var LOC=window.CPRLocations||{names:function(){return[];},normalize:function(s){return s;},
  display:function(s){return s;},find:function(){return null;},sort:function(a){return a;}};
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var MSHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var LSKEY='cprCashJournal';

/* ------------- view state (persisted) ------------- */
var STORE=LOC.names()[0], YEAR=new Date().getFullYear();
try{
  var savedView=JSON.parse(localStorage.getItem(LSKEY)||'{}');
  if(savedView.store&&LOC.find(savedView.store))STORE=LOC.normalize(savedView.store);
  if(savedView.year&&+savedView.year>1999&&+savedView.year<3000)YEAR=+savedView.year;
}catch(e){}
function persist(){try{localStorage.setItem(LSKEY,JSON.stringify({store:STORE,year:YEAR}));}catch(e){}}

/* ------------- data state ------------- */
var STATE={};      // 'YYYY-MM' -> {starting,ending,deposited,note} (live, incl. unsaved edits)
var AUD=null;      // 'YYYY-MM' -> closed cash_audits deposit sum (null = feature unavailable)
var NOTEOPEN={};   // 'YYYY-MM' -> note row forced open
var TIMERS={};     // 'YYYY-MM' -> debounce timer
var STATUS={};     // 'YYYY-MM' -> ''|'saving'|'saved'|'error'
var LOADTOKEN=0;

/* ------------- helpers ------------- */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m,err){var t=$('#toast');t.textContent=m;t.className='toast show'+(err?' err':'');clearTimeout(toast._t);toast._t=setTimeout(function(){t.className='toast';},2200);}
function num(v){if(v==null||v==='')return null;var n=+v;return isNaN(n)?null:n;}
/* $ with commas; whole dollars drop the cents, otherwise 2 decimals */
function money(n){
  if(n==null||isNaN(n))return '—';
  var neg=n<-0.004,a=Math.abs(n);
  var whole=Math.abs(a-Math.round(a))<0.005;
  var s=whole?Math.round(a).toLocaleString('en-US')
             :a.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return (neg?'-$':'$')+s;
}
/* always 2 decimals — the QBO copy block */
function money2(n){
  if(n==null||isNaN(n))return '—';
  var neg=n<-0.004,a=Math.abs(n);
  return (neg?'-$':'$')+a.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function mkey(y,m){return y+'-'+String(m).padStart(2,'0');}
function priorKey(m){return m===1?mkey(YEAR-1,12):mkey(YEAR,m-1);}
function st(k){return STATE[k]||(STATE[k]={starting:null,ending:null,deposited:null,note:'',
  qbo_je_id:null,qbo_doc_number:null,qbo_posted_at:null,qbo_posted_by:null,qbo_posted_amount:null});}
function revenue(k){var s=st(k);return (s.ending!=null&&s.starting!=null)?s.ending-s.starting:null;}
function onHand(k){var s=st(k);return (s.ending!=null&&s.deposited!=null)?s.ending-s.deposited:null;}

/* Adopt the shared front-door PIN session so owner-only RLS reads/writes work. */
async function ensureSession(){
  try{
    var s=(await sb.auth.getSession()).data.session; if(s)return s;
    var raw=localStorage.getItem('sb-xuvsehrevxackuhmbmry-auth-token'); if(!raw)return null;
    var o=JSON.parse(raw);
    var at=o.access_token||(o.currentSession&&o.currentSession.access_token);
    var rt=o.refresh_token||(o.currentSession&&o.currentSession.refresh_token);
    if(at&&rt){await sb.auth.setSession({access_token:at,refresh_token:rt});return (await sb.auth.getSession()).data.session;}
  }catch(e){}
  return null;
}

/* ------------- load ------------- */
async function load(){
  var tok=++LOADTOKEN;
  $('#grid').innerHTML='';$('#tiles').innerHTML='';
  var gate=$('#gate');gate.style.display='';gate.classList.remove('err');gate.textContent='Loading…';
  renderChips();renderYearNav();
  if(!STORE){gate.classList.add('err');gate.textContent='Store list failed to load — reload the page.';return;}

  var sess=await ensureSession();
  if(tok!==LOADTOKEN)return;
  if(!sess){showGate();return;}

  /* one query: prior December (January's carry-forward) through this December */
  var r=await sb.from('cash_journal')
    .select('month,starting_cash,ending_cash,cash_deposited,note,qbo_je_id,qbo_doc_number,qbo_posted_at,qbo_posted_by,qbo_posted_amount')
    .eq('store',STORE).gte('month',mkey(YEAR-1,12)).lte('month',mkey(YEAR,12));
  if(tok!==LOADTOKEN)return;
  if(r.error){showGate();return;}

  STATE={};NOTEOPEN={};STATUS={};
  (r.data||[]).forEach(function(row){
    /* qbo_* fields are read-only here — written only by the qbo edge function,
       NEVER included in the autosave upsert payload */
    STATE[row.month]={starting:num(row.starting_cash),ending:num(row.ending_cash),
      deposited:num(row.cash_deposited),note:row.note||'',
      qbo_je_id:row.qbo_je_id||null,qbo_doc_number:row.qbo_doc_number||null,
      qbo_posted_at:row.qbo_posted_at||null,qbo_posted_by:row.qbo_posted_by||null,
      qbo_posted_amount:num(row.qbo_posted_amount)};
  });

  /* Cash Admin helper — closed audits for the year give BOTH suggestions
     (hidden silently on error): deposited = bank_deposit + small_to_bank,
     ending cash = the audit's counted locations summed (drawers + safes —
     verified against the owner's workbook to the dollar). */
  AUD=null;
  var a=await sb.from('cash_audits')
    .select('id,store,period,bank_deposit,small_to_bank')
    .eq('status','closed').gte('period',mkey(YEAR,1)).lte('period',mkey(YEAR,12));
  if(tok!==LOADTOKEN)return;
  if(!a.error&&a.data){
    AUD={};
    var idToPeriod={};
    a.data.forEach(function(row){
      if(LOC.normalize(row.store)!==STORE)return;
      idToPeriod[row.id]=row.period;
      var rec=AUD[row.period]||(AUD[row.period]={dep:0,end:null});
      rec.dep+=(num(row.bank_deposit)||0)+(num(row.small_to_bank)||0);
    });
    var ids=Object.keys(idToPeriod).map(Number);
    if(ids.length){
      var lr=await sb.from('cash_audit_locations').select('audit_id,counted').in('audit_id',ids);
      if(tok!==LOADTOKEN)return;
      if(!lr.error&&lr.data){
        lr.data.forEach(function(row){
          var p=idToPeriod[row.audit_id];if(!p||!AUD[p])return;
          AUD[p].end=(AUD[p].end||0)+(num(row.counted)||0);
        });
      }
    }
  }

  gate.style.display='none';
  renderGrid();
  updateTiles();
}
function showGate(){
  var g=$('#gate');g.style.display='';g.classList.add('err');
  g.textContent='Owner sign-in required — sign in with your PIN from any page, then reload.';
}

/* ------------- render ------------- */
function renderChips(){   // kept name — now renders the Store dropdown (design handoff:
  // brand Select, scales past 3 locations; values stay canonical, labels 'CPR <display>')
  var sel=$('#storeSel');
  sel.innerHTML=LOC.names().map(function(n){
    return '<option value="'+esc(n)+'"'+(n===STORE?' selected':'')+'>CPR '+esc(LOC.display(n))+'</option>';
  }).join('');
  sel.onchange=function(){
    var s=sel.value;if(s===STORE)return;
    flushSaves();STORE=s;persist();load();
  };
}
function renderYearNav(){
  $('#yLbl').textContent=YEAR;
  $('#yNow').style.display=(YEAR===new Date().getFullYear())?'none':'';
}

function renderGrid(){
  var grid=$('#grid');grid.innerHTML='';
  var today=new Date();
  var curKey=mkey(today.getFullYear(),today.getMonth()+1);
  for(var m=1;m<=12;m++)(function(m){
    var k=mkey(YEAR,m);
    var future=new Date(YEAR,m-1,1)>today;
    var lastDay=new Date(YEAR,m,0).getDate();
    var card=document.createElement('div');
    card.className='mcard'+(future?' future':'')+(k===curKey?' cur':'');
    card.setAttribute('data-k',k);
    function moneyInput(f,label){
      return '<span class="iwrap"><span class="dol">$</span>'
        +'<input type="number" step="0.01" data-k="'+k+'" data-f="'+f+'" aria-label="'+label+'"></span>';
    }
    card.innerHTML=
      '<div class="mhead"><span class="mname">'+MONTHS[m-1]+'</span><span class="mend">· ends '+m+'/'+lastDay+'</span>'
      +'<span class="mstat" data-k="'+k+'"></span>'
      +'<button class="notebtn" data-k="'+k+'" title="Add a note">📝</button></div>'
      +'<div class="mrow"><label>Starting Cash <span class="adjchip" data-k="'+k+'" style="display:none">adj</span></label>'
        +moneyInput('starting','Starting cash')+'</div>'
      +'<div class="hint carry" data-k="'+k+'" style="display:none"></div>'
      +'<div class="mrow"><label>Ending Cash</label>'+moneyInput('ending','Ending cash')+'</div>'
      +'<div class="hint audend" data-k="'+k+'" style="display:none"></div>'
      +'<div class="mrow"><label>Cash Deposited</label>'+moneyInput('deposited','Cash deposited')+'</div>'
      +'<div class="hint aud" data-k="'+k+'" style="display:none"></div>'
      +'<div class="cstrip"><div><div class="cl">Revenue</div><span class="val rev" data-k="'+k+'">—</span></div>'
        +'<div class="rcol"><div class="cl">On Hand</div><span class="val onh" data-k="'+k+'">—</span></div></div>'
      +'<div class="noterow" data-k="'+k+'" style="display:none">'
        +'<input type="text" maxlength="300" placeholder="Note — e.g. why the start was adjusted" data-k="'+k+'" data-f="note"></div>'
      +'<div class="jefoot" data-k="'+k+'" style="display:none">'
        +'<button class="jebtn" data-k="'+k+'" title="Copy the QBO journal-entry block">📋 JE</button>'
        +'<span class="qboctl" data-k="'+k+'"></span></div>';
    grid.appendChild(card);

    /* values are set as DOM properties (never innerHTML) so notes need no escaping here */
    var s=st(k);
    card.querySelectorAll('input[data-f]').forEach(function(inp){
      var f=inp.getAttribute('data-f');
      if(f==='note')inp.value=s.note||'';
      else inp.value=s[f]==null?'':String(s[f]);
      inp.addEventListener('input',function(){onEdit(k,f,inp);});
    });
    card.querySelector('.notebtn').addEventListener('click',function(){
      NOTEOPEN[k]=!NOTEOPEN[k];updateCard(k);
      if(NOTEOPEN[k])card.querySelector('.noterow input').focus();
    });
    card.querySelector('.adjchip').addEventListener('click',function(){
      NOTEOPEN[k]=true;updateCard(k);card.querySelector('.noterow input').focus();
    });
    card.querySelector('.jebtn').addEventListener('click',function(){copyJE(k);});
    updateCard(k);
  })(m);
}

/* refresh one card's computed values / hints without touching its inputs (keeps focus) */
function updateCard(k){
  if(k.slice(0,4)!==String(YEAR))return;   // prior December isn't rendered
  var s=st(k),rev=revenue(k),onh=onHand(k);
  var m=+k.slice(5);
  function q(sel){return document.querySelector(sel+'[data-k="'+k+'"]');}

  var complete=(s.starting!=null&&s.ending!=null&&s.deposited!=null);
  var cardEl=q('.mcard');
  if(cardEl)cardEl.classList.toggle('complete',complete);

  var revEl=q('.val.rev'),onhEl=q('.val.onh');
  revEl.textContent=money(rev);
  revEl.classList.toggle('neg',rev!=null&&rev<-0.004);
  revEl.title=(rev!=null&&rev<-0.004)?'Check ending cash / deposits':'';
  onhEl.textContent=money(onh);
  onhEl.classList.toggle('neg',onh!=null&&onh<-0.004);
  onhEl.classList.toggle('ok',complete&&onh!=null&&onh>=-0.004);
  onhEl.title=(onh!=null&&onh<-0.004)?'Check ending cash / deposits':'';

  /* carry-forward from the prior month's ending on hand */
  var pk=priorKey(m),pOnh=onHand(pk),pName=MSHORT[(+pk.slice(5))-1];
  var carry=q('.hint.carry');
  if(s.starting==null&&pOnh!=null){
    carry.style.display='';
    carry.innerHTML='← '+money(pOnh)+' from '+pName+' <button class="mini">Use</button>';
    carry.querySelector('.mini').onclick=function(){
      s.starting=Math.round(pOnh*100)/100;
      var inp=document.querySelector('input[data-f="starting"][data-k="'+k+'"]');
      if(inp)inp.value=String(s.starting);
      afterEdit(k);
    };
  }else carry.style.display='none';

  /* amber chip when the saved start was overridden vs the prior month */
  var adj=q('.adjchip');
  if(s.starting!=null&&pOnh!=null&&Math.abs(s.starting-pOnh)>0.005){
    adj.style.display='';
    adj.title=pName+' ended on hand at '+money2(pOnh)+' — click to note why this month starts different';
  }else adj.style.display='none';

  /* Cash Admin suggestions (never auto-write): deposited + ending cash */
  var rec=AUD?AUD[k]:null;
  var aud=q('.hint.aud');
  var dep=rec?rec.dep:null;
  if(dep!=null&&dep>0&&(s.deposited==null||Math.abs(s.deposited-dep)>0.005)){
    aud.style.display='';
    aud.innerHTML='Cash Admin: '+money(dep)+' <button class="mini">Use</button>';
    aud.querySelector('.mini').onclick=function(){
      s.deposited=Math.round(dep*100)/100;
      var inp=document.querySelector('input[data-f="deposited"][data-k="'+k+'"]');
      if(inp)inp.value=String(s.deposited);
      afterEdit(k);
    };
  }else aud.style.display='none';
  var audend=q('.hint.audend');
  var cend=rec?rec.end:null;
  if(cend!=null&&cend>0&&(s.ending==null||Math.abs(s.ending-cend)>0.005)){
    audend.style.display='';
    audend.innerHTML='Cash Admin counted: '+money(cend)+' <button class="mini">Use</button>';
    audend.querySelector('.mini').onclick=function(){
      s.ending=Math.round(cend*100)/100;
      var inp=document.querySelector('input[data-f="ending"][data-k="'+k+'"]');
      if(inp)inp.value=String(s.ending);
      afterEdit(k);
    };
  }else audend.style.display='none';

  /* note row + 📝 state */
  q('.noterow').style.display=(NOTEOPEN[k]||(s.note&&s.note.trim()))?'':'none';
  q('.notebtn').classList.toggle('has',!!(s.note&&s.note.trim()));

  /* JE footer — compact layout keeps the summary on the button's tooltip */
  var je=q('.jefoot');
  if(rev!=null&&onh!=null){
    je.style.display='';
    var adjv=onh-s.starting;
    je.querySelector('.jebtn').title=
      'Revenue '+money(rev)+' · Deposits '+money(s.deposited)
      +' · On-hand '+money(s.starting)+' → '+money(onh)
      +' ('+(adjv>=-0.004?'+':'')+money(adjv)+') — click to copy the QBO block';
    updateQboCtl(k,rev);
  }else je.style.display='none';
}

/* QBO control in the JE footer: ⬆ post button, or the posted chip (green / amber-drift) */
function updateQboCtl(k,rev){
  var el=document.querySelector('.qboctl[data-k="'+k+'"]');
  if(!el)return;
  var s=st(k);
  if(!s.qbo_je_id){
    el.innerHTML='<button class="jebtn qbo" title="Post this month\'s journal entry to QuickBooks Online">⬆ QBO</button>';
  }else{
    var drift=(rev!=null&&s.qbo_posted_amount!=null&&Math.abs(rev-s.qbo_posted_amount)>0.005);
    if(drift){
      el.innerHTML='<button class="qbochip warn" title="Posted amount differs from current revenue — post again to correct">⚠ QBO '
        +esc(money2(s.qbo_posted_amount))+'</button>';
    }else{
      var when=s.qbo_posted_at?new Date(s.qbo_posted_at).toLocaleDateString():'?';
      el.innerHTML='<button class="qbochip" title="Posted '+esc(when)+' by '+esc(s.qbo_posted_by||'?')+'">✓ QBO #'
        +esc(s.qbo_doc_number||s.qbo_je_id)+'</button>';
    }
  }
  el.firstChild.onclick=function(){openQbo(k);};
}

function updateTiles(){
  var rev=0,dep=0,revAny=false,depAny=false,latestM=0,latestVal=null;
  for(var m=1;m<=12;m++){
    var k=mkey(YEAR,m),r=revenue(k),o=onHand(k),s=st(k);
    if(r!=null){rev+=r;revAny=true;}
    if(s.deposited!=null){dep+=s.deposited;depAny=true;}
    if(o!=null){latestM=m;latestVal=o;}
  }
  function tile(n,l){return '<div class="tile"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
  $('#tiles').innerHTML=
    tile(revAny?money(rev):'—','YTD Store Revenue')
   +tile(depAny?money(dep):'—','YTD Deposited')
   +tile(latestVal!=null?money(latestVal):'—','Cash On Hand'+(latestM?' · '+MSHORT[latestM-1]:''));
}

/* ------------- edits + autosave ------------- */
function onEdit(k,f,inp){
  var s=st(k);
  if(f==='note')s.note=inp.value;
  else{var v=inp.value.trim();s[f]=(v===''||isNaN(+v))?null:+v;}
  afterEdit(k);
}
function afterEdit(k){
  updateCard(k);
  var m=+k.slice(5);
  if(m<12)updateCard(mkey(YEAR,m+1));   // downstream carry-forward hint
  updateTiles();
  schedule(k);
}
function schedule(k){
  clearTimeout(TIMERS[k]);
  TIMERS[k]=setTimeout(function(){delete TIMERS[k];saveMonth(k);},700);
}
/* fire pending saves immediately before a store/year switch */
function flushSaves(){
  Object.keys(TIMERS).forEach(function(k){clearTimeout(TIMERS[k]);delete TIMERS[k];saveMonth(k);});
}
async function saveMonth(k){
  var s=st(k),store=STORE;
  setStat(k,'saving');
  /* GENERATED columns (store_revenue, ending_on_hand) must NEVER be in this payload */
  var payload={store:store,month:k,
    starting_cash:s.starting,ending_cash:s.ending,cash_deposited:s.deposited,
    note:(s.note&&s.note.trim())?s.note.trim():null,
    updated_by:window.CPRNavName||'owner'};
  var r=await sb.from('cash_journal').upsert(payload,{onConflict:'store,month'});
  /* the failure toast must fire even if the user navigated away mid-save —
     a flushed edit that silently fails is invisible data loss */
  if(r.error)toast('Save failed for '+MSHORT[+k.slice(5)-1]+' '+k.slice(0,4)+' — '+r.error.message,true);
  if(store!==STORE||k.slice(0,4)!==String(YEAR))return;  // navigated away mid-save (card DOM is gone)
  if(r.error){
    setStat(k,'error');                                  // dirty values stay in STATE/inputs
  }else{
    setStat(k,'saved');
    setTimeout(function(){if(STATUS[k]==='saved')setStat(k,'');},1800);
    updateCard(k);
    var m=+k.slice(5);if(m<12)updateCard(mkey(YEAR,m+1));
    updateTiles();
  }
}
function setStat(k,mode){
  STATUS[k]=mode;
  var el=document.querySelector('.mstat[data-k="'+k+'"]');
  if(!el)return;
  el.classList.remove('ok','err');el.onclick=null;el.title='';
  if(mode==='saving')el.textContent='…';
  else if(mode==='saved'){el.textContent='✓ saved';el.classList.add('ok');}
  else if(mode==='error'){el.textContent='⚠ retry';el.classList.add('err');el.title='Save failed — click to retry';
    el.onclick=function(){saveMonth(k);};}
  else el.textContent='';
}

/* ------------- JE copy (uses LIVE computed values) ------------- */
function copyJE(k){
  var s=st(k),rev=revenue(k),onh=onHand(k);
  if(rev==null||onh==null){toast('Fill Starting, Ending and Deposited first',true);return;}
  var m=+k.slice(5),adj=onh-s.starting;
  var txt=STORE+' — '+MONTHS[m-1]+' '+YEAR+' cash journal\n'
    +'Cash store revenue: '+money2(rev)+'\n'
    +'Bank deposits to match in QBO banking: '+money2(s.deposited)+'\n'
    +'Cash on Hand: '+money2(s.starting)+' → '+money2(onh)
    +' (adjustment '+(adj>=-0.004?'+':'')+money2(adj)+')';
  copyText(txt);
}
function copyText(t){
  function done(){toast('Copied');}
  function fallback(){
    var ta=document.createElement('textarea');
    ta.value=t;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    var ok=false;try{ok=document.execCommand('copy');}catch(e){}
    document.body.removeChild(ta);
    if(ok)done();else toast('Copy failed',true);
  }
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(t).then(done,fallback);
  else fallback();
}

/* ------------- QBO post (journal entry via the qbo edge function) ------------- */
var QBO_FN=SB_URL+'/functions/v1/qbo';
var QBO_OPEN=null;    // month key while the modal is open
var QBO_BUSY=false;   // a post is in flight — block close/double-submit

async function openQbo(k){
  /* unsaved edits (debounce pending) flush first — the function reads the DB row */
  if(TIMERS[k]){clearTimeout(TIMERS[k]);delete TIMERS[k];await saveMonth(k);}
  flushSaves();
  /* if that flush FAILED, the server row is stale — posting would use the old
     numbers while the modal shows the new ones. Refuse until the save lands. */
  if(STATUS[k]==='error'){toast('This month didn’t save — fix that (⚠ retry) before posting to QBO',true);return;}
  if(revenue(k)==null||onHand(k)==null){toast('Fill Starting, Ending and Deposited first',true);return;}
  QBO_OPEN=k;QBO_BUSY=false;
  renderQbo();
}
function closeQbo(){
  if(QBO_BUSY)return;
  QBO_OPEN=null;
  var m=$('#qboMask');m.style.display='none';m.innerHTML='';
}
function renderQbo(note){
  var k=QBO_OPEN;if(!k)return;
  var s=st(k),rev=revenue(k);
  var m=+k.slice(5),lastDay=new Date(YEAR,m,0).getDate();
  var disp=LOC.display(STORE);
  var posted=!!s.qbo_je_id;
  var memo=disp+' — '+MONTHS[m-1]+' '+YEAR+' cash store revenue';
  var html='<div class="qmodal" role="dialog" aria-modal="true">'
    +'<div class="qm-h">Post to QuickBooks — '+esc(disp)+' '+MONTHS[m-1]+' '+YEAR+'</div>';
  if(note)html+='<div class="qm-warn">'+note+'</div>';   // pre-escaped by callers
  if(posted){
    var when=s.qbo_posted_at?new Date(s.qbo_posted_at).toLocaleDateString():'?';
    html+='<div class="qm-receipt">✓ Posted — JE #'+esc(s.qbo_doc_number||s.qbo_je_id)
      +' · '+esc(money2(s.qbo_posted_amount))+' · '+esc(when)+' · by '+esc(s.qbo_posted_by||'?')+'</div>';
  }
  /* negative month (refund-heavy): the function swaps the posting types and
     sends positive amounts — the preview must show the same JE it confirms */
  var neg=rev<0, absRev=Math.abs(rev);
  html+='<table class="qm-je">'
    +'<tr><td>'+(neg?'Credit':'Debit')+' · Cash on Hand — '+esc(disp)+'</td><td class="r">'+esc(money2(absRev))+'</td></tr>'
    +'<tr><td>'+(neg?'Debit':'Credit')+' · Store Revenue</td><td class="r">'+esc(money2(absRev))+'</td></tr>'
    +'</table>'
    +(neg?'<div class="qm-warn">Negative revenue month — this JE REDUCES store revenue and cash on hand.</div>':'')
    +'<div class="qm-meta">TxnDate '+m+'/'+lastDay+'/'+YEAR+' · Memo: &ldquo;'+esc(memo)+'&rdquo;</div>'
    +'<div class="qm-note">Account names above are generic labels — the real per-store mapping lives in Settings → Integrations → QuickBooks Online.</div>'
    +'<div class="qm-dep">🏦 Banking: also match '+esc(money2(s.deposited))+' of deposits as Transfers to Cash on Hand — '+esc(disp)+'.</div>';
  if(posted)html+='<div class="qm-warn">Post Again creates a SECOND journal entry in QBO — delete the old one there if this is a correction.</div>';
  html+='<div class="qm-err" id="qboErr"></div>'
    +'<div class="qm-ft"><button class="btn alt" id="qboCancel">Cancel</button><span class="spacer"></span>'
    +(posted
      ?'<button class="btn danger" id="qboPost">Post Again</button>'
      :'<button class="btn" id="qboPost">Post Journal Entry</button>')
    +'</div></div>';
  var mask=$('#qboMask');
  mask.innerHTML=html;mask.style.display='flex';
  $('#qboCancel').onclick=closeQbo;
  $('#qboPost').onclick=function(){postQbo(k,posted);};
}
async function postQbo(k,force){
  if(QBO_BUSY)return;
  QBO_BUSY=true;
  var btn=$('#qboPost'),err=$('#qboErr');
  var was=btn?btn.textContent:'';
  if(btn){btn.disabled=true;btn.textContent='Posting…';}
  if(err)err.innerHTML='';
  function fail(html){
    QBO_BUSY=false;
    if(btn){btn.disabled=false;btn.textContent=was;}
    if(err)err.innerHTML=html;
  }
  var sess=await ensureSession();
  if(!sess){fail('Owner sign-in required — sign in with your PIN, then retry.');return;}
  var res,d={};
  try{
    res=await fetch(QBO_FN,{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+sess.access_token,'apikey':ANON},
      body:JSON.stringify(force?{action:'post_je',store:STORE,month:k,force:true}
                               :{action:'post_je',store:STORE,month:k})});
    try{d=await res.json();}catch(e){d={};}
  }catch(e){fail('Network error — '+esc(e&&e.message||'could not reach the function')+'.');return;}

  if(res.ok&&d.ok){
    var s=st(k);
    s.qbo_je_id=d.je_id||s.qbo_je_id;
    s.qbo_doc_number=d.doc_number||null;
    s.qbo_posted_amount=num(d.amount);
    s.qbo_posted_at=new Date().toISOString();
    s.qbo_posted_by=window.CPRNavName||'owner';
    QBO_BUSY=false;
    closeQbo();
    updateCard(k);
    toast('JE #'+(d.doc_number||d.je_id)+' posted');
    return;
  }
  if(res.status===409&&d.error==='already_posted'){
    /* someone else posted — pull the receipt and re-render in posted mode */
    var r=await sb.from('cash_journal')
      .select('qbo_je_id,qbo_doc_number,qbo_posted_at,qbo_posted_by,qbo_posted_amount')
      .eq('store',STORE).eq('month',k).maybeSingle();
    if(r&&r.data){
      var s2=st(k);
      s2.qbo_je_id=r.data.qbo_je_id||s2.qbo_je_id;
      s2.qbo_doc_number=r.data.qbo_doc_number||null;
      s2.qbo_posted_at=r.data.qbo_posted_at||null;
      s2.qbo_posted_by=r.data.qbo_posted_by||null;
      s2.qbo_posted_amount=num(r.data.qbo_posted_amount);
    }
    QBO_BUSY=false;
    updateCard(k);
    renderQbo('Already posted (JE #'+esc(d.doc_number||'?')+') — someone else beat you to it.');
    return;
  }
  if(res.status===503||d.error==='not_connected'){
    toast('QuickBooks Online is not connected',true);
    fail('QBO isn&rsquo;t connected — <a href="settings.html">Connect QBO in Settings → Integrations</a>.');
    return;
  }
  if(d.error==='unmapped'){
    fail('This store&rsquo;s accounts aren&rsquo;t mapped — <a href="settings.html">Map accounts in Settings → Integrations → QuickBooks Online</a>.');
    return;
  }
  if(res.status===502||d.error==='qbo_error'){
    var det=d.detail==null?'':(typeof d.detail==='string'?d.detail:JSON.stringify(d.detail));
    fail('QuickBooks error — '+esc(det||'no detail')+'.');
    return;
  }
  fail(esc(d.detail||d.error||('Post failed (HTTP '+res.status+')'))+'.');
}
/* mask click (outside the card) + Escape close the modal */
$('#qboMask').addEventListener('click',function(e){if(e.target===this)closeQbo();});
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&QBO_OPEN)closeQbo();});

/* ------------- year nav ------------- */
$('#yPrev').addEventListener('click',function(){flushSaves();YEAR--;persist();load();});
$('#yNext').addEventListener('click',function(){flushSaves();YEAR++;persist();load();});
$('#yNow').addEventListener('click',function(){flushSaves();YEAR=new Date().getFullYear();persist();load();});
/* year label drops a picker (house date-nav convention) */
$('#yLbl').addEventListener('click',function(ev){
  if(!(window.CPRPickers&&CPRPickers.year))return;
  ev.stopPropagation();
  CPRPickers.year($('#yLbl'),{
    get:function(){return YEAR;},
    set:function(y){flushSaves();YEAR=y;persist();load();},
    min:2020,max:new Date().getFullYear()+1
  });
});

/* edits are debounced 700ms — flush them if the tab closes/hides inside the window */
window.addEventListener('pagehide',flushSaves);
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='hidden')flushSaves();});

load();
</script>
