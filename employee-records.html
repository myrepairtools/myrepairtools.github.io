<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Employee Records · CPR Oregon</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#DC282E;--light-red:#E8474C;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;
  --grey:#B9BDCB;--light-grey:#F3F2F2;--border:#E0E2EA;--green:#2E9E5B;--amber:#C9820B;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:'Nunito Sans',sans-serif;color:var(--dark);background:var(--light-grey)}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#D2D5DF;border-radius:6px}::-webkit-scrollbar-track{background:transparent}
.head{font-family:'Nunito',sans-serif}

/* ===== app shell (sits right of the shared nav, which sets body margin) ===== */
.erec-root{display:flex;height:100vh;overflow:hidden;background:var(--light-grey)}
.erec-root[hidden]{display:none}

/* ----- Employees pane ----- */
.emp-pane{width:248px;flex:none;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.emp-hd{display:flex;align-items:center;justify-content:space-between;padding:15px 16px 10px;flex:none}
.emp-hd .ttl{font-family:'Nunito';font-weight:900;font-size:1rem}
.pill-sync{font-family:'Nunito';font-weight:800;font-size:.64rem;color:var(--green);background:#E9F6EE;border:1px solid #CFE9D8;border-radius:6px;padding:3px 8px}
.emp-search-wrap{flex:none;padding:0 12px 11px;border-bottom:1px solid var(--border)}
.emp-search{width:100%;font-family:'Nunito Sans';font-size:.82rem;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;background:#fff;outline:none}
.emp-search:focus{border-color:var(--blue)}
.emp-list{flex:1;overflow-y:auto;padding:10px 10px 14px}
.grp-lbl{font-family:'Nunito';font-weight:800;font-size:.56rem;text-transform:uppercase;letter-spacing:.7px;color:var(--grey);padding:12px 8px 6px}
.erow{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;margin-bottom:2px;background:transparent}
.erow:hover{background:var(--light-grey)}
.erow.sel{background:#FDEBEC}
.erow.sel:hover{background:#FDEBEC}
.av{border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:'Nunito';font-weight:800;color:#fff}
.erow .av{width:34px;height:34px;font-size:.72rem}
.erow .nm{font-family:'Nunito';font-weight:800;font-size:.84rem;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--dark)}
.erow.sel .nm{color:#B91C1C}
.erow .rl{font-size:.68rem;color:var(--grey);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot7{width:7px;height:7px;border-radius:50%;flex:none}
.cnt{font-family:'Nunito';font-weight:800;font-size:.66rem;color:var(--dark-grey);background:var(--light-grey);border-radius:7px;padding:2px 7px;flex:none}
.emp-foot{flex:none;padding:10px 12px;border-top:1px solid var(--border)}
.arch-btn{width:100%;font-family:'Nunito';font-weight:800;font-size:.74rem;border:1.5px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;background:#fff;color:var(--dark-grey)}
.arch-btn:hover{border-color:var(--grey)}
.arch-btn.on{border-color:var(--blue);color:var(--blue);background:#EAF6FD}
.emp-addrow{flex:none;padding:0 12px 11px;border-bottom:1px solid var(--border)}
.addbtn{width:100%;font-family:'Nunito';font-weight:800;font-size:.78rem;border:none;border-radius:8px;padding:9px;cursor:pointer;background:var(--red);color:#fff}
.addbtn:hover{background:var(--light-red)}
.kebab{flex:none;border:none;background:none;color:var(--grey);font-size:1.05rem;line-height:1;cursor:pointer;padding:3px 5px;border-radius:6px;margin-left:2px}
.kebab:hover{background:#E7EBF2;color:var(--dark)}

/* ----- main ----- */
.erec-main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--light-grey)}
.prof{flex:none;padding:18px 24px 16px;background:#fff;border-bottom:1px solid var(--border)}
.prof-top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap}
.prof-id{display:flex;align-items:center;gap:15px;min-width:0}
.prof .av{width:56px;height:56px;font-size:1.2rem}
.prof-name{font-family:'Nunito';font-weight:900;font-size:1.5rem;line-height:1;letter-spacing:-.4px}
.status-pill{font-family:'Nunito';font-weight:800;font-size:.64rem;text-transform:uppercase;letter-spacing:.4px;border-radius:6px;padding:4px 9px}
.prof-sub{font-size:.86rem;color:var(--dark-grey);font-weight:700;margin-top:5px}
.btn-red{font-family:'Nunito';font-weight:800;font-size:.82rem;border:none;border-radius:9px;padding:11px 20px;cursor:pointer;background:var(--red);color:#fff}
.btn-red:hover{background:var(--light-red)}
.metrics{display:flex;flex-wrap:wrap;align-items:center;gap:10px 22px;margin-top:13px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:11px 16px}
.metric{display:flex;align-items:center;gap:7px}
.metric .mdot{width:8px;height:8px;border-radius:2px;flex:none}
.metric .mval{font-family:'Nunito';font-weight:900;font-size:1.02rem;line-height:1}
.metric .mval.sm{font-size:.86rem}
.metric .mlbl{font-family:'Nunito';font-weight:800;font-size:.62rem;text-transform:uppercase;letter-spacing:.5px;color:var(--grey)}

.tabbar{flex:none;display:flex;align-items:center;gap:10px;padding:11px 22px 0;background:#fff;border-bottom:1px solid var(--border)}
.tab{font-family:'Nunito';font-weight:800;font-size:.84rem;background:none;border:none;border-bottom:3px solid transparent;color:var(--grey);padding:7px 4px 11px;cursor:pointer;margin-bottom:-1px;display:flex;align-items:center;gap:7px}
.tab.on{border-bottom-color:var(--red);color:var(--red)}
.tab .badge{font-family:'Nunito';font-weight:800;font-size:.62rem;color:#fff;border-radius:9px;padding:1px 7px}
.badge.amber{background:var(--amber)}.badge.blue{background:var(--blue)}

.work{flex:1;min-height:0;display:flex;overflow:hidden}
.list-pane{flex:none;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:#fff}
.detail-pane{flex:1;min-width:0;overflow-y:auto;background:var(--light-grey)}
.list-scroll{flex:1;overflow-y:auto;padding:10px}

.flt{flex:none;padding:12px 14px;border-bottom:1px solid var(--border);display:flex;gap:10px}
.flt label{flex:1;min-width:0}
.flt .lbl{display:block;font-family:'Nunito';font-weight:800;font-size:.56rem;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);margin-bottom:4px}
.sel{width:100%;font-family:'Nunito Sans';font-size:.82rem;font-weight:600;padding:8px 28px 8px 10px;border:1.5px solid var(--border);border-radius:8px;color:var(--dark);cursor:pointer;-webkit-appearance:none;appearance:none;
  background:#fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8'><path d='M1 1.5L6 6.5L11 1.5' stroke='%23B9BDCB' stroke-width='1.8' fill='none' stroke-linecap='round'/></svg>") no-repeat right 10px center;background-size:11px}
.sel.sm{font-size:.72rem;font-weight:700;padding:4px 22px 4px 9px;border-radius:7px;color:var(--dark-grey);background-size:9px;background-position:right 7px center}
.sel:focus{outline:none;border-color:var(--blue)}
.flt2{flex:none;display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border)}
.flt2 .ecount{font-family:'Nunito';font-weight:800;font-size:.66rem;color:var(--dark-grey);flex:1}
.sortbtn{font-family:'Nunito';font-weight:800;font-size:.7rem;border:1.5px solid var(--border);border-radius:7px;padding:4px 10px;cursor:pointer;background:#fff;color:var(--dark-grey)}
.sortbtn:hover{border-color:var(--blue);color:var(--blue)}

.card{border:1.5px solid var(--border);border-radius:9px;padding:11px 13px;margin-bottom:8px;cursor:pointer;background:#fff}
.card:hover{box-shadow:0 2px 10px rgba(45,45,59,.08)}
.card .crow{display:flex;align-items:center;justify-content:space-between;gap:8px}
.tbadge{font-family:'Nunito';font-weight:800;font-size:.62rem;text-transform:uppercase;letter-spacing:.4px;border-radius:5px;padding:2px 7px}
.cdate{font-size:.68rem;color:var(--grey);font-weight:700;white-space:nowrap}
.csubj{font-family:'Nunito';font-weight:800;font-size:.88rem;color:var(--dark);margin-top:7px;line-height:1.3}
.cmeta{display:flex;align-items:center;gap:7px;margin-top:8px}
.catchip{display:inline-flex;align-items:center;gap:5px;font-family:'Nunito';font-weight:700;font-size:.66rem}
.disc{font-family:'Nunito';font-weight:700;font-size:.64rem;color:var(--green);margin-left:auto}
.empty{padding:42px 22px;text-align:center}
.empty .ico{font-size:1.6rem;margin-bottom:8px}
.empty .t{font-family:'Nunito';font-weight:800;font-size:.92rem;color:var(--dark);margin-bottom:4px}
.empty .s{color:var(--grey);font-weight:700;font-size:.8rem;line-height:1.5}
.empty-sm{padding:34px 18px;text-align:center;color:var(--grey);font-weight:700;font-size:.84rem}
.center-msg{height:100%;display:flex;align-items:center;justify-content:center;color:var(--grey);font-weight:700;font-size:.88rem;padding:40px;text-align:center}

/* detail cards */
.dwrap{max-width:760px;margin:0 auto;padding:22px 26px 60px}
.dcard{background:#fff;border:1px solid var(--border);border-radius:11px;box-shadow:0 1px 3px rgba(45,45,59,.05);padding:22px 24px}
.dcard.stripe{border-top-width:3px;border-top-style:solid}
.dbadges{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.dcatchip{display:inline-flex;align-items:center;gap:5px;font-family:'Nunito';font-weight:800;font-size:.64rem;text-transform:uppercase;letter-spacing:.4px;border-radius:5px;padding:3px 8px}
.dtitle{font-family:'Nunito';font-weight:900;font-size:1.4rem;letter-spacing:-.3px;line-height:1.2;margin:0 0 8px}
.dmeta{font-size:.82rem;color:var(--dark-grey);font-weight:700;padding-bottom:16px;border-bottom:1px solid var(--border)}
.dactions{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 4px}
.btn-o{font-family:'Nunito';font-weight:800;font-size:.74rem;border:1.5px solid var(--border);border-radius:8px;padding:7px 13px;cursor:pointer;background:#fff;color:var(--dark-grey)}
.btn-o:hover{border-color:var(--blue);color:var(--blue)}
.btn-o.del:hover{border-color:var(--red);color:var(--red)}
.btn-o.gr{border-color:var(--green);background:#E9F6EE;color:#1B7A41}
.btn-o.gr:hover{background:#DCF0E4}
.sec{margin-bottom:18px}
.sec .sh{font-family:'Nunito';font-weight:900;font-size:.7rem;text-transform:uppercase;letter-spacing:.6px;color:var(--dark);border-bottom:1.5px solid var(--border);padding-bottom:5px;margin-bottom:8px}
.sec .sb{font-size:.9rem;color:var(--dark);line-height:1.65}
.sec .sb p{margin:0 0 8px}

/* lock screen */
.lock{position:fixed;inset:0;z-index:1500;background:var(--light-grey);display:flex;align-items:center;justify-content:center;padding:24px}
.lock[hidden]{display:none}
.lock-card{background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 8px 30px rgba(45,45,59,.10);padding:26px 26px 22px;width:340px;max-width:100%}
.lock-card .lk-mark{width:42px;height:42px;border-radius:11px;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Nunito';font-weight:900;margin-bottom:14px}
.lock-card h1{font-family:'Nunito';font-weight:900;font-size:1.15rem;margin:0 0 3px}
.lock-card p{font-size:.8rem;color:var(--dark-grey);font-weight:600;margin:0 0 16px}
.lk-field{margin-bottom:11px}
.lk-field label{display:block;font-family:'Nunito';font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);margin-bottom:5px}
.lk-input{width:100%;font-family:'Nunito Sans';font-size:.92rem;padding:10px 11px;border:1.5px solid var(--border);border-radius:9px;background:#fff;outline:none}
.lk-input:focus{border-color:var(--blue)}
.lk-go{width:100%;font-family:'Nunito';font-weight:800;font-size:.9rem;border:none;border-radius:9px;padding:11px;cursor:pointer;background:var(--red);color:#fff;margin-top:6px}
.lk-go:disabled{opacity:.6;cursor:default}
.lk-err{color:var(--red);font-size:.74rem;font-weight:700;margin-top:9px;min-height:1em;text-align:center}

/* ===== modal / editors ===== */
.modal{position:fixed;inset:0;z-index:1700;display:none}
.modal.show{display:block}
.mback{position:absolute;inset:0;background:rgba(45,45,59,.45)}
.mcard{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:580px;max-width:calc(100% - 28px);max-height:calc(100% - 44px);overflow-y:auto;background:#fff;border-radius:14px;box-shadow:0 18px 50px rgba(45,45,59,.28);padding:22px 24px}
.mcard h2{font-family:'Nunito';font-weight:900;font-size:1.15rem;margin:0 0 3px}
.mcard .msub{font-size:.78rem;color:var(--dark-grey);font-weight:600;margin:0 0 16px}
.mcard p.warn{font-size:.85rem;color:var(--dark-grey);line-height:1.5}
.fblock{margin-bottom:11px}
.frow{display:flex;gap:10px}
.frow>.fblock{flex:1;min-width:0}
.flbl{display:block;font-family:'Nunito';font-weight:800;font-size:.58rem;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);margin-bottom:5px}
.fin{width:100%;font-family:'Nunito Sans';font-size:.86rem;padding:9px 10px;border:1.5px solid var(--border);border-radius:8px;background:#fff;outline:none;color:var(--dark)}
.fin:focus{border-color:var(--blue)}
select.fin{cursor:pointer}
textarea.fin{resize:vertical;min-height:58px;line-height:1.5}
.fcheck{display:flex;align-items:center;gap:8px;font-family:'Nunito';font-weight:700;font-size:.82rem;color:var(--dark-grey);margin-bottom:4px;cursor:pointer}
.goalrow{display:flex;gap:8px;margin-bottom:7px}
.mactions{display:flex;gap:9px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;font-family:'Nunito';font-weight:700;font-size:.84rem;padding:11px 18px;border-radius:10px;opacity:0;pointer-events:none;transition:.2s;z-index:1800}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}

/* responsive: collapse detail to an overlay on narrow screens */
@media(max-width:900px){
  .emp-pane{width:208px}
  .detail-pane{position:fixed;inset:0 0 0 auto;width:min(560px,100%);z-index:1200;box-shadow:-8px 0 30px rgba(45,45,59,.16);display:none}
  .detail-pane.show{display:block}
  .list-pane{flex:1}
}
@media(max-width:620px){
  .emp-pane{position:fixed;left:0;top:0;bottom:0;z-index:1100;transform:translateX(-100%);transition:.2s}
  .emp-pane.show{transform:translateX(0)}
}
</style>
</head>
<body>

<!-- ===== PIN lock ===== -->
<div id="lock" class="lock">
  <div class="lock-card">
    <div class="lk-mark">+</div>
    <h1>Employee Records</h1>
    <p>Enter your PIN to view staff records.</p>
    <div class="lk-field">
      <label>PIN</label>
      <input id="lkPin" class="lk-input" type="password" inputmode="numeric" autocomplete="off" placeholder="••••" autofocus>
    </div>
    <button id="lkGo" class="lk-go">Sign in</button>
    <div id="lkErr" class="lk-err"></div>
  </div>
</div>

<!-- ===== app ===== -->
<div id="app" class="erec-root" hidden>
  <aside class="emp-pane" id="empPane">
    <div class="emp-hd"><span class="ttl head">Employees</span><span class="pill-sync">&#10003; Synced</span></div>
    <div class="emp-addrow"><button id="addPersonBtn" class="addbtn">+ Add employee</button></div>
    <div class="emp-search-wrap"><input id="empSearch" class="emp-search" placeholder="🔍  Search name or role…"></div>
    <div class="emp-list" id="empList"></div>
    <div class="emp-foot"><button id="archBtn" class="arch-btn">Show archived</button></div>
  </aside>
  <main class="erec-main">
    <div id="profile"></div>
    <div class="tabbar" id="tabbar">
      <button class="tab on" data-tab="log">Log</button>
      <button class="tab" data-tab="pips">PIPs &amp; Reviews <span class="badge amber" data-pipbadge hidden></span></button>
      <button class="tab" data-tab="damage">Tech Damage <span class="badge blue" data-dmgbadge hidden></span></button>
    </div>
    <div class="work" id="work"></div>
  </main>
</div>

<div id="modal" class="modal"></div>
<div id="toast" class="toast"></div>

<script src="assets/locations.js"></script>
<script src="assets/pin-gate.js"></script>
<script src="assets/nav.js"></script>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SB_URL='https://xuvsehrevxackuhmbmry.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY';
const sb=createClient(SB_URL,ANON);
const FN=SB_URL+'/functions/v1/cpr-auth';
const DMG_URL='https://script.google.com/macros/s/AKfycbyvHDQSWs6p9d3WING02i9VyO_ja0TzL8nb_DhhO4Myom_H0_34045pz8GOhyWQUWc7/exec';

  observation:{label:'Observation',fg:'#4E4E50',bg:'#EEF0F3',stripe:'#B9BDCB'},

  active:{label:'Active',fg:'#8A5A00',bg:'#FCF1DD',stripe:'#C9820B'},
  'under-review':{label:'Under Review',fg:'#1E7AA8',bg:'#EAF6FD',stripe:'#4FB0E3'},
  'closed-met':{label:'Closed — Met',fg:'#1B7A41',bg:'#E9F6EE',stripe:'#2E9E5B'},
  'closed-extended':{label:'Closed — Extended',fg:'#3730A3',bg:'#E9E9FA',stripe:'#5B54C9'},
  'closed-terminated':{label:'Closed — Terminated',fg:'#B91C1C',bg:'#FCE8E8',stripe:'#DC282E'},
};

const SECLABELS={issue:'Issue / What Happened',cause:'Root Cause',coaching:'Coaching Provided',response:'Employee Response',actions:'Action Items'};
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

/* ===== helpers ===== */
const $=s=>document.querySelector(s);
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function money(n){const x=Number(n)||0;return '$'+x.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function isoOf(v){return String(v||'').slice(0,10);}
function fmt(iso){iso=isoOf(iso);if(!iso)return '';const p=iso.split('-');if(p.length<3)return iso;return MONTHS[(+p[1])-1]+' '+(+p[2])+', '+p[0];}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function tenure(iso){iso=isoOf(iso);if(!iso)return '—';const s=new Date(iso+'T00:00:00'),n=new Date(todayISO()+'T00:00:00');if(isNaN(s))return '—';let m=(n.getFullYear()-s.getFullYear())*12+(n.getMonth()-s.getMonth());if(n.getDate()<s.getDate())m--;if(m<0)return '—';const y=Math.floor(m/12),mo=m%12;return (y?y+'y ':'')+mo+'m';}
function inRange(iso,range){iso=isoOf(iso);if(!iso||range==='all')return true;const d=new Date(iso+'T00:00:00'),now=new Date(todayISO()+'T00:00:00');if(range==='90'){const c=new Date(now);c.setDate(c.getDate()-90);return d>=c;}if(range==='ytd')return d>=new Date(now.getFullYear()+'-01-01T00:00:00');return true;}
function initials(name){return String(name||'').trim().split(/\s+/).map(w=>w[0]||'').slice(0,2).join('').toUpperCase()||'—';}
function stripStore(s){return String(s||'').replace(/^CPR\s+/i,'').trim();}
function deviceId(){try{let d=localStorage.getItem('cpr_device_id');if(!d){d='dev-'+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('cpr_device_id',d);}return d;}catch(e){return 'dev-x';}}
function toast(m,err){const t=$('#toast');t.textContent=m;t.className='toast show'+(err?' err':'');setTimeout(()=>{t.className='toast';},2400);}

/* ===== state + data ===== */
let AUTH=null, NAME2USER={};
let ALL=[], EMPLOYEES=[], DMG_BYNAME={};
const S={empId:null,tab:'log',entryId:null,pipId:null,damageId:null,typeF:'all',catF:'all',sortNewest:true,empSearch:'',logRange:'all',dmgRange:'all',showArchived:false,mDetail:false};

function fn(body){return fetch(FN,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ANON,'apikey':ANON},body:JSON.stringify(body)}).then(r=>r.json().then(d=>({status:r.status,data:d}),()=>({status:r.status,data:{}})));}
/* staff CRUD carries the authenticated session bearer (caller() requires owner/admin) */
async function authFn(body){
  const sess=(await sb.auth.getSession()).data.session;
  const tok=sess?sess.access_token:ANON;
  const r=await fetch(FN,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok,'apikey':ANON},body:JSON.stringify(body)});
  const d=await r.json().catch(()=>({}));
  return {status:r.status,data:d};
}

/* ===== auth (PIN only) ===== */
async function doLogin(){
  const pin=$('#lkPin').value;
  const err=$('#lkErr');
  if(!pin){err.textContent='Enter your PIN';return;}
  $('#lkGo').disabled=true;err.textContent='Signing in…';
  try{
    const r=await fn({action:'login',pin,device_id:deviceId()});
    if(r.status!==200){const d=r.data||{};
      if(r.status===423||d.locked)err.textContent='Locked after too many tries — an owner must reset this device.';
      else if(d.error==='invalid')err.textContent='Wrong PIN.'+(d.remaining!=null?(' '+d.remaining+' left.'):'');
      else err.textContent=d.error||'Login failed.';
      $('#lkGo').disabled=false;return;
    }
    await sb.auth.setSession({access_token:r.data.access_token,refresh_token:r.data.refresh_token});
    const st=r.data.staff||{};
    AUTH={name:st.display_name,role:st.role};
    err.textContent='';$('#lkGo').disabled=false;
    unlock();
  }catch(e){$('#lkGo').disabled=false;err.textContent=String(e&&e.message||e);}
}
function unlock(){$('#lock').setAttribute('hidden','');$('#app').removeAttribute('hidden');load();}
async function initAuth(){
  $('#lkGo').onclick=doLogin;
  $('#lkPin').focus();
  $('#lkPin').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  const sess=(await sb.auth.getSession()).data.session;
  if(sess){
    const sr=await sb.from('staff').select('display_name,role').eq('auth_uid',sess.user.id).maybeSingle();
    if(sr.data){AUTH={name:sr.data.display_name,role:sr.data.role};unlock();return;}
  }
  $('#lock').removeAttribute('hidden');
}

/* ===== data load ===== */
async function load(){
  const [stRes,enRes,piRes]=await Promise.all([
    sb.from('staff').select('id,display_name,first_name,last_name,username,title,role,home_store,authorized_stores,start_date,hr_status,notes,archived,active'),
    sb.from('staff_entries').select('*'),
    sb.from('staff_pips').select('*'),
  ]);
  if(stRes.error){toast('Could not load staff: '+stRes.error.message,true);return;}
  const byId={};
  (stRes.data||[]).forEach(s=>{byId[s.id]={
    id:s.id,name:s.display_name,role:s.title||roleLabel(s.role),store:stripStore(s.home_store),
    title:s.title||'',roleLevel:s.role,homeStore:s.home_store,first:s.first_name||'',last:s.last_name||'',
    username:s.username||'',hrStatus:s.hr_status||'active',notes:s.notes||'',
    start:isoOf(s.start_date),archived:!!s.archived||s.active===false,active:s.active!==false,onPip:false,entries:[],pips:[]
  };});
  (enRes.data||[]).forEach(r=>{const e=byId[r.staff_id];if(!e)return;
    e.entries.push({id:r.id,date:isoOf(r.entry_date),incidentDate:isoOf(r.incident_date||r.entry_date),
      subject:r.subject||'(untitled)',type:r.entry_type||'observation',category:r.category||'general',
      discussed:!!r.discussed,sections:r.sections||{}});});
  (piRes.data||[]).forEach(r=>{const e=byId[r.staff_id];if(!e)return;const d=r.doc||{};
    e.pips.push({id:r.id,title:d.title||'Performance Improvement Plan',status:r.status||d.status||'draft',
      start:isoOf(r.start_date||d.start),review:isoOf(r.outcome_date||d.review),manager:d.manager||'',
      issues:d.issues||'',goals:Array.isArray(d.goals)?d.goals:[],support:d.support||'',
      checkins:Array.isArray(d.checkins)?d.checkins:[]});});
  ALL=Object.values(byId);
  ALL.forEach(e=>{e.onPip=e.pips.some(p=>p.status==='active'||p.status==='under-review');});
  ALL.sort((a,b)=>String(a.store).localeCompare(String(b.store))||String(a.name).localeCompare(String(b.name)));
  ALL.forEach((e,i)=>{e.avatarBg=AV[i%AV.length];});
  loadDamage();   // async, re-renders when done
  refilter();
  if(!S.empId||!EMPLOYEES.find(e=>e.id===S.empId))selectFirst();
  render();
}
function roleLabel(r){return ({owner:'Owner',admin:'Admin',manager:'Manager',team_member:'Team Member',employee:'Team Member'})[r]||r||'';}
function refilter(){EMPLOYEES=ALL.filter(e=>S.showArchived?true:!e.archived);}
function selectFirst(){const e=EMPLOYEES[0]||ALL[0]||null;S.empId=e?e.id:null;syncSel(e);}
function selEmp(){return EMPLOYEES.find(e=>e.id===S.empId)||ALL.find(e=>e.id===S.empId)||EMPLOYEES[0]||null;}
function syncSel(e){if(!e){S.entryId=S.pipId=S.damageId=null;return;}
  const ents=sortedEntries(e);S.entryId=ents[0]?ents[0].id:null;
  S.pipId=e.pips[0]?e.pips[0].id:null;
  const dmg=dmgFor(e);S.damageId=dmg[0]?dmg[0].id:null;}

async function loadDamage(){
  try{
    const u=DMG_URL+'?action=list';
    const res=await fetch(u);const b=await res.json();
    const rows=(b&&b.ok&&b.rows)?b.rows:[];
    DMG_BYNAME={};
    rows.forEach(row=>{const k=normName(row.tech);if(!k)return;
      (DMG_BYNAME[k]=DMG_BYNAME[k]||[]).push({
        id:row.id||('t'+(row.ticket||'')+'-'+(row.date||'')),date:isoOf(row.date),store:stripStore(row.store),
        device:row.device||'',mfr:(row.manufacturer==='Other'&&row.mfrDetail)?('Other: '+row.mfrDetail):(row.manufacturer||''),
        part:(row.part==='Other'&&row.partDetail)?('Other: '+row.partDetail):(row.part||''),
        cost:Number(row.cost)||0,ticket:String(row.ticket||''),how:row.how||''});});
    if(!$('#app').hasAttribute('hidden'))render();
  }catch(e){DMG_BYNAME={};}
}
function normName(n){return String(n||'').trim().toLowerCase().replace(/\s+/g,' ');}
function dmgFor(e){if(!e)return [];return (DMG_BYNAME[normName(e.name)]||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));}

function sortedEntries(e){
  let ents=e.entries.slice();
  ents.sort((a,b)=>S.sortNewest?b.incidentDate.localeCompare(a.incidentDate):a.incidentDate.localeCompare(b.incidentDate));
  return ents;
}

/* ===== render ===== */
function render(){renderEmpList();renderProfile();renderTabs();renderWork();}

function renderEmpList(){
  const q=S.empSearch.trim().toLowerCase();
  const match=e=>!q||(e.name+' '+e.role+' '+e.store).toLowerCase().includes(q);
  const vis=EMPLOYEES.filter(match);
  if(!vis.length){$('#empList').innerHTML='<div class="empty-sm">No employees match your search.</div>';return;}
  const order=[...new Set(EMPLOYEES.map(e=>e.store))];
  let html='';
  order.forEach(store=>{
    const grp=vis.filter(e=>e.store===store);if(!grp.length)return;
    html+='<div class="grp-lbl">'+esc(store||'—')+'</div>';
    grp.forEach(e=>{
      const recentIncident=e.entries.some(en=>en.type==='incident'&&inRange(en.incidentDate||en.date,'90'));
      html+='<div class="erow'+(e.id===S.empId?' sel':'')+'" data-emp="'+esc(e.id)+'">'
        +'<div class="av" style="background:'+e.avatarBg+'">'+esc(initials(e.name))+'</div>'
        +'<div style="min-width:0;flex:1"><div class="nm">'+esc(e.name)+'</div><div class="rl">'+esc(e.role)+'</div></div>'
        +(recentIncident?'<span class="dot7" style="background:var(--red)" title="Recent incident (90 days)"></span>':'')
        +(e.onPip?'<span class="dot7" style="background:var(--amber)" title="On PIP"></span>':'')
        +'<span class="cnt">'+e.entries.length+'</span>'
        +'<button class="kebab" data-editperson="'+esc(e.id)+'" title="Edit person" aria-label="Edit person">&#8942;</button></div>';
    });
  });
  $('#empList').innerHTML=html;
}

function renderProfile(){
  const e=selEmp();
  if(!e){$('#profile').innerHTML='<div class="prof"><div class="prof-sub">No staff to display.</div></div>';return;}
  const last=e.entries.map(x=>x.date).filter(Boolean).sort().slice(-1)[0];
  const dmgYtd=dmgFor(e).filter(r=>r.date>=todayISO().slice(0,4)+'-01-01').reduce((s,r)=>s+r.cost,0);
  const openPips=e.pips.filter(p=>p.status==='active'||p.status==='under-review').length;
  const absences=e.entries.filter(x=>x.category==='attendance').length;
  const sBg=e.onPip?'#FCF1DD':'#E9F6EE',sFg=e.onPip?'#8A5A00':'#1B7A41',sLbl=e.onPip?'On PIP':(e.archived?'Archived':'Active');
  const stBg=e.archived?'#EEF0F3':sBg,stFg=e.archived?'#4E4E50':sFg;
  const m=(dot,val,lbl,sm)=>'<div class="metric"><span class="mdot" style="background:'+dot+'"></span><span class="mval'+(sm?' sm':'')+'">'+esc(val)+'</span><span class="mlbl">'+lbl+'</span></div>';
  $('#profile').innerHTML='<div class="prof"><div class="prof-top">'
    +'<div class="prof-id"><div class="av" style="background:'+e.avatarBg+'">'+esc(initials(e.name))+'</div>'
    +'<div style="min-width:0"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
    +'<span class="prof-name head">'+esc(e.name)+'</span>'
    +'<span class="status-pill" style="background:'+stBg+';color:'+stFg+'">'+esc(sLbl)+'</span></div>'
    +'<div class="prof-sub">'+esc(e.role)+' &middot; '+esc(e.store||'—')+(e.start?(' &middot; Started '+esc(fmt(e.start))):'')+'</div></div></div>'
    +'<div style="display:flex;gap:9px;align-items:center;flex-wrap:wrap;flex:none"><button class="btn-o" data-act="export">&#8595; Export</button><button class="btn-red" data-act="new-entry">+ New Entry</button></div></div>'
    +'<div class="metrics">'
    +m('var(--blue)',e.entries.length,'Entries')
    +m('var(--amber)',openPips,'Open PIPs')
    +m('var(--red)',absences,'Absences')
    +m('var(--dark)',money(dmgYtd),'Damage YTD')
    +m('var(--green)',tenure(e.start),'Tenure')
    +m('var(--grey)',last?fmt(last):'—','Last Seen',true)
    +'</div></div>';
}

function renderTabs(){
  const e=selEmp();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===S.tab));
  const pb=$('[data-pipbadge]'),db=$('[data-dmgbadge]');
  const np=e?e.pips.length:0,nd=e?dmgFor(e).length:0;
  if(np>0){pb.textContent=np;pb.hidden=false;}else pb.hidden=true;
  if(nd>0){db.textContent=nd;db.hidden=false;}else db.hidden=true;
}

function renderWork(){
  const e=selEmp();
  const w=$('#work');
  if(!e){w.innerHTML='';return;}
  if(S.tab==='log')w.innerHTML=logHtml(e);
  else if(S.tab==='pips')w.innerHTML=pipHtml(e);
  else w.innerHTML=dmgHtml(e);
  const dp=w.querySelector('.detail-pane');if(dp)dp.classList.toggle('show',S.mDetail);
}

function logHtml(e){
  let ents=e.entries.slice();
  if(S.typeF!=='all')ents=ents.filter(x=>x.type===S.typeF);
  if(S.catF!=='all')ents=ents.filter(x=>x.category===S.catF);
  if(S.logRange!=='all')ents=ents.filter(x=>inRange(x.incidentDate||x.date,S.logRange));
  ents.sort((a,b)=>S.sortNewest?b.incidentDate.localeCompare(a.incidentDate):a.incidentDate.localeCompare(b.incidentDate));
  const opt=(v,l,cur)=>'<option value="'+v+'"'+(v===cur?' selected':'')+'>'+l+'</option>';
  let cards='';
  ents.forEach(x=>{const t=TYPE[x.type]||TYPE.observation,c=CAT[x.category]||CAT.general,on=x.id===S.entryId;
    cards+='<div class="card'+(on?' sel':'')+'" data-entry="'+esc(x.id)+'" style="border-left:4px solid '+t.stripe+';'+(on?'background:#FBFCFE;border-color:#B7DDF2':'')+'">'
      +'<div class="crow"><span class="tbadge" style="background:'+t.bg+';color:'+t.fg+'">'+t.label+'</span><span class="cdate">'+esc(fmt(x.date))+'</span></div>'
      +'<div class="csubj">'+esc(x.subject)+'</div>'
      +'<div class="cmeta"><span class="catchip" style="color:'+c.fg+'"><span class="dot7" style="background:'+c.dot+'"></span>'+c.label+'</span>'
      +(x.discussed&&x.type==='conversation'?'<span class="disc">&#10003; Discussed</span>':'')+'</div></div>';
  });
  let listInner;
  if(!e.entries.length)listInner='<div class="empty"><div class="ico">📋</div><div class="t">No entries yet</div><div class="s">Log the first observation, incident, or conversation for '+esc(e.name)+'.</div></div>';
  else if(!ents.length)listInner='<div class="empty-sm">No entries match these filters.</div>';
  else listInner=cards;
  const cur=e.entries.find(x=>x.id===S.entryId);
  return '<div class="list-pane" style="width:368px">'
    +'<div class="flt">'
    +'<label><span class="lbl">Type</span><select class="sel" data-f="typeF">'+opt('all','All types',S.typeF)+opt('observation','Observation',S.typeF)+opt('incident','Incident',S.typeF)+opt('conversation','Conversation',S.typeF)+'</select></label>'
    +'<label><span class="lbl">Category</span><select class="sel" data-f="catF">'+opt('all','All categories',S.catF)+opt('coaching','Coaching',S.catF)+opt('performance','Performance',S.catF)+opt('attendance','Attendance',S.catF)+opt('positive','Positive',S.catF)+opt('general','General',S.catF)+'</select></label>'
    +'</div>'
    +'<div class="flt2"><span class="ecount">'+ents.length+(ents.length===1?' entry':' entries')+'</span>'
    +'<select class="sel sm" data-f="logRange">'+opt('all','All time',S.logRange)+opt('90','Last 90 days',S.logRange)+opt('ytd','This year',S.logRange)+'</select>'
    +'<button class="sortbtn" data-act="sort">'+(S.sortNewest?'↓ Newest':'↑ Oldest')+'</button></div>'
    +'<div class="list-scroll">'+listInner+'</div></div>'
    +'<div class="detail-pane">'+(cur?entryDetail(e,cur):'<div class="center-msg">Select an entry to view the full record.</div>')+'</div>';
}
function entryDetail(e,x){
  const t=TYPE[x.type]||TYPE.observation,c=CAT[x.category]||CAT.general;
  const secs=Object.keys(SECLABELS).filter(k=>x.sections&&x.sections[k]).map(k=>'<div class="sec"><div class="sh">'+SECLABELS[k]+'</div><div class="sb">'+richText(x.sections[k])+'</div></div>').join('');
  return '<div class="dwrap"><div class="dcard stripe" style="border-top-color:'+t.stripe+'">'
    +'<div class="dbadges"><span class="tbadge" style="background:'+t.bg+';color:'+t.fg+';padding:3px 8px">'+t.label+'</span>'
    +'<span class="dcatchip" style="color:'+c.fg+';border:1px solid '+c.bd+';background:'+c.bg+'"><span class="dot7" style="background:'+c.dot+'"></span>'+c.label+'</span></div>'
    +'<h1 class="dtitle head">'+esc(x.subject)+'</h1>'
    +'<div class="dmeta">'+esc(e.name+' · '+e.role+' · '+fmt(x.date))+'</div>'
    +'<div class="dactions">'
    +(x.type==='incident'&&!x.discussed?'<button class="btn-o gr" data-act="discuss">&#128172; Log Discussion</button>':'')
    +'<button class="btn-o" data-act="download">&#8595; Download</button>'
    +'<button class="btn-o" data-act="edit">Edit</button>'
    +'<button class="btn-o del" data-act="delete">Delete</button></div>'
    +'<div style="margin-top:18px">'+(secs||'<div class="sb" style="color:var(--grey)">No write-up recorded.</div>')+'</div>'
    +'</div></div>';

/* entry section bodies may contain legacy rich HTML — render it, lightly. */
function richText(v){
  const s=String(v==null?'':v);
  if(/<[a-z][\s\S]*>/i.test(s))return s;            // already HTML
  return esc(s).replace(/\n/g,'<br>');
}

function pipHtml(e){
  let cards='';
  e.pips.forEach(p=>{const m=PIPST[p.status]||PIPST.draft,on=p.id===S.pipId;
    cards+='<div class="card'+(on?' sel':'')+'" data-pip="'+esc(p.id)+'" style="border-left:4px solid '+m.stripe+';'+(on?'background:#FBFCFE;border-color:#B7DDF2':'')+'">'
      +'<div class="csubj" style="margin-top:0">'+esc(p.title)+'</div>'
      +'<div class="rl" style="margin-top:4px">'+(p.start?('Started '+esc(fmt(p.start))):'')+(p.review?(' · Review '+esc(fmt(p.review))):'')+'</div>'
      +'<span class="tbadge" style="display:inline-block;margin-top:8px;background:'+m.bg+';color:'+m.fg+'">'+m.label+'</span></div>';
  });

    +'<div class="flt" style="justify-content:space-between;align-items:center"><span class="lbl" style="margin:0">Plans &amp; Reviews</span>'
    +'<button class="btn-red" style="padding:6px 12px;font-size:.72rem" data-act="new-pip">+ New PIP</button></div>'
    +'<div class="list-scroll">'+(cards||'<div class="empty-sm">No PIPs on file for this employee.</div>')+'</div></div>'
    +'<div class="detail-pane">'+(cur?pipDetail(e,cur):'<div class="center-msg">Select a plan to view it, or start a new PIP.</div>')+'</div>';
}
function pipDetail(e,p){

  const block=(t,b)=>b?('<div class="sec"><div class="sh">'+t+'</div><div class="sb">'+richText(b)+'</div></div>'):'';
  return '<div class="dwrap" style="max-width:720px"><div class="dcard" style="padding:26px 28px">'
    +'<div style="text-align:center;padding-bottom:16px;border-bottom:2px solid var(--dark);margin-bottom:18px">'
    +'<div style="font-family:Nunito;font-weight:900;font-size:1rem;color:var(--red)">CPR CELL PHONE REPAIR — OREGON</div>'
    +'<div style="font-family:Nunito;font-weight:900;font-size:.86rem;text-transform:uppercase;letter-spacing:.8px;margin-top:8px">Performance Improvement Plan</div></div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px"><span class="tbadge" style="padding:4px 10px;background:'+m.bg+';color:'+m.fg+'">'+m.label+'</span>'
    +'<button class="btn-o" data-act="download">&#8595; Download</button><button class="btn-o" data-act="edit-pip">Edit</button></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;background:var(--light-grey);border-radius:9px;padding:14px 16px;margin-bottom:20px">'+info+'</div>'
    +block('Performance Issues',p.issues)

function modal(html){const m=$('#modal');m.innerHTML='<div class="mback" data-close></div><div class="mcard">'+html+'</div>';m.classList.add('show');}
function closeModal(){const m=$('#modal');m.classList.remove('show');m.innerHTML='';}
function field(label,inner){return '<div class="fblock"><label class="flbl">'+label+'</label>'+inner+'</div>';}
function optList(arr,cur){return arr.map(o=>'<option value="'+o[0]+'"'+(o[0]===cur?' selected':'')+'>'+o[1]+'</option>').join('');}
const TYPES=[['observation','Observation'],['incident','Incident'],['conversation','Conversation']];
const CATS=[['coaching','Coaching'],['performance','Performance'],['attendance','Attendance'],['positive','Positive'],['general','General']];
const STATS=[['draft','Draft'],['active','Active'],['under-review','Under Review'],['closed-met','Closed — Met'],['closed-extended','Closed — Extended'],['closed-terminated','Closed — Terminated']];

function handleAct(a){
  const e=selEmp();if(!e)return;
  const curEntry=()=>e.entries.find(x=>x.id===S.entryId);
  const curPip=()=>e.pips.find(p=>p.id===S.pipId);
  if(a==='export')exportEmployee(e);
  else if(a==='new-entry')openEntryEditor(e,null);
  else if(a==='edit'){const x=curEntry();if(x)openEntryEditor(e,x);}
  else if(a==='delete'){const x=curEntry();if(x)confirmDeleteEntry(e,x);}
  else if(a==='discuss'){const x=curEntry();if(x)logDiscussion(x);}
  else if(a==='new-pip')openPipEditor(e,null);
  else if(a==='edit-pip'){const p=curPip();if(p)openPipEditor(e,p);}
  else if(a==='add-checkin'){const p=curPip();if(p)openCheckinEditor(p);}
  else if(a==='download'){if(S.tab==='pips'){const p=curPip();if(p)downloadPip(e,p);}else{const x=curEntry();if(x)downloadEntry(e,x);}}
}

async function saveEntry(e,id){
  const v=i=>$('#'+i);const sec={};

    entry_date:v('f_date').value||todayISO(),incident_date:v('f_inc').value||v('f_date').value||todayISO(),
    discussed:v('f_disc').checked,sections:sec};
  v('f_save').disabled=true;

  else{rec.staff_id=e.id;const r=await sb.from('staff_entries').insert(rec).select('id').single();res=r;newId=r.data&&r.data.id;}

function openPersonEditor(emp){
  const isNew=!emp;emp=emp||{};

  const statusOpts=[['active','Active'],['notice','On notice'],['terminated','Terminated']].map(s=>'<option value="'+s[0]+'"'+(s[0]===curStatus?' selected':'')+'>'+s[1]+'</option>').join('');
  modal(

    +'<div class="frow">'+field('Store','<select id="p_store" class="fin">'+storeOpts+'</select>')+field('Job title','<input id="p_title" class="fin" value="'+esc(emp.title||'')+'" placeholder="e.g. Repair Technician">')+'</div>'
    +'<div class="frow">'+field('Start date','<input id="p_start" type="date" class="fin" value="'+esc(emp.start||'')+'">')+field('Access level','<select id="p_role" class="fin">'+roleOpts+'</select>')+'</div>'

    +(isNew?'':'<button class="btn-o" id="p_arch" style="margin-right:auto">'+(emp.archived?'Restore':'Archive')+'</button>')

async function savePerson(emp){
  const v=i=>$('#'+i);
  const first=v('p_first').value.trim(),last=v('p_last').value.trim();
  const home=v('p_store').value,title=v('p_title').value.trim(),start=v('p_start').value,role=v('p_role').value;
  if(!first&&!last){toast('Enter a name',true);return;}
  v('p_psave').disabled=true;
  if(!emp){
    const pin=v('p_pin').value.trim();
    if(!pin){toast('Set a PIN',true);v('p_psave').disabled=false;return;}
    const base=((first[0]||'')+last).toLowerCase().replace(/[^a-z0-9]/g,'')||('user'+Date.now().toString(36));
    let res=null;
    for(let n=0;n<6;n++){
      res=await authFn({action:'create_staff',first_name:first,last_name:last,username:base+(n?String(n+1):''),
        role,home_store:home,authorized_stores:[home],pin,title,start_date:start});
      if(res.status===200&&res.data.ok)break;
      if(!/taken/i.test(res.data.error||''))break;
    }
    if(!(res&&res.status===200&&res.data.ok)){toast((res&&res.data.error)||'Could not create employee',true);v('p_psave').disabled=false;return;}
    closeModal();toast('Employee added');await load();
  }else{
    const status=v('p_status').value,notes=v('p_notes').value.trim();
    const archived=status==='terminated',active=status!=='terminated';
    const res=await authFn({action:'update_staff',staff_id:emp.id,first_name:first,last_name:last,
      home_store:home,role,title,start_date:start,hr_status:status,notes,archived,active});
    if(!(res.status===200&&res.data.ok)){toast(res.data.error||'Could not save',true);v('p_psave').disabled=false;return;}
    closeModal();toast('Saved');await load();
  }
}
async function archivePerson(emp,arch){
  const res=await authFn({action:'update_staff',staff_id:emp.id,archived:arch,active:!arch,hr_status:arch?'terminated':'active'});
  if(!(res.status===200&&res.data.ok)){toast(res.data.error||'Could not update',true);return;}
  closeModal();toast(arch?'Archived':'Restored');await load();
}

/* ----- download (printable .html) ----- */
function slug(s){return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,60)||'document';}
function docShell(title,body){return '<!doctype html><html><head><meta charset="utf-8"><title>'+esc(title)+'</title><style>body{font-family:Arial,Helvetica,sans-serif;max-width:720px;margin:40px auto;padding:0 24px;color:#2D2D3B;line-height:1.55}h1{font-size:1.55rem;margin:.2em 0}h3{text-transform:uppercase;font-size:.78rem;letter-spacing:.5px;color:#4E4E50;border-bottom:1px solid #ddd;padding-bottom:4px;margin-top:24px}.meta{color:#666;font-size:.85rem;margin:2px 0}.goal{border-left:3px solid #4FB0E3;padding:4px 10px;margin:6px 0;background:#f6f8fb}</style></head><body>'+body+'</body></html>';}
function downloadDoc(fn,html){const b=new Blob([html],{type:'text/html'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=fn;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1500);}
function downloadEntry(e,x){
  const t=TYPE[x.type]||TYPE.observation,c=CAT[x.category]||CAT.general;
  const secs=Object.keys(SECLABELS).filter(k=>x.sections&&x.sections[k]).map(k=>'<h3>'+SECLABELS[k]+'</h3><div>'+richText(x.sections[k])+'</div>').join('');
  downloadDoc(slug(e.name+'-'+x.subject)+'.html',docShell(x.subject,
    '<p class="meta">'+esc(e.name+' · '+e.role+' · '+(e.store||''))+'</p>'
    +'<p class="meta">'+t.label+' · '+c.label+' · '+esc(fmt(x.date))+(x.incidentDate?(' · Incident '+esc(fmt(x.incidentDate))):'')+'</p>'
    +'<h1>'+esc(x.subject)+'</h1>'+(secs||'<p>No write-up recorded.</p>')));
}
function downloadPip(e,p){
  const m=PIPST[p.status]||PIPST.draft;
  const goals=(p.goals||[]).map(g=>'<div class="goal"><b>'+esc(g.text||'')+'</b>'+(g.deadline?(' — Target: '+esc(g.deadline)):'')+'</div>').join('');
  const checks=(p.checkins||[]).map(c=>'<div class="goal" style="border-left-color:#2E9E5B"><b>'+esc(c.date||'')+'</b><div>'+esc(c.notes||'')+'</div></div>').join('');
  downloadDoc(slug(e.name+'-pip')+'.html',docShell('PIP — '+e.name,
    '<p class="meta">CPR CELL PHONE REPAIR — OREGON</p><h1>Performance Improvement Plan</h1>'
    +'<p class="meta">'+esc(e.name)+' · Manager '+esc(p.manager||'—')+' · '+m.label+'</p>'
    +'<p class="meta">Start '+esc(p.start?fmt(p.start):'—')+' · Review '+esc(p.review?fmt(p.review):'—')+'</p>'
    +(p.issues?'<h3>Performance Issues</h3><div>'+richText(p.issues)+'</div>':'')
    +(goals?'<h3>Goals &amp; Expectations</h3>'+goals:'')
    +(p.support?'<h3>Support Provided</h3><div>'+richText(p.support)+'</div>':'')
    +(checks?'<h3>Check-ins</h3>'+checks:'')));
}

/* ----- export employee file (zip: records.csv + one PDF per record) ----- */
function htmlToText(s){
  s=String(s==null?'':s);
  if(!/[<&]/.test(s))return s.trim();
  s=s.replace(/<\s*(br|\/p|\/div|\/li|\/tr)\s*\/?>/gi,'\n').replace(/<[^>]+>/g,'');
  const ta=document.createElement('textarea');ta.innerHTML=s;s=ta.value;
  return s.replace(/\r/g,'').replace(/[ \t]+\n/g,'\n').replace(/\n{3,}/g,'\n\n').trim();
}
function pdfSafe(s){return String(s==null?'':s)
  .replace(/[‘’]/g,"'").replace(/[“”]/g,'"')
  .replace(/[–—]/g,'-').replace(/…/g,'...').replace(/ /g,' ')
  .replace(/[^\x00-\xFF]/g,'');}
function flattenSections(sec){return Object.keys(SECLABELS).filter(k=>sec&&sec[k]).map(k=>SECLABELS[k]+': '+htmlToText(sec[k])).join('\n\n');}
function flattenPip(p){const a=[];if(p.issues)a.push('Performance Issues: '+htmlToText(p.issues));
  if(p.goals&&p.goals.length)a.push('Goals: '+p.goals.map(g=>g.text+(g.deadline?(' (Target: '+g.deadline+')'):'')).join('; '));
  if(p.support)a.push('Support: '+htmlToText(p.support));
  if(p.checkins&&p.checkins.length)a.push('Check-ins: '+p.checkins.map(c=>c.date+' - '+c.notes).join(' | '));
  return a.join('\n\n');}
function buildCsv(e){
  const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const head=['record_type','date','incident_date','title','category_or_status','discussed','store','cost','ticket','details'];
  const rows=[head.map(q).join(',')];
  e.entries.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(x=>rows.push(
    ['Entry',x.date,x.incidentDate||'',x.subject,x.category,x.discussed?'yes':'no','','','',flattenSections(x.sections)].map(q).join(',')));
  e.pips.forEach(p=>rows.push(
    ['PIP',p.start||'',p.review||'',p.title,p.status,'','','','',flattenPip(p)].map(q).join(',')));
  dmgFor(e).forEach(r=>rows.push(
    ['Tech Damage',r.date,'',r.part,r.mfr,'',r.store,r.cost,r.ticket,htmlToText(r.how)].map(q).join(',')));
  return '﻿'+rows.join('\r\n');
}
function makePdf(jsPDF){const doc=new jsPDF({unit:'pt',format:'letter'});doc._y=56;return doc;}
function pdfBlock(doc,text,o){o=o||{};const size=o.size||10,M=56,PW=doc.internal.pageSize.getWidth(),PH=doc.internal.pageSize.getHeight();
  doc.setFont('helvetica',o.style||'normal');doc.setFontSize(size);doc.setTextColor.apply(doc,o.color||[45,45,59]);
  const lines=doc.splitTextToSize(pdfSafe(text),PW-M*2-(o.indent||0));const lh=size*1.35;
  for(const ln of lines){if(doc._y+lh>PH-M){doc.addPage();doc._y=M;}doc.text(ln,M+(o.indent||0),doc._y);doc._y+=lh;}
  doc._y+=(o.gap==null?4:o.gap);}
function entryPdf(jsPDF,e,x){const doc=makePdf(jsPDF),t=TYPE[x.type]||TYPE.observation,c=CAT[x.category]||CAT.general;
  pdfBlock(doc,'CPR CELL PHONE REPAIR - OREGON',{size:9,style:'bold',color:[220,40,46],gap:2});
  pdfBlock(doc,t.label+'  ·  '+c.label,{size:8,style:'bold',color:[150,150,160],gap:6});
  pdfBlock(doc,x.subject,{size:16,style:'bold',gap:4});
  pdfBlock(doc,e.name+'  ·  '+e.role+'  ·  '+fmt(x.date)+(x.incidentDate&&x.incidentDate!==x.date?('  ·  Incident '+fmt(x.incidentDate)):''),{size:9,color:[110,110,120],gap:10});
  Object.keys(SECLABELS).forEach(k=>{if(x.sections&&x.sections[k]){pdfBlock(doc,SECLABELS[k].toUpperCase(),{size:8,style:'bold',color:[120,120,130],gap:2});pdfBlock(doc,htmlToText(x.sections[k]),{size:10,gap:9});}});
  if(x.discussed)pdfBlock(doc,'Discussed with employee.',{size:9,style:'bold',color:[46,158,91]});
  return doc.output('arraybuffer');}
function pipPdf(jsPDF,e,p){const doc=makePdf(jsPDF),m=PIPST[p.status]||PIPST.draft;
  pdfBlock(doc,'CPR CELL PHONE REPAIR - OREGON',{size:9,style:'bold',color:[220,40,46],gap:2});
  pdfBlock(doc,'Performance Improvement Plan',{size:15,style:'bold',gap:2});
  pdfBlock(doc,p.title,{size:11,style:'bold',color:[90,90,100],gap:6});
  pdfBlock(doc,e.name+'  ·  Manager '+(p.manager||'-')+'  ·  '+m.label,{size:9,color:[110,110,120],gap:2});
  pdfBlock(doc,'Start '+(p.start?fmt(p.start):'-')+'    Review '+(p.review?fmt(p.review):'-'),{size:9,color:[110,110,120],gap:8});
  if(p.issues){pdfBlock(doc,'PERFORMANCE ISSUES',{size:8,style:'bold',color:[120,120,130],gap:2});pdfBlock(doc,htmlToText(p.issues),{size:10,gap:8});}
  if(p.goals&&p.goals.length){pdfBlock(doc,'GOALS & EXPECTATIONS',{size:8,style:'bold',color:[120,120,130],gap:2});p.goals.forEach(g=>pdfBlock(doc,'- '+g.text+(g.deadline?('  (Target: '+g.deadline+')'):''),{size:10,gap:2}));doc._y+=6;}
  if(p.support){pdfBlock(doc,'SUPPORT PROVIDED',{size:8,style:'bold',color:[120,120,130],gap:2});pdfBlock(doc,htmlToText(p.support),{size:10,gap:8});}
  if(p.checkins&&p.checkins.length){pdfBlock(doc,'CHECK-INS',{size:8,style:'bold',color:[120,120,130],gap:2});p.checkins.forEach(c=>{pdfBlock(doc,c.date,{size:9,style:'bold',gap:1});pdfBlock(doc,htmlToText(c.notes),{size:10,gap:6});});}
  return doc.output('arraybuffer');}
function damagePdf(jsPDF,e,r){const doc=makePdf(jsPDF);
  pdfBlock(doc,'TECH DAMAGE REPORT',{size:9,style:'bold',color:[220,40,46],gap:2});
  pdfBlock(doc,r.part||'-',{size:16,style:'bold',gap:2});
  if(r.device)pdfBlock(doc,r.device,{size:10,color:[110,110,120],gap:6});
  pdfBlock(doc,e.name+'  ·  '+(r.store||'')+'  ·  '+fmt(r.date),{size:9,color:[110,110,120],gap:8});
  pdfBlock(doc,'Manufacturer: '+(r.mfr||'-')+'      Part cost: '+money(r.cost)+'      Ticket: '+(r.ticket||'-'),{size:10,gap:8});
  if(r.how){pdfBlock(doc,'HOW IT HAPPENED',{size:8,style:'bold',color:[120,120,130],gap:2});pdfBlock(doc,htmlToText(r.how),{size:10,gap:6});}
  return doc.output('arraybuffer');}
function downloadBlob(fn,blob){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=fn;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),2000);}
async function exportEmployee(e){
  if(!e)return;
  toast('Building export…');
  let JSZip,jsPDF;
  try{
    const z=await import('https://esm.sh/jszip@3.10.1');JSZip=z.default||z;
    const j=await import('https://esm.sh/jspdf@2.5.1');jsPDF=j.jsPDF||(j.default&&j.default.jsPDF);
  }catch(err){toast('Could not load export libraries.',true);return;}
  if(!JSZip||!jsPDF){toast('Export libraries unavailable.',true);return;}
  try{
    const zip=new JSZip();
    zip.file('records.csv',buildCsv(e));
    e.entries.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach((x,i)=>
      zip.file('entries/'+(x.date||'undated')+'-'+slug(x.subject||('entry-'+(i+1)))+'.pdf',entryPdf(jsPDF,e,x)));
    e.pips.forEach((p,i)=>
      zip.file('pips/'+(p.start||'')+'-'+slug(p.title||('pip-'+(i+1)))+'.pdf',pipPdf(jsPDF,e,p)));
    dmgFor(e).forEach((r,i)=>
      zip.file('tech-damage/'+(r.date||'undated')+'-'+slug((r.part||'damage')+'-'+(r.ticket||(i+1)))+'.pdf',damagePdf(jsPDF,e,r)));
    const blob=await zip.generateAsync({type:'blob'});
    downloadBlob(slug(e.name)+'-records.zip',blob);
    toast('Export ready');
  }catch(err){toast('Export failed: '+(err&&err.message||err),true);}
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

$('#archBtn').addEventListener('click',()=>{S.showArchived=!S.showArchived;$('#archBtn').classList.toggle('on',S.showArchived);$('#archBtn').textContent=S.showArchived?'Hide archived':'Show archived';refilter();if(!EMPLOYEES.find(x=>x.id===S.empId))selectFirst();render();});
$('#addPersonBtn').addEventListener('click',()=>openPersonEditor(null));
$('#empList').addEventListener('click',e=>{
  const kb=e.target.closest('[data-editperson]');
  if(kb){const emp=ALL.find(x=>String(x.id)===String(kb.dataset.editperson));if(emp)openPersonEditor(emp);return;}
  const row=e.target.closest('[data-emp]');if(!row)return;
  const raw=row.dataset.emp,id=(raw!==''&&!isNaN(+raw))?+raw:raw;
  const emp=ALL.find(x=>String(x.id)===String(id));S.empId=emp?emp.id:id;syncSel(emp);S.mDetail=false;render();
  if(window.innerWidth<=620)$('#empPane').classList.remove('show');});
$('#tabbar').addEventListener('click',e=>{const b=e.target.closest('[data-tab]');if(!b)return;S.tab=b.dataset.tab;S.mDetail=false;render();});
$('#work').addEventListener('change',e=>{const f=e.target.closest('[data-f]');if(f){S[f.dataset.f]=f.value;render();}});
$('#work').addEventListener('click',e=>{
  if(e.target.closest('[data-ticket]'))return;            // let ticket links open
  const card=e.target.closest('[data-entry],[data-pip],[data-dmg]');
  if(card){if(card.dataset.entry!=null)S.entryId=card.dataset.entry;
    else if(card.dataset.pip!=null)S.pipId=card.dataset.pip;
    else S.damageId=card.dataset.dmg;
    if(window.innerWidth<=900)S.mDetail=true;render();return;}
  const act=e.target.closest('[data-act]');if(!act)return;
  if(act.dataset.act==='sort'){S.sortNewest=!S.sortNewest;render();return;}
  handleAct(act.dataset.act);
});
$('#profile').addEventListener('click',e=>{const a=e.target.closest('[data-act]');if(a)handleAct(a.dataset.act);});
