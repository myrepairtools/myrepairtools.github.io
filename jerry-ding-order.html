<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPR — Jerry Ding Order Form</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap');

  :root {
    --red:        #DC282E;
    --light-red:  #F15F5E;
    --dark:       #2D2D3B;
    --dark-grey:  #4E4E50;
    --blue:       #4FB0E3;
    --grey:       #B9BDCB;
    --light-grey: #F3F2F2;
    --white:      #FFFFFF;
    --border:     #E0E2EA;
    --text:       #4E4E50;
    --muted:      #B9BDCB;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--light-grey);
    color: var(--text);
    font-family: 'Nunito Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--white);
    border-bottom: 3px solid var(--red);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo-area { display: flex; align-items: center; gap: 14px; }

  /* SVG CPR icon inline */
  .cpr-logo-wrap svg {
    height: 36px;
    width: auto;
  }

  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .page-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--dark);
    letter-spacing: -0.2px;
  }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border-radius: 5px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 800;
    letter-spacing: 0.8px; text-transform: uppercase;
    cursor: pointer; border: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn-red { background: var(--red); color: var(--white); }
  .btn-blue { background: var(--blue); color: var(--white); }
  .btn-outline {
    background: transparent; color: var(--dark-grey);
    border: 1.5px solid var(--border);
    font-weight: 700;
  }
  .btn-outline:hover { border-color: var(--grey); }
  .btn-sm { padding: 6px 12px; font-size: 11px; }

  /* ── TABS ── */
  .tabs-wrapper { max-width: 860px; margin: 28px auto 0; padding: 0 16px; }

  .tab-nav {
    display: flex; gap: 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 20px;
  }

  .tab-btn {
    padding: 11px 22px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 800;
    letter-spacing: 0.8px; text-transform: uppercase;
    cursor: pointer; border: none;
    background: transparent; color: var(--muted);
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--dark-grey); }
  .tab-btn.active { color: var(--red); border-bottom-color: var(--red); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── SECTION STACK ── */
  .section-stack { display: flex; flex-direction: column; gap: 12px; }

  .section {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(45,45,59,0.06);
  }

  .section-header {
    padding: 13px 18px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .section-header:hover { background: #fafafa; }

  .section-header-left { display: flex; align-items: center; gap: 10px; }

  .section-header h2 {
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--dark-grey);
  }

  .count {
    font-family: 'Nunito', sans-serif;
    font-size: 11px; font-weight: 700;
    color: var(--red); background: rgba(220,40,46,0.08);
    padding: 2px 8px; border-radius: 20px;
    letter-spacing: 0.3px;
  }
  .count.zero { color: var(--muted); background: rgba(185,189,203,0.15); }

  .chevron {
    color: var(--grey); font-size: 11px;
    transition: transform 0.2s;
    font-style: normal;
  }
  .section.collapsed > .section-header .chevron { transform: rotate(-90deg); }
  .section.collapsed > .section-body { display: none; }

  /* ── TABLE ── */
  table { width: 100%; border-collapse: collapse; }

  thead th {
    padding: 8px 18px; text-align: left;
    font-family: 'Nunito', sans-serif;
    font-size: 10px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); border-bottom: 1px solid var(--border);
    background: #fafafa;
  }
  thead th.qty-th { text-align: right; width: 70px; }
  thead th.cost-th { text-align: right; width: 80px; }
  thead th.total-th { text-align: right; width: 80px; }

  tbody td.cost-cell { text-align: right; }
  tbody td.total-cell {
    text-align: right;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 12px;
    color: var(--dark-grey);
  }
  tbody td.total-cell.has-total { color: var(--red); }

  input[type="number"].cost-input {
    width: 70px; background: var(--light-grey);
    border: 1.5px solid var(--border); border-radius: 5px;
    color: var(--dark-grey);
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: 13px; padding: 5px 8px; text-align: right;
    -moz-appearance: textfield;
  }
  input[type="number"].cost-input::-webkit-inner-spin-button,
  input[type="number"].cost-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"].cost-input:focus { outline: none; border-color: var(--blue); }

  /* Section total bar */
  .section-total-bar {
    padding: 8px 18px;
    border-top: 1px solid var(--border);
    background: #fafafa;
    display: flex; justify-content: flex-end; align-items: center; gap: 8px;
    font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700;
    color: var(--muted);
  }
  .section-total-bar span { color: var(--red); font-weight: 800; }

  /* Grand total bar */
  .grand-total-bar {
    max-width: 860px; margin: 0 auto 20px; padding: 0 16px;
  }
  .grand-total-inner {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 20px;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 1px 3px rgba(45,45,59,0.06);
  }
  .grand-total-inner .gt-label {
    font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
  }
  .grand-total-inner .gt-sections {
    display: flex; gap: 24px; align-items: center;
  }
  .gt-section {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .gt-section-label {
    font-family: 'Nunito', sans-serif; font-size: 9px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted);
  }
  .gt-section-value {
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 900;
    color: var(--dark);
  }
  .gt-divider { color: var(--border); font-size: 20px; }
  .gt-grand {
    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
  }
  .gt-grand-label {
    font-family: 'Nunito', sans-serif; font-size: 9px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted);
  }
  .gt-grand-value {
    font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900;
    color: var(--red);
  }

  tbody tr {
    border-bottom: 1px solid rgba(224,226,234,0.6);
    transition: background 0.08s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(79,176,227,0.04); }

  tbody td {
    padding: 8px 18px; font-size: 13px; vertical-align: middle;
    color: var(--dark-grey);
  }
  tbody td.model-cell {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 13px; font-weight: 600;
  }
  tbody td.qty-cell { text-align: right; }
  .qty-cell-inner { display: flex; align-items: center; justify-content: flex-end; gap: 6px; }

  /* ── INPUTS ── */
  input[type="number"] {
    width: 60px; background: var(--light-grey);
    border: 1.5px solid var(--border); border-radius: 5px;
    color: var(--dark-grey);
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: 13px; padding: 5px 8px; text-align: center;
    transition: border-color 0.15s, background 0.15s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus {
    outline: none; border-color: var(--blue);
    background: rgba(79,176,227,0.06);
  }
  input[type="number"].has-value {
    border-color: var(--red); background: rgba(220,40,46,0.05);
    color: var(--red);
  }

  input[type="text"].inline-edit {
    background: transparent; border: none;
    color: var(--dark-grey);
    font-family: 'Nunito Sans', sans-serif; font-size: 13px; font-weight: 600;
    padding: 0; width: 100%;
  }
  input[type="text"].inline-edit:focus { outline: none; }

  input[type="text"].add-input {
    flex: 1; background: var(--light-grey);
    border: 1.5px solid var(--border); border-radius: 5px;
    color: var(--dark-grey);
    font-family: 'Nunito Sans', sans-serif; font-size: 12px; font-weight: 600;
    padding: 6px 10px; transition: border-color 0.15s;
  }
  input[type="text"].add-input:focus { outline: none; border-color: var(--blue); }

  /* ── ADD ROW BAR ── */
  .add-row-bar {
    padding: 10px 18px; border-top: 1px solid var(--border);
    background: #fafafa;
    display: flex; align-items: center; gap: 8px;
  }

  .delete-btn {
    background: transparent; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 13px; padding: 2px 5px;
    border-radius: 4px; transition: color 0.15s; line-height: 1;
  }
  .delete-btn:hover { color: var(--red); }

  /* ── SUBSECTIONS ── */
  .subsection-stack { display: flex; flex-direction: column; }

  .subsection { border-bottom: 1px solid var(--border); }
  .subsection:last-child { border-bottom: none; }

  .subsection-header {
    padding: 10px 18px 10px 30px;
    background: #fafafa;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
    transition: background 0.1s;
  }
  .subsection-header:hover { background: #f5f5f5; }

  .subsection-header-left { display: flex; align-items: center; gap: 10px; }

  .subsection-header h3 {
    font-family: 'Nunito', sans-serif;
    font-size: 11px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--blue);
  }

  .subsection.collapsed > .subsection-header .chevron { transform: rotate(-90deg); }
  .subsection.collapsed > .subsection-body { display: none; }

  .subsection-body table thead th { padding-left: 30px; }
  .subsection-body table tbody td { padding-left: 30px; }
  .subsection-body .add-row-bar { padding-left: 30px; }

  /* ── SIMPLE TAB SECTIONS ── */
  .single-section { max-width: 520px; }

  /* ── MODAL ── */
  .preview-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(45,45,59,0.55); z-index: 100;
    align-items: center; justify-content: center; padding: 24px;
  }
  .preview-modal.open { display: flex; }

  .modal-box {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 10px; width: 100%; max-width: 560px;
    max-height: 82vh; display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 8px 40px rgba(45,45,59,0.18);
  }

  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--light-grey);
  }
  .modal-header h3 {
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--dark-grey);
  }

  .modal-body { flex: 1; overflow-y: auto; padding: 18px; }

  #preview-text {
    background: var(--light-grey); border: 1px solid var(--border);
    border-radius: 6px; padding: 16px;
    font-family: 'Nunito Sans', monospace; font-size: 12.5px; font-weight: 600;
    line-height: 1.9; white-space: pre-wrap; color: var(--dark-grey);
    min-height: 180px;
  }

  .modal-footer {
    padding: 14px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
    background: var(--light-grey);
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--red); color: var(--white);
    padding: 11px 22px; border-radius: 5px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 800; letter-spacing: 0.8px;
    text-transform: uppercase;
    transition: transform 0.3s ease; z-index: 200;
    box-shadow: 0 4px 16px rgba(220,40,46,0.3);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── RED ACCENT LINE ── */
  .section { border-top: 3px solid transparent; }
  .section:focus-within { border-top-color: var(--red); }
</style>
</head>

  div.innerHTML = `
    <div class="section-header" onclick="toggleSection('sec-${id}')">
      <div class="section-header-left">
        <h2>${label}</h2>
        <span class="count zero" id="${countId}">0 items</span>
      </div>
      <i class="chevron">▾</i>
    </div>
    <div class="section-body">
      <table><thead><tr><th>Model</th><th class="qty-th">Qty</th><th class="cost-th">Unit Cost</th><th class="total-th">Total</th></tr></thead>
      <tbody id="body-${id}"></tbody></table>
      <div class="add-row-bar">
        <input type="text" class="add-input" id="new-${id}" placeholder="Add model..." />
        <button class="btn btn-outline btn-sm" onclick="addCustomRow('body-${id}','new-${id}','${countId}')">+ Add</button>
      </div>
    </div>`;
  return div;
}

function buildNestedSection(sec) {
  const stack = document.getElementById('sp-stack');
  const div = document.createElement('div');
  div.className = 'section collapsed';
  div.id = `sec-${sec.id}`;
  div.innerHTML = `
    <div class="section-header" onclick="toggleSection('sec-${sec.id}')">
      <div class="section-header-left">
        <h2>${sec.label}</h2>
        <span class="count zero" id="count-${sec.id}">0 items</span>
      </div>
      <i class="chevron">▾</i>
    </div>
    <div class="section-body">
      <div class="subsection-stack" id="subsections-${sec.id}"></div>
    </div>`;
  stack.appendChild(div);

  const subStack = div.querySelector(`#subsections-${sec.id}`);
  sec.subsections.forEach(sub => {
    const subDiv = document.createElement('div');
    subDiv.className = 'subsection collapsed';
    subDiv.id = `subsec-${sub.id}`;
    subDiv.innerHTML = `
      <div class="subsection-header" onclick="toggleSubsection('subsec-${sub.id}')">
        <div class="subsection-header-left">
          <h3>${sub.label}</h3>
          <span class="count zero" id="count-${sub.id}">0 items</span>
        </div>
        <i class="chevron">▾</i>
      </div>
      <div class="subsection-body">
        <table><thead><tr><th>Model</th><th class="qty-th">Qty</th><th class="cost-th">Unit Cost</th><th class="total-th">Total</th></tr></thead>
        <tbody id="body-${sub.id}"></tbody></table>
        <div class="add-row-bar">
          <input type="text" class="add-input" id="new-${sub.id}" placeholder="Add model..." />
          <button class="btn btn-outline btn-sm" onclick="addCustomRow('body-${sub.id}','new-${sub.id}','count-${sub.id}')">+ Add</button>
        </div>
      </div>`;
    subStack.appendChild(subDiv);
    sub.models.forEach(m => addPresetRow(`body-${sub.id}`, m, `count-${sub.id}`, 0.50));
    bindEnter(`new-${sub.id}`, `body-${sub.id}`, `count-${sub.id}`);
  });
}

function addPresetRow(tbodyId, label, countId, defaultCost = '') {
  const tbody = document.getElementById(tbodyId);
  const id = `qty-${rowId++}`;
  const cid = `cost-${rowId++}`;
  const tr = document.createElement('tr');
  tr.dataset.countId = countId;
  tr.innerHTML = `
    <td class="model-cell">${label}</td>
    <td class="qty-cell">
      <input type="number" id="${id}" min="0" placeholder="—" oninput="onQtyChange(this,'${countId}','${cid}','${tbodyId}')" />
    </td>
    <td class="cost-cell">
      <input type="number" class="cost-input" id="${cid}" min="0" step="0.01" placeholder="$0.00" value="${defaultCost}" oninput="onCostChange(this,'${id}','${tbodyId}')" />
    </td>
    <td class="total-cell" id="line-${id}">—</td>`;
  tbody.appendChild(tr);
}

function addCustomRow(tbodyId, inputId, countId) {
  const input = document.getElementById(inputId);
  const val = input.value.trim();
  if (!val) return;
  const tbody = document.getElementById(tbodyId);
  const id = `qty-${rowId++}`;
  const cid = `cost-${rowId++}`;
  const tr = document.createElement('tr');
  tr.dataset.countId = countId;
  tr.innerHTML = `
    <td class="model-cell"><input type="text" class="inline-edit" value="${val}" /></td>
    <td class="qty-cell">
      <div class="qty-cell-inner">
        <input type="number" id="${id}" min="0" placeholder="—" oninput="onQtyChange(this,'${countId}','${cid}','${tbodyId}')" />
        <button class="delete-btn" onclick="deleteRow(this,'${countId}','${tbodyId}')">✕</button>
      </div>
    </td>
    <td class="cost-cell">
      <input type="number" class="cost-input" id="${cid}" min="0" step="0.01" placeholder="$0.00" oninput="onCostChange(this,'${id}','${tbodyId}')" />
    </td>
    <td class="total-cell" id="line-${id}">—</td>`;
  tbody.appendChild(tr);
  input.value = '';
  input.focus();
}

function deleteRow(btn, countId, tbodyId) {
  btn.closest('tr').remove();
  updateCount(countId);
  updateMotoCount();
  updateTotals(tbodyId);
  updateGrandTotal();
}

function onQtyChange(input, countId, costId, tbodyId) {
  const val = parseInt(input.value);
  if (val > 0) { input.classList.add('has-value'); }
  else { input.classList.remove('has-value'); input.value = ''; }
  updateCount(countId);
  updateMotoCount();
  updateLineTotal(input.id, costId);
  updateTotals(tbodyId);
  updateGrandTotal();
}

function onCostChange(costInput, qtyId, tbodyId) {
  updateLineTotal(qtyId, costInput.id);
  updateTotals(tbodyId);
  updateGrandTotal();
}

function updateLineTotal(qtyId, costId) {
  const qty = parseFloat(document.getElementById(qtyId)?.value) || 0;
  const cost = parseFloat(document.getElementById(costId)?.value) || 0;
  const lineEl = document.getElementById(`line-${qtyId}`);
  if (!lineEl) return;
  if (qty > 0 && cost > 0) {
    lineEl.textContent = '$' + (qty * cost).toFixed(2);
    lineEl.classList.add('has-total');
  } else {
    lineEl.textContent = '—';
    lineEl.classList.remove('has-total');
  }
}

function getTabForBody(tbodyId) {
  if (['tools-body'].includes(tbodyId)) return 'gt-tools';
  if (['supplies-body'].includes(tbodyId)) return 'gt-supplies';
  return 'gt-sp';
}

function updateTotals(tbodyId) {
  if (!tbodyId) return;
  // Find all tbodies that map to the same tab
  let bodies = [tbodyId];
  // If it's an SP body, collect all SP bodies
  const spBodyIds = [];
  spConfig.forEach(sec => {
    if (sec.type === 'simple') spBodyIds.push(`body-${sec.id}`);
    else if (sec.type === 'nested') sec.subsections.forEach(sub => spBodyIds.push(`body-${sub.id}`));
  });
  
  let total = 0;
  if (spBodyIds.includes(tbodyId)) {
    spBodyIds.forEach(bid => {
      document.querySelectorAll(`#${bid} tr`).forEach(row => {
        const qtyInp = row.querySelector('input[type="number"]:not(.cost-input)');
        const costInp = row.querySelector('input.cost-input');
        const qty = parseFloat(qtyInp?.value) || 0;
        const cost = parseFloat(costInp?.value) || 0;
        total += qty * cost;
      });
    });
    const el = document.getElementById('gt-sp');
    if (el) el.textContent = '$' + total.toFixed(2);
  } else {
    document.querySelectorAll(`#${tbodyId} tr`).forEach(row => {
      const qtyInp = row.querySelector('input[type="number"]:not(.cost-input)');
      const costInp = row.querySelector('input.cost-input');
      const qty = parseFloat(qtyInp?.value) || 0;
      const cost = parseFloat(costInp?.value) || 0;
      total += qty * cost;
    });
    const gtId = tbodyId === 'tools-body' ? 'gt-tools' : 'gt-supplies';
    const el = document.getElementById(gtId);
    if (el) el.textContent = '$' + total.toFixed(2);
  }
}

function updateGrandTotal() {
  const sp = parseFloat(document.getElementById('gt-sp')?.textContent.replace('$','')) || 0;
  const tools = parseFloat(document.getElementById('gt-tools')?.textContent.replace('$','')) || 0;
  const supplies = parseFloat(document.getElementById('gt-supplies')?.textContent.replace('$','')) || 0;
  const el = document.getElementById('gt-grand');
  if (el) el.textContent = '$' + (sp + tools + supplies).toFixed(2);
}

function bindEnter(inputId, tbodyId, countId) {
  setTimeout(() => {
    const inp = document.getElementById(inputId);
    if (inp) inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') addCustomRow(tbodyId, inputId, countId);
    });
  }, 0);
}

function updateCount(countId) {
  const rows = document.querySelectorAll(`tr[data-count-id="${countId}"]`);
  let count = 0;
  rows.forEach(row => {
    const inp = row.querySelector('input[type="number"]');
    if (inp && parseInt(inp.value) > 0) count++;
  });
  const el = document.getElementById(countId);
  if (el) {
    el.textContent = `${count} item${count !== 1 ? 's' : ''}`;
    el.classList.toggle('zero', count === 0);
  }
}

function updateMotoCount() {
  const motoConfig = spConfig.find(s => s.id === 'motorola');
  if (!motoConfig) return;
  let total = 0;
  motoConfig.subsections.forEach(sub => {
    const rows = document.querySelectorAll(`tr[data-count-id="count-${sub.id}"]`);
    rows.forEach(row => {
      const inp = row.querySelector('input[type="number"]');
      if (inp && parseInt(inp.value) > 0) total++;
    });
  });
  const el = document.getElementById('count-motorola');
  if (el) {
    el.textContent = `${total} item${total !== 1 ? 's' : ''}`;
    el.classList.toggle('zero', total === 0);
  }
}

function toggleSection(id) { document.getElementById(id).classList.toggle('collapsed'); }
function toggleSubsection(id) { document.getElementById(id).classList.toggle('collapsed'); }

function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).classList.add('active');
  btn.classList.add('active');
}

function clearAll() {
  document.querySelectorAll('input[type="number"]').forEach(inp => {
    inp.value = ''; inp.classList.remove('has-value');
  });
  document.querySelectorAll('.count').forEach(el => {
    el.textContent = '0 items'; el.classList.add('zero');
  });
  document.querySelectorAll('.total-cell').forEach(el => {
    el.textContent = '—'; el.classList.remove('has-total');
  });
  ['gt-sp','gt-tools','gt-supplies','gt-grand'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = '$0.00';
  });
}

function getRowLabel(row) {
  const inp = row.cells[0].querySelector('input[type="text"]');
  return inp ? inp.value.trim() : row.cells[0].textContent.trim();
}

function buildPreviewText() {
  const today = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  let lines = [`Jerry Ding Order — ${today}`, ''];
  let grandTotal = 0; let hasAny = false;

  let spBlock = [];
  spConfig.forEach(sec => {
    if (sec.type === 'simple') {
      let secLines = [];
      document.querySelectorAll(`#body-${sec.id} tr`).forEach(row => {
        const inp = row.querySelector('input[type="number"]');
        const qty = parseInt(inp?.value);
        if (qty > 0) { secLines.push(`  ${getRowLabel(row)}  x${qty}`); grandTotal += qty; }
      });
      if (secLines.length) { spBlock.push(`[ ${sec.label} ]`); spBlock = spBlock.concat(secLines); spBlock.push(''); }
    } else if (sec.type === 'nested') {
      let motoLines = [];
      sec.subsections.forEach(sub => {
        let subLines = [];
        document.querySelectorAll(`#body-${sub.id} tr`).forEach(row => {
          const inp = row.querySelector('input[type="number"]');
          const qty = parseInt(inp?.value);
          if (qty > 0) { subLines.push(`    ${getRowLabel(row)}  x${qty}`); grandTotal += qty; }
        });
        if (subLines.length) { motoLines.push(`  [ ${sub.label} ]`); motoLines = motoLines.concat(subLines); }
      });
      if (motoLines.length) { spBlock.push('[ Motorola ]'); spBlock = spBlock.concat(motoLines); spBlock.push(''); }
    }
  });
  if (spBlock.length) { lines.push('── SCREEN PROTECTORS ──'); lines = lines.concat(spBlock); hasAny = true; }

  let toolLines = [];
  document.querySelectorAll('#tools-body tr').forEach(row => {
    const inp = row.querySelector('input[type="number"]');
    const qty = parseInt(inp?.value);
    if (qty > 0) { toolLines.push(`  ${getRowLabel(row)}  x${qty}`); grandTotal += qty; }
  });
  if (toolLines.length) { lines.push('── TOOLS ──'); lines = lines.concat(toolLines); lines.push(''); hasAny = true; }

  let supLines = [];
  document.querySelectorAll('#supplies-body tr').forEach(row => {
    const inp = row.querySelector('input[type="number"]');
    const qty = parseInt(inp?.value);
    if (qty > 0) { supLines.push(`  ${getRowLabel(row)}  x${qty}`); grandTotal += qty; }
  });
  if (supLines.length) { lines.push('── SUPPLIES ──'); lines = lines.concat(supLines); lines.push(''); hasAny = true; }

  if (!hasAny) return 'No quantities entered yet.';
  lines.push(`Total units: ${grandTotal}`);
  return lines.join('\n');
}

function openPreview() {
  document.getElementById('preview-text').textContent = buildPreviewText();
  document.getElementById('preview-modal').classList.add('open');
}
function closePreview() { document.getElementById('preview-modal').classList.remove('open'); }
function copyText() {
  navigator.clipboard.writeText(document.getElementById('preview-text').textContent).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  });
}

document.getElementById('preview-modal').addEventListener('click', function(e) {
  if (e.target === this) closePreview();
});

['tools-new','supplies-new'].forEach(id => {
  const inp = document.getElementById(id);
  if (!inp) return;
  const base = id.replace('-new','');
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') addCustomRow(`${base}-body`, id, `count-${base}`);
  });
});

document.addEventListener('DOMContentLoaded', function() {
  buildSPStack();
  toolsPreset.forEach(([label, cost]) => addPresetRow('tools-body', label, 'count-tools', cost));
  suppliesPreset.forEach(([label, cost]) => addPresetRow('supplies-body', label, 'count-supplies', cost));
});
</script>
</body>
