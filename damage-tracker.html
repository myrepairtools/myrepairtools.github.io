<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Damage Tracker — CPR</title>
<link rel="icon" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--red:#DC282E;--light-red:#E8474C;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--border:#E0E2EA;--green:#2E9E5B;--amber:#C9820B}
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;background:var(--light-grey);font-family:'Nunito Sans',sans-serif;color:var(--dark);min-height:100vh}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#D2D5DF;border-radius:6px}::-webkit-scrollbar-track{background:transparent}
  .content{padding:24px 30px 80px;max-width:1280px;width:100%}
  h1{font-family:'Nunito';font-weight:900;font-size:1.6rem;letter-spacing:-.5px;margin:0 0 3px}
  .seg{display:flex;background:var(--dark);border-radius:10px;padding:3px}
  .seg button{font-family:'Nunito';font-weight:800;font-size:.8rem;border:none;border-radius:7px;padding:8px 16px;cursor:pointer;color:#9AA0AE;background:transparent}
  .seg button.on{background:#fff;color:var(--dark)}
  .newbtn{font-family:'Nunito';font-weight:800;font-size:.82rem;border:none;border-radius:9px;padding:10px 18px;cursor:pointer;background:var(--red);color:#fff;white-space:nowrap}
  .newbtn:hover{background:var(--light-red)}
  .pill{font-family:'Nunito';font-weight:800;font-size:.74rem;text-transform:uppercase;letter-spacing:.4px;border:1.5px solid var(--border);border-radius:999px;padding:7px 14px;cursor:pointer;background:#fff;color:var(--dark-grey)}
  .pill.on{background:var(--blue);color:#fff;border-color:var(--blue)}
  .lbl{font-family:'Nunito';font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.6px;color:var(--grey)}
  .card{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 1px 3px rgba(45,45,59,.05)}
  .statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
  .breakdowns{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;align-items:start}
  .bignum{font-family:'Nunito';font-weight:900;font-size:1.9rem;line-height:1}
  .statcap{font-family:'Nunito';font-weight:800;font-size:.64rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey);margin-top:6px}
  .brow{cursor:pointer;border-radius:8px;padding:5px 6px;margin:0 -6px 6px}
  .brow:hover{background:#F6FAFD}
  .chip{display:inline-flex;align-items:center;gap:6px;font-family:'Nunito';font-weight:700;font-size:.74rem;padding:4px 6px 4px 11px;border-radius:20px;border:1px solid #CDEAF8;background:#EAF6FD;color:#1E7AA8}
  .chip button{background:none;border:none;cursor:pointer;color:#1E7AA8;font-weight:900;font-size:.95rem;line-height:1;padding:0 2px}
  .field{display:block}
  .field>span{display:block;font-family:'Nunito';font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.4px;color:var(--dark-grey);margin-bottom:5px}
  .in{width:100%;font-family:'Nunito Sans';font-size:.9rem;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;background:#fff}
  .ro{background:#F7F8FA;color:var(--dark-grey);font-weight:700;font-family:'Nunito'}
  .mbtn{font-family:'Nunito';font-weight:800;font-size:.86rem;border:none;border-radius:10px;padding:13px;cursor:pointer}
  .scrim{position:fixed;inset:0;background:rgba(45,45,59,.5);z-index:90}
  .modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:560px;max-width:94vw;max-height:90vh;overflow-y:auto;background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(45,45,59,.32);z-index:91;padding:22px 22px 24px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--dark);color:#fff;font-family:'Nunito';font-weight:800;font-size:.82rem;padding:11px 18px;border-radius:10px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .toast.err{background:var(--red)}
  .fab{display:none}
  @media(max-width:820px){
    .content{padding:14px 14px 96px}
    .statgrid{grid-template-columns:1fr 1fr}
    .breakdowns{grid-template-columns:1fr}
    .newbtn{display:none}
    .fab{display:block}
    .toprow{flex-wrap:wrap}
  }
  @media(max-width:480px){ .statgrid{grid-template-columns:1fr} }
</style>
</head>
<body>
<div id="root" class="content"><div style="color:var(--grey);font-weight:700;padding:40px 4px">Loading…</div></div>

<button class="fab" data-act="new" style="position:fixed;left:16px;right:16px;bottom:16px;z-index:40;font-family:'Nunito';font-weight:800;font-size:1rem;border:none;border-radius:12px;padding:15px;background:var(--red);color:#fff;cursor:pointer;box-shadow:0 6px 18px rgba(220,40,46,.32)">+ New Report</button>

<div id="modalHost"></div>
<div id="toast" class="toast"></div>

<script src="assets/pin-gate.js"></script>
<script src="assets/nav.js"></script>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SB_URL="https://xuvsehrevxackuhmbmry.supabase.co";
const ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY";
const sb=createClient(SB_URL,ANON);
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const STORECOLOR={'Eugene':'#23A62F','Salem Northeast':'#DE262E','Clackamas':'#4FB0E3'};
const PALETTE=['#4FB0E3','#DC282E','#23A62F','#C9820B','#5B54C9','#2D7D8A','#DE7AB0','#8A8F9C'];
const stripStore=s=>String(s||'').replace(/^CPR\s+/,'');

let ME=null, REPORTS=[], MFRS=[], PARTS=[], STORES=[];
let S={tab:'dash',range:'30',filter:{store:null,mfr:null,tech:null},seriesDim:'store',modal:false};

const money=n=>'$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmt=iso=>{const p=String(iso).split('-');return MONTHS[(+p[1])-1]+' '+(+p[2])+', '+p[0];};
const dimVal=(r,d)=>d==='store'?r.store:d==='mfr'?r.mfr:r.tech;

function inRange(iso){
  const R=S.range; if(R==='all')return true;
  const d=new Date(iso+'T00:00:00'), now=new Date(); now.setHours(0,0,0,0);
  if(R==='30'){const c=new Date(now);c.setDate(c.getDate()-29);return d>=c;}
  if(R==='mtd')return d>=new Date(now.getFullYear(),now.getMonth(),1);
  if(R==='lm'){const s=new Date(now.getFullYear(),now.getMonth()-1,1),e=new Date(now.getFullYear(),now.getMonth(),0);return d>=s&&d<=e;}
  if(R==='ytd')return d>=new Date(now.getFullYear(),0,1);
  return true;
}
function passesExcept(r,skip){const f=S.filter;for(const d of ['store','mfr','tech']){if(d!==skip&&f[d]&&dimVal(r,d)!==f[d])return false;}return true;}
const passes=r=>passesExcept(r,null);
function setF(dim,val){S.filter[dim]=S.filter[dim]===val?null:val;render();}

async function sessionToken(){
  try{const s=(await sb.auth.getSession()).data.session;if(s&&s.access_token)return s;}catch(e){}
  return null;
}
async function loadMe(){
  const s=await sessionToken();
  if(!s)return null;
  const r=await sb.from('staff').select('id,display_name,home_store,authorized_stores,role').eq('auth_uid',s.user.id).maybeSingle();
  return r.data||null;
}
async function load(){
  ME=await loadMe();
  const [rep,mf,pt,st]=await Promise.all([
    sb.from('damage_reports').select('report_date,tech_id,tech_name,store,manufacturer,part,device,cost_cents,ticket,how').order('report_date',{ascending:false}),
    sb.from('damage_manufacturers').select('name').eq('active',true).order('sort'),
    sb.from('damage_parts').select('name').eq('active',true).order('sort'),
    sb.from('stores').select('store,display_order,active').eq('active',true).order('display_order'),
  ]);
  REPORTS=(rep.data||[]).map(r=>({
    date:r.report_date, store:stripStore(r.store), storeFull:r.store, tech:r.tech_name||'—', tech_id:r.tech_id,
    mfr:r.manufacturer||'—', part:r.part||'', device:r.device||'', cost:(r.cost_cents||0)/100,
    ticket:r.ticket||'', how:r.how||''
  }));
  MFRS=(mf.data||[]).map(x=>x.name);
  PARTS=(pt.data||[]).map(x=>x.name);
  STORES=(st.data||[]).map(x=>x.store);
}

/* ---------- compute (ported from design renderVals) ---------- */
function compute(){
  const inRangeAll=REPORTS.filter(r=>inRange(r.date));
  const scoped=inRangeAll.filter(passes);
  const total=scoped.reduce((s,r)=>s+r.cost,0);
  const anyFilter=S.filter.store||S.filter.mfr||S.filter.tech;
  const rangeLabel={'30':'last 30 days',mtd:'month-to-date',lm:'last month',ytd:'year-to-date',all:'all time'}[S.range];

  const mkBreakdown=(dim,title,colorFn)=>{
    const base=inRangeAll.filter(r=>passesExcept(r,dim));
    const m={}; base.forEach(r=>{const k=dimVal(r,dim);m[k]=(m[k]||0)+r.cost;});
    const arr=Object.keys(m).map(k=>({k,v:m[k]})).sort((a,b)=>b.v-a.v);
    const max=arr.length?arr[0].v:0;
    return {title,empty:arr.length===0,rows:arr.slice(0,6).map(r=>({
      label:r.k,amount:money(r.v),width:(max>0?Math.max(4,Math.round(r.v/max*100)):0)+'%',
      color:colorFn(r.k),on:S.filter[dim]===r.k,dim,val:r.k}))};
  };
  const breakdowns=[
    mkBreakdown('store','By store',k=>STORECOLOR[k]||'#B9BDCB'),
    mkBreakdown('mfr','By manufacturer',()=>'#2D2D3B'),
    mkBreakdown('tech','By tech',()=>'#4FB0E3'),
  ];
  const reports=scoped.slice().sort((a,b)=>b.date.localeCompare(a.date));

  // trends
  const now=new Date(); now.setHours(0,0,0,0);
  const months=[];
  for(let i=11;i>=0;i--){const x=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({key:x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0'),label:MONTHS[x.getMonth()],y:x.getFullYear()});}
  const dim=S.seriesDim;
  const trendRows=REPORTS.filter(passes);
  const groups={};
  trendRows.forEach(r=>{const ym=r.date.slice(0,7);if(!months.some(mo=>mo.key===ym))return;const k=dimVal(r,dim);(groups[k]=groups[k]||{})[ym]=(groups[k][ym]||0)+r.cost;});
  const keys=Object.keys(groups).sort((a,b)=>{const sa=months.reduce((s,mo)=>s+(groups[a][mo.key]||0),0),sb2=months.reduce((s,mo)=>s+(groups[b][mo.key]||0),0);return sb2-sa;});
  const seriesData=keys.map((k,i)=>({key:k,label:k,color:dim==='store'?(STORECOLOR[k]||'#B9BDCB'):PALETTE[i%PALETTE.length],d:months.map(mo=>groups[k][mo.key]||0)}));
  const totals=months.map((mo,i)=>seriesData.reduce((s,se)=>s+se.d[i],0));
  let max=0; seriesData.forEach(se=>se.d.forEach(v=>{if(v>max)max=v;})); totals.forEach(v=>{if(v>max)max=v;});
  const top=Math.max(50,Math.ceil(max/50)*50);
  const W=720,pl=46,pr=16,pt=16,pb=34,ih=260-pt-pb,iw=W-pl-pr;
  const X=i=>pl+iw*(i/11), Y=v=>pt+ih-ih*(v/top);
  const ptsOf=arr=>arr.map((v,i)=>X(i).toFixed(1)+','+Y(v).toFixed(1)).join(' ');
  const gridlines=[]; for(let g=0;g<=4;g++){const gv=Math.round(top*g/4),gy=Y(gv);gridlines.push({y:gy.toFixed(1),ty:(gy+3).toFixed(1),label:'$'+gv});}
  const chart={gridlines,xlabels:months.map((mo,i)=>({x:X(i).toFixed(1),label:mo.label})),totalPoints:ptsOf(totals),
    series:seriesData.map(se=>({color:se.color,points:ptsOf(se.d),dots:se.d.map((v,i)=>({cx:X(i).toFixed(1),cy:Y(v).toFixed(1)}))})),
    legend:seriesData.map(se=>({label:se.label,color:se.color}))};
  const monthTable=months.map((mo,i)=>({label:mo.label+" '"+String(mo.y).slice(-2),amount:money(totals[i]),count:trendRows.filter(r=>r.date.slice(0,7)===mo.key).length}));

  return {scoped,total,anyFilter,rangeLabel,breakdowns,reports,seriesData,chart,monthTable,
    summary:{total:money(total),count:scoped.length,avg:scoped.length?money(total/scoped.length):'$0.00',scopeLbl:anyFilter?'· filtered':'· '+rangeLabel}};
}

/* ---------- render ---------- */
const RANGES=[['30','Last 30 days'],['mtd','MTD'],['lm','Last month'],['ytd','YTD'],['all','All']];
const SERIES=[['store','By store'],['mfr','By manufacturer'],['tech','By tech']];

function render(){
  const c=compute();
  const tabBtn=(id,label)=>`<button data-act="tab" data-tab="${id}" class="${S.tab===id?'on':''}">${label}</button>`;
  let html=`
  <div class="toprow" style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px">
    <div style="min-width:0">
      <h1>Tech Damage Tracker</h1>
      <p style="color:var(--grey);margin:0;font-size:.84rem;font-weight:600">Parts damaged during repairs · logged by store · tap a stat to filter.</p>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex:none">
      <div class="seg">${tabBtn('dash','Dashboard')}${tabBtn('trends','Trends')}</div>
      <button class="newbtn" data-act="new">+ New Report</button>
    </div>
  </div>`;

  if(S.tab==='dash'){
    html+=`<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:16px">
      <span class="lbl" style="margin-right:3px">Range</span>
      ${RANGES.map(([id,l])=>`<button class="pill ${S.range===id?'on':''}" data-act="range" data-range="${id}">${l}</button>`).join('')}
    </div>`;
    if(c.anyFilter){
      const chips=[];
      ['store','mfr','tech'].forEach(d=>{if(S.filter[d])chips.push(`<span class="chip">${esc(S.filter[d])}<button data-act="unfilter" data-dim="${d}">×</button></span>`);});
      html+=`<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:16px">
        <span class="lbl">Filtered by</span>${chips.join('')}
        <button data-act="clearfilters" style="font-family:'Nunito';font-weight:800;font-size:.68rem;color:var(--dark-grey);background:none;border:none;cursor:pointer;text-decoration:underline">Clear all</button>
      </div>`;
    }
    html+=`<div class="statgrid">
      <div class="card" style="border-top:3px solid var(--red);padding:16px 18px"><div class="bignum" style="color:var(--red)">${c.summary.total}</div><div class="statcap">Damage $ <span style="color:var(--grey)">${c.summary.scopeLbl}</span></div></div>
      <div class="card" style="border-left:4px solid var(--blue);padding:16px 18px"><div class="bignum">${c.summary.count}</div><div class="statcap">Reports</div></div>
      <div class="card" style="border-left:4px solid var(--dark);padding:16px 18px"><div class="bignum">${c.summary.avg}</div><div class="statcap">Avg / report</div></div>
    </div>`;
    html+=`<div class="breakdowns">${c.breakdowns.map(b=>`
      <div class="card" style="padding:15px 16px">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:11px"><span style="font-family:'Nunito';font-weight:900;font-size:.82rem">${b.title}</span><span style="font-family:'Nunito';font-weight:700;font-size:.62rem;color:var(--grey)">tap to filter</span></div>
        ${b.empty?`<div style="color:var(--grey);font-size:.8rem;font-weight:700;padding:6px">No data in range.</div>`:b.rows.map(r=>`
          <div class="brow" data-act="filter" data-dim="${r.dim}" data-val="${esc(r.val)}" style="background:${r.on?'#EAF6FD':'transparent'}">
            <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px"><span style="font-size:.82rem;font-weight:700">${esc(r.label)}</span><span style="font-family:'Nunito';font-weight:900;font-size:.82rem;white-space:nowrap">${r.amount}</span></div>
            <div style="height:7px;background:var(--light-grey);border-radius:4px;margin-top:4px;overflow:hidden"><div style="height:7px;border-radius:4px;width:${r.width};background:${r.color}"></div></div>
          </div>`).join('')}
      </div>`).join('')}</div>`;
    html+=`<div style="display:flex;align-items:baseline;justify-content:space-between;margin:0 2px 10px"><h2 style="font-family:'Nunito';font-weight:900;font-size:1.05rem;margin:0">Reports</h2><span style="font-size:.76rem;color:var(--grey);font-weight:700">${c.summary.count} shown</span></div>`;
    html+=`<div class="card" style="overflow:hidden">${c.reports.length?c.reports.map(r=>{
      const stripe=STORECOLOR[r.store]||'#B9BDCB';
      return `<div style="display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;padding:14px 16px;border-bottom:1px solid var(--light-grey);border-left:4px solid ${stripe}">
        <div style="flex:1;min-width:200px">
          <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap">
            <span style="font-family:'Nunito';font-weight:900;font-size:1rem">${esc(r.tech)}</span>
            <span style="display:inline-flex;align-items:center;gap:5px;font-family:'Nunito';font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.3px;color:var(--dark-grey)"><span style="width:7px;height:7px;border-radius:50%;background:${stripe}"></span>${esc(r.store)}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:5px">
            <span style="font-family:'Nunito';font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.4px;padding:2px 8px;border-radius:999px;background:var(--light-grey);color:var(--dark-grey)">${esc(r.mfr)}</span>
            <span style="font-size:.84rem;font-weight:700">${esc(r.part)}</span>
            ${r.device?`<span style="color:var(--grey)">·</span><span style="font-size:.8rem;color:var(--dark-grey)">${esc(r.device)}</span>`:''}
          </div>
          ${r.how?`<div style="font-size:.82rem;color:var(--dark-grey);margin-top:6px;line-height:1.5">${esc(r.how)}</div>`:''}
        </div>
        <div style="text-align:right;flex:none;min-width:120px">
          <div style="font-family:'Nunito';font-weight:900;font-size:1.15rem;color:var(--red)">${money(r.cost)}</div>
          <div style="font-size:.7rem;color:var(--grey);font-weight:700;margin-top:4px">${fmt(r.date)}</div>
          ${r.ticket?`<a href="https://cpr.repairq.io/ticket/${encodeURIComponent(r.ticket)}" target="_blank" rel="noopener" style="display:inline-block;font-family:'Nunito';font-weight:800;font-size:.72rem;color:var(--blue);text-decoration:none;margin-top:2px">#${esc(r.ticket)} ↗</a>`:''}
        </div>
      </div>`;}).join(''):`<div style="padding:34px;text-align:center;color:var(--grey);font-weight:700">No reports match these filters.</div>`}</div>`;
  } else {
    const seriesNoun=S.seriesDim==='store'?'store':S.seriesDim==='mfr'?'manufacturer':'tech';
    html+=`<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:16px"><span class="lbl" style="margin-right:3px">Series</span>
      ${SERIES.map(([id,l])=>`<button class="pill ${S.seriesDim===id?'on':''}" data-act="series" data-series="${id}">${l}</button>`).join('')}</div>`;
    html+=`<div class="card" style="border-top:3px solid var(--red);padding:18px;margin-bottom:14px">
      <h3 style="font-family:'Nunito';font-weight:900;font-size:.92rem;margin:0 0 2px">Damage $ — rolling 12 months</h3>
      <p style="color:var(--grey);font-size:.76rem;font-weight:700;margin:0 0 12px">Total dashed; each ${seriesNoun} a colored line.</p>
      <div style="overflow-x:auto"><svg viewBox="0 0 720 260" style="min-width:640px;width:100%;height:auto;display:block">
        ${c.chart.gridlines.map(g=>`<line x1="46" y1="${g.y}" x2="704" y2="${g.y}" stroke="#EEEEF1"></line>`).join('')}
        ${c.chart.gridlines.map(g=>`<text x="40" y="${g.ty}" font-size="10" fill="#B9BDCB" text-anchor="end" font-family="Nunito" font-weight="700">${g.label}</text>`).join('')}
        ${c.chart.xlabels.map(x=>`<text x="${x.x}" y="250" font-size="10" fill="#B9BDCB" text-anchor="middle" font-family="Nunito" font-weight="700">${x.label}</text>`).join('')}
        <polyline points="${c.chart.totalPoints}" fill="none" stroke="#2D2D3B" stroke-width="2.2" stroke-dasharray="5 4" stroke-linejoin="round" stroke-linecap="round"></polyline>
        ${c.chart.series.map(s=>`<polyline points="${s.points}" fill="none" stroke="${s.color}" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"></polyline>${s.dots.map(d=>`<circle cx="${d.cx}" cy="${d.cy}" r="2.8" fill="${s.color}"></circle>`).join('')}`).join('')}
      </svg></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px">
        ${c.chart.legend.map(l=>`<span style="display:inline-flex;align-items:center;gap:6px;font-family:'Nunito';font-weight:800;font-size:.72rem;border:1.5px solid var(--border);border-radius:999px;padding:5px 11px"><span style="width:11px;height:11px;border-radius:3px;background:${l.color}"></span>${esc(l.label)}</span>`).join('')}
        <span style="display:inline-flex;align-items:center;gap:6px;font-family:'Nunito';font-weight:800;font-size:.72rem;border:1.5px solid var(--border);border-radius:999px;padding:5px 11px"><span style="width:11px;height:3px;border-radius:2px;background:#2D2D3B"></span>Total</span>
      </div>
    </div>`;
    html+=`<div class="card" style="padding:18px"><h3 style="font-family:'Nunito';font-weight:900;font-size:.92rem;margin:0 0 10px">Month by month</h3>
      <table style="width:100%;border-collapse:collapse;font-size:.84rem"><thead><tr>
        <th style="text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)" class="lbl">Month</th>
        <th style="text-align:right;padding:8px 10px;border-bottom:1px solid var(--border)" class="lbl">Damage $</th>
        <th style="text-align:right;padding:8px 10px;border-bottom:1px solid var(--border)" class="lbl">Reports</th>
      </tr></thead><tbody>
        ${c.monthTable.map(m=>`<tr><td style="padding:8px 10px;border-bottom:1px solid var(--light-grey);font-weight:700">${m.label}</td><td style="padding:8px 10px;border-bottom:1px solid var(--light-grey);text-align:right;font-family:'Nunito';font-weight:800">${m.amount}</td><td style="padding:8px 10px;border-bottom:1px solid var(--light-grey);text-align:right;font-family:'Nunito';font-weight:800;color:var(--dark-grey)">${m.count}</td></tr>`).join('')}
      </tbody></table></div>`;
  }
  $('#root').innerHTML=html;
  renderModal();
}

function renderModal(){
  const host=$('#modalHost');
  if(!S.modal){host.innerHTML='';return;}
  const today=new Date(); const iso=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  const techName=ME?ME.display_name:'—';
  const homeFull=ME?ME.home_store:'';
  const storeOpts=STORES.map(s=>`<option value="${esc(s)}"${s===homeFull?' selected':''}>${esc(stripStore(s))}</option>`).join('');
  const mfrOpts='<option value="">Select…</option>'+MFRS.map(m=>`<option>${esc(m)}</option>`).join('');
  const partOpts='<option value="">Select…</option>'+PARTS.map(p=>`<option>${esc(p)}</option>`).join('');
  host.innerHTML=`
  <div class="scrim" data-act="close"></div>
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2 style="font-family:'Nunito';font-weight:900;font-size:1.2rem;margin:0">New damage report</h2><button data-act="close" style="background:none;border:none;font-size:1.5rem;color:var(--grey);font-weight:800;cursor:pointer;line-height:1">×</button></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px">
      <label class="field"><span>Date</span><input id="m_date" type="date" class="in" value="${iso}"></label>
      <label class="field"><span>Reporting as</span><input class="in ro" value="${esc(techName)}" readonly></label>
      <label class="field"><span>Store</span><select id="m_store" class="in">${storeOpts}</select></label>
      <label class="field"><span>Ticket #</span><input id="m_ticket" class="in" placeholder="e.g. 16035523"></label>
      <label class="field"><span>Manufacturer</span><select id="m_mfr" class="in">${mfrOpts}</select></label>
      <label class="field"><span>Part</span><select id="m_part" class="in">${partOpts}</select></label>
      <label class="field"><span>Device</span><input id="m_device" class="in" placeholder="e.g. iPhone 14 Pro"></label>
      <label class="field"><span>Part cost</span><input id="m_cost" class="in" inputmode="decimal" placeholder="$0.00"></label>
    </div>
    <label class="field" style="margin-top:13px"><span>How it happened</span><textarea id="m_how" rows="3" class="in" placeholder="What went wrong, in your own words…" style="resize:vertical"></textarea></label>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="mbtn" data-act="submit" style="flex:1;background:var(--red);color:#fff">Submit report</button>
      <button class="mbtn" data-act="close" style="border:1.5px solid var(--border);background:#fff;color:var(--dark-grey)">Cancel</button>
    </div>
  </div>`;
}

function toast(msg,err){const t=$('#toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2200);}

async function submitReport(btn){
  if(!ME){toast('Not signed in',true);return;}
  const v=id=>{const el=$('#'+id);return el?el.value.trim():'';};
  const date=v('m_date'), store=v('m_store'), mfr=v('m_mfr'), part=v('m_part'), device=v('m_device'), ticket=v('m_ticket'), how=v('m_how');
  const costNum=parseFloat(v('m_cost').replace(/[$,]/g,''))||0;
  if(!date){toast('Pick a date',true);return;}
  if(!mfr){toast('Pick a manufacturer',true);return;}
  if(btn)btn.disabled=true;
  const {error}=await sb.from('damage_reports').insert({
    report_date:date, tech_id:ME.id, tech_name:ME.display_name, store, manufacturer:mfr,
    part:part||null, device:device||null, cost_cents:Math.round(costNum*100), ticket:ticket||null, how:how||null
  });
  if(error){toast(error.message||'Could not save',true);if(btn)btn.disabled=false;return;}
  S.modal=false; toast('Report logged'); await load(); render();
}

/* ---------- events ---------- */
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]'); if(!el)return;
  const act=el.getAttribute('data-act');
  if(act==='tab'){S.tab=el.getAttribute('data-tab');render();}
  else if(act==='range'){S.range=el.getAttribute('data-range');render();}
  else if(act==='series'){S.seriesDim=el.getAttribute('data-series');render();}
  else if(act==='filter'){setF(el.getAttribute('data-dim'),el.getAttribute('data-val'));}
  else if(act==='unfilter'){const d=el.getAttribute('data-dim');setF(d,S.filter[d]);}
  else if(act==='clearfilters'){S.filter={store:null,mfr:null,tech:null};render();}
  else if(act==='new'){S.modal=true;renderModal();}
  else if(act==='close'){S.modal=false;renderModal();}
  else if(act==='submit'){submitReport(el);}
});

(async function init(){
  try{ await load(); render(); }
  catch(err){ $('#root').innerHTML='<div style="color:var(--red);font-weight:700;padding:40px 4px">Could not load: '+esc(err&&err.message||err)+'</div>'; }
})();
</script>
</body>
</html>
