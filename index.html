<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — CPR</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='52' font-size='86' text-anchor='middle' dominant-baseline='central'>🏠</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--white:#FFFFFF;--border:#E0E2EA;--green:#2E9E5B;--purple:#8B5CF6;--amber:#B45309;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--light-grey);font-family:'Nunito Sans',sans-serif;color:var(--dark);min-height:100vh}
main{max-width:none;margin:0;padding:24px 28px 70px}

/* greeting */
.dash-head{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap;margin-bottom:22px}
.hi{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.95rem;letter-spacing:-.6px;line-height:1.1}
.hi .wave{font-size:1.7rem;margin-right:4px}
.dash-sub{color:var(--dark-grey);font-size:.9rem;margin-top:5px;font-weight:600}
.head-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:7px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;color:var(--dark-grey);background:var(--white);border:1.5px solid var(--border);border-radius:999px;padding:8px 14px;white-space:nowrap}
.chip .dot{width:8px;height:8px;border-radius:50%;background:var(--grey)}
.ai-btn{display:inline-flex;align-items:center;gap:8px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;color:#fff;background:var(--dark);border:none;border-radius:999px;padding:9px 16px;cursor:pointer;transition:filter .15s}
.ai-btn:hover{filter:brightness(1.12)}
.ai-btn .spark{font-size:.95rem}
.edit-btn{display:inline-flex;align-items:center;gap:7px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;color:var(--dark-grey);background:var(--white);border:1.5px solid var(--border);border-radius:999px;padding:8px 15px;cursor:pointer;transition:all .15s}
.edit-btn:hover{border-color:var(--blue);color:var(--dark)}
.edit-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.reset-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;color:var(--dark-grey);background:none;border:none;cursor:pointer;text-decoration:underline;display:none}
.editing .reset-btn{display:inline-block}

/* edit-mode banner */
.edit-note{display:none;align-items:center;gap:9px;background:#EAF6FD;border:1px solid #BFE2F5;color:#1f6f9c;border-radius:11px;padding:10px 14px;font-size:.82rem;font-weight:700;margin-bottom:16px}
.editing .edit-note{display:flex}

/* widget grid — 10 cols so 100=10, 60=6, 40=4 */
/* masonry: 1px row track + JS-computed row-spans so widgets pack vertically
   (the right column stacks tight instead of waiting for a tall left neighbour) */
.widgets{display:grid;grid-template-columns:repeat(10,1fr);column-gap:16px;row-gap:0;grid-auto-rows:1px;grid-auto-flow:row dense;align-items:start}
.w{background:var(--white);border:1px solid var(--border);border-top:3px solid var(--accent,var(--blue));border-radius:14px;box-shadow:0 1px 3px rgba(45,45,59,.05);display:flex;flex-direction:column;overflow:hidden;transition:box-shadow .15s}
.w[data-size="full"]{grid-column:span 10}
.w[data-size="wide"]{grid-column:span 6}
.w[data-size="narrow"]{grid-column:span 4}
.w[data-accent="green"]{--accent:var(--green)}
.w[data-accent="blue"]{--accent:var(--blue)}
.w[data-accent="purple"]{--accent:var(--purple)}
.w[data-accent="red"]{--accent:var(--red)}
.w[data-accent="amber"]{--accent:var(--amber)}
.w[data-accent="dark"]{--accent:var(--dark)}
.w-hd{display:flex;align-items:center;gap:10px;padding:15px 17px 13px;border-bottom:1px solid #F1F2F6}
.w-ic{width:31px;height:31px;border-radius:9px;display:grid;place-items:center;font-size:1rem;background:var(--light-grey);flex:none}
.w-hd h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.02rem;letter-spacing:-.2px}
.w-tag{font-family:'Nunito',sans-serif;font-weight:800;font-size:.54rem;text-transform:uppercase;letter-spacing:.6px;padding:3px 7px;border-radius:6px;border:1px solid var(--border);color:var(--grey)}
.w-tag.preview{color:var(--blue);border-color:#BFE2F5;background:#EAF6FD}
.w-tag.soon{color:var(--amber);border-color:#F3D9A8;background:#FEF6E7}
.w-link{margin-left:auto;font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;color:var(--blue);text-decoration:none;white-space:nowrap}
.w-link:hover{text-decoration:underline}
.w-bd{padding:15px 17px 17px;flex:1}

/* edit controls (hidden until editing) */
.w-grip{display:none;cursor:grab;color:var(--grey);font-size:1rem;line-height:1;margin-right:-2px;flex:none}
.w-size{display:none;margin-left:auto;background:var(--light-grey);border:1px solid var(--border);border-radius:8px;padding:2px}
.w-size button{font-family:'Nunito',sans-serif;font-weight:800;font-size:.66rem;color:var(--dark-grey);background:none;border:none;border-radius:6px;padding:4px 8px;cursor:pointer}
.w-size button.on{background:var(--white);color:var(--dark);box-shadow:0 1px 2px rgba(45,45,59,.12)}
.w-del{display:none;margin-left:8px;width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--white);color:var(--grey);cursor:pointer;font-size:.8rem;align-items:center;justify-content:center;flex:none}
.w-del:hover{color:var(--red);border-color:#F6C9CA;background:#FFF1F1}
.editing .w{border:1.5px dashed var(--blue);border-top-width:3px}
.editing .w-hd{cursor:grab}
.editing .w-grip{display:block}
.editing .w-size{display:inline-flex}
.editing .w-del{display:inline-flex}
.editing .w-link,.editing .w-tag{display:none}
.editing .w-bd{opacity:.55;pointer-events:none}
.w.dragging{opacity:.4;box-shadow:0 12px 30px rgba(45,45,59,.18)}

/* add-widget tile + gallery (edit mode) */
.w-add{display:none;grid-column:1/-1;align-items:center;justify-content:center;gap:9px;min-height:84px;background:none;border:2px dashed var(--grey);border-radius:14px;color:var(--dark-grey);font-family:'Nunito',sans-serif;font-weight:800;font-size:.92rem;cursor:pointer;transition:all .15s}
.w-add:hover{border-color:var(--blue);color:var(--blue);background:#EAF6FD}
.editing .w-add{display:flex}
.wg-modal{display:none;position:fixed;inset:0;z-index:1200;background:rgba(45,45,59,.5);align-items:center;justify-content:center;padding:20px}
.wg-modal.show{display:flex}
.wg-card{background:#fff;border-radius:16px;width:100%;max-width:460px;max-height:84vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(45,45,59,.3)}
.wg-hd{display:flex;align-items:center;padding:17px 19px;border-bottom:1px solid var(--border);font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem}
.wg-hd button{margin-left:auto;border:none;background:none;font-size:1.1rem;color:var(--grey);cursor:pointer}
.wg-list{padding:10px;overflow-y:auto}
.wg-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px}
.wg-item:hover{background:var(--light-grey)}
.wg-item .gi{width:34px;height:34px;border-radius:9px;background:var(--light-grey);display:grid;place-items:center;font-size:1.05rem;flex:none}
.wg-item .gt{font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem}
.wg-item .gd{font-size:.76rem;color:var(--dark-grey);margin-top:1px}
.wg-item .gadd{margin-left:auto;font-family:'Nunito',sans-serif;font-weight:800;font-size:.76rem;color:#fff;background:var(--blue);border:none;border-radius:8px;padding:7px 13px;cursor:pointer;flex:none}
.wg-item .gadd:hover{filter:brightness(1.07)}
.wg-empty{padding:24px;text-align:center;color:var(--grey);font-size:.85rem;font-weight:700}

/* tasks */
.tasklist{list-style:none;display:flex;flex-direction:column;gap:2px}
.task{display:flex;align-items:center;gap:11px;padding:9px 6px;border-radius:9px}
.task:hover{background:var(--light-grey)}
.cbx{width:19px;height:19px;border-radius:6px;border:2px solid var(--grey);flex:none}
.task.done .cbx{background:var(--green);border-color:var(--green);position:relative}
.task.done .cbx::after{content:'✓';position:absolute;inset:0;color:#fff;font-size:.7rem;font-weight:900;display:grid;place-items:center}
.task .tt{font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;color:var(--dark)}
.task.done .tt{color:var(--grey);text-decoration:line-through}
.task .tm{font-size:.72rem;color:var(--dark-grey);margin-top:1px}
.task .tg{margin-left:auto;font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;text-transform:uppercase;letter-spacing:.5px;padding:3px 7px;border-radius:6px;white-space:nowrap}
.tg.must{color:var(--red);background:#FFF1F1;border:1px solid #F6C9CA}
.tg.asap{color:var(--amber);background:#FEF6E7;border:1px solid #F3D9A8}

/* kpis (commission / generic) */
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kpi{background:var(--light-grey);border-radius:11px;padding:12px}
.kpi .kl{font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey)}
.kpi .kv{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.35rem;color:var(--dark);margin-top:4px}
.kpi.tot .kv{color:var(--green)}
.goal{margin-top:14px}
.goal-row{display:flex;justify-content:space-between;font-size:.74rem;font-weight:700;color:var(--dark-grey);margin-bottom:6px}
.bar-track{height:9px;border-radius:999px;background:var(--light-grey);overflow:hidden}
.bar-fill{height:100%;border-radius:999px;background:var(--blue)}

/* schedule */
.shift{display:flex;align-items:center;gap:13px;background:var(--light-grey);border-radius:11px;padding:13px 14px}
.shift .day{text-align:center;background:#fff;border:1px solid var(--border);border-radius:9px;padding:6px 11px;flex:none}
.shift .day .dow{font-family:'Nunito',sans-serif;font-weight:800;font-size:.58rem;text-transform:uppercase;letter-spacing:.5px;color:var(--red)}
.shift .day .dnum{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.25rem;color:var(--dark);line-height:1}
.shift .si .stime{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;color:var(--dark)}
.shift .si .sloc{font-size:.76rem;color:var(--dark-grey);margin-top:2px}
.hoursline{display:flex;justify-content:space-between;align-items:baseline;margin-top:13px}
.hoursline .hl{font-family:'Nunito',sans-serif;font-weight:800;font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey)}
.hoursline .hv{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem;color:var(--dark)}

/* leaderboard */
.lb{list-style:none;display:flex;flex-direction:column;gap:3px}
.lb li{display:flex;align-items:center;gap:11px;padding:8px 6px;border-radius:9px}
.lb li:hover{background:var(--light-grey)}
.lb .rk{width:22px;height:22px;border-radius:50%;background:var(--light-grey);display:grid;place-items:center;font-family:'Nunito',sans-serif;font-weight:900;font-size:.72rem;color:var(--dark-grey);flex:none}
.lb li.me .rk{background:var(--blue);color:#fff}
.lb .ln{font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem}
.lb .lv{margin-left:auto;font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;color:var(--dark);white-space:nowrap}
.lb .lv .lsub{font-weight:700;font-size:.72rem;color:var(--grey)}
.w-headx{margin-left:auto;display:inline-flex;align-items:center}
.editing .w-headx{display:none}
.lb-toggle{display:inline-flex;background:var(--light-grey);border:1px solid var(--border);border-radius:8px;padding:2px}
.lb-toggle button{font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;color:var(--dark-grey);background:none;border:none;border-radius:6px;padding:4px 9px;cursor:pointer;white-space:nowrap}
.lb-toggle button.on{background:#fff;color:var(--dark);box-shadow:0 1px 2px rgba(45,45,59,.12)}
.lb-cap{font-size:.64rem;color:var(--grey);font-weight:800;text-transform:uppercase;letter-spacing:.4px;margin:8px 2px 4px}

/* tills (cash status) */
.tills{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:9px}
.till{background:var(--light-grey);border-radius:10px;padding:11px}
.till .tl{font-family:'Nunito',sans-serif;font-weight:800;font-size:.58rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey)}
.till .tv{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.15rem;margin-top:3px}
.till .ts{font-size:.64rem;font-weight:800;margin-top:2px}
.till .ts.ok{color:var(--green)} .till .ts.bad{color:var(--red)}

/* empty state */
.empty{display:flex;flex-direction:column;align-items:center;text-align:center;gap:7px;padding:26px 14px;color:var(--grey)}
.empty .ei{font-size:1.8rem;opacity:.7}
.empty .et{font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;color:var(--dark-grey)}
.empty .es{font-size:.78rem;color:var(--grey);max-width:280px;line-height:1.45}

/* quick links */
.qlinks{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:11px}
.ql{display:flex;align-items:center;gap:11px;background:var(--white);border:1px solid var(--border);border-radius:11px;padding:12px 13px;text-decoration:none;transition:transform .12s,box-shadow .12s,border-color .12s}
.ql:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(45,45,59,.08);border-color:var(--blue)}
.ql .qi{font-size:1.25rem;line-height:1}
.ql .qn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.86rem;color:var(--dark)}

.foot-note{margin-top:22px;font-size:.74rem;color:var(--grey);text-align:center}

@media(max-width:1000px){ .w,.w-add{grid-column:1/-1 !important} .w-size{display:none !important} .editing .w-hd{cursor:default} .editing .w-grip{display:none} }
@media(max-width:560px){ main{padding:18px 16px 60px} .hi{font-size:1.6rem} .kpis{grid-template-columns:1fr 1fr} }
</style>
</head>
<body>

<main>
  <div class="dash-head">
    <div>
      <h1 class="hi"><span class="wave">👋</span><span id="greeting">Welcome</span></h1>
      <div class="dash-sub" id="subline">Here's your day at a glance.</div>
    </div>
    <div class="head-actions">
      <button class="reset-btn" id="resetBtn">Reset layout</button>
      <button class="edit-btn" id="editBtn">⚙ Customize</button>
      <span class="chip" id="clockChip"><span class="dot"></span> <span id="clockTxt">Clock status · coming soon</span></span>
      <button class="ai-btn" id="aiBtn"><span class="spark">✨</span> Ask AI</button>
    </div>
  </div>

  <div class="edit-note">↔ Drag a widget by its header to reorder · pick <b>100 / 60 / 40</b> width · <b>＋ Add a widget</b> to bring more in · changes save automatically.</div>

  <div class="widgets" id="widgets"></div>

  <div class="foot-note">Dashboard · widgets fill in as tools come online.</div>
</main>

<!-- add-widget gallery -->
<div class="wg-modal" id="wgModal">
  <div class="wg-card">
    <div class="wg-hd">Add a widget <button id="wgClose">✕</button></div>
    <div class="wg-list" id="wgList"></div>
  </div>
</div>

<script src="assets/pin-gate.js"></script>
<script src="assets/nav.js"></script>
<script src="assets/commission-engine.js"></script>
<script src="assets/commission-summary.js"></script>
<script src="assets/schedule-summary.js"></script>
<script src="assets/leaderboard-summary.js"></script>
<script>
(function(){
  /* ====================== greeting + date ====================== */
  var greetEl=document.getElementById('greeting'), subEl=document.getElementById('subline');
  function timeGreeting(){ var h=new Date().getHours(); return h<12?'Good morning':h<18?'Good afternoon':'Good evening'; }
  function firstName(){ var n=(window.CPRNavName||'').trim(); return n?n.split(/\s+/)[0]:''; }
  function applyGreeting(){ var fn=firstName(); greetEl.textContent=timeGreeting()+(fn?', '+fn:''); }
  (function(){
    var d=new Date(), days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var mons=['January','February','March','April','May','June','July','August','September','October','November','December'];
    subEl.textContent=days[d.getDay()]+', '+mons[d.getMonth()]+' '+d.getDate()+' · here’s your day at a glance.';
  })();
  window.addEventListener('cprnav:auth', function(){ applyGreeting(); rebuildIfRoleChanged(); });
  setTimeout(applyGreeting, 300);

  document.getElementById('aiBtn').onclick=function(){
    if (window.CPRAssistant && window.CPRAssistant.open){ window.CPRAssistant.open(); return; }
    alert('The AI assistant is coming soon — ask questions, analyze panic logs, and draft customer replies right from here.');
  };

  /* ====================== role / perms helpers ====================== */
  var RANK={none:0,employee:1,team_member:1,manager:2,admin:2,owner:3};
  function rank(){ return RANK[window.CPRNavRole]||0; }
  function hasPerm(k){ var p=window.CPRPerms; return !p ? true : (p.indexOf(k)>-1); } // perms unknown -> allow
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }

  /* ====================== widget registry ====================== */
  var todayNum=new Date().getDate();
  var REG=[
    { id:'tasks', title:'My Tasks', icon:'✅', accent:'green', defaultSize:'wide',
      desc:'Today’s checklist items and due tasks.', tag:{t:'preview',x:'Preview'}, link:{href:'#',x:'View all →'},
      render:function(){ return ''
        +'<ul class="tasklist">'
        +'<li class="task"><span class="cbx"></span><div><div class="tt">Open registers &amp; count tills</div><div class="tm">Opening · due 10:00 AM</div></div><span class="tg must">Must do</span></li>'
        +'<li class="task"><span class="cbx"></span><div><div class="tt">Wipe down counters &amp; demo phones</div><div class="tm">Anytime today</div></div><span class="tg asap">ASAP</span></li>'
        +'<li class="task"><span class="cbx"></span><div><div class="tt">Restock screen protectors</div><div class="tm">Anytime today</div></div></li>'
        +'<li class="task done"><span class="cbx"></span><div><div class="tt">Check overnight repair queue</div><div class="tm">Completed 9:12 AM</div></div></li>'
        +'</ul>'; } },

    { id:'commission', title:'My Commission', icon:'📈', accent:'blue', defaultSize:'narrow',
      desc:'Your commission, tips and goal this period.', link:{href:'commission-dashboard.html',x:'Open →'},
      render:function(){ return ''
        +'<div class="kpis" data-comm-kpis>'
        +'<div class="kpi"><div class="kl">Commission</div><div class="kv" data-k="commission">—</div></div>'
        +'<div class="kpi"><div class="kl">Tips</div><div class="kv" data-k="tips">—</div></div>'
        +'<div class="kpi tot"><div class="kl">Total</div><div class="kv" data-k="total">—</div></div>'
        +'</div>'
        +'<div class="goal" data-comm-goal style="display:none">'
        +'<div class="goal-row"><span data-g="label">Pay-period goal</span><span data-g="pct"></span></div>'
        +'<div class="bar-track"><div class="bar-fill" data-g="bar" style="width:0%"></div></div>'
        +'</div>'
        +'<div class="empty" data-comm-empty style="display:none;padding:14px 4px"><div class="et" data-comm-msg>Sign in to see your commission.</div></div>'; },
      mount:function(bd){ loadCommission(bd); } },

    { id:'comms', title:'Communications', icon:'📣', accent:'red', defaultSize:'wide',
      desc:'Store announcements, shift swaps, manager notes.', tag:{t:'soon',x:'Coming soon'},
      render:function(){ return '<div class="empty"><div class="ei">📭</div><div class="et">No new messages</div><div class="es">Store announcements, shift swaps, and manager notes will show up here.</div></div>'; } },

    { id:'schedule', title:'My Schedule', icon:'🗓️', accent:'purple', defaultSize:'narrow',
      desc:'Your next shift and hours this week.', link:{href:'my-schedule.html',x:'View →'},
      render:function(){ return ''
        +'<div class="shift" data-sched-shift style="display:none"><div class="day"><div class="dow">Today</div><div class="dnum">'+todayNum+'</div></div>'
        +'<div class="si"><div class="stime" data-s="time">—</div><div class="sloc" data-s="loc"></div></div></div>'
        +'<div class="empty" data-sched-off style="display:none;padding:10px 4px 4px"><div class="et" data-s="offmsg">Day off today</div></div>'
        +'<div class="hoursline" data-sched-week style="display:none"><span class="hl">Scheduled this week</span><span class="hv" data-s="hrs">—</span></div>'
        +'<div class="empty" data-sched-empty style="display:none;padding:14px 4px"><div class="et">Sign in to see your schedule.</div></div>'; },
      mount:function(bd){ loadSchedule(bd); } },

    { id:'links', title:'Quick Links', icon:'⚡', accent:'dark', defaultSize:'full',
      desc:'Fast access to the tools you use most.',
      render:function(){ return ''
        +'<div class="qlinks">'
        +'<a class="ql" href="cash-tracker.html"><span class="qi">💵</span><span class="qn">Cash Tracker</span></a>'
        +'<a class="ql" href="price-guide.html"><span class="qi">📱</span><span class="qn">Price Guide</span></a>'
        +'<a class="ql" href="price-calculator.html"><span class="qi">🧮</span><span class="qn">Price Calculator</span></a>'
        +'<a class="ql" href="commission-dashboard.html"><span class="qi">📈</span><span class="qn">My Commission</span></a>'
        +'<a class="ql" href="my-schedule.html"><span class="qi">🗓️</span><span class="qn">My Schedule</span></a>'
        +'<a class="ql" href="damage-tracker.html"><span class="qi">🔧</span><span class="qn">Damage Tracker</span></a>'
        +'</div>'; } },

    /* ---- library extras (not in the default board; available from the gallery) ---- */
    { id:'goals', title:'My Goals', icon:'🎯', accent:'amber', defaultSize:'narrow',
      desc:'Track attach rate and personal targets.', tag:{t:'preview',x:'Preview'},
      render:function(){ return ''
        +'<div class="goal" style="margin-top:0"><div class="goal-row"><span>Accessory attach</span><span>48% of 55%</span></div><div class="bar-track"><div class="bar-fill" style="width:87%"></div></div></div>'
        +'<div class="goal"><div class="goal-row"><span>Google reviews</span><span>6 of 10</span></div><div class="bar-track"><div class="bar-fill" style="width:60%;background:var(--green)"></div></div></div>'; } },

    { id:'leaderboard', title:'Store Leaderboard', icon:'🏆', accent:'blue', defaultSize:'narrow',
      desc:'Rank your store’s techs by accessory $ or device units (this month).',
      headExtra:'<div class="lb-toggle" data-lb-toggle><button data-m="accy" class="on">Accy $</button><button data-m="dev">Devices</button></div>',
      render:function(){ return ''
        +'<div class="lb-cap" data-lb-cap>This month</div>'
        +'<ul class="lb" data-lb-list></ul>'
        +'<div class="empty" data-lb-empty style="display:none;padding:14px 4px"><div class="et">No sales recorded yet this month.</div></div>'; },
      mount:function(bd,el){ loadLeaderboard(bd,el); } },

    { id:'cashstatus', title:'Store Cash Status', icon:'💰', accent:'green', defaultSize:'narrow',
      desc:'Till & safe balances — managers only.', tag:{t:'preview',x:'Preview'},
      can:function(){ return rank()>=RANK.manager || hasPerm('cash.admin'); },
      render:function(){ return ''
        +'<div class="tills">'
        +'<div class="till"><div class="tl">Till #1</div><div class="tv">$1,240</div><div class="ts ok">Balanced</div></div>'
        +'<div class="till"><div class="tl">Till #2</div><div class="tv">$980</div><div class="ts ok">Balanced</div></div>'
        +'<div class="till"><div class="tl">Safe</div><div class="tv">$5,400</div><div class="ts bad">Count due</div></div>'
        +'</div>'; } }
  ];
  function byId(id){ for(var i=0;i<REG.length;i++){ if(REG[i].id===id) return REG[i]; } return null; }
  function canShow(def){ return def && (!def.can || def.can()); }

  var DEFAULT_LAYOUT=[
    {id:'tasks',size:'wide'},{id:'commission',size:'narrow'},
    {id:'comms',size:'wide'},{id:'schedule',size:'narrow'},
    {id:'links',size:'full'}
  ];
  var SIZES=[['full','100'],['wide','60'],['narrow','40']];

  /* ====================== render engine ====================== */
  var grid=document.getElementById('widgets');
  var editing=false, dragEl=null, addTile=null, lastRole=null;

  /* masonry: give each card a row-span matching its height so cards pack
     vertically (1px row track + 16 extra rows == the 16px gap). */
  var masonryRAF=null;
  function masonry(){
    var els=grid.querySelectorAll('.w, .w-add');
    for(var i=0;i<els.length;i++){ var h=els[i].getBoundingClientRect().height; els[i].style.gridRowEnd='span '+(Math.ceil(h)+16); }
  }
  function scheduleMasonry(){ if(masonryRAF) return; masonryRAF=requestAnimationFrame(function(){ masonryRAF=null; masonry(); }); }
  var ro=(typeof ResizeObserver!=='undefined') ? new ResizeObserver(scheduleMasonry) : null;  // recompute when any card's content resizes
  window.addEventListener('resize', scheduleMasonry);
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(scheduleMasonry);

  function widgetEl(rec){
    var def=byId(rec.id); if(!canShow(def)) return null;
    var el=document.createElement('section');
    el.className='w'; el.setAttribute('data-wid',def.id);
    el.setAttribute('data-size', rec.size||def.defaultSize); el.setAttribute('data-accent',def.accent);
    el.setAttribute('draggable','false');
    var tag = def.tag ? '<span class="w-tag '+def.tag.t+'">'+def.tag.x+'</span>' : '';
    var link= def.link ? '<a class="w-link" href="'+def.link.href+'">'+def.link.x+'</a>' : '';
    el.innerHTML=''
      +'<div class="w-hd" data-handle>'
      +'<span class="w-grip">⠿</span>'
      +'<span class="w-ic">'+def.icon+'</span><h2>'+def.title+'</h2>'
      +tag
      +(def.headExtra?'<span class="w-headx">'+def.headExtra+'</span>':'')
      +link
      +'<span class="w-size" data-size-ctl></span>'
      +'<button class="w-del" title="Remove widget">✕</button>'
      +'</div>'
      +'<div class="w-bd"></div>';
    var bd=el.querySelector('.w-bd'); bd.innerHTML=def.render();
    var ctl=el.querySelector('[data-size-ctl]');
    SIZES.forEach(function(s){ var b=document.createElement('button'); b.textContent=s[1]; b.setAttribute('data-sz',s[0]);
      b.onclick=function(e){ e.stopPropagation(); setSize(el,s[0]); save(); }; ctl.appendChild(b); });
    refreshSize(el);
    el.querySelector('.w-del').onclick=function(e){ e.stopPropagation(); if(ro) ro.unobserve(el); el.remove(); save(); scheduleMasonry(); };
    el.addEventListener('dragstart', function(e){ if(!editing){ e.preventDefault(); return; } dragEl=el; el.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain','');}catch(_){}} );
    el.addEventListener('dragend', function(){ el.classList.remove('dragging'); dragEl=null; save(); scheduleMasonry(); });
    if (def.mount) try{ def.mount(bd, el); }catch(_){}
    if (ro) ro.observe(el);
    return el;
  }
  function setSize(el,sz){ el.setAttribute('data-size',sz); refreshSize(el); scheduleMasonry(); }
  function refreshSize(el){ var sz=el.getAttribute('data-size');
    Array.prototype.forEach.call(el.querySelectorAll('[data-size-ctl] button'), function(b){ b.classList.toggle('on', b.getAttribute('data-sz')===sz); }); }

  function ensureAddTile(){
    if(!addTile){ addTile=document.createElement('button'); addTile.className='w-add'; addTile.id='addTile';
      addTile.innerHTML='＋ Add a widget'; addTile.onclick=openGallery; if(ro) ro.observe(addTile); }
    grid.appendChild(addTile);
  }
  function renderLayout(layout){
    grid.innerHTML=''; addTile=null;
    (layout||[]).forEach(function(rec){ var el=widgetEl(rec); if(el) grid.appendChild(el); });
    ensureAddTile();
    Array.prototype.forEach.call(grid.querySelectorAll('.w'), function(el){ el.setAttribute('draggable', editing?'true':'false'); });
    scheduleMasonry();
  }
  function getLayout(){ return Array.prototype.map.call(grid.querySelectorAll('.w[data-wid]'), function(el){
    return { id:el.getAttribute('data-wid'), size:el.getAttribute('data-size') }; }); }

  function place(x,y){
    var items=grid.querySelectorAll('.w:not(.dragging)'), best=null,bestD=Infinity,after=false;
    Array.prototype.forEach.call(items, function(it){ var r=it.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
      var d=(x-cx)*(x-cx)+(y-cy)*(y-cy); if(d<bestD){ bestD=d; best=it; after=(x>cx); if(y>r.bottom) after=true; if(y<r.top) after=false; } });
    if(!best){ grid.insertBefore(dragEl, addTile); return; }
    best.parentNode.insertBefore(dragEl, after?best.nextSibling:best);
    if(addTile) grid.appendChild(addTile);
  }
  grid.addEventListener('dragover', function(e){ if(!editing||!dragEl) return; e.preventDefault(); place(e.clientX,e.clientY); scheduleMasonry(); });

  /* ====================== add-widget gallery ====================== */
  var modal=document.getElementById('wgModal'), wgList=document.getElementById('wgList');
  function shownIds(){ var s={}; Array.prototype.forEach.call(grid.querySelectorAll('.w[data-wid]'), function(el){ s[el.getAttribute('data-wid')]=1; }); return s; }
  function openGallery(){ buildGallery(); modal.classList.add('show'); }
  function closeGallery(){ modal.classList.remove('show'); }
  function buildGallery(){
    var shown=shownIds(), rows='';
    REG.forEach(function(def){ if(shown[def.id] || !canShow(def)) return;
      rows+='<div class="wg-item" data-add="'+def.id+'"><span class="gi">'+def.icon+'</span>'
        +'<div><div class="gt">'+def.title+'</div><div class="gd">'+(def.desc||'')+'</div></div>'
        +'<button class="gadd">Add</button></div>'; });
    wgList.innerHTML = rows || '<div class="wg-empty">All available widgets are on your dashboard.</div>';
    Array.prototype.forEach.call(wgList.querySelectorAll('[data-add]'), function(row){
      row.querySelector('.gadd').onclick=function(){ addWidget(row.getAttribute('data-add')); }; });
  }
  function addWidget(id){
    var def=byId(id); if(!def) return;
    var el=widgetEl({id:id,size:def.defaultSize}); if(!el) return;
    grid.insertBefore(el, addTile||null);
    el.setAttribute('draggable', editing?'true':'false');
    save(); buildGallery(); scheduleMasonry();
  }
  document.getElementById('wgClose').onclick=closeGallery;
  modal.addEventListener('click', function(e){ if(e.target===modal) closeGallery(); });

  /* ====================== edit mode ====================== */
  function setEditing(on){
    editing=on; document.body.classList.toggle('editing',on);
    var b=document.getElementById('editBtn'); b.classList.toggle('on',on); b.innerHTML=on?'✓ Done':'⚙ Customize';
    Array.prototype.forEach.call(grid.querySelectorAll('.w'), function(el){ el.setAttribute('draggable', on?'true':'false'); });
    if(!on) closeGallery();
  }
  document.getElementById('editBtn').onclick=function(){ setEditing(!editing); };
  document.getElementById('resetBtn').onclick=function(){ localStorageSet(null); applyLayout(DEFAULT_LAYOUT); save(); };

  /* ====================== persistence (Supabase per-user + localStorage) ====================== */
  var LS='cprDashLayout';
  var SB_URL='https://xuvsehrevxackuhmbmry.supabase.co';
  var SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY';
  var sbP=null, staffP=null, saveT=null;
  function sbClient(){ if(sbP) return sbP; sbP=import('https://esm.sh/@supabase/supabase-js@2').then(function(m){ return m.createClient(SB_URL,SB_ANON); }).catch(function(){ return null; }); return sbP; }
  function myStaffId(){ if(staffP) return staffP; staffP=sbClient().then(function(sb){ if(!sb) return null;
      return sb.auth.getUser().then(function(res){ var u=res&&res.data&&res.data.user; if(!u) return null;
        return sb.from('staff').select('id').eq('auth_uid',u.id).maybeSingle().then(function(r){ return r.data?r.data.id:null; }); }); }).catch(function(){ return null; }); return staffP; }

  function localStorageGet(){ try{ var a=JSON.parse(localStorage.getItem(LS)); return (a&&a.length)?a:null; }catch(_){ return null; } }
  function localStorageSet(v){ try{ if(v) localStorage.setItem(LS, JSON.stringify(v)); else localStorage.removeItem(LS); }catch(_){} }

  function save(){
    var layout=getLayout();
    localStorageSet(layout);
    clearTimeout(saveT);
    saveT=setTimeout(function(){ myStaffId().then(function(id){ if(!id) return; sbClient().then(function(sb){ if(!sb) return;
      sb.from('dashboard_layouts').upsert({ staff_id:id, layout:layout, updated_at:new Date().toISOString() }, { onConflict:'staff_id' }).then(function(){}, function(){}); }); }); }, 600);
  }
  function applyLayout(layout){ renderLayout(layout); }

  function syncFromCloud(){
    myStaffId().then(function(id){ if(!id) return; sbClient().then(function(sb){ if(!sb) return;
      sb.from('dashboard_layouts').select('layout').eq('staff_id',id).maybeSingle().then(function(r){
        if(r && r.data && Array.isArray(r.data.layout) && r.data.layout.length){ localStorageSet(r.data.layout); applyLayout(r.data.layout); }
      }, function(){}); }); });
  }

  function rebuildIfRoleChanged(){ var r=window.CPRNavRole||'none'; if(r!==lastRole){ lastRole=r; applyLayout(getLayout().length?getLayout():(localStorageGet()||DEFAULT_LAYOUT)); } }

  /* ====================== commission wiring (real data) ====================== */
  function money0(n){ return '$'+Math.round(Number(n)||0).toLocaleString('en-US'); }
  function loadCommission(bd){
    if(!window.CPRCommissionSummary || !window.CPRCommissionSummary.forMe){ return; }
    function showEmpty(msg){ var k=bd.querySelector('[data-comm-kpis]'); if(k)k.style.display='none'; var g=bd.querySelector('[data-comm-goal]'); if(g)g.style.display='none'; var em=bd.querySelector('[data-comm-empty]'); if(em) em.style.display='block'; var m=bd.querySelector('[data-comm-msg]'); if(m&&msg) m.textContent=msg; }
    window.CPRCommissionSummary.forMe().then(function(s){
      if(!s){ showEmpty('Sign in to see your commission.'); return; }
      if(s.excluded){ showEmpty('Owners don’t earn commission.'); return; }
      var set=function(key,v){ var el=bd.querySelector('[data-k="'+key+'"]'); if(el) el.textContent=v; };
      set('commission', money0(s.commission)); set('tips', money0(s.tips)); set('total', money0(s.total));
      if(s.goal && s.goal>0){ var cur=Number(s.goalCurrent)||0, pct=Math.min(100,Math.round((cur/s.goal)*100));
        var g=bd.querySelector('[data-comm-goal]'); if(g){ g.style.display='block';
          g.querySelector('[data-g="label"]').textContent=s.goalLabel||'Goal';
          g.querySelector('[data-g="pct"]').textContent=money0(cur)+' of '+money0(s.goal);
          g.querySelector('[data-g="bar"]').style.width=pct+'%'; } }
    }, function(){});
  }

  function loadSchedule(bd){
    if(!window.CPRScheduleSummary || !window.CPRScheduleSummary.forMe){ return; }
    window.CPRScheduleSummary.forMe().then(function(s){
      if(!s){ var em=bd.querySelector('[data-sched-empty]'); if(em) em.style.display='block'; return; }
      var wk=bd.querySelector('[data-sched-week]'); if(wk){ wk.style.display='flex'; var hv=wk.querySelector('[data-s="hrs"]'); if(hv) hv.textContent=(s.weekHours||0).toFixed(1)+' hrs'; }
      var t=s.today||{};
      if(t.kind==='shift'){
        var sf=bd.querySelector('[data-sched-shift]'); if(sf){ sf.style.display='flex';
          sf.querySelector('[data-s="time"]').textContent=t.time||t.name||'Scheduled';
          sf.querySelector('[data-s="loc"]').textContent=(t.store||'')+(t.hours?(' · '+t.hours.toFixed(1)+' hrs'):''); }
      } else {
        var off=bd.querySelector('[data-sched-off]'); if(off){ off.style.display='block';
          off.querySelector('[data-s="offmsg"]').textContent = t.kind==='timeoff' ? ('Time off today'+(t.type?(' · '+t.type):'')) : 'Day off today'; }
      }
    }, function(){});
  }

  function loadLeaderboard(bd, el){
    if(!window.CPRLeaderboard || !window.CPRLeaderboard.forStore){ return; }
    var host = el || bd;   // toggle lives in the widget header (el); list/cap live in the body (bd)
    function shortStore(s){ return window.CPRLocations ? CPRLocations.display(s) : String(s||'').replace(/^CPR\s*/,''); }
    function metric(){ try{ return localStorage.getItem('cprLbMetric')||'accy'; }catch(_){ return 'accy'; } }
    function setMetric(m){ try{ localStorage.setItem('cprLbMetric',m); }catch(_){} }
    function val(row,m){
      if(m==='accy') return '$'+Math.round(row.accy||0).toLocaleString('en-US');
      return (row.devUnits||0)+' <span class="lsub">dev · '+(row.devAccy||0)+' accy</span>';
    }
    var STATE={rows:[],meId:null};
    function paint(){
      var m=metric(), list=bd.querySelector('[data-lb-list]'); if(!list) return;
      // reflect active toggle
      Array.prototype.forEach.call(host.querySelectorAll('[data-lb-toggle] button'), function(b){ b.classList.toggle('on', b.getAttribute('data-m')===m); });
      var rows=STATE.rows.slice().sort(function(a,b){ return (m==='accy'?(b.accy-a.accy):(b.devUnits-a.devUnits)); }).slice(0,8);
      if(!rows.length){ list.innerHTML=''; var em=bd.querySelector('[data-lb-empty]'); if(em) em.style.display='block'; return; }
      var em2=bd.querySelector('[data-lb-empty]'); if(em2) em2.style.display='none';
      list.innerHTML=rows.map(function(r,i){
        return '<li'+(r.id===STATE.meId?' class="me"':'')+'><span class="rk">'+(i+1)+'</span><span class="ln">'+(r.id===STATE.meId?'You':esc(r.name))+'</span><span class="lv">'+val(r,m)+'</span></li>';
      }).join('');
    }
    // toggle wiring (once)
    Array.prototype.forEach.call(host.querySelectorAll('[data-lb-toggle] button'), function(b){
      b.onclick=function(e){ e.stopPropagation(); setMetric(b.getAttribute('data-m')); paint(); scheduleMasonry(); };
    });
    window.CPRLeaderboard.forStore().then(function(d){
      if(!d || !d.rows || !d.rows.length){ var em=bd.querySelector('[data-lb-empty]'); if(em) em.style.display='block'; return; }
      STATE.rows=d.rows; STATE.meId=d.meId;
      var cap=bd.querySelector('[data-lb-cap]'); if(cap) cap.textContent='This month'+(d.store?(' · '+shortStore(d.store)):'');
      paint();
    }, function(){});
  }

  /* ====================== boot ====================== */
  lastRole=window.CPRNavRole||'none';
  applyLayout(localStorageGet() || DEFAULT_LAYOUT);
  syncFromCloud();
})();
</script>
</body>
