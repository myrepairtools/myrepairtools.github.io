<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myrepairtools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #DC282E;
    --light-red: #F15F5E;
    --dark: #2D2D3B;
    --dark-grey: #4E4E50;
    --blue: #4FB0E3;
    --grey: #B9BDCB;
    --light-grey: #F3F2F2;
    --white: #FFFFFF;
    --border: #E0E2EA;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--light-grey);
    font-family: 'Nunito Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .site-header {
    background: var(--white);
    border-bottom: 3px solid var(--red);
    padding: 18px 40px;
    display: flex;
    align-items: center;
    gap: 0;
  }
  .logo-wrap { width: 200px; }
  .logo-wrap svg { width: 200px; height: auto; display: block; }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }

  .welcome {
    text-align: center;
    margin-bottom: 48px;
  }
  .welcome h1 {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: var(--dark);
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .welcome p {
    font-size: 14px;
    color: var(--grey);
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 700px;
    width: 100%;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px 32px;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(45,45,59,0.06);
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    cursor: pointer;
    border-top: 4px solid transparent;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(45,45,59,0.12);
  }
  .card.ops { border-top-color: var(--blue); }
  .card.ops:hover { border-color: var(--blue); }
  .card.admin { border-top-color: var(--red); }
  .card.admin:hover { border-color: var(--red); }

  .card-icon {
    font-size: 36px;
    line-height: 1;
  }
  .card-label {
    font-family: 'Nunito', sans-serif;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .card.ops .card-label { color: var(--blue); }
  .card.admin .card-label { color: var(--red); }

  .card-title {
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--dark);
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .card-desc {
    font-size: 13px;
    color: var(--grey);
    font-weight: 600;
    line-height: 1.5;
  }
  .card-arrow {
    margin-top: auto;
    font-size: 20px;
    font-weight: 900;
  }
  .card.ops .card-arrow { color: var(--blue); }
  .card.admin .card-arrow { color: var(--red); }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--grey);
    text-transform: uppercase;
  }

  @media (max-width: 560px) {
    .card-grid { grid-template-columns: 1fr; }
    .welcome h1 { font-size: 22px; }
  }
</style>
</head>
