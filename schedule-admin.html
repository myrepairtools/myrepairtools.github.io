<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Admin — CPR</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--white:#FFFFFF;--border:#E0E2EA;--green:#2E9E5B;--amber:#C9820B;--purple:#8B5CF6;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--light-grey);font-family:'Nunito Sans',sans-serif;color:var(--dark);min-height:100vh}
main{max-width:none;margin:0;padding:24px 28px 60px;overflow-x:auto}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:-.4px}
.hide{display:none}
/* lock */
.lock{position:fixed;inset:0;width:100vw;height:100vh;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:2000}
.lock.hide{display:none}
.lock-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:34px 38px;text-align:center;width:100%;max-width:330px}
.lock-box .ic{font-size:30px;margin-bottom:14px}
.lock-box h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;color:#fff;margin-bottom:4px}
.lock-box p{font-size:12px;color:rgba(255,255,255,.4);font-weight:600;margin-bottom:22px}
.lock-box input{width:100%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:8px;padding:12px 14px;font-size:16px;color:#fff;margin-bottom:12px;text-align:center;letter-spacing:4px}
.lock-box button{width:100%;background:var(--red);border:none;border-radius:8px;padding:12px;font-family:'Nunito',sans-serif;font-weight:800;color:#fff;cursor:pointer}
.lock-err{color:#ef4444;font-size:12px;font-weight:700;min-height:16px;margin-top:8px}
.app{display:none}.app.show{display:block}
/* hub */
.hubbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.hub{display:inline-flex;background:var(--dark);border-radius:11px;padding:3px;gap:2px}
.hub button{display:inline-flex;align-items:center;gap:7px;padding:8px 15px;border:none;border-radius:8px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;background:transparent;color:#D5D8E0}
.hub button.on{background:#fff;color:var(--dark)}
.hub .badge{font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;color:#fff;background:var(--red);border-radius:999px;padding:1px 6px;min-width:16px;text-align:center}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.cap{display:inline-flex;align-items:center;gap:7px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;color:var(--dark-grey);background:#fff;border:1px solid var(--border);border-radius:999px;padding:6px 13px}
.legend{display:flex;align-items:center;gap:13px;flex-wrap:wrap}
.legend .lgt{font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;letter-spacing:.5px;text-transform:uppercase;color:var(--grey)}
.legend .lg{display:inline-flex;align-items:center;gap:6px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;color:var(--dark-grey)}
.seg{display:inline-flex;background:#fff;border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px}
.seg button{padding:7px 14px;border:none;border-radius:7px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.76rem;background:transparent;color:#9aa0b0}
.seg.dk button.on{background:var(--dark);color:#fff}.seg.dk button{padding:6px 13px;font-size:.74rem}
.seg button.on{background:var(--blue);color:#fff}
.navbox{display:inline-flex;align-items:center;background:#fff;border:1px solid var(--border);border-radius:9px;overflow:hidden}
.navbox button{padding:8px 12px;border:none;background:#fff;color:var(--dark-grey);cursor:pointer;font-size:15px;font-weight:800;line-height:1}
.navbox .lbl{padding:0 14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;border-left:1px solid #EEF0F4;border-right:1px solid #EEF0F4;line-height:36px}
.btn{font-family:'Nunito',sans-serif;font-weight:800;border-radius:9px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--dark-grey);padding:8px 13px;font-size:.76rem}
/* boards */
.boards{display:flex;flex-direction:column;gap:16px;min-width:740px}
.board{background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 3px rgba(45,45,59,.05);overflow:visible}
.board-hd{display:flex;align-items:center;gap:10px;padding:13px 16px;min-height:54px;background:var(--dark);border-radius:14px 14px 0 0}
.board-hd .bar{display:inline-block;width:11px;height:22px;border-radius:5px;flex:none}
.board-hd .nm{font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;letter-spacing:.3px;text-transform:uppercase;color:#fff}
.board-hd .sub{font-family:'Nunito Sans',sans-serif;font-weight:600;font-size:.76rem;color:rgba(255,255,255,.72)}
.board-hd .add{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;padding:0;border:1px solid rgba(255,255,255,.45);border-radius:7px;background:rgba(255,255,255,.14);color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:1.1rem;line-height:1;cursor:pointer}
table.bt{width:100%;border-collapse:collapse;table-layout:fixed}
table.bt th{padding:9px 6px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;letter-spacing:.5px;text-transform:uppercase;color:var(--grey);border-bottom:1px solid #EEF0F4;border-left:1px solid #F5F6F8}
table.bt th.emp{width:172px;text-align:left;padding:9px 16px;border-left:none}
table.bt th .dt{font-weight:700;font-size:.74rem;color:#cfd2dd;margin-top:1px}
table.bt td.emp{padding:8px 16px;border-bottom:1px solid #F5F6F8;vertical-align:middle}
table.bt td.cell{padding:5px;border-bottom:1px solid #F5F6F8;border-left:1px solid #F5F6F8;vertical-align:middle;height:56px}
table.bt td.cell.clk{cursor:pointer}
.empname{display:flex;align-items:center;gap:10px}
.av{border-radius:50%;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none}
.nmline{font-family:'Nunito',sans-serif;font-weight:800;font-size:.86rem;line-height:1.15}
.tag{font-family:'Nunito',sans-serif;font-weight:800;font-size:.5rem;letter-spacing:.4px;padding:1px 6px;border-radius:999px}
.chip{border-radius:7px;padding:5px 8px;width:100%;text-align:left}
.chip .cn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.chip .ct{font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.68rem;color:#6b7180;margin-top:1px}
.offc{text-align:center;font-family:'Nunito',sans-serif;font-weight:800;font-size:.68rem;color:#cfd2dd;letter-spacing:.5px}
.blankc{text-align:center;color:#E0E2EA;font-size:15px}
.note{font-family:'Nunito Sans',sans-serif;font-size:.78rem;color:var(--grey);font-weight:600;margin-top:14px;line-height:1.5;max-width:740px}
/* monthly */
.cal{background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 3px rgba(45,45,59,.05);overflow:hidden;min-width:760px}
.cal-hd{display:grid;grid-template-columns:repeat(7,1fr);background:var(--dark)}
.cal-hd div{padding:10px 12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.85)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:104px;padding:7px 8px;border-bottom:1px solid #F0F1F4;border-left:1px solid #F0F1F4}
.cal-cell.out{min-height:96px;background:#FBFBFC}
.cal-num{font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;margin-bottom:4px}
.ev{font-family:'Nunito Sans',sans-serif;font-size:.62rem;font-weight:700;border-radius:5px;padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.covpill{display:inline-flex;align-items:center;gap:3px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.54rem;padding:1px 5px;border-radius:5px}
/* time off table */
.totbl{background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 3px rgba(45,45,59,.05);overflow:hidden;min-width:720px}
.totbl table{width:100%;border-collapse:collapse}
.totbl th{text-align:left;padding:11px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.58rem;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.85);background:var(--dark)}
.totbl td{padding:10px 12px;border-bottom:1px solid #F3F2F2;vertical-align:middle}
.totbl td.first{padding:10px 16px}
.sbadge{font-family:'Nunito',sans-serif;font-weight:800;font-size:.58rem;letter-spacing:.4px;text-transform:uppercase;padding:3px 9px;border-radius:999px}
.flagchip{display:inline-flex;align-items:center;gap:4px;margin-top:4px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;padding:2px 7px;border-radius:999px}
.toact button{padding:7px 13px;border-radius:8px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;cursor:pointer}
/* popover */
.pop-back{position:fixed;inset:0;z-index:55}
.pop{position:fixed;width:240px;max-height:360px;overflow:auto;background:#fff;border:1px solid var(--border);border-radius:11px;box-shadow:0 14px 34px rgba(45,45,59,.24);z-index:60;padding:6px}
.pop-hd{padding:8px 10px 7px;border-bottom:1px solid #EEF0F4;margin-bottom:5px}
.pop-hd .n{font-family:'Nunito',sans-serif;font-weight:900;font-size:.84rem}
.pop-hd .d{font-family:'Nunito Sans',sans-serif;font-size:.7rem;color:var(--grey)}
.pop-grp{display:flex;align-items:center;gap:6px;padding:9px 10px 3px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;letter-spacing:.5px;text-transform:uppercase;color:var(--grey)}
.pop-item{width:100%;display:flex;align-items:center;gap:8px;padding:7px 10px;border:none;border-radius:7px;background:transparent;cursor:pointer;text-align:left;font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;color:var(--dark)}
.pop-item:hover{background:var(--light-grey)}
.pop-item.muted{font-weight:700;color:var(--grey)}
.pop-item .tm{margin-left:auto;font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.72rem;color:var(--grey)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:11px 20px;border-radius:10px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.84rem;opacity:0;pointer-events:none;transition:.2s;z-index:3000}
.toast.show{opacity:1}.toast.err{background:var(--red)}
/* shifts editor (ported from settings) */
.btn.alt{background:#fff;color:var(--dark);border:1.5px solid var(--border)}
.btn.blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.sm{padding:6px 13px;font-size:.72rem}
.btn.alt.sm:hover{border-color:var(--blue);color:var(--blue)}
.emptyc{padding:34px;text-align:center;color:var(--grey);font-weight:700}
.shmd{display:grid;grid-template-columns:208px 1fr;gap:16px;align-items:start}
.shmaster{border:1px solid var(--border);border-radius:11px;background:#FCFCFD;padding:8px 7px;overflow:auto;max-height:60vh}
.shdetail{min-width:0}
.pg3item{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:none;border-left:3px solid transparent;background:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:.84rem;padding:9px 11px;border-radius:0 8px 8px 0;cursor:pointer;color:var(--dark-grey);margin-bottom:2px}
.pg3item.on{background:#E9F4FB;color:var(--dark);border-left-color:var(--red)}
.hlbl{display:block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.66rem;text-transform:uppercase;letter-spacing:.4px;color:var(--dark-grey);margin-bottom:5px}
.toggle{width:40px;height:23px;border-radius:20px;border:none;background:var(--grey);position:relative;cursor:pointer;flex:none;transition:background .15s}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:left .15s}
.toggle.on{background:var(--blue)}.toggle.on::after{left:19px}
.toggle.grn.on{background:var(--green)}
@media(max-width:640px){.shmd{grid-template-columns:1fr}}
/* holidays table */
.htbl-wrap{background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 3px rgba(45,45,59,.05);overflow:hidden}
.htbl{width:100%;border-collapse:collapse}
.htbl thead th{background:var(--dark);color:rgba(255,255,255,.9);font-family:'Nunito',sans-serif;font-weight:800;font-size:.58rem;letter-spacing:.6px;text-transform:uppercase;padding:12px 16px;text-align:left;white-space:nowrap}
.htbl thead th.stcol{text-align:center;border-left:1px solid rgba(255,255,255,.08)}
.htbl thead th.actcol{width:1%}
.htbl tbody td{padding:12px 16px;border-bottom:1px solid #F1F2F5;vertical-align:middle}
.htbl tbody td.stcol{text-align:center;border-left:1px solid #F4F5F7}
.htbl tbody tr:last-child td{border-bottom:none}
.htbl tbody tr.hrow:hover td{background:#FBFBFD}
.htbl tbody tr.hrow.need td{background:#FFFCF6}
.htbl tbody tr.hrow.need:hover td{background:#FFF9EE}
.htbl .sectrow td{background:#F7F8FB;padding:6px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;letter-spacing:.6px;text-transform:uppercase;color:#9aa0b0;border-bottom:1px solid #F1F2F5}
.hnm{font-family:'Nunito',sans-serif;font-weight:800;font-size:.92rem;color:var(--dark);line-height:1.15}
.hdt{font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.72rem;color:var(--grey);margin-top:2px}
.htags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.htag{display:inline-flex;align-items:center;gap:3px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;padding:2px 8px;border-radius:999px}
.hstat{display:inline-flex;align-items:center;gap:5px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;padding:3px 11px;border-radius:999px}
.hstat.reg{color:#a4a9b5;background:#F4F5F7}
.hstat.closed{color:var(--red);background:#FBE9EA}
.hstat.cust{color:#1E6FA8;background:#E7F2FA}
.hact{display:inline-flex;align-items:center;gap:7px;justify-content:flex-end;white-space:nowrap}
.hbtn{border-radius:8px;padding:7px 13px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;cursor:pointer}
.hbtn.conf{border:none;background:var(--green);color:#fff}
.hbtn.conf:hover{background:#278a4e}
.hbtn.edit{border:1.5px solid var(--border);background:#fff;color:var(--dark-grey)}
.hbtn.edit:hover{border-color:var(--blue);color:var(--blue)}
.hdel{border:none;background:none;color:#cfd2dd;font-size:1rem;cursor:pointer;padding:3px 5px;border-radius:6px;line-height:1}
.hdel:hover{color:var(--red);background:#FBE9EA}
</style>
</head>
<body>
<div id="lockScreen" class="lock">
  <div class="lock-box">
    <div class="ic">🗓️</div>
    <h2>Schedule Admin</h2>
    <p>Enter your admin PIN to manage schedules.</p>
    <input id="lkPin" type="password" inputmode="numeric" placeholder="PIN" autocomplete="off">
    <button id="lkGo">Unlock</button>
    <div id="lkErr" class="lock-err"></div>
  </div>
</div>

<div id="app" class="app">
  <main>
    <div class="hubbar"><h1>Schedule Admin</h1><div class="hub" id="hub"></div></div>
    <div id="view"></div>
  </main>
</div>
<div id="toast" class="toast"></div>

<script src="assets/pin-gate.js"></script>
<script src="assets/nav.js" data-section="admin"></script>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
var SB_URL='https://xuvsehrevxackuhmbmry.supabase.co';
var ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY';
var FN=SB_URL+'/functions/v1/cpr-auth';
var sb=createClient(SB_URL,ANON);
var AUTH=null, DEVICE_ID=localStorage.getItem('cpr_device_id')||(function(){var d=(crypto.randomUUID?crypto.randomUUID():String(Date.now())+Math.random());localStorage.setItem('cpr_device_id',d);return d;})();
var $=function(s){return document.querySelector(s);};
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m,err){var t=$('#toast');t.textContent=m;t.className='toast show'+(err?' err':'');setTimeout(function(){t.className='toast';},2200);}
function shortStore(s){return window.CPRLocations?CPRLocations.display(s):String(s||'').replace(/^CPR\s*/,'');}
function storeShort(s){return shortStore(s).split(/\s+/)[0].slice(0,3).toUpperCase();}
var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var DAYL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MONL=['January','February','March','April','May','June','July','August','September','October','November','December'];
var TYPES={Vacation:'#4FB0E3',Personal:'#8B5CF6',Sick:'#DC282E'};
var AVPAL=['#DC282E','#2E9E5B','#4FB0E3','#C9820B','#7A6FD0','#2D2D3B','#1E7AA8','#C24E8E'];
function avatarBg(id){var h=0,s=String(id||'');for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return AVPAL[h%AVPAL.length];}
function initials(n){var p=String(n||'?').trim().split(/\s+/);return ((p[0]||'')[0]||'')+((p[1]||'')[0]||'')||'?';}
function hexA(hex,a){var h=String(hex||'#4FB0E3').replace('#','');if(h.length===3)h=h.split('').map(function(c){return c+c;}).join('');return 'rgba('+(parseInt(h.slice(0,2),16)||79)+','+(parseInt(h.slice(2,4),16)||176)+','+(parseInt(h.slice(4,6),16)||227)+','+a+')';}
function fmtMin(m){if(m==null)return '';var h=Math.floor(m/60),mm=m%60,h12=h%12;if(h12===0)h12=12;return mm?(h12+':'+('0'+mm).slice(-2)):(''+h12);}
function rangeMin(s,e){return fmtMin(s)+'–'+fmtMin(e);}
function iso(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function fmtRange(s,e){var a=s.split('-').map(Number),b=e.split('-').map(Number);if(s===e)return MON[a[1]-1]+' '+a[2];if(a[1]===b[1])return MON[a[1]-1]+' '+a[2]+'–'+b[2];return MON[a[1]-1]+' '+a[2]+' – '+MON[b[1]-1]+' '+b[2];}
function dayCount(s,e){var n=Math.round((new Date(e)-new Date(s))/86400000)+1;return n===1?'1 day':n+' days';}
function isMgr(role){return ['owner','admin','manager'].indexOf(role)>-1;}
function lsGet(k,d){try{return localStorage.getItem(k)||d;}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}

/* ===== auth (admin PIN lock) ===== */
var IDLE_MS=10*60*1000, idleTimer=null;
function fn(body,tok){return fetch(FN,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(tok||ANON),'apikey':ANON},body:JSON.stringify(body)}).then(function(r){return r.json().then(function(d){return {status:r.status,data:d};},function(){return {status:r.status,data:{}};});});}
function lockErr(t){$('#lkErr').textContent=t||'';}
function showLock(){$('#app').classList.remove('show');$('#lockScreen').classList.remove('hide');$('#lkPin').value='';}
function resetIdle(){clearTimeout(idleTimer);idleTimer=setTimeout(relock,IDLE_MS);}
function relock(){clearTimeout(idleTimer);sb.auth.signOut();AUTH=null;showLock();}
function unlockUI(){$('#lockScreen').classList.add('hide');$('#app').classList.add('show');resetIdle();load();}
function isAdminRole(r){return ['admin','manager','owner'].indexOf(r)>-1;}
async function doLogin(){
  var pin=$('#lkPin').value||'';if(!pin){lockErr('Enter your PIN');return;}
  $('#lkGo').disabled=true;lockErr('Signing in…');
  try{
    var r=await fn({action:'login',pin:pin,device_id:DEVICE_ID});
    if(r.status!==200){var d=r.data||{};lockErr(d.error==='invalid'?('Wrong PIN.'+(d.remaining!=null?(' '+d.remaining+' left.'):'')):(d.error||'Login failed.'));$('#lkGo').disabled=false;return;}
    var st=r.data.staff||{};

async function load(){

  HOURS={};(hr.data||[]).forEach(function(r){var k=r.shift_id+'|'+r.store,h=HOURS[k]||(HOURS[k]={def:null,days:{}});var row={closed:!!r.closed,start:r.start_min,end:r.end_min,enabled:r.enabled!==false};if(r.weekday==null)h.def=row;else h.days[r.weekday]=row;});
  SCHED={};STAFF.forEach(function(e){SCHED[e.id]={arr:[null,null,null,null,null,null,null],store:e.home_store};});
  (sc.data||[]).forEach(function(r){
    var rec=SCHED[r.staff_id]||(SCHED[r.staff_id]={arr:[null,null,null,null,null,null,null],store:r.store});rec.store=r.store||rec.store;
    var shf=r.shifts||{};
    for(var wd=0;wd<7;wd++){var v=shf[String(wd)];if(v==null){rec.arr[wd]=null;continue;}if(typeof v==='string')v={label:v};
      if(v.label==='Off'&&!v.shift_id)rec.arr[wd]='off';

  });

  CATOBS={};((hc&&hc.data)||[]).forEach(function(c){CATOBS[c.id]=c.observed!==false;});

  HOLH={};((holh&&holh.data)||[]).forEach(function(r){(HOLH[r.holiday_id]=HOLH[r.holiday_id]||{})[r.store]={closed:!!r.closed,open_min:r.open_min,close_min:r.close_min};});

function weekStart(d){var x=new Date(d);x.setDate(x.getDate()-x.getDay());x.setHours(0,0,0,0);return x;}
function reqOn(empId,isoDate){return REQS.filter(function(r){return r.staff_id===empId&&r.status!=='denied'&&r.start_date<=isoDate&&r.end_date>=isoDate;})[0]||null;}
function reqFor(store,wd){
  var s=STORES.filter(function(x){return x.store===store;})[0]||{};
  var we=(wd===0||wd===6);
  var nz=function(v,d){return v==null?d:v;};
  return we?{staff:nz(s.we_min_staff,2),mgr:nz(s.we_min_mgr,1)}:{staff:nz(s.min_staff,2),mgr:nz(s.min_mgr,1)};
}
function coverage(store,wd,isoDate){
  var count=0,mgr=0;
  STAFF.forEach(function(e){var a=SCHED[e.id]&&SCHED[e.id].arr[wd];if(!a||a==='off'||a.store!==store||a.away)return;
    var r=isoDate?reqOn(e.id,isoDate):null;if(r&&r.status==='approved')return;count++;if(isMgr(e.role))mgr++;});
  var req=reqFor(store,wd);

}
function conflictFor(r){
  var e=empById(r.staff_id);if(!e||r.status!=='pending')return null;var byStore={};
  var d=new Date(r.start_date+'T00:00:00'),end=new Date(r.end_date+'T00:00:00');
  while(d<=end){var wd=d.getDay(),isoDate=iso(d);var a=SCHED[e.id]&&SCHED[e.id].arr[wd];
    if(a&&a!=='off'&&a.store&&!a.away){var cov=coverage(a.store,wd,isoDate);var after=cov.count-1,afterMgr=cov.mgr-(isMgr(e.role)?1:0);var req=reqFor(a.store,wd);

    d.setDate(d.getDate()+1);}

  return stores.map(function(s){return storeShort(s)+' '+byStore[s].join('/');}).join(' · ');
}
function overlapsFor(r){

  if(!hits.length)return null;
  return hits.map(function(o){var e=empById(o.staff_id);return (e?e.display_name.split(' ')[0]:'')+' · '+fmtRange(o.start_date,o.end_date);}).join(', ');
}
function avHtml(e,sz,fs,colorOverride){var bg=esc(colorOverride||(e&&e.avatar_color)||avatarBg(e&&e.id));var face=e&&e.avatar?esc(e.avatar):esc(initials(e&&e.display_name));return '<span class="av" style="width:'+sz+'px;height:'+sz+'px;font-size:'+fs+';background:'+bg+'">'+face+'</span>';}

}

function parseLabel(label){var m=String(label||'').split(/\s*[-–]\s*/);if(m.length!==2)return null;

function minToTime(m){if(m==null)return '';var h=Math.floor(m/60),mm=m%60;return ('0'+h).slice(-2)+':'+('0'+mm).slice(-2);}
function timeToMin(t){if(!t)return null;var p=String(t).split(':');return (+p[0])*60+(+(p[1]||0));}
function holDateLabel(di){var p=String(di).split('-').map(Number);var d=new Date(p[0],p[1]-1,p[2]);return DAYL[d.getDay()]+', '+MON[p[1]-1]+' '+p[2]+', '+p[0];}
function holidayOn(di){return HOLIDAYS.filter(function(h){return h.holiday_date===di;})[0]||null;}
function holidayHours(hid,store){return (HOLH[hid]&&HOLH[hid][store])||null;}   // null = regular (no effect)
/* Holiday effect on a scheduled cell at `store` on date `di`. null = none; {closed} or {start,end} window. */
function holClamp(store,di){var hol=holidayOn(di);if(!hol)return null;var hh=holidayHours(hol.id,store);if(!hh)return null;
  return hh.closed?{closed:true,name:hol.name}:{start:hh.open_min,end:hh.close_min,name:hol.name};}
function holidayChip(name,sub){return '<div class="chip" style="background:'+hexA('#C9820B',0.12)+';border-left:3px solid #C9820B"><div class="cn" style="color:#8a6412">🎉 '+esc(name)+'</div><div class="ct" style="color:#b0842a;font-weight:800">'+esc(sub)+'</div></div>';}
/* Scheduled shift's own [start,end] minutes at a store/weekday (0-length if unresolved). */
function shiftWindow(a,store,wd){var sh=shiftById(a.id)||labelToShift(a.label);
  if(sh){var rd=resolve(sh.id,a.store||store,wd);if(rd.start!=null)return [rd.start,rd.end];}
  var pm=parseLabel(a.label);return pm?[pm[0],pm[1]]:null;}
function holCell(hid,store){
  var m=HOLH[hid]&&HOLH[hid][store];

  if(m.closed)return '<span class="hstat closed">Closed</span>';

}

function applyHField(key,val){

function holErr(t){var e=$('#hErr');if(e)e.textContent=t||'';}
async function saveHoliday(){
  var f=HFORM;if(!f)return;
  var stores=visibleStores();
  if(!f.name.trim()){holErr('Give the holiday a name.');return;}
  if(!f.date){holErr('Pick a date.');return;}
  // build per-store rows to write and stores to clear (regular)
  function rowFor(store,state){
    if(state.status==='regular')return null;
    if(state.status==='closed')return {store:store,closed:true,open_min:null,close_min:null};
    var o=timeToMin(state.open),c=timeToMin(state.close);
    if(o==null||c==null||c<=o)return {err:true,store:store};
    return {store:store,closed:false,open_min:o,close_min:c};
  }
  var writes=[],clears=[];
  for(var i=0;i<stores.length;i++){
    var store=stores[i].store;
    var state=f.mode==='all'?{status:f.all.status,open:f.all.open,close:f.all.close}:f.stores[store];
    var r=rowFor(store,state);
    if(r&&r.err){holErr('Custom hours for '+shortStore(store)+' need a valid open & close time.');return;}
    if(r)writes.push(r);else clears.push(store);
  }
  if(!writes.length){holErr('Set at least one store to Closed or custom hours.');return;}
  f.saving=true;drawHolidayModal();
  try{
    var hid=f.editId;
    var confMeta={hours_confirmed:true,confirmed_by:(AUTH&&AUTH.id)||null,confirmed_at:new Date().toISOString()};
    if(hid){
      var up=await sb.from('holidays').update(Object.assign({name:f.name.trim(),holiday_date:f.date},confMeta)).eq('id',hid);
      if(up.error)throw up.error;
    }else{
      var ins=await sb.from('holidays').insert(Object.assign({name:f.name.trim(),holiday_date:f.date,created_by:(AUTH&&AUTH.id)||null},confMeta)).select('id').single();
      if(ins.error)throw ins.error;hid=ins.data.id;
    }
    if(clears.length){var d=await sb.from('holiday_hours').delete().eq('holiday_id',hid).in('store',clears);if(d.error)throw d.error;}
    var payload=writes.map(function(w){return {holiday_id:hid,store:w.store,closed:w.closed,open_min:w.open_min,close_min:w.close_min};});
    var u=await sb.from('holiday_hours').upsert(payload,{onConflict:'holiday_id,store'});
    if(u.error)throw u.error;
    closeHolidayModal();await load();toast((f.editId?'Holiday updated':'Holiday added')+' · '+f.name.trim());
  }catch(e){f.saving=false;drawHolidayModal();holErr(String(e&&e.message||e));}
}

async function sedNew(){

  var r=await sb.from('shifts').insert({name:'New shift',color:color,sort:sort,active:true}).select().single();
  if(r.error){toast(r.error.message,true);return;}
  SED_SHIFTS.push(r.data);SED_BY_ID[r.data.id]=r.data;SED_SEL=String(r.data.id);lsSet('cprSchedShiftSel',SED_SEL);SED_DIRTY=true;
  toast('Shift created');sedRe();
}
async function sedRename(id,name){name=String(name).trim();var s=SED_BY_ID[id];if(!s)return;if(!name){sedDetail();return;}

async function sedRecolor(id,color){var s=SED_BY_ID[id];if(!s)return;

async function sedDel(id){var s=SED_BY_ID[id];if(!s)return;

async function sedCopyLoc(id,store){

    var rows=[{shift_id:id,store:t,weekday:null,start_min:src.def.start,end_min:src.def.end,enabled:src.def.enabled,closed:!!src.def.closed}];
    Object.keys(src.days).forEach(function(wd){var d=src.days[wd];rows.push({shift_id:id,store:t,weekday:+wd,start_min:d.start,end_min:d.end,enabled:true,closed:!!d.closed});});
    var ins=await sb.from('shift_hours').insert(rows).select();if(ins.error){toast(ins.error.message,true);return;}
    var stx={def:null,days:{}};(ins.data||[]).forEach(function(r){var row={id:r.id,enabled:r.enabled!==false,closed:!!r.closed,start:r.start_min,end:r.end_min};if(r.weekday==null)stx.def=row;else stx.days[r.weekday]=row;});
