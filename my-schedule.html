<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Time — CPR</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--white:#FFFFFF;--border:#E0E2EA;--green:#2E9E5B;--amber:#C9820B;--purple:#8B5CF6;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--light-grey);font-family:'Nunito Sans',sans-serif;color:var(--dark);min-height:100vh}
main{max-width:680px;margin:0 auto;padding:18px 16px 70px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.4rem;letter-spacing:-.4px}
.hide{display:none!important}
/* lock (mirrors schedule.html) */
.lock{position:fixed;inset:0;width:100vw;height:100vh;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:2000}
.lock.hide{display:none}
.lock-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:34px 38px;text-align:center;width:100%;max-width:330px}
.lock-box .ic{font-size:30px;margin-bottom:14px}
.lock-box h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;color:#fff;margin-bottom:4px}
.lock-box p{font-size:12px;color:rgba(255,255,255,.4);font-weight:600;margin-bottom:22px}
.lock-box input{width:100%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:8px;padding:12px 14px;font-size:16px;color:#fff;margin-bottom:12px;text-align:center;letter-spacing:4px}
.lock-box button{width:100%;background:var(--red);border:none;border-radius:8px;padding:12px;font-family:'Nunito',sans-serif;font-weight:800;color:#fff;cursor:pointer}
.lock-err{color:#ef4444;font-size:12px;font-weight:700;min-height:16px;margin-top:8px}
.app{display:none}.app.show{display:block}
/* header */
.me-hd{display:flex;align-items:center;gap:11px;margin-bottom:14px}
/* mobile: the admin button crowds the name — drop it to its own row under the location pills */
@media(max-width:979px){
  .me-hd{flex-wrap:wrap;row-gap:9px}
  .me-hd .adminbtn{order:10;margin-left:auto}
}
.me-av{width:44px;height:44px;border-radius:50%;color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;display:flex;align-items:center;justify-content:center;flex:none}
.me-nm{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem;line-height:1.1}
.me-sub{display:flex;align-items:center;gap:6px;margin-top:2px;font-size:.78rem;color:var(--grey);font-weight:700}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;flex:none}
/* admin swivel button — same shape as Schedule Admin's header .btn; greyed without access */
.adminbtn{display:inline-flex;align-items:center;gap:6px;font-family:'Nunito',sans-serif;font-weight:800;border-radius:9px;border:1px solid var(--border);background:#fff;color:var(--dark-grey);padding:8px 13px;font-size:.76rem;cursor:pointer;text-decoration:none;white-space:nowrap}
.adminbtn:hover{border-color:var(--blue);color:var(--blue)}
.adminbtn.off,.adminbtn.off:hover{opacity:.45;cursor:not-allowed;border-color:var(--border);color:var(--dark-grey)}
.locpills{display:inline-flex;background:#fff;border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px}
.locpills button{padding:5px 11px;border:none;border-radius:5px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.68rem;text-transform:uppercase;letter-spacing:.4px;background:transparent;color:var(--grey)}
.locpills button.on{background:var(--blue);color:#fff!important}
/* tabs — brand pill group (white track, dark active) */
.tabs{display:flex;background:#fff;border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px;margin-bottom:14px}
.tabs button{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 4px;border:none;border-radius:5px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;background:transparent;color:var(--grey);transition:all .15s}
.tabs button:not(.on):hover{color:var(--dark-grey)}
.tabs button.on{background:var(--dark);color:#fff}
.tabs button.on .badge{background:#fff;color:var(--amber)}
.tabs .badge{font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;color:#fff;background:var(--amber);border-radius:999px;padding:0 5px;min-width:15px;text-align:center}
/* week nav */
.wknav{display:inline-flex;align-items:stretch;background:#fff;border:1px solid var(--border);border-radius:9px;overflow:hidden}
.wknav button{display:flex;align-items:center;justify-content:center;padding:0 14px;border:none;background:#fff;color:var(--dark-grey);cursor:pointer;font-size:15px;font-weight:800;line-height:1}
.wknav .lbl{display:flex;align-items:center;justify-content:center;margin:0;padding:9px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;text-transform:none;letter-spacing:normal;color:var(--dark);border-left:1px solid #EEF0F4;border-right:1px solid #EEF0F4;white-space:nowrap}
.wknav-wrap{display:flex;justify-content:center;margin-bottom:12px}
/* day cards */
.dcard{display:flex;align-items:center;gap:13px;width:100%;border:1px solid var(--border);border-radius:12px;background:#fff;overflow:hidden;padding:12px 14px;margin-bottom:9px;box-shadow:0 1px 3px rgba(45,45,59,.05)}
.dcard.today{border-color:var(--red)}
.drail{width:42px;flex:none;text-align:center}
.drail .d{font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;letter-spacing:.5px;text-transform:uppercase;color:var(--grey)}
.drail .n{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.15rem;line-height:1.1}
.drail .t{font-family:'Nunito',sans-serif;font-weight:800;font-size:.5rem;letter-spacing:.4px;color:var(--red)}
.dvr{width:1px;align-self:stretch;background:#EEF0F4}
.dbody{flex:1;min-width:0}
.shift-nm{font-family:'Nunito',sans-serif;font-weight:800;font-size:.92rem;display:flex;align-items:center;gap:6px}
.shift-tm{font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.78rem;color:#6b7180;margin-top:1px}
.pill{display:inline-block;margin-top:5px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;letter-spacing:.3px;padding:2px 7px;border-radius:999px}
.muted{color:var(--grey)}
/* store / who's on */
.scard{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 3px rgba(45,45,59,.05)}
.scard.today{border-color:var(--red)}
.scard-hd{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);background:#fafafa}
.scard-hd .h{font-family:'Nunito',sans-serif;font-weight:900;font-size:.84rem}
.scard-bd{padding:8px 14px 11px;display:flex;flex-direction:column;gap:7px}
.who{display:flex;align-items:center;gap:9px}
.av{width:24px;height:24px;border-radius:50%;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;display:flex;align-items:center;justify-content:center;flex:none}
.who .nm{font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem}
.who .tm{margin-left:auto;font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.74rem;color:#9aa0b0}
/* time off */
.btn{font-family:'Nunito',sans-serif;font-weight:800;border:none;border-radius:9px;cursor:pointer;transition:filter .15s}
.btn:hover{filter:brightness(1.05)}
.btn-red{background:var(--red);color:#fff;padding:13px;width:100%;font-size:.9rem}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(45,45,59,.05)}
.lbl{display:block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.58rem;letter-spacing:.5px;text-transform:uppercase;color:var(--grey);margin-bottom:6px}
.inp{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:9px;font-family:'Nunito Sans',sans-serif;font-size:.84rem}
.seg{display:flex;gap:7px}
.seg button{flex:1;padding:9px 4px;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.76rem;background:#fff;color:#9aa0b0}
.sect{font-family:'Nunito',sans-serif;font-weight:900;font-size:.82rem;margin:18px 0 10px}
.req{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--border);border-radius:11px;padding:11px 13px;margin-bottom:8px}
.req .meta{flex:1;min-width:0}
.req .dr{font-family:'Nunito',sans-serif;font-weight:800;font-size:.84rem}
.req .sm{font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.72rem;color:var(--grey);margin-top:2px}
.sbadge{font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;letter-spacing:.4px;text-transform:uppercase;padding:3px 9px;border-radius:999px;flex:none}
.tbadge{font-family:'Nunito',sans-serif;font-weight:800;font-size:.54rem;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:999px}
.warnbox{display:flex;align-items:flex-start;gap:8px;background:#FCF1DD;border:1px solid #F0E0BE;border-radius:10px;padding:10px 12px;margin-bottom:13px;font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.74rem;color:#8A5A00;line-height:1.4}
.acklbl{display:flex;gap:8px;align-items:flex-start;font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;color:#8A5A00;cursor:pointer;line-height:1.35;background:#fff;border:1px solid #F0E0BE;border-radius:8px;padding:8px 10px}
.acklbl input{margin-top:1px;flex:none;width:15px;height:15px;accent-color:#C9820B;cursor:pointer}
.empty{font-family:'Nunito Sans',sans-serif;font-weight:600;font-size:.8rem;color:var(--grey);padding:2px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:11px 18px;border-radius:11px;font-weight:800;font-size:.84rem;opacity:0;pointer-events:none;transition:.2s;z-index:3000;font-family:'Nunito',sans-serif}
.toast.show{opacity:1}.toast.err{background:var(--red)}
/* ===== web (desktop) layout ===== */
body.web main{max-width:1180px;padding:24px 28px 60px}
.webtop{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.wkstrip{background:#fff;border:1px solid var(--border);border-top:3px solid var(--blue);border-radius:12px;box-shadow:0 1px 3px rgba(45,45,59,.05);overflow:hidden;margin-bottom:20px}
.wkstrip-hd{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);background:#fafafa}
.wkstrip-hd .h{font-family:'Nunito',sans-serif;font-weight:900;font-size:.78rem;letter-spacing:.5px;text-transform:uppercase;color:var(--dark)}
.wkstrip-hd .s{font-family:'Nunito Sans',sans-serif;font-weight:600;font-size:.74rem;color:var(--grey)}
.wk-worked{margin-left:auto;font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.74rem;color:var(--grey)}
.wk-worked b{font-family:'Nunito',sans-serif;font-weight:900;color:var(--dark)}
.wk-worked .ot{color:var(--red);font-weight:800;margin-left:6px}
.wk-worked .live{color:#1E9E5B;font-weight:800;margin-left:6px}
.ptochip{display:inline-flex;flex-direction:column;background:var(--light-grey);border:1px solid var(--border);border-radius:9px;padding:7px 11px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.92rem;color:var(--dark);line-height:1.1}
.ptochip span{font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.6rem;text-transform:uppercase;letter-spacing:.3px;color:var(--grey);margin-top:2px}
.wkgrid{display:grid;grid-template-columns:repeat(7,1fr)}
.wkcol{display:flex;flex-direction:column;padding:11px 12px;border-left:1px solid #F5F6F8;min-height:120px}
.wkcol.today{background:#FFFBFB}
.wkcol .dh{display:flex;align-items:baseline;gap:6px;margin-bottom:8px}
.wkcol .dh .d{font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;letter-spacing:.5px;text-transform:uppercase;color:var(--grey)}
.wkcol .dh .n{font-family:'Nunito',sans-serif;font-weight:900;font-size:.92rem}
.twocol{display:grid;grid-template-columns:1fr 330px;gap:20px;align-items:start}
.wsect{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;margin-bottom:4px}
.wboard{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 1px 3px rgba(45,45,59,.05);overflow:hidden}
.wboard-hd{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);background:#fafafa}
.wboard-hd .nm{font-family:'Nunito',sans-serif;font-weight:900;font-size:.82rem;letter-spacing:.5px;text-transform:uppercase;color:var(--dark)}
.wbt{width:100%;border-collapse:collapse;table-layout:fixed}
.wbt th{padding:8px 6px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;letter-spacing:.4px;text-transform:uppercase;color:var(--grey);border-bottom:1px solid #EEF0F4;border-left:1px solid #F5F6F8;text-align:center}
.wbt th.p{width:130px;text-align:left;padding:8px 14px;border-left:none}
.wbt td.p{padding:7px 14px;border-bottom:1px solid #F5F6F8}
.wbt td.c{padding:4px 5px;border-bottom:1px solid #F5F6F8;border-left:1px solid #F5F6F8;vertical-align:middle;height:46px}
.wchip{border-radius:6px;padding:4px 6px}
.wchip .n{font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wchip .t{font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.58rem;color:#6b7180}
.side{display:flex;flex-direction:column;gap:16px;position:sticky;top:24px}
/* planner modal */
.pl-back{position:fixed;inset:0;z-index:2000;background:rgba(45,45,59,.45);display:flex;align-items:center;justify-content:center;padding:24px}
.pl{position:relative;width:820px;max-width:100%;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.32)}
.pl-hd{position:relative;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 58px 13px 18px;border-bottom:1px solid var(--border);background:var(--light-grey)}
.pl-hd .t{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;color:var(--dark)}
.pl-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.pl-cell{min-height:60px;padding:7px 8px;text-align:left;border:none;border-top:1px solid #F0F1F4;border-left:1px solid #F0F1F4;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between}
.pl-ft{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 18px;border-top:1px solid #EEF0F4;flex-wrap:wrap}
.pl-chips{display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.pl-ini{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.5rem;letter-spacing:-.2px}
.pl-more{font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;color:var(--dark-grey);align-self:center}
@media(max-width:560px){
  .pl-hd{flex-wrap:wrap;row-gap:11px;padding:14px 50px 13px 16px}
  .pl-hd .t{flex:1 1 100%;font-size:.95rem;line-height:1.2}
  .pl-hd #plx{top:14px;transform:none}
}
@media(min-width:561px){
  .pl-cell{min-height:96px;padding:9px 11px}
  .pl-cell span:first-child{font-size:.92rem !important}
  .pl-ini{width:21px;height:21px;font-size:.56rem}
}
/* month calendar (My schedule + Team off layers) */
.mtoolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.mlayer{display:inline-flex;background:var(--dark);border:1px solid var(--dark);border-radius:8px;padding:3px;gap:2px}
.mlayer button{padding:7px 12px;border:none;border-radius:5px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.7rem;background:transparent;color:rgba(255,255,255,.55)}
.mlayer button.on{background:#fff;color:var(--dark)}
.mcal{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(45,45,59,.05)}
.mcal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:#fafafa;border-bottom:1px solid var(--border)}
.mcal-dow div{padding:7px 4px;text-align:center;font-family:'Nunito',sans-serif;font-weight:800;font-size:.54rem;letter-spacing:.4px;text-transform:uppercase;color:var(--grey)}
.mcal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.mcell{min-height:58px;padding:4px 4px 5px;border-top:1px solid #F0F1F4;border-left:1px solid #F0F1F4;display:flex;flex-direction:column;gap:2px;overflow:hidden}
.mcell:nth-child(7n+1){border-left:none}
.mcell.out{background:#FBFBFC}
.mcell.today{background:#FFF7F7}
.mtop{display:flex;align-items:center;gap:4px}
.mcell .mn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.66rem;color:var(--dark-grey)}
.mcell.today .mn{color:var(--red)}
.mcell .mhol{font-family:'Nunito',sans-serif;font-weight:800;font-size:.5rem;color:#C9820B;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mchip{border-radius:4px;padding:2px 4px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mchip .mt{font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.52rem;color:#6b7180;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.moff{font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;color:#cfd2dd}
.mteam{display:flex;flex-wrap:wrap;gap:2px}
.mini{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.46rem;flex:none}
.web .mcell{min-height:104px;padding:7px 8px 8px;gap:3px}
.web .mcell .mn{font-size:.8rem}
.web .mcell .mhol{font-size:.58rem}
.web .mchip{font-size:.66rem;padding:3px 6px}
.web .mchip .mt{font-size:.6rem}
.web .mini{width:20px;height:20px;font-size:.54rem}
.web .moff{font-size:.66rem}
body.mfull main{max-width:none}   /* month view fills the viewport instead of the 680/1180 column */
</style>
</head>
<body>
<div id="lockScreen" class="lock">
  <div class="lock-box">
    <div class="ic">🗓️</div>
    <h2>My Time</h2>
    <p>Enter your PIN to see your shifts.</p>
    <input id="lkPin" type="password" inputmode="numeric" placeholder="PIN" autocomplete="off">
    <button id="lkGo">Unlock</button>
    <div id="lkErr" class="lock-err"></div>
  </div>
</div>

<div id="app" class="app">
  <main>
    <div class="me-hd">
      <span class="me-av" id="meAv"></span>
      <div style="min-width:0">
        <div class="me-nm" id="meNm"></div>
        <div class="me-sub" id="meSub"></div>
      </div>
      <span style="flex:1"></span>
      <a class="adminbtn off" id="schAdminBtn" href="schedule-admin.html" title="Managers &amp; the owner only">🗓️ Schedule Admin</a>
      <span id="locWrap"></span>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="wknav"></div>
    <div id="view"></div>
  </main>
</div>
<div id="toast" class="toast"></div>

<script src="assets/pin-gate.js"></script>
<script src="assets/nav.js"></script>
<script src="assets/pto-summary.js"></script>

var AVPAL=['#DC282E','#2E9E5B','#4FB0E3','#C9820B','#7A6FD0','#2D2D3B','#1E7AA8','#C24E8E'];
function avatarBg(id){var h=0,s=String(id||'');for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return AVPAL[h%AVPAL.length];}
function initials(n){var p=String(n||'?').trim().split(/\s+/);return ((p[0]||'')[0]||'')+((p[1]||'')[0]||'')||'?';}
function hexA(hex,a){var h=String(hex||'#4FB0E3').replace('#','');if(h.length===3)h=h.split('').map(function(c){return c+c;}).join('');return 'rgba('+(parseInt(h.slice(0,2),16)||79)+','+(parseInt(h.slice(2,4),16)||176)+','+(parseInt(h.slice(4,6),16)||227)+','+a+')';}
function fmtMin(m){if(m==null)return '';var h=Math.floor(m/60),mm=m%60,h12=h%12;if(h12===0)h12=12;return mm?(h12+':'+('0'+mm).slice(-2)):(''+h12);}
function rangeMin(s,e){return fmtMin(s)+'–'+fmtMin(e);}
function iso(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function fmtRange(s,e){var a=s.split('-').map(Number),b=e.split('-').map(Number);if(s===e)return MON[a[1]-1]+' '+a[2];if(a[1]===b[1])return MON[a[1]-1]+' '+a[2]+'–'+b[2];return MON[a[1]-1]+' '+a[2]+' – '+MON[b[1]-1]+' '+b[2];}
function dayCount(s,e){var n=Math.round((new Date(e)-new Date(s))/86400000)+1;return n===1?'1 day':n+' days';}
function statusBadge(st){return 'sbadge '+(st==='approved'?'':st==='denied'?'':'')+'';}
function statusStyle(st){return st==='approved'?'color:var(--green);background:#E6F4EC':st==='denied'?'color:var(--red);background:#FBE9EA':'color:var(--amber);background:#FCF3E3';}

var STAFF=[], STORES=[], SHIFT_BY_ID={}, HOURS={}, SCHED={}, REQS=[], HOLBYDATE={}, HOLNAME={}, HOLHMAP={}, OVR={};
var HOL_AMBER='#C9820B';
function lsGet(k,d){try{var v=localStorage.getItem(k);return v==null?d:v;}catch(e){return d;}}

/* Effective day for a real date: a per-week schedule_override wins over the recurring template
   (mirrors Schedule Admin › This Week). */
function effDayRec(staffId,wd,di){
  var o=OVR[staffId+'|'+di];
  if(o){ if(o.is_off) return {off:true}; if(o.shift_id!=null) return {shift_id:o.shift_id,store:o.store,ovr:true}; return {none:true}; }
  return dayRec(staffId,wd);
}
/* Holiday effect on a store for a date: null = none; {closed} or {open,close} minutes. */
function holEffect(store,di){var hid=HOLBYDATE[di];if(hid==null)return null;var m=HOLHMAP[hid+'|'+store];if(!m)return null;return m.closed?{closed:true}:{open:m.open,close:m.close};}
function shiftWindow(r,wd){var s=SHIFT_BY_ID[r.shift_id]||labelToShift(r.label);
  if(s){var rd=resolve(s.id,r.store,wd);if(rd.start!=null)return [rd.start,rd.end];}
  var pm=parseLabel(r.label);return pm?[pm[0],pm[1]]:null;}
/* Trim a resolved shift view by a holiday, matching Schedule Admin › This Week:
   closed -> amber "🎉 <Holiday> / Closed" chip; reduced -> shift name + 🎉 with clamped range. */
function holAdjust(v,r,wd,di){
  if(!di||!r||!r.store)return v;
  var eff=holEffect(r.store,di);if(!eff)return v;
  var nm=HOLNAME[di]||'Holiday';
  v.holiday=true;v.color=HOL_AMBER;
  if(eff.closed){v.name='🎉 '+nm;v.time='Closed';return v;}
  var win=shiftWindow(r,wd);
  if(!win){v.name='🎉 '+nm;return v;}
  var cs=Math.max(win[0],eff.open),ce=Math.min(win[1],eff.close);
  if(ce<=cs){v.name='🎉 '+nm;v.time='Closed';}
  else{v.name=v.name+' 🎉';v.time=rangeMin(cs,ce);}
  return v;
}
function resolve(shiftId,store,wd){
  var h=HOURS[shiftId+'|'+store];
  if(!h||!h.def||!h.def.enabled)return {offered:false};
  var d=h.days[wd];
  if(d&&d.closed)return {closed:true};
  if(d&&d.start!=null)return {start:d.start,end:d.end};
  if(h.def.closed)return {closed:true};
  return {start:h.def.start,end:h.def.end};
}
function storeColor(store){var s=STORES.filter(function(x){return x.store===store;})[0];return (s&&s.color)||'#4FB0E3';}
function dayRec(staffId,wd){
  var sh=(SCHED[staffId]&&SCHED[staffId].shifts)||{}, v=sh[String(wd)];
  if(v==null)return {none:true};
  if(typeof v==='string')v={label:v};
  if(v==='off'||v.label==='Off')return {off:true};
  var sid=v.shift_id;
  if(sid==null&&v.label){var m=Object.values(SHIFT_BY_ID).filter(function(s){return s.name===v.label;})[0];if(m)sid=m.id;}
  if(sid==null)return {none:true};
  return {shift_id:sid,store:v.store||(SCHED[staffId]&&SCHED[staffId].store),label:v.label};
}
function parseLabel(label){var m=String(label||'').split(/\s*[-–]\s*/);if(m.length!==2)return null;
  function t(s){var x=/(\d+)(?::(\d+))?\s*([AP]M)?/i.exec(String(s).trim());if(!x)return null;var h=(+x[1])%12;if(/pm/i.test(x[3]||''))h+=12;return h*60+(+(x[2]||0));}
  var a=t(m[0]),b=t(m[1]);return (a==null||b==null)?null:[a,b];}
/* Map a label that is itself a shift NAME (e.g. "Opener") to its definition. */
function labelToShift(label){var n=String(label||'').trim().toLowerCase();if(!n)return null;
  return Object.keys(SHIFT_BY_ID).map(function(k){return SHIFT_BY_ID[k];}).filter(function(s){return String(s.name||'').trim().toLowerCase()===n;})[0]||null;}
/* Resolve a day's chip — every scheduled day renders cleanly. A named shift shows its
   name + resolved hours; a day stored with explicit hours (e.g. "11:30AM - 7:30PM")
   shows that time range. Ordinary scheduled hours are never flagged as errors. */
function shiftView(r,wd){
  var s=SHIFT_BY_ID[r.shift_id]||labelToShift(r.label);
  if(s){var rd=resolve(s.id,r.store,wd);
    if(rd.start!=null)return {name:s.name,color:s.color||'#4FB0E3',time:rangeMin(rd.start,rd.end),warn:false};
    var pm0=parseLabel(r.label);
    if(pm0)return {name:s.name,color:s.color||'#4FB0E3',time:rangeMin(pm0[0],pm0[1]),warn:false};
    return {name:s.name,color:s.color||'#4FB0E3',time:rd.closed?'closed':'',warn:false};}
  var pm=parseLabel(r.label);
  if(pm)return {name:rangeMin(pm[0],pm[1]),color:'#4FB0E3',time:'',warn:false};
  if(r.label&&r.label!=='Off')return {name:r.label,color:'#4FB0E3',time:'',warn:false};
  return {name:'Scheduled',color:'#B9BDCB',time:'',warn:false};
}
function weekStart(d){var x=new Date(d);x.setDate(x.getDate()-x.getDay());x.setHours(0,0,0,0);return x;}
function myStores(){
  var set={};if(ME.home_store)set[ME.home_store]=1;
  var sh=(SCHED[ME.id]&&SCHED[ME.id].shifts)||{};
  Object.keys(sh).forEach(function(k){var r=dayRec(ME.id,k);if(r.store)set[r.store]=1;});
  (ME.authorized_stores||[]).forEach(function(s){if(ME.role==='owner'||ME.role==='admin'||ME.role==='manager')set[s]=1;});
  var order=STORES.map(function(s){return s.store;});
  return Object.keys(set).sort(function(a,b){return order.indexOf(a)-order.indexOf(b);});
}
function approvedOn(staffId,isoDate){return REQS.filter(function(r){return r.staff_id===staffId&&r.status==='approved'&&r.start_date<=isoDate&&r.end_date>=isoDate;})[0]||null;}
/* partial day: they're away for some hours but still work the rest of the shift */
function apPartial(ap,isoDate){return !!(ap&&ap.partial_days&&ap.partial_days[isoDate]);}
function apAway(ap,isoDate){return (ap&&ap.day_hours&&Number(ap.day_hours[isoDate]))||0;}
function pendingOn(staffId,isoDate){return REQS.filter(function(r){return r.staff_id===staffId&&r.status==='pending'&&r.start_date<=isoDate&&r.end_date>=isoDate;})[0]||null;}

    sb.from('shift_hours').select('shift_id,store,weekday,start_min,end_min,closed,enabled'),
    sb.from('staff_schedule').select('staff_id,store,shifts'),
    sb.from('time_off_requests').select('id,staff_id,store,type,start_date,end_date,status,note,hours,paid,day_hours,partial_days'),
    sb.from('holidays').select('id,holiday_date,name'),

  HOURS={};(hr.data||[]).forEach(function(r){var k=r.shift_id+'|'+r.store,h=HOURS[k]||(HOURS[k]={def:null,days:{}});var row={closed:!!r.closed,start:r.start_min,end:r.end_min,enabled:r.enabled!==false};if(r.weekday==null)h.def=row;else h.days[r.weekday]=row;});
  SCHED={};(sc.data||[]).forEach(function(r){SCHED[r.staff_id]={shifts:r.shifts||{},store:r.store};});

  OVR={};((ov&&ov.data)||[]).forEach(function(r){OVR[r.staff_id+'|'+String(r.ovr_date).slice(0,10)]=r;});

function isWeb(){return window.innerWidth>=980;}
function render(){

  try{if(location.hash.replace('#','')!==TAB)history.replaceState(null,'','#'+TAB);}catch(e){}
  var web=isWeb();
  document.body.classList.toggle('web',web);
  document.body.classList.toggle('mfull',TAB==='month');     // month calendar spans full width
  $('#tabs').classList.toggle('hide',web);

  // picker is a dead control there — it only matters on mobile (Store tab, holiday card).

  if(TAB==='month'){ if(!MMON)MMON=new Date((new Date()).getFullYear(),(new Date()).getMonth(),1); renderMonth(web); return; }
  if(web){renderWeb();return;}
  renderWknav();
  if(TAB==='me')renderMe();else if(TAB==='store')renderStore();else renderTimeoff();

var _rz=null;window.addEventListener('resize',function(){clearTimeout(_rz);_rz=setTimeout(function(){if(ME)render();},150);});
function renderMe(){
  var todayIso=iso(new Date());
  var html=DAYS.map(function(dy,wd){
    var dt=new Date(WK);dt.setDate(dt.getDate()+wd);var di=iso(dt);var isToday=di===todayIso;
    var rail='<div class="drail"><div class="d">'+dy+'</div><div class="n"'+(isToday?' style="color:var(--red)"':'')+'>'+dt.getDate()+'</div>'+(isToday?'<div class="t">TODAY</div>':'')+'</div>';
    var ap=approvedOn(ME.id,di), body;
    if(ap&&apPartial(ap,di)){var cp=TYPES[ap.type]||'#B9BDCB';body='<div class="shift-nm" style="color:#8a5a00"><span class="dot" style="background:'+cp+'"></span>½ Partial day</div><div class="shift-tm">'+esc(ap.type)+' · away '+apAway(ap,di)+'h</div>';}
    else if(ap){var c=TYPES[ap.type]||'#B9BDCB';body='<div class="shift-nm" style="color:'+c+'"><span class="dot" style="background:'+c+'"></span>Time off</div><div class="shift-tm">'+esc(ap.type)+'</div>';}
    else{
      var r=effDayRec(ME.id,wd,di);
      if(r.none||r.off)body='<span class="shift-nm muted">Day off</span>';
      else{var v=holAdjust(shiftView(r,wd),r,wd,di);var pend=pendingOn(ME.id,di);
        body='<div class="shift-nm"><span class="dot" style="background:'+esc(v.color)+'"></span>'+esc(v.name)+'</div><div class="shift-tm">'+(v.time?esc(v.time)+' · ':'')+esc(shortStore(r.store))+'</div>'
          +(pend?'<span class="pill" style="color:var(--amber);background:#FCF3E3">YOUR TIME OFF — PENDING</span>':'');}
    }
    return '<div class="dcard'+(isToday?' today':'')+'">'+rail+'<div class="dvr"></div><div class="dbody">'+body+'</div></div>';
  }).join('');
  $('#view').innerHTML=html;
}
function renderStore(){
  var store=SELSTORE, todayIso=iso(new Date());
  if(!store){$('#view').innerHTML='<div class="empty">No store schedule to show.</div>';return;}
  var html=DAYS.map(function(dy,wd){
    var dt=new Date(WK);dt.setDate(dt.getDate()+wd);var di=iso(dt);var isToday=di===todayIso;
    var working=[];
    STAFF.forEach(function(e){
      var ap=approvedOn(e.id,di);if(ap&&!apPartial(ap,di))return;   // partial-day people still work part of the shift
      var r=effDayRec(e.id,wd,di);if(r.none||r.off||r.store!==store)return;
      var v=holAdjust(shiftView(r,wd),r,wd,di),rd=resolve(r.shift_id,store,wd),pl=parseLabel(r.label);
      var startMin=rd.start!=null?rd.start:(pl?pl[0]:9999);
      working.push({e:e,name:e.display_name,tm:v.time||v.name,start:startMin,me:e.id===ME.id});

    +'<div class="seg" style="flex:none">'+['Vacation','Personal','Sick','Unpaid'].map(function(t){var on=WIZ.type===t,c=TYPES[t]||'#8A8F9C';return '<button data-wtype="'+t+'" style="'+(on?'border-color:'+c+';background:'+hexA(c,0.12)+';color:'+c:'')+'">'+t+'</button>';}).join('')+'</div></div>'
    +'<div class="pl-grid" style="background:#fafafa;border-bottom:1px solid var(--border)">'+DAYS.map(function(d){return '<div style="padding:9px 8px;font-family:Nunito;font-weight:800;font-size:.56rem;letter-spacing:.4px;text-transform:uppercase;color:var(--grey)">'+d+'</div>';}).join('')+'</div>'
    +'<div class="pl-grid">'+cells+'</div>'
    +'<div class="pl-ft"><div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">'
    +lg('<span style="width:11px;height:11px;border-radius:3px;background:#fff;border:1.5px solid var(--border)"></span>','Open')
    +lg('<span style="width:11px;height:11px;border-radius:3px;background:#FCF6EA;border:1.5px solid #EBD9AE"></span>','Pending')
    +lg('<span style="width:11px;height:11px;border-radius:3px;background:#FBEDED;border:1.5px solid #F0C9C9"></span>','Booked')
    +lg('<span class="pl-ini" style="background:#4FB0E3;box-shadow:0 0 0 1.5px var(--dark)">ME</span>','Your time off')
    +'</div><div style="flex:1"></div><div style="font-family:Nunito Sans;font-size:.82rem">'+(WIZ.start?'<b style="font-family:Nunito">'+esc(fmtRange(WIZ.start,WIZ.end||WIZ.start))+'</b>':'<span style="color:var(--grey)">Click a start, then an end — sick days can be back-dated</span>')+'</div>'
    +'<button class="btn btn-red" id="wzNext1" style="width:auto;padding:9px 16px;'+(WIZ.start?'':'opacity:.5;cursor:not-allowed')+'">Next: My schedule →</button></div>';
}
function wireWizStep1(back){
  back.querySelectorAll('[data-pm]').forEach(function(b){b.onclick=function(){WIZ.mon=new Date(WIZ.mon.getFullYear(),WIZ.mon.getMonth()+Number(b.getAttribute('data-pm')),1);drawWiz();};});
  var mp=back.querySelector('[data-wmpick]');
  if(mp)mp.onclick=function(ev){ev.stopPropagation();openMonthPicker(mp,function(){return WIZ.mon;},function(d){WIZ.mon=d;drawWiz();});};
  back.querySelectorAll('[data-wtype]').forEach(function(b){b.onclick=function(){WIZ.type=b.getAttribute('data-wtype');drawWiz();};});
  back.querySelectorAll('[data-day]').forEach(function(b){var di=b.getAttribute('data-day');if(!di)return;b.onclick=function(){
    if(!WIZ.start||(WIZ.start&&WIZ.end)||di<WIZ.start){WIZ.start=di;WIZ.end=null;}else WIZ.end=di;WIZ.days=null;drawWiz();};});
  back.querySelector('#wzNext1').onclick=function(){if(!WIZ.start)return;if(!WIZ.end)WIZ.end=WIZ.start;wizBuildDays();WIZ.step=2;drawWiz();};
}
/* ---- step 2: expected schedule + per-day PTO hours, laid out as a calendar ---- */
function wizStep2Html(){
  var paid=isPaidType(WIZ.type);
  // week rows covering the selected range (Sunday-aligned)
  var sp=WIZ.start.split('-').map(Number),ep=WIZ.end.split('-').map(Number);
  var gStart=new Date(sp[0],sp[1]-1,sp[2]-new Date(sp[0],sp[1]-1,sp[2]).getDay());
  var gEnd=new Date(ep[0],ep[1]-1,ep[2]+(6-new Date(ep[0],ep[1]-1,ep[2]).getDay()));
  var cells='',cur=new Date(gStart),lastMon=-1,guard=0;
  while(cur<=gEnd&&guard++<77){
    var di=iso(cur),inRange=di>=WIZ.start&&di<=WIZ.end,d=inRange?WIZ.days[di]:null;
    var mLbl=(cur.getMonth()!==lastMon)?(MON[cur.getMonth()]+' '):'';lastMon=cur.getMonth();
    var num='<div style="display:flex;align-items:center;justify-content:space-between;gap:4px"><span style="font-family:Nunito;font-weight:800;font-size:.74rem;color:'+(inRange?(d&&!d.off&&d.use?'var(--dark)':'var(--grey)'):'#d8dbe2')+'">'+mLbl+cur.getDate()+'</span>';
    if(!inRange){
      cells+='<div class="pl-cell" style="min-height:104px;background:#FBFBFC;cursor:default">'+num+'</div></div>';
    }else if(d.off){
      cells+='<div class="pl-cell" style="min-height:104px;background:#FBFBFC;cursor:default">'+num+'</div>'
        +'<div style="font-family:Nunito;font-weight:800;font-size:.62rem;letter-spacing:.4px;text-transform:uppercase;color:#cfd2dd;margin-top:4px">'+(d.holiday?'🎉 Closed':'Day off')+'</div>'
        +'<div style="font-family:Nunito Sans;font-weight:700;font-size:.6rem;color:var(--grey);line-height:1.3;margin-top:2px">'+(d.holiday?esc(d.holiday):'No '+(paid?'PTO':'hours')+' needed')+'</div></div>';
    }else{
      var on=d.use,half=on&&d.partial;
      var accent=half?'#B45309':'var(--green)';
      cells+='<div class="pl-cell" data-wday="'+di+'" style="min-height:122px;cursor:pointer;background:'+(on?(half?'#FFF9F1':'#F1FAF4'):'#fff')+';box-shadow:inset 0 0 0 '+(on?'1.5px '+accent:'0 transparent')+'">'
        +num+'<span style="width:17px;height:17px;border-radius:50%;flex:none;display:inline-flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:900;'+(on?'background:'+accent+';color:#fff':'background:#fff;border:1.5px solid var(--grey);color:transparent')+'">'+(half?'½':'✓')+'</span></div>'
        +'<div style="font-family:Nunito;font-weight:800;font-size:.7rem;color:'+(on?'var(--dark)':'var(--dark-grey)')+';margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(d.name)+(d.holiday?' 🎉':'')+'</div>'
        +'<div style="font-family:Nunito Sans;font-weight:700;font-size:.6rem;color:var(--grey);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(d.time||'')+(d.est?' · est.':'')+'</div>'
        +(on?'<div style="display:flex;gap:3px;margin-top:4px">'
          +'<button data-wmode="'+di+'|full" style="flex:1;padding:2px 0;border-radius:6px;font-family:Nunito;font-weight:800;font-size:.54rem;text-transform:uppercase;cursor:pointer;'+(!half?'background:var(--green);border:1px solid var(--green);color:#fff':'background:#fff;border:1px solid var(--border);color:var(--grey)')+'">Full day</button>'
          +'<button data-wmode="'+di+'|part" style="flex:1;padding:2px 0;border-radius:6px;font-family:Nunito;font-weight:800;font-size:.54rem;text-transform:uppercase;cursor:pointer;'+(half?'background:#B45309;border:1px solid #B45309;color:#fff':'background:#fff;border:1px solid var(--border);color:var(--grey)')+'">½ Partial</button></div>':'')
        +'<div style="display:flex;align-items:center;gap:4px;margin-top:4px">'
        +'<input type="number" data-whrs="'+di+'" value="'+esc(on?d.hours:'')+'" min="0" max="'+d.sched+'" step="0.25"'+(on?'':' disabled')+' style="width:52px;padding:4px 5px;border:1.5px solid '+(on?'var(--border)':'#EEF0F4')+';border-radius:7px;font-family:Nunito Sans;font-weight:700;font-size:.76rem;text-align:right;'+(on?'background:#fff':'background:#F5F5F6;color:var(--grey)')+'">'
        +'<span style="font-family:Nunito Sans;font-weight:700;font-size:.6rem;color:var(--grey);white-space:nowrap">'+(half?'away, of ':'of ')+d.sched+'h</span></div></div>';
    }
    cur.setDate(cur.getDate()+1);
  }
  var total=wizTotal(),bal=wizBal();
  var over=paid&&bal!=null&&total>bal;
  var anySched=wizDates().some(function(di){return !WIZ.days[di].off;});
  var note=anySched?'':'<div style="padding:12px 18px;font-family:Nunito Sans;font-weight:700;font-size:.8rem;color:var(--dark-grey);background:#F7FAFD;border-bottom:1px solid var(--border)">These dates all fall on your regular days off — you can still submit the request so your manager knows, but no '+(paid?'PTO':'hours')+' will be used.</div>';
  return '<div style="padding:11px 18px;border-bottom:1px solid var(--border);font-family:Nunito Sans;font-weight:700;font-size:.8rem;color:var(--dark-grey)">'
    +'Tap the days you want to use '+(paid?'<b>PTO</b>':'<b>unpaid hours</b>')+' for, and adjust the hours if you like — you can go lower to stretch your bank, never higher than your scheduled shift. Use <b>½ Partial</b> for appointments — you\'re off part of the shift and working the rest.</div>'
    +note
    +'<div class="pl-grid" style="background:#fafafa;border-bottom:1px solid var(--border)">'+DAYS.map(function(d){return '<div style="padding:9px 8px;font-family:Nunito;font-weight:800;font-size:.56rem;letter-spacing:.4px;text-transform:uppercase;color:var(--grey)">'+d+'</div>';}).join('')+'</div>'
    +'<div style="max-height:50vh;overflow:auto"><div class="pl-grid">'+cells+'</div></div>'
    +(over?'<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 18px;background:#FBE9EA;border-top:1px solid #F0C9C9;font-family:Nunito Sans;font-weight:700;font-size:.8rem;color:var(--red)"><span style="flex:1;min-width:220px">⚠ That\'s <b>'+total+'h</b> but you only have <b>'+bal+'h</b> '+(WIZ.type==='Sick'?'sick time':'PTO')+' — hours past your balance wouldn\'t be paid.</span><button class="btn" id="wzTrim" style="width:auto;padding:7px 14px;border:none;background:var(--red);color:#fff;font-size:.76rem">✂ Trim to '+bal+'h</button></div>':'')
    +'<div class="pl-ft"><div style="font-family:Nunito Sans;font-weight:700;font-size:.84rem;color:'+(over?'var(--red)':'var(--dark)')+'">Using <b style="font-family:Nunito;font-size:.95rem">'+total+'h</b>'+(paid?' PTO':' unpaid')+'</div>'
    +'<span id="wzBal" style="font-family:Nunito Sans;font-weight:700;font-size:.76rem;color:var(--grey)">'+(paid?(bal!=null?('Available: <b style="color:var(--dark)">'+bal+' hrs</b>'):'Available: …'):'Not paid time off')+'</span>'
    +'<div style="flex:1"></div><button class="btn" id="wzBack2" style="width:auto;padding:9px 16px;border:1.5px solid var(--border);background:#fff;color:var(--dark-grey)">← Back</button>'
    +'<button class="btn btn-red" id="wzNext2" style="width:auto;padding:9px 16px'+(over?';opacity:.5;cursor:not-allowed':'')+'"'+(over?' disabled':'')+'>Next: Review →</button></div>';
}
function wireWizStep2(back){
  back.querySelectorAll('[data-wday]').forEach(function(cell){cell.onclick=function(ev){
    if(ev.target.closest('[data-whrs]')||ev.target.closest('[data-wmode]'))return;   // inner controls shouldn't toggle the day
    var d=WIZ.days[cell.getAttribute('data-wday')];d.use=!d.use;if(d.use&&!(Number(d.hours)>0)){d.hours=d.partial?Math.round(d.sched/2*4)/4:d.sched;}drawWiz();};});
  back.querySelectorAll('[data-wmode]').forEach(function(b){b.onclick=function(){
    var p=b.getAttribute('data-wmode').split('|'),d=WIZ.days[p[0]],part=p[1]==='part';
    if(d.partial===part)return;
    d.partial=part;
    d.hours=part?Math.round(d.sched/2*4)/4:d.sched;                 // partial defaults to half the shift
    drawWiz();};});
  back.querySelectorAll('[data-whrs]').forEach(function(inp){
    inp.onchange=function(){var d=WIZ.days[inp.getAttribute('data-whrs')];var v=Number(inp.value);
      if(!(v>=0))v=d.sched; if(v>d.sched)v=d.sched;                 // never more than scheduled
      d.hours=Math.round(v*100)/100; drawWiz();};
    inp.oninput=function(){var d=WIZ.days[inp.getAttribute('data-whrs')];var v=Number(inp.value);
      if(v>d.sched){inp.value=d.sched;d.hours=d.sched;}else if(v>=0)d.hours=Math.round(v*100)/100;
      var t=back.querySelector('.pl-ft b');if(t)t.textContent=wizTotal()+'h';};
  });
  back.querySelector('#wzBack2').onclick=function(){WIZ.step=1;drawWiz();};
  var tr=back.querySelector('#wzTrim');if(tr)tr.onclick=wizTrim;
  var nx=back.querySelector('#wzNext2');if(nx)nx.onclick=function(){if(nx.disabled)return;WIZ.step=3;drawWiz();};
}
/* auto-trim paid hours down to the available balance: the LAST days of the range give up
   hours first, so the start of the trip stays fully paid; a day trimmed to 0 flips to an
   unpaid day off (still requested off, just no PTO drawn) */
function wizTrim(){
  var bal=wizBal();if(bal==null)return;
  var excess=Math.round((wizTotal()-bal)*100)/100;
  if(excess<=0)return;
  var ds=wizDates().slice().reverse();
  for(var i=0;i<ds.length&&excess>0;i++){
    var d=WIZ.days[ds[i]];
    if(d.off||!d.use||!(Number(d.hours)>0))continue;
    var cut=Math.min(Number(d.hours),excess);
    d.hours=Math.round((Number(d.hours)-cut)*100)/100;
    if(!(d.hours>0)){d.hours=0;d.use=false;}
    excess=Math.round((excess-cut)*100)/100;
  }
  drawWiz();
  toast('✂ Trimmed to your '+bal+'h balance');
}
/* ---- step 3: review, description, overlap acknowledgment, submit ---- */
function wizStep3Html(){
  var paid=isPaidType(WIZ.type),c=TYPES[WIZ.type]||'#8A8F9C',total=wizTotal();
  var used=wizDates().filter(function(di){var d=WIZ.days[di];return !d.off&&d.use&&Number(d.hours)>0;});
  var offs=wizDates().filter(function(di){return WIZ.days[di].off;});
  var skipped=wizDates().filter(function(di){var d=WIZ.days[di];return !d.off&&(!d.use||!(Number(d.hours)>0));});
  var conflicts=conflictsFor(WIZ.start,WIZ.end),conflictTxt=conflictText(conflicts);
  var needNote=(WIZ.type==='Vacation'||WIZ.type==='Personal');
  var noteLbl=needNote?'Description <span style="color:var(--red)">*</span>'
    :(WIZ.type==='Sick'?'Description <span style="text-transform:none;font-weight:600;color:var(--grey)">(optional — you never have to share medical details)</span>':'Description <span style="text-transform:none;font-weight:600;color:var(--grey)">(optional)</span>');
  function line(di,txt,strong){return '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 0;border-top:1px solid #F3F2F2"><span style="font-family:Nunito;font-weight:'+(strong?'800':'700')+';font-size:.8rem;color:'+(strong?'var(--dark)':'var(--grey)')+'">'+wizDayLabel(di)+'</span><span style="font-family:Nunito Sans;font-weight:700;font-size:.76rem;color:'+(strong?'var(--dark-grey)':'var(--grey)')+'">'+txt+'</span></div>';}
  var dayLines=wizDates().map(function(di){var d=WIZ.days[di];
    if(d.off)return line(di,d.holiday?'🎉 '+esc(d.holiday):'Regular day off',false);
    if(!d.use||!(Number(d.hours)>0))return line(di,'Scheduled '+d.sched+'h · no '+(paid?'PTO':'hours')+' used',false);
    if(d.partial)return line(di,'<span style="color:#8a5a00">½ Partial</span> — away <b>'+d.hours+'h</b> of '+d.sched+'h, working the rest',true);
    return line(di,(paid?'PTO ':'Unpaid ')+'<b>'+d.hours+'h</b> of '+d.sched+'h scheduled',true);
  }).join('');
  return '<div style="max-height:56vh;overflow:auto;padding:16px 18px">'
    +'<div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:12px">'
    +'<span class="tbadge" style="color:'+c+';background:'+hexA(c,0.13)+';font-size:.72rem;padding:4px 11px">'+esc(WIZ.type)+'</span>'
    +'<span style="font-family:Nunito;font-weight:900;font-size:1.02rem">'+esc(fmtRange(WIZ.start,WIZ.end))+'</span>'
    +'<span style="font-family:Nunito Sans;font-weight:700;font-size:.78rem;color:var(--grey)">'+dayCount(WIZ.start,WIZ.end)+'</span></div>'
    +'<div style="background:#FBFBFC;border:1px solid var(--border);border-radius:11px;padding:6px 14px 10px;margin-bottom:14px">'+dayLines
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0 3px;border-top:1.5px solid var(--border);margin-top:2px"><span style="font-family:Nunito;font-weight:900;font-size:.84rem">Total '+(paid?'PTO':'unpaid hours')+'</span><span style="font-family:Nunito;font-weight:900;font-size:.95rem">'+total+'h</span></div>'
    +(paid&&wizBal()!=null?'<div style="font-family:Nunito Sans;font-weight:700;font-size:.72rem;color:var(--grey);text-align:right">of '+wizBal()+' hrs available</div>':'')+'</div>'
    +'<label class="lbl" style="display:block;margin-bottom:5px">'+noteLbl+'</label>'
    +'<input class="inp" id="wzNote" value="'+esc(WIZ.note)+'" placeholder="'+(WIZ.type==='Vacation'?'e.g. family trip':WIZ.type==='Personal'?'e.g. appointment':'optional')+'" style="margin-bottom:13px;width:100%">'
    +(conflicts.length?ackBoxHtml(conflictTxt,WIZ.ack):'')
    +'<div id="wzErr" style="color:var(--red);font-family:Nunito;font-weight:800;font-size:.78rem;min-height:1px;margin-top:6px"></div>'
    +'</div>'
    +'<div class="pl-ft"><button class="btn" id="wzBack3" style="width:auto;padding:9px 16px;border:1.5px solid var(--border);background:#fff;color:var(--dark-grey)">← Back</button><div style="flex:1"></div>'
    +'<button class="btn btn-red" id="wzSubmit" style="width:auto;padding:9px 20px"'+(WIZ.saving?' disabled':'')+'>'+(WIZ.saving?'Sending…':'Send to manager')+'</button></div>';
}
function wireWizStep3(back){
  back.querySelector('#wzBack3').onclick=function(){WIZ.step=2;drawWiz();};
  var n=back.querySelector('#wzNote');if(n)n.oninput=function(){WIZ.note=this.value;};
  var a=back.querySelector('#fAck');if(a)a.onchange=function(){WIZ.ack=this.checked;};
  back.querySelector('#wzSubmit').onclick=wizSubmit;
}
async function wizSubmit(){
  var w=WIZ;if(!w||w.saving)return;
  function err(t){var e=document.getElementById('wzErr');if(e)e.textContent=t||'';}
  var needNote=(w.type==='Vacation'||w.type==='Personal');
  if(needNote&&!String(w.note||'').trim()){err('Add a short description for this request.');return;}
  var conflicts=conflictsFor(w.start,w.end);
  if(conflicts.length&&!w.ack){err('Please check the box acknowledging the overlap.');return;}
  var total=wizTotal(),bal=wizBal();
  if(isPaidType(w.type)&&bal!=null&&total>bal){err('That’s '+total+'h but you only have '+bal+'h available — go back and trim the hours.');return;}
  var dayHours={},partials={};
  wizDates().forEach(function(di){var d=w.days[di];
    if(!d.off&&d.use&&Number(d.hours)>0){dayHours[di]=Number(d.hours);if(d.partial)partials[di]=true;}});
  var row={staff_id:ME.id,store:ME.home_store,type:w.type,paid:isPaidType(w.type),start_date:w.start,end_date:w.end,
    hours:total,day_hours:Object.keys(dayHours).length?dayHours:null,
    partial_days:Object.keys(partials).length?partials:null,
    note:String(w.note||'').trim()||null,status:'pending'};
  w.saving=true;drawWiz();
  var r=await sb.from('time_off_requests').insert(row).select().single();
  if(r.error){w.saving=false;drawWiz();var e=document.getElementById('wzErr');if(e)e.textContent=r.error.message;return;}
  REQS.push(r.data);closePlanner();toast('✓ Sent to your manager');renderHeader();render();
}

initAuth();
