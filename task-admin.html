<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Admin — CPR</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--white:#FFFFFF;--border:#E0E2EA;--green:#2E9E5B;--amber:#C9820B;--purple:#8B5CF6;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--light-grey);font-family:'Nunito Sans',sans-serif;color:var(--dark);min-height:100vh}
main{max-width:none;margin:0;padding:24px 28px 70px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:-.4px}
.hide{display:none!important}
button{font-family:inherit}
.hd{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.hd-sub{color:var(--grey);font-size:.82rem;font-weight:600;margin-top:3px}
.hd-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.locpills{display:inline-flex;background:#fff;border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px}
.locpills button{padding:6px 12px;border:none;border-radius:5px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.68rem;text-transform:uppercase;letter-spacing:.4px;background:transparent;color:var(--grey)}
.locpills button.on{background:var(--blue);color:#fff}
.navbtn{display:inline-flex;align-items:center;gap:7px;text-decoration:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;color:var(--dark-grey);border:1.5px solid var(--border);background:#fff;border-radius:9px;padding:8px 13px;cursor:pointer}
.navbtn:hover{border-color:var(--blue);color:var(--blue)}
.ctl{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.tabs{display:inline-flex;background:#fff;border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px}
.tabs button{padding:8px 14px;border:none;border-radius:5px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;background:transparent;color:var(--grey)}
.tabs button:not(.on):hover{color:var(--dark-grey)}
.tabs button.on{background:var(--dark);color:#fff}
.sel{padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-family:'Nunito Sans',sans-serif;font-size:.84rem;font-weight:600;color:var(--dark)}
.lbl{font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;text-transform:uppercase;letter-spacing:.6px;color:var(--grey)}
.cnt{font-size:.8rem;color:var(--dark-grey);font-weight:600}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--red);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;cursor:pointer}
.btn:hover{filter:brightness(1.06)}
.btn.alt{background:#fff;color:var(--dark-grey);border:1.5px solid var(--border)}
.btn.alt:hover{border-color:var(--blue);color:var(--blue);filter:none}
.btn.dark{background:var(--dark)}
.btn.sm{padding:7px 12px;font-size:.72rem}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(45,45,59,.05)}
.thead,.trow{display:grid;align-items:center}
.thead{background:#fafafa;border-bottom:1px solid var(--border)}
.thead div{padding:10px 12px;font-family:'Nunito',sans-serif;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--grey)}
.trow{border-bottom:1px solid rgba(224,226,234,.6);border-left:3px solid transparent}
.trow:hover{background:rgba(79,176,227,.045)}
.trow>div{padding:11px 12px;min-width:0}
.bdg{display:inline-flex;align-items:center;border-radius:20px;padding:2px 9px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.b-daily{background:#EAF5FC;color:#1b6fa3}.b-weekly{background:#E6F4EC;color:var(--green)}.b-monthly{background:#F1EDFC;color:#6d4fc4}.b-flex{background:#FCF3E3;color:var(--amber)}.b-oneoff{background:var(--light-grey);color:var(--dark-grey)}
.b-must{background:#FBE9EA;color:var(--red)}.b-asap{background:#FCF3E3;color:#B45309}.b-info{background:#EAF5FC;color:#1b6fa3}.b-red{background:#FBE9EA;color:var(--red)}
.av{border-radius:50%;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none}
.icb{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;color:var(--dark-grey);font-size:.85rem}
.icb:hover{background:var(--light-grey);color:var(--dark)}
a.clink{color:var(--blue);font-weight:700;text-decoration:none;border-bottom:1.5px solid rgba(79,176,227,.45)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 16px}
.stat .l{font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;text-transform:uppercase;letter-spacing:.7px;color:var(--grey)}
.stat .v{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.55rem;margin:2px 0 1px}
.stat .s{font-size:.7rem;color:var(--grey);font-weight:700}
.stat.dk .v{color:var(--dark)} .stat.rd .v{color:var(--red)} .stat.gn .v{color:var(--green)} .stat.am .v{color:var(--amber)}
.sechd{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.sechd .t{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem}
.sechd .s{font-size:.76rem;color:var(--grey);font-weight:600}
.empty{padding:30px 20px;text-align:center;color:var(--grey)}
.empty .t{font-family:'Nunito',sans-serif;font-weight:800;color:var(--dark-grey)}
.note{background:#F7FAFD;border:1px solid #DDEBF6;border-radius:11px;padding:13px 15px}
/* calendar */
.cal{padding:18px}
.calhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.calhd .m{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem}
.calnav{display:inline-flex;gap:6px;align-items:center}
.calnav button{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.9rem;color:var(--dark-grey)}
.leg{display:flex;gap:12px;flex-wrap:wrap;font-size:.72rem;font-weight:700;color:var(--dark-grey)}
.leg span{display:inline-flex;align-items:center;gap:5px}
.leg i{width:9px;height:9px;border-radius:2px;display:inline-block}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.caldh{text-align:center;font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;text-transform:uppercase;letter-spacing:.6px;color:var(--grey);padding-bottom:4px}
.calc{min-height:96px;border:1px solid var(--border);border-radius:9px;padding:6px 7px;background:#fff}
.calc.today{background:#FFF6F6}
.calc .d{font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;color:var(--dark);margin-bottom:4px}
.calc.today .d{color:var(--red)}
.chip{font-size:.6rem;font-weight:700;color:#fff;border-radius:4px;padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
/* fairness */
.fair2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.bar{flex:1;height:8px;border-radius:4px;background:var(--light-grey);overflow:hidden}
.bar i{display:block;height:100%}
/* modal */
.ovl{position:fixed;inset:0;background:rgba(45,45,59,.45);z-index:1200;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow:auto}
.mdl{width:600px;max-width:100%;background:#fff;border-radius:16px;box-shadow:0 18px 50px rgba(45,45,59,.3);overflow:hidden}
.mdl-hd{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:14px}
.mdl-x{background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--grey);flex:none}
.mdl-bd{padding:20px 24px;max-height:66vh;overflow:auto}
.mdl-ft{padding:16px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fafafa;flex-wrap:wrap}
.fld{display:block;margin-bottom:14px}
.fld .fl{display:block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;text-transform:uppercase;letter-spacing:.6px;color:var(--dark-grey);margin-bottom:5px}
.inp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:'Nunito Sans',sans-serif;font-size:.9rem;color:var(--dark);background:#fff}
.inp:focus{outline:none;border-color:var(--blue)}
textarea.inp{resize:vertical}
.panel{background:var(--light-grey);border-radius:11px;padding:13px 14px;margin-bottom:18px}
.pill{font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;padding:8px 13px;border-radius:8px;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--dark-grey)}
.pill.on{color:#fff}
.hint{font-size:.76rem;color:var(--dark-grey)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.linkdel{background:none;border:none;color:var(--red);font-family:'Nunito',sans-serif;font-weight:800;font-size:.76rem;cursor:pointer;padding:0}
/* locations picker (template create) */
.locsug{display:none;position:absolute;left:0;right:0;top:100%;margin-top:4px;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 12px 32px rgba(45,45,59,.18);overflow:hidden;z-index:30;max-height:200px;overflow-y:auto}
.locsug.open{display:block}
.locopt{padding:9px 13px;cursor:pointer;font-size:.85rem;font-weight:700;color:var(--dark)}
.locopt:hover{background:var(--light-grey)}
.locrow{display:flex;align-items:center;gap:10px;margin-top:8px;padding:8px 10px;border:1px solid var(--border);border-radius:10px;background:#fafafa}
.locrow .locname{flex:1;font-family:'Nunito',sans-serif;font-weight:800;font-size:.86rem}
.locrow .loctime{width:130px;text-align:center}
.locrow .locx{margin-left:2px;width:28px;height:28px;border:none;border-radius:8px;background:none;color:var(--grey);font-weight:800;cursor:pointer;font-size:.85rem}
.locrow .locx:hover:not(:disabled){background:#FBE9E9;color:var(--red)}
.locrow .locx:disabled{opacity:.35;cursor:default}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;padding:12px 22px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.25);transition:transform .25s;z-index:3000}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}
@media (max-width:1000px){.fair2,.rep2{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<main id="app" style="visibility:hidden">
  <div class="hd">
    <div>
      <h1 style="margin-bottom:3px">Task Admin</h1>
      <div class="hd-sub">Task library, properties &amp; compliance</div>
    </div>
    <div class="hd-r">
      <span class="locpills" id="locPills"></span>
      <button class="btn" id="newBtn"><span style="font-size:1.05rem;line-height:1">＋</span>New template</button>
      <a class="navbtn" href="checklist.html" title="Back to Checklist">✅ Checklist</a>
    </div>
  </div>
  <div id="gate" class="note hide" style="max-width:520px">Task Admin is for managers and the owner. The <a class="clink" href="checklist.html">Checklist</a> has your own tasks.</div>

  <div id="body" class="hide">
    <div class="ctl">
      <span class="tabs" id="secTabs"></span>
      <span id="libCtl" style="display:inline-flex;align-items:center;gap:12px">
        <span class="tabs" id="modeTabs"></span>
        <span style="display:inline-flex;align-items:center;gap:7px"><span class="lbl">Recurs</span>
          <select class="sel" id="recurSel"><option value="all">All</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option><option value="flexible">Flexible</option><option value="oneoff">One-off</option></select>
        </span>
      </span>
      <span style="flex:1"></span>
      <span class="cnt" id="secHint"></span>
    </div>
    <div id="secBody"></div>
  </div>
</main>

<div id="mdlWrap"></div>
<div id="toast" class="toast"></div>

<script src="assets/pin-gate.js"></script>
<script src="assets/pickers.js"></script>
<script src="assets/locations.js"></script>
<script src="assets/nav.js"></script>
<script type="module">
import { createClient } from "/assets/supabase-js.js";
const SB_URL='https://xuvsehrevxackuhmbmry.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY';
const sb=createClient(SB_URL,ANON);
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const isMgr=r=>['owner','admin'].indexOf(r)>-1;
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONL=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function iso(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function fromISO(s){const p=String(s).slice(0,10).split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function shortStore(s){return window.CPRLocations?CPRLocations.display(s):String(s||'').replace(/^CPR\s*/,'');}
function toast(m,err){const t=$('#toast');t.textContent=m;t.className='toast show'+(err?' err':'');setTimeout(()=>{t.className='toast';},2400);}
const AVPAL=['#DC282E','#2E9E5B','#4FB0E3','#C9820B','#7A6FD0','#2D2D3B','#1E7AA8','#C24E8E'];
function avatarBg(st){return (st&&st.avatar_color)||AVPAL[(st?st.id:0)%AVPAL.length];}
function initials(n){const p=String(n||'?').trim().split(/\s+/);return (((p[0]||'')[0]||'')+((p[1]||'')[0]||'')).toUpperCase()||'?';}
function firstName(n){return String(n||'').split(' ')[0];}
function fmt12(hhmm){const m=/^(\d{1,2}):(\d{2})$/.exec(hhmm||'');if(!m)return hhmm||'';let h=+m[1];const mm=m[2],ap=h<12?'AM':'PM';h=h%12;if(h===0)h=12;return h+':'+mm+' '+ap;}
function to24(s){const m=/(\d{1,2})(?::(\d{2}))?\s*([AaPp])?/.exec(String(s||'').trim());if(!m)return '18:00';let h=+m[1];const mm=m[2]||'00';if(/p/i.test(m[3]||'')&&h<12)h+=12;if(/a/i.test(m[3]||'')&&h===12)h=0;return ('0'+h).slice(-2)+':'+mm;}
function ord(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function lsGet(k,d){try{const v=localStorage.getItem(k);return v==null?d:v;}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
const TOOLS=[
  {value:'',label:'— none —'},
  {value:'consumption-report.html',label:'Consumption Report'},
  {value:'cash-tracker.html',label:'Cash Tracker'},
  {value:'damage-tracker.html',label:'Damage Tracker'},
  {value:'hyla-orders.html',label:'Hyla Orders'},
  {value:'claim-ledger.html',label:'Claim Ledger'},
  {value:'communications.html',label:'Communications'},
  {value:'__custom',label:'Paste a URL…'}
];
const RECURS=[['oneoff','One-off'],['daily','Daily'],['weekly','Weekly'],['monthly','Monthly'],['flexible','Flexible']];
function recurLabel(t){
  const r=t.recur;
  if(r==='weekly')return 'Weekly'+((t.weekdays&&t.weekdays.length)?' · '+t.weekdays.map(d=>DOW[d]).join('/'):'');
  if(r==='monthly')return 'Monthly'+((t.month_dates&&t.month_dates.length)?' · '+t.month_dates.map(n=>ord(n)).join(', '):'');
  if(r==='flexible')return 'Flexible · '+(t.flex_n||1)+'×/'+(t.flex_per==='month'?'month':'week');
  if(r==='daily')return 'Daily';
  return 'One-off';
}
function recurBadgeCls(r){return r==='daily'?'b-daily':r==='weekly'?'b-weekly':r==='monthly'?'b-monthly':r==='flexible'?'b-flex':'b-oneoff';}
function recurColor(r){return r==='daily'?'var(--blue)':r==='weekly'?'var(--green)':r==='monthly'?'var(--purple)':r==='flexible'?'var(--amber)':'var(--grey)';}
function prioInfo(p){if(p==='must')return{label:'Must do today',cls:'b-must'};if(p==='asap')return{label:'Please do ASAP',cls:'b-asap'};return null;}

/* ===== auth ===== */
let ME=null,BOOTED=false;
async function resolveMe(sess){
  if(!sess||BOOTED)return;
  const sr=await sb.from('staff').select('id,display_name,role,home_store,authorized_stores').eq('auth_uid',sess.user.id).maybeSingle();
  if(sr.data){BOOTED=true;ME=sr.data;boot();}
}
sb.auth.onAuthStateChange((_e,sess)=>{if(sess)resolveMe(sess);});

/* ===== state ===== */
let STAFF=[],SBID={},SHIFTS=[],TPLS=[],TODAY=iso(new Date());
let SEC=lsGet('cprTaskAdminSec','library'),MODE=lsGet('cprTaskAdminMode','list'),RECF=lsGet('cprTaskAdminRecf','all');
let SEL=null,STORES=[],CALM=null,REPM=null;   // CALM/REPM = displayed calendar/report month Date
let REP={list:[],comps:{},trend:[]};          // reporting cache for the loaded month

/* hash deep-link (#library / #reporting / #fairness) — a valid hash wins over localStorage */
const HASH_SECS=['library','reporting','fairness'];
function secFromHash(){const h=location.hash.replace('#','').toLowerCase();return HASH_SECS.indexOf(h)>-1?h:null;}
const _hs=secFromHash();if(_hs){SEC=_hs;lsSet('cprTaskAdminSec',SEC);}
window.addEventListener('hashchange',()=>{const t=secFromHash();if(t&&t!==SEC){SEC=t;lsSet('cprTaskAdminSec',SEC);if(CALM)render();}});   // CALM set = manager UI booted

async function boot(){
  $('#app').style.visibility='visible';
  if(!isMgr(ME.role)){$('#gate').classList.remove('hide');return;}
  $('#body').classList.remove('hide');
  // Store list from the stores TABLE — the same names staff.home_store,
  // staff_schedule and can_see_store use. (CPRLocations' canonical names are
  // the RepairQ spellings — 'CPR Clackamas OR' — which the task universe does
  // NOT use; templates created under those names were invisible to the
  // store's own staff and unassignable by the shift resolver.)
  try{
    const str=await sb.from('stores').select('store,display_order,active').eq('active',true).order('display_order');
    STORES=(str.data||[]).map(x=>x.store);
  }catch(e){STORES=[];}
  if(!STORES.length)STORES=[ME.home_store].filter(Boolean);
  SEL=lsGet('cprCkStore',ME.home_store||STORES[0]);
  if(STORES.indexOf(SEL)<0)SEL=STORES[0];
  const now=new Date();CALM=new Date(now.getFullYear(),now.getMonth(),1);REPM=new Date(now.getFullYear(),now.getMonth(),1);
  $('#newBtn').onclick=()=>openEditor(null);
  const rsel=$('#recurSel');rsel.value=RECF;
  rsel.onchange=()=>{RECF=rsel.value;lsSet('cprTaskAdminRecf',RECF);render();};
  await loadCore();
  await loadReport();
  render();
}
async function loadCore(){
  const [st,sh,tp]=await Promise.all([
    sb.from('staff').select('id,display_name,role,home_store,avatar_color,active,hide_from_recurring').eq('active',true),
    sb.from('shifts').select('id,name,active'),
    sb.from('task_templates').select('*').eq('active',true).eq('personal',false)
  ]);
  STAFF=(st.data||[]);SBID={};STAFF.forEach(s=>{SBID[s.id]=s;});
  SHIFTS=(sh.data||[]).filter(s=>s.active!==false);
  TPLS=(tp.data||[]);
}
async function loadReport(){
  const mS=iso(REPM),mE=iso(new Date(REPM.getFullYear(),REPM.getMonth()+1,0));
  const sixBack=iso(new Date(REPM.getFullYear(),REPM.getMonth()-5,1));
  const [inMonth,openOld,trend]=await Promise.all([
    sb.from('task_instances').select('*').gte('task_date',mS).lte('task_date',mE).eq('personal',false),
    sb.from('task_instances').select('*').eq('status','open').lt('task_date',TODAY).neq('recur','daily').eq('personal',false),
    sb.from('task_instances').select('id,store,task_date,status,on_time').gte('task_date',sixBack).lte('task_date',mE).eq('personal',false)
  ]);
  const seen={};REP.list=[];
  [].concat(inMonth.data||[],openOld.data||[]).forEach(r=>{if(!seen[r.id]){seen[r.id]=1;REP.list.push(r);}});
  REP.trend=(trend.data||[]);
  REP.comps={};
  const eachIds=REP.list.filter(i=>i.completion==='each').map(i=>i.id);
  if(eachIds.length){
    const c=await sb.from('task_completions').select('*').in('instance_id',eachIds);
    (c.data||[]).forEach(r=>{(REP.comps[r.instance_id]=REP.comps[r.instance_id]||[]).push(r);});
  }
}

/* ===== library ===== */
function assignKindLabel(t){
  if(t.target==='shift'){const s=SHIFTS.find(x=>x.id===t.shift_id);return (s?s.name:'Shift')+' · '+shortStore(t.store);}
  if(t.target==='role')return t.role_key==='manager'?'Manager':'Any tech';
  if(t.target==='group')return t.strategy==='rotate'?'Rotating':'Group';
  return 'Fixed';
}
function assignColor(t){return t.target==='shift'?'#1b6fa3':t.target==='role'?'#5b3fb0':t.target==='group'?'#0f6e56':'#4E4E50';}
function assignDetail(t){
  if(t.target==='shift'){const s=SHIFTS.find(x=>x.id===t.shift_id);return 'Whoever works '+(s?s.name:'the shift')+' that day';}
  if(t.target==='role')return (t.completion==='each'?'Every ':'Any ')+(t.role_key==='manager'?'manager':'tech')+(t.completion==='each'?' — completion grid':'');
  if(t.target==='group')return (t.strategy==='rotate'?'Rotates: ':'Shared: ')+(t.pool||[]).map(id=>SBID[id]?firstName(SBID[id].display_name):'').filter(Boolean).join(', ');
  const a=SBID[t.assignee_staff_id];
  return (a?a.display_name:'—')+(t.fallback_staff_id&&SBID[t.fallback_staff_id]?' · fallback '+firstName(SBID[t.fallback_staff_id].display_name):'');
}
function dueLabel(t){
  if(t.recur==='monthly')return (t.month_dates||[]).map(n=>ord(n)).join(', ')||'—';
  if(t.recur==='oneoff'){if(t.due_type==='date'&&t.due_date){const d=fromISO(t.due_date);return MON[d.getMonth()]+' '+d.getDate();}if(t.due_type==='after')return 'In '+(t.due_after_n||'?')+' '+(t.due_after_unit||'days');}
  return fmt12(t.due_time);
}

function renderCalendar(defs){
  const y=CALM.getFullYear(),m=CALM.getMonth();
  const dim=new Date(y,m+1,0).getDate(),lead=new Date(y,m,1).getDay();
  const dailyN=defs.filter(t=>t.recur==='daily').length;
  let cells='';
  for(let i=0;i<lead;i++)cells+='<div></div>';
  for(let day=1;day<=dim;day++){
    const dISO=y+'-'+('0'+(m+1)).slice(-2)+'-'+('0'+day).slice(-2);
    const dow=new Date(y,m,day).getDay();
    const chips=[];
    if(dailyN)chips.push({label:'Daily ×'+dailyN,color:'var(--blue)'});
    defs.forEach(t=>{
      if(t.recur==='weekly'&&(t.weekdays||[]).indexOf(dow)>-1)chips.push({label:t.name,color:'var(--green)'});
      if(t.recur==='monthly'&&(t.month_dates||[]).some(n=>Math.min(+n||0,dim)===day))chips.push({label:t.name,color:'var(--purple)'});
      if(t.recur==='flexible'){
        const per=t.flex_per==='month'?'month':'week';
        if((per==='week'&&dow===1)||(per==='month'&&day===1))chips.push({label:t.name+' ('+(t.flex_n||1)+'×/'+per+')',color:'var(--amber)'});
      }
      if(t.recur==='oneoff'&&t.due_type==='date'&&String(t.due_date||'').slice(0,10)===dISO)chips.push({label:t.name,color:'var(--grey)'});
    });
    const shown=chips.slice(0,3),extra=chips.length-shown.length;
    cells+='<div class="calc'+(dISO===TODAY?' today':'')+'"><div class="d">'+day+'</div>'+shown.map(c=>'<div class="chip" style="background:'+c.color+'" title="'+esc(c.label)+'">'+esc(c.label)+'</div>').join('')+(extra>0?'<div style="font-size:.6rem;font-weight:800;color:var(--grey)">+'+extra+' more</div>':'')+'</div>';
  }
  $('#secBody').innerHTML='<div class="card cal">'+
    '<div class="calhd"><div style="display:flex;align-items:center;gap:10px"><span class="calnav"><button id="calPrev">‹</button><button id="calNext">›</button></span><button class="m" id="calPick" title="Pick a month" style="border:none;background:transparent;cursor:pointer;font-family:inherit;padding:0">'+MONL[m]+' '+y+' <span style="font-size:.6rem;color:var(--grey)">▾</span></button></div>'+
    '<div class="leg"><span><i style="background:var(--blue)"></i>Daily</span><span><i style="background:var(--green)"></i>Weekly</span><span><i style="background:var(--purple)"></i>Monthly</span><span><i style="background:var(--amber)"></i>Flexible</span><span><i style="background:var(--grey)"></i>One-off</span></div></div>'+
    '<div class="calgrid">'+DOW.map(d=>'<div class="caldh">'+d+'</div>').join('')+cells+'</div>'+
    '<div style="font-size:.74rem;color:var(--grey);margin-top:12px">This is where monthly planning lives — payroll dates, the inventory count — so employees don’t have to look months ahead on their daily checklist.</div></div>';
  $('#calPrev').onclick=()=>{CALM=new Date(CALM.getFullYear(),CALM.getMonth()-1,1);render();};
  $('#calNext').onclick=()=>{CALM=new Date(CALM.getFullYear(),CALM.getMonth()+1,1);render();};
  const cp=$('#calPick');
  if(cp&&window.CPRPickers)cp.onclick=ev=>{ev.stopPropagation();CPRPickers.month(cp,{get:()=>CALM,set:d=>{CALM=d;render();}});};
}

/* ===== reporting ===== */
function personStats(){
  const per={};
  const add=(sid,onTime)=>{if(!sid||!SBID[sid])return;const p=per[sid]||(per[sid]={done:0,ontime:0,late:0});p.done++;if(onTime)p.ontime++;else p.late++;};
  REP.list.filter(i=>i.store===SEL).forEach(i=>{
    if(i.completion==='each'){(REP.comps[i.id]||[]).forEach(c=>add(c.staff_id,c.on_time!==false));}
    else if(i.status==='done')add(i.done_by||i.assigned_staff_id,i.on_time!==false);
  });
  return per;
}

  const completion=sched?Math.round(done.length/sched*100)+'%':'—';

async function closeMissed(id){
  try{
    const r=await sb.from('task_instances').update({status:'missed',followup_by:ME.id,followup_at:new Date().toISOString()}).eq('id',id);
    if(r.error)throw r.error;

    await loadReport();render();
  }catch(e){toast(String(e.message||e),true);}
}

      const r1=await sb.from('task_instances').update({status:'missed',followup_by:ME.id,followup_at:new Date().toISOString()}).eq('id',old.id);
      if(r1.error)throw r1.error;
      const r2=await sb.from('task_instances').insert({
        template_id:old.template_id,gen_key:'reopen:'+old.id,store:old.store,task_date:TODAY,due_at:nd.toISOString(),

  const hist=await sb.from('task_instances').select('template_id,status,done_by,assigned_staff_id').in('template_id',rot.map(t=>t.id));
  const counts={};
  (hist.data||[]).forEach(i=>{

      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px"><div><div style="font-family:Nunito,sans-serif;font-weight:900;font-size:1rem;line-height:1.25">'+esc(t.name)+'</div><div style="font-size:.74rem;color:var(--grey);font-weight:700;margin-top:4px">'+esc(recurLabel(t))+' · rotates</div></div><span class="bdg b-info">'+esc(balance)+'</span></div>'+
      '<div style="background:#F7FAFD;border:1px solid #DDEBF6;border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:14px"><div class="av" style="width:32px;height:32px;font-size:.68rem;background:'+avatarBg(np)+'">'+esc(initials(np?np.display_name:'?'))+'</div><div><div style="font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#1b6fa3">Up next</div><div style="font-weight:800;font-size:.9rem">'+esc(np?np.display_name:'—')+'</div></div></div>'+
      pool.map(id=>{const s=SBID[id],n=c[id]||0;
        return '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--border)"><div class="av" style="width:24px;height:24px;font-size:.58rem;background:'+avatarBg(s)+'">'+esc(initials(s.display_name))+'</div><span style="font-weight:700;font-size:.84rem;width:80px">'+esc(firstName(s.display_name))+'</span><div class="bar"><i style="width:'+Math.round(n/max*100)+'%;background:'+avatarBg(s)+'"></i></div><span style="font-family:Nunito,sans-serif;font-weight:800;font-size:.78rem;width:44px;text-align:right;color:var(--dark-grey)">'+n+'×</span><span style="'+(id===nextId?'color:var(--blue);font-size:.7rem':'display:none')+'">▲</span></div>';}).join('')+
    '</div>';
  });
  $('#secBody').innerHTML=
    '<div class="card" style="background:var(--dark);color:#fff;padding:18px 20px;margin-bottom:18px;border:none"><div style="font-family:Nunito,sans-serif;font-weight:900;font-size:1.02rem;margin-bottom:4px">Fairness ledger</div><div style="font-size:.86rem;color:var(--grey);line-height:1.5;max-width:720px">For every rotating task: <strong style="color:#fff">who’s up next</strong> and <strong style="color:#fff">how many times each person has done it</strong> — so you can trust the rotation is even and nobody’s quietly stuck with the bathroom.</div></div>'+
    '<div class="fair2">'+cards+'</div>';
}

/* ===== template editor (same shape as checklist.html's) ===== */
let DRAFT=null,EDIT_ID=null,EDIT_GID=null,STEP=1;

function storeOrd(s){const i=STORES.indexOf(s);return i<0?99:i;}
// Templates created together for several stores share a group_id. Fan-out
// targets (shift/role) can be edited across all their stores at once.
function groupSibs(gid){return gid?TPLS.filter(x=>x.group_id===gid&&x.active&&!x.personal):[];}
// Assignment lives PER LOCATION — Salem runs openers/closers, Eugene a mid,
// so each store carries its own default target + per-day overrides. A location
// is {store, dueTime, target, assignee, fallback, shift, role, pool, strategy,
// completion, dayAssign, perDay}. The multi-store template = one row per loc.
function blankAssign(store){
  const staffL=STAFF.filter(s=>s.home_store===store&&s.role!=='owner');
  return {target:'person',assignee:(staffL[0]||ME).id,fallback:'',shift:(SHIFTS[0]||{}).id,role:'any',
    pool:staffL.map(s=>s.id),strategy:'rotate',completion:'any',dayAssign:{},perDay:false};
}
function locFromTpl(t){

    fallback:t.fallback_staff_id||'',shift:t.shift_id||(SHIFTS[0]||{}).id,role:t.role_key||'any',
    pool:(t.pool||[]).slice(),strategy:t.strategy||'rotate',completion:t.completion||'any',
    dayAssign:(t.day_assignments&&typeof t.day_assignments==='object')?JSON.parse(JSON.stringify(t.day_assignments)):{},
    perDay:Object.keys(t.day_assignments||{}).length>0});
}

}
function draftFrom(t){
  return {name:t.name||'',linkText:t.link_text||'',linkUrl:(t.link_url&&TOOLS.some(o=>o.value===t.link_url))?t.link_url:(t.link_url?'__custom':''),customUrl:t.link_url||'',
    priority:t.priority||'normal',recur:t.recur||'daily',
    weekdays:(t.weekdays||[]).slice(),monthDates:(t.month_dates||[]).join(', '),flexN:String(t.flex_n||1),flexPer:t.flex_per||'week',

function openEditor(t){

/* weekdays this recurrence actually runs — the only days an override matters */
function overrideDays(d){ if(d.recur==='daily')return [0,1,2,3,4,5,6]; if(d.recur==='weekly')return [0,1,2,3,4,5,6].filter(w=>(d.weekdays||[]).indexOf(w)>-1); return []; }
// copy one location's assignment onto another store, remapping store-specific
// people to that store's roster (shift/role targets carry over untouched; a
// per-day person override that has no match in the target store is dropped).
function remapAssign(src,store){
  const staffL=STAFF.filter(s=>s.home_store===store&&s.role!=='owner');
  const ids=staffL.map(s=>s.id),has=id=>ids.indexOf(+id)>-1;
  const a={target:src.target,strategy:src.strategy,completion:src.completion,
    shift:src.shift,role:src.role,perDay:src.perDay,
    assignee:has(src.assignee)?src.assignee:(staffL[0]||ME).id,
    fallback:has(src.fallback)?src.fallback:'',
    pool:(src.target==='group'&&(src.pool||[]).filter(has).length)?src.pool.filter(has):ids.slice(),
    dayAssign:{}};
  Object.keys(src.dayAssign||{}).forEach(w=>{const ov=src.dayAssign[w];
    if(ov.target==='person'){if(has(ov.assignee_staff_id))a.dayAssign[w]=JSON.parse(JSON.stringify(ov));}
    else a.dayAssign[w]=JSON.parse(JSON.stringify(ov));});
  return a;
}

      (d.dueType==='date'?'<label class="fld" style="width:200px;margin-bottom:6px"><span class="fl">On date</span><input class="inp" type="date" id="eDueDate" value="'+esc(d.dueDate)+'"></label>':'')
    :'');
  const locChips=multiLoc?('<div style="margin-bottom:12px"><span class="fl" style="display:block;margin-bottom:6px">Assignment for which location?</span><div style="display:flex;gap:6px;flex-wrap:wrap">'+pillRow(d.locs.map((Lx,i)=>[i,shortStore(Lx.store),'var(--blue)']),d.__locSel,'var(--blue)','locsel')+'</div></div>'):'';
  const s3=locChips+
    '<div style="margin-bottom:12px"><span class="fl" style="display:block;margin-bottom:6px">Assign to (default)'+(multiLoc?' · '+esc(shortStore(L.store)):'')+'</span><div style="display:flex;gap:6px;flex-wrap:wrap">'+pillRow([['person','Person','var(--dark)'],['shift','Shift','var(--dark)'],['role','Role','var(--dark)'],['group','Group','var(--dark)']],L.target,'var(--dark)','tgt')+'</div></div>'+
    '<div class="panel">'+assignPanel+
      ((showStrat||showComp)?'<div style="display:flex;gap:18px;margin-top:14px;flex-wrap:wrap">'+
      (showStrat?'<div><span class="fl" style="display:block;margin-bottom:5px">Strategy</span><div style="display:flex;gap:6px">'+pillRow([['fixed','Fixed','var(--dark)'],['rotate','Rotate','var(--dark)']],L.strategy,'var(--dark)','strat')+'</div></div>':'')+
      (showComp?'<div><span class="fl" style="display:block;margin-bottom:5px">Who must complete</span><div style="display:flex;gap:6px">'+pillRow([['any','Any one','var(--dark)'],['each','Each person','var(--dark)']],L.completion,'var(--dark)','comp')+'</div></div>':'')+
      '</div>':'')+'</div>'+
    dayOverrideSection+
    (multiLoc?'<button type="button" class="btn alt" data-copyall style="margin-top:10px;font-size:.82rem">Copy '+esc(shortStore(L.store))+'’s assignment to all locations</button>':'');
  const rvrow=(l,v)=>'<div style="display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)"><b style="min-width:118px;font-size:.66rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey);font-weight:800">'+l+'</b><span style="flex:1;font-size:.9rem;color:var(--dark)">'+v+'</span></div>';
  const rInt=Math.max(1,+d.recurInterval||1);
  const wkLabel=(rInt>1?'Every '+rInt+' weeks · ':'Weekly · ')+(d.weekdays||[]).slice().sort().map(w=>wk[wkIdx.indexOf(w)]).join('/')+(rInt>1&&d.recurAnchor?' (from '+esc(d.recurAnchor)+')':'');
  const moLabel=(rInt>1?'Every '+rInt+' months · ':'Monthly · ')+(d.monthDates||'—')+(rInt>1&&d.recurAnchor?' (from '+esc(d.recurAnchor)+')':'');
  const recurTxt=d.recur==='daily'?'Every day':d.recur==='weekly'?wkLabel:d.recur==='monthly'?moLabel:d.recur==='flexible'?(d.flexN+'× per '+d.flexPer):'One-off';
  // per-location assignment as a real table — one row per store, day overrides
  // as compact day chips so multi-store / per-day tasks stay readable
  const dayShort={0:'Sun',1:'Mon',2:'Tue',3:'Wed',4:'Thu',5:'Fri',6:'Sat'};
  const th=(t,extra)=>'<th style="text-align:left;padding:0 12px 7px 0;font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey);font-weight:800;border-bottom:1px solid var(--border);'+(extra||'')+'">'+t+'</th>';
  const td=(v,extra)=>'<td style="padding:10px 12px 10px 0;vertical-align:top;border-bottom:1px solid var(--border);font-size:.86rem;color:var(--dark);'+(extra||'')+'">'+v+'</td>';
  const assignTable=
    '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'+
    '<thead><tr>'+th('Location')+th('Due')+th('Default')+(odays.length?th('By day'):'')+'</tr></thead><tbody>'+
    d.locs.map(function(Lx){
      const od=odays.filter(w=>Lx.dayAssign&&Lx.dayAssign[w]);
      const chips=od.length?od.map(w=>'<span style="display:inline-block;background:var(--light-grey);border-radius:6px;padding:2px 8px;margin:0 4px 4px 0;font-size:.78rem;white-space:nowrap"><b style="color:var(--dark-grey);font-weight:800">'+dayShort[w]+'</b> '+esc(ovLabel(Lx.dayAssign[w]))+'</span>').join(''):'<span style="color:var(--grey)">—</span>';
      return '<tr>'+
        td(esc(shortStore(Lx.store)),'font-weight:800')+
        td(esc(fmt12(to24(Lx.dueTime))),'white-space:nowrap;color:var(--dark-grey)')+
        td(esc(defaultAssignText(Lx)))+
        (odays.length?td(chips):'')+
      '</tr>';
    }).join('')+
    '</tbody></table></div>';
  const s4=
    '<div class="panel">'+
      rvrow('Task',esc(d.name||'—'))+
      rvrow('Priority',esc(d.priority==='must'?'Must do today':d.priority==='asap'?'ASAP':'Normal'))+
      rvrow('When',esc(recurTxt))+
      (d.instr?rvrow('Instructions',esc(d.instr)):'')+
    '</div>'+
    '<div style="font-family:Nunito,sans-serif;font-weight:800;font-size:.62rem;text-transform:uppercase;letter-spacing:.6px;color:var(--dark-grey);margin:2px 0 8px">Assignment</div>'+
    '<div class="panel">'+assignTable+'</div>';
  const stepBody=STEP===1?s1:STEP===2?s2:STEP===3?s3:s4;
  const chips='<div style="display:flex;gap:6px;padding:2px 20px 6px">'+WSTEPS.map((s,i)=>{const n=i+1,on=n===STEP,done=n<STEP;return '<div style="flex:1;text-align:center;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:7px 3px;border-radius:8px;'+(on?'background:var(--dark);color:#fff':done?'background:var(--light-grey);color:var(--dark)':'color:var(--grey);background:#fafafa')+'">'+n+'. '+s[0]+'</div>';}).join('')+'</div>';
  const footer=
    '<div class="mdl-ft"><div style="display:flex;align-items:center;gap:14px"><div class="hint">Step '+STEP+' of 4</div>'+
    (EDIT_ID&&STEP===4?'<button class="linkdel" data-arch>Archive'+(useLocsUI()&&(d.locs||[]).length>1?' (all '+d.locs.length+')':'')+'</button>':'')+
    '</div><div style="display:flex;gap:10px">'+
    (STEP>1?'<button class="btn alt" data-back>Back</button>':'<button class="btn alt" data-close>Cancel</button>')+
    (STEP<4?'<button class="btn" data-next>Next</button>':'<button class="btn" data-save>'+(EDIT_ID?(useLocsUI()&&(d.locs||[]).length>1?'Save '+d.locs.length+' stores':'Save changes'):(d.locs.length>1?'Create '+d.locs.length+' templates':'Create template'))+'</button>')+
    '</div></div>';
  // a re-render rebuilds the modal's innerHTML, which resets scroll to the top.
  // capture the body/overlay scroll first so editing a per-day row doesn't jump
  // the whole modal back up.
  const _bd=$('#mdlWrap .mdl-bd'),_ovl=$('#mdlWrap .ovl');
  const _sbd=_bd?_bd.scrollTop:0,_sovl=_ovl?_ovl.scrollTop:0;
  openModal(
    '<div class="mdl" style="width:640px;border-top:3px solid var(--red)">'+
    '<div class="mdl-hd"><div style="font-family:Nunito,sans-serif;font-weight:900;font-size:1.15rem">'+(EDIT_ID?'Edit template':'New template')+'</div><button class="mdl-x" data-close>✕</button></div>'+
    chips+
    '<div class="mdl-bd">'+stepBody+'</div>'+
    footer+'</div>'
  );
  const _nbd=$('#mdlWrap .mdl-bd'),_novl=$('#mdlWrap .ovl');
  if(_nbd&&_sbd)_nbd.scrollTop=_sbd;
  if(_novl&&_sovl)_novl.scrollTop=_sovl;
  const grab=()=>{
    const g=id=>{const el=$('#mdlWrap #'+id);return el?el.value:undefined;};
    const L=d.locs[d.__locSel];               // assignment writes land on the selected location
    if(g('eName')!=null)d.name=g('eName');
    if(g('eLinkText')!=null)d.linkText=g('eLinkText');
    if(g('eCustomUrl')!=null)d.customUrl=g('eCustomUrl');
    if(g('eMonthDates')!=null)d.monthDates=g('eMonthDates');
    if(g('eFlexN')!=null)d.flexN=g('eFlexN');if(g('eFlexPer')!=null)d.flexPer=g('eFlexPer');
    if(g('eRecurInt')!=null)d.recurInterval=g('eRecurInt');if(g('eRecurAnchor')!=null)d.recurAnchor=g('eRecurAnchor');
    if(L){
      if(g('eAssignee')!=null)L.assignee=g('eAssignee');if(g('eFallback')!=null)L.fallback=g('eFallback');
      if(g('eShift')!=null)L.shift=g('eShift');if(g('eRole')!=null)L.role=g('eRole');
    }
    document.querySelectorAll('#mdlWrap .loctime').forEach(el=>{const i=+el.dataset.li;if(d.locs&&d.locs[i])d.locs[i].dueTime=el.value;});
    if(g('eDueAfterN')!=null)d.dueAfterN=g('eDueAfterN');if(g('eDueAfterUnit')!=null)d.dueAfterUnit=g('eDueAfterUnit');
    if(g('eDueDate')!=null)d.dueDate=g('eDueDate');if(g('eInstr')!=null)d.instr=g('eInstr');
    if(L){
      const dt=$('#mdlWrap #eDayToggle');if(dt)L.perDay=dt.checked;
      document.querySelectorAll('#mdlWrap [data-dayov]').forEach(el=>{const w=+el.dataset.dayov;const ov=ovParse(el.value);if(ov)L.dayAssign[w]=ov;else delete L.dayAssign[w];});
    }
  };
  document.querySelectorAll('#mdlWrap [data-prio]').forEach(b=>b.onclick=()=>{grab();d.priority=b.dataset.prio;drawEditor();});
  document.querySelectorAll('#mdlWrap [data-recur]').forEach(b=>b.onclick=()=>{grab();d.recur=b.dataset.recur;drawEditor();});
  document.querySelectorAll('#mdlWrap [data-locsel]').forEach(b=>b.onclick=()=>{grab();d.__locSel=+b.dataset.locsel;drawEditor();});
  document.querySelectorAll('#mdlWrap [data-tgt]').forEach(b=>b.onclick=()=>{grab();d.locs[d.__locSel].target=b.dataset.tgt;drawEditor();});
  document.querySelectorAll('#mdlWrap [data-strat]').forEach(b=>b.onclick=()=>{grab();d.locs[d.__locSel].strategy=b.dataset.strat;drawEditor();});
  document.querySelectorAll('#mdlWrap [data-comp]').forEach(b=>b.onclick=()=>{grab();d.locs[d.__locSel].completion=b.dataset.comp;drawEditor();});
  document.querySelectorAll('#mdlWrap [data-duety]').forEach(b=>b.onclick=()=>{grab();d.dueType=b.dataset.duety;drawEditor();});
  document.querySelectorAll('#mdlWrap [data-wd]').forEach(b=>b.onclick=()=>{grab();const wd=+b.dataset.wd;const at=d.weekdays.indexOf(wd);if(at>-1)d.weekdays.splice(at,1);else d.weekdays.push(wd);drawEditor();});
  const ri=$('#mdlWrap #eRecurInt');if(ri)ri.onchange=()=>{grab();d.recurInterval=ri.value;if(+ri.value>1&&!d.recurAnchor)d.recurAnchor=TODAY;drawEditor();};
  const ra=$('#mdlWrap #eRecurAnchor');if(ra)ra.onchange=()=>{grab();drawEditor();};
  document.querySelectorAll('#mdlWrap [data-pool]').forEach(b=>b.onclick=()=>{grab();const L=d.locs[d.__locSel];const id=+b.dataset.pool;const at=L.pool.indexOf(id);if(at>-1)L.pool.splice(at,1);else L.pool.push(id);drawEditor();});
  document.querySelectorAll('#mdlWrap [data-dayov]').forEach(sel=>sel.onchange=()=>{grab();drawEditor();});
  const dtog=$('#mdlWrap #eDayToggle');if(dtog)dtog.onchange=()=>{grab();const L=d.locs[d.__locSel];L.perDay=dtog.checked;if(!dtog.checked)L.dayAssign={};drawEditor();};
  // copy the selected location's whole assignment to every other location,
  // remapping store-specific people to each store's own roster (see remapAssign)
  const ca=$('#mdlWrap [data-copyall]');if(ca)ca.onclick=()=>{grab();const src=d.locs[d.__locSel];d.locs.forEach((Lx,i)=>{if(i===d.__locSel)return;Object.assign(Lx,remapAssign(src,Lx.store));});drawEditor();toast('Copied to all locations');};
  const nx=$('#mdlWrap [data-next]');if(nx)nx.onclick=()=>{grab();if(STEP===1&&!String(d.name||'').trim()){toast('Give the task a name',true);return;}STEP=Math.min(4,STEP+1);drawEditor();};
  const bk=$('#mdlWrap [data-back]');if(bk)bk.onclick=()=>{grab();STEP=Math.max(1,STEP-1);drawEditor();};
  const lu=$('#mdlWrap #eLinkUrl');if(lu)lu.onchange=()=>{grab();d.linkUrl=lu.value;drawEditor();};
  // locations search-add / per-location due time / remove
  const ls=$('#mdlWrap #eLocSearch');
  if(ls){
    const sug=$('#mdlWrap #eLocSug');
    const renderSug=()=>{
      const q=ls.value.trim().toLowerCase();
      const have={};d.locs.forEach(L=>have[L.store]=1);
      const hits=STORES.filter(s=>!have[s]&&(!q||s.toLowerCase().indexOf(q)>-1||shortStore(s).toLowerCase().indexOf(q)>-1));
      sug.innerHTML=hits.map(s=>'<div class="locopt" data-s="'+esc(s)+'">'+esc(shortStore(s))+'</div>').join('');
      sug.classList.toggle('open',hits.length>0&&document.activeElement===ls);
      sug.querySelectorAll('.locopt').forEach(o=>o.addEventListener('mousedown',e=>{
        e.preventDefault();grab();
        const store=o.dataset.s;
        d.locs.push(Object.assign({store:store,dueTime:(d.locs[d.locs.length-1]||{}).dueTime||'6:00 PM'},blankAssign(store)));
        drawEditor();
        const nls=$('#mdlWrap #eLocSearch');if(nls)nls.focus();
      }));
    };
    ls.addEventListener('focus',renderSug);
    ls.addEventListener('input',renderSug);
    ls.addEventListener('blur',()=>setTimeout(()=>{sug.classList.remove('open');},150));
    document.querySelectorAll('#mdlWrap .locx').forEach(b=>b.onclick=()=>{
      if(d.locs.length<2)return;
      grab();d.locs.splice(+b.dataset.li,1);if(d.__locSel>=d.locs.length)d.__locSel=d.locs.length-1;drawEditor();
    });
  }
  const lt=$('#mdlWrap #eLinkText');if(lt)lt.onchange=()=>{grab();drawEditor();};
  const sv=$('#mdlWrap [data-save]');if(sv)sv.onclick=()=>{grab();saveTemplate();};
  const ar=$('#mdlWrap [data-arch]');if(ar)ar.onclick=()=>{grab();archiveTemplate();};
}
async function saveTemplate(){
  const d=DRAFT;
  if(!String(d.name||'').trim()){toast('Give the task a name',true);return;}
  const url=d.linkUrl==='__custom'?String(d.customUrl||'').trim():d.linkUrl;
  // shared, task-level fields (same across every location)
  const shared={
    name:d.name.trim(),
    link_text:(d.linkText&&url&&d.name.indexOf(d.linkText)>-1)?d.linkText:null,
    link_url:(d.linkText&&url&&d.name.indexOf(d.linkText)>-1)?url:null,
    priority:d.priority,recur:d.recur,
    weekdays:d.recur==='weekly'?d.weekdays.slice().sort():null,
    month_dates:d.recur==='monthly'?String(d.monthDates||'').split(/[,\s]+/).map(Number).filter(n=>n>=1&&n<=31):null,
    flex_n:d.recur==='flexible'?Math.max(1,+d.flexN||1):null,
    flex_per:d.recur==='flexible'?(d.flexPer==='month'?'month':'week'):null,
    recur_interval:(d.recur==='weekly'||d.recur==='monthly')?Math.max(1,Math.min(4,+d.recurInterval||1)):1,
    recur_anchor:((d.recur==='weekly'||d.recur==='monthly')&&(+d.recurInterval>1))?(d.recurAnchor||TODAY):null,
    due_type:d.recur==='oneoff'?d.dueType:'same',
    due_after_n:(d.recur==='oneoff'&&d.dueType==='after')?+d.dueAfterN||null:null,
    due_after_unit:(d.recur==='oneoff'&&d.dueType==='after')?d.dueAfterUnit:null,
    due_date:(d.recur==='oneoff'&&d.dueType==='date'&&d.dueDate)?d.dueDate:null,
    instructions:String(d.instr||'').trim()||null,
    personal:false,updated_at:new Date().toISOString()
  };
  if(shared.recur==='weekly'&&!(shared.weekdays||[]).length){toast('Pick at least one weekday',true);return;}
  if(shared.recur==='monthly'&&!(shared.month_dates||[]).length){toast('Enter at least one date of the month',true);return;}
  const odays=overrideDays(d);
  // per-location assignment → its own row. Each store carries its own target,
  // people, and per-weekday overrides; the shared fields ride along unchanged.
  const rowFor=(L)=>{
    const dayAssign=(function(){const out={};odays.forEach(w=>{if(L.dayAssign&&L.dayAssign[w])out[w]=L.dayAssign[w];});return Object.keys(out).length?out:null;})();
    return Object.assign({},shared,{
      store:L.store,due_time:to24(L.dueTime),
      target:L.target,
      assignee_staff_id:L.target==='person'?+L.assignee||null:null,
      fallback_staff_id:(L.target==='person'&&L.fallback)?+L.fallback:null,
      shift_id:L.target==='shift'?+L.shift||null:null,
      role_key:L.target==='role'?L.role:null,
      pool:L.target==='group'?L.pool:null,
      strategy:L.strategy,completion:(['role','group'].indexOf(L.target)>-1)?L.completion:'any',
      day_assignments:dayAssign
    });
  };
  for(const L of d.locs){
    if(L.target==='group'&&!(L.pool||[]).length){toast('Pick at least one person for the pool at '+shortStore(L.store),true);return;}
  }
  const locs=d.locs;
  try{
    if(!EDIT_ID){
      // create: one template per location, all sharing a fresh group_id
      const gid=(self.crypto&&crypto.randomUUID)?crypto.randomUUID():null;
      const rows=locs.map(L=>Object.assign(rowFor(L),{created_by:ME.id,group_id:gid}));
      const r=await sb.from('task_templates').insert(rows).select();if(r.error)throw r.error;
    } else {
      // grouped edit: one edit reconciles every store in the group — updates
      // existing store rows, inserts newly-added stores, archives removed ones
      let gid=EDIT_GID||((self.crypto&&crypto.randomUUID)?crypto.randomUUID():null);
      let sibs=groupSibs(gid);
      const cur=TPLS.find(x=>x.id===EDIT_ID);
      if(cur&&!sibs.some(x=>x.id===EDIT_ID))sibs=sibs.concat([cur]);   // defensive (pre-group templates)
      const bySt={};sibs.forEach(x=>{bySt[x.store]=x;});
      const want={};locs.forEach(L=>{want[L.store]=1;});
      const ops=[];
      locs.forEach(L=>{
        const base=Object.assign(rowFor(L),{group_id:gid});
        const ex=bySt[L.store];
        ops.push(ex?sb.from('task_templates').update(base).eq('id',ex.id)
                   :sb.from('task_templates').insert(Object.assign({},base,{created_by:ME.id})));
      });
      sibs.forEach(x=>{ if(!want[x.store]){   // store removed from the group → archive it
        ops.push(sb.from('task_templates').update({active:false,updated_at:new Date().toISOString()}).eq('id',x.id));
        ops.push(sb.from('task_instances').update({status:'missed'}).eq('template_id',x.id).eq('status','open'));
      }});
      const res=await Promise.all(ops);
      const bad=res.find(r=>r&&r.error);if(bad)throw bad.error;
    }
    closeModal();toast(EDIT_ID?(locs.length>1?'Saved · '+locs.length+' stores':'Template updated'):(locs.length>1?locs.length+' templates created — one per location':'Template created'));
    const sess=(await sb.auth.getSession()).data.session;
    if(sess)await fetch(SB_URL+'/functions/v1/tasks?action=generate',{headers:{'Authorization':'Bearer '+sess.access_token}}).catch(()=>{});
    await loadCore();await loadReport();render();
  }catch(e){toast(String(e.message||e),true);}
}
async function archiveTemplate(){
  if(!EDIT_ID)return;
  // fan-out task → archive every store in the group; else just this one
  const grouped=useLocsUI()&&EDIT_GID;
  let ids=[EDIT_ID];
  if(grouped){const sibs=groupSibs(EDIT_GID);if(sibs.length)ids=sibs.map(x=>x.id);if(ids.indexOf(EDIT_ID)<0)ids.push(EDIT_ID);}
  if(!confirm(grouped&&ids.length>1?('Archive this task at all '+ids.length+' stores? It stops generating; history is kept.'):'Archive this task template? It stops generating; history is kept.'))return;
  try{
    const r=await sb.from('task_templates').update({active:false,updated_at:new Date().toISOString()}).in('id',ids);
    if(r.error)throw r.error;
    await sb.from('task_instances').update({status:'missed'}).in('template_id',ids).eq('status','open');
    closeModal();toast(ids.length>1?('Archived · '+ids.length+' stores'):'Template archived');
    await loadCore();await loadReport();render();
  }catch(e){toast(String(e.message||e),true);}
}

/* ===== modal plumbing ===== */
function openModal(inner){
  $('#mdlWrap').innerHTML='<div class="ovl">'+inner+'</div>';
  const ovl=$('#mdlWrap .ovl');
  ovl.addEventListener('mousedown',e=>{if(e.target===ovl)closeModal();});
  document.querySelectorAll('#mdlWrap [data-close]').forEach(b=>b.onclick=closeModal);
}
function closeModal(){$('#mdlWrap').innerHTML='';DRAFT=null;EDIT_ID=null;EDIT_GID=null;}
</script>
