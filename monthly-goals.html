<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monthly Goals · CPR Oregon</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--border:#E0E2EA;--green:#2E9E5B;--amber:#C9820B;}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0}
body{font-family:'Nunito Sans',sans-serif;color:var(--dark);background:var(--light-grey)}
.wrap{padding:22px 26px 60px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.6rem;letter-spacing:-.4px;margin:0}
.sub{font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.85rem;color:var(--grey);margin-top:4px}
.rephd{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.wknav{display:flex;align-items:center;gap:6px;margin-left:auto}
.wknav button{height:34px;border:1px solid var(--border);background:#fff;border-radius:9px;cursor:pointer;font-size:1rem;color:var(--dark-grey)}
.wknav button.arrow{width:34px}
.wknav .lbl{font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;min-width:150px;text-align:center;padding:0 12px}
.board{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.board-hd{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);background:#fafafa}
.board-hd .bar{width:11px;height:18px;border-radius:4px;flex:none}
.board-hd .nm{font-family:'Nunito',sans-serif;font-weight:900;font-size:.84rem;letter-spacing:.4px;text-transform:uppercase}
.board-hd .sub2{font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.72rem;color:var(--grey)}
table.g{width:100%;border-collapse:collapse}
table.g th{font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey);text-align:left;padding:9px 14px;border-bottom:1px solid var(--border);background:#F0F1F4}
table.g td{padding:10px 14px;border-bottom:1px solid var(--light-grey);font-size:.86rem;vertical-align:middle}
table.g tr:last-child td{border-bottom:none}
table.g td.num,table.g th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.emp{display:flex;align-items:center;gap:9px}
.av{width:30px;height:30px;border-radius:50%;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.64rem;display:flex;align-items:center;justify-content:center;flex:none}
.emp .nm{font-family:'Nunito',sans-serif;font-weight:800;font-size:.86rem}
.emp .rl{font-size:.66rem;color:var(--grey);font-weight:700}
.gin{font-family:'Nunito',sans-serif;font-weight:800;font-size:.84rem;padding:7px 9px;border:1.5px solid var(--border);border-radius:8px;width:110px;text-align:right}
.gin:focus{outline:none;border-color:var(--blue)}
.nin{font-family:'Nunito Sans',sans-serif;font-weight:600;font-size:.8rem;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;width:100%;min-width:140px}
.nin:focus{outline:none;border-color:var(--blue)}
.chip{display:inline-block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.56rem;text-transform:uppercase;letter-spacing:.4px;border-radius:999px;padding:2px 8px;white-space:nowrap}
.c-set{color:#1E7AA8;background:#E3F0F7}
.c-def{color:#8a909e;background:var(--light-grey)}
.c-hit{color:#1E7A45;background:#E9F6EE}
.c-miss{color:#9A6700;background:#FCF3E3}
.muted{color:var(--grey)}
.money{font-family:'Nunito',sans-serif;font-weight:800}
.empty{color:var(--grey);font-weight:700;padding:24px;text-align:center}
.note{font-family:'Nunito Sans',sans-serif;font-size:.88rem;color:var(--dark-grey);background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-top:6px;line-height:1.55}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:11px 18px;border-radius:11px;font-weight:800;font-size:.84rem;opacity:0;pointer-events:none;transition:.2s;z-index:3000;font-family:'Nunito',sans-serif}
.toast.show{opacity:1}.toast.err{background:var(--red)}
@media(max-width:760px){ .wrap{padding:16px 12px 50px} table.g th,table.g td{padding:8px 8px} .nin{min-width:90px} }
</style>
</head>
<body>

<div class="wrap" id="app">
  <div id="repBody"><div class="empty">Loading…</div></div>
  <div id="gate" class="note" hidden>Monthly Goals are for managers and the owner.</div>
</div>
<div id="toast" class="toast"></div>

<script src="assets/pin-gate.js"></script>
<script src="assets/locations.js"></script>
<script src="assets/nav.js"></script>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SB_URL='https://xuvsehrevxackuhmbmry.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY';
const sb=createClient(SB_URL,ANON);
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const isMgr=r=>['owner','admin','manager'].indexOf(r)>-1;
function shortStore(s){return window.CPRLocations?CPRLocations.display(s):String(s||'').replace(/^CPR\s*/,'');}
function storeRank(s){try{var x=window.CPRLocations&&CPRLocations.find&&CPRLocations.find(s);return x?x.order:99;}catch(e){return 99;}}
function iso(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONL=['January','February','March','April','May','June','July','August','September','October','November','December'];
const money=n=>'$'+Math.round(Number(n)||0).toLocaleString('en-US');
function toast(m,err){var t=$('#toast');t.textContent=m;t.className='toast show'+(err?' err':'');setTimeout(function(){t.className='toast';},2600);}
const AVPAL=['#DC282E','#2E9E5B','#4FB0E3','#C9820B','#7A6FD0','#2D2D3B','#1E7AA8','#C24E8E'];
function avatarBg(id){var h=0,s=String(id||'');for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return AVPAL[h%AVPAL.length];}
function initials(n){var p=String(n||'?').trim().split(/\s+/);return ((p[0]||'')[0]||'')+((p[1]||'')[0]||'')||'?';}

/* Auth: pin-gate.js is the sole gate. */
let ME=null, BOOTED=false;
async function resolveMe(sess){
  if(!sess||BOOTED)return;
  const sr=await sb.from('staff').select('id,display_name,role').eq('auth_uid',sess.user.id).maybeSingle();
  if(sr.data){ BOOTED=true; ME={id:sr.data.id,name:sr.data.display_name,role:sr.data.role}; boot(); }
}
sb.auth.onAuthStateChange((_e,sess)=>{ if(sess) resolveMe(sess); });
function boot(){
  if(!ME||!isMgr(ME.role)){ $('#repBody').innerHTML=''; $('#gate').hidden=false; return; }
  render();
}

/* ===== state ===== */
let MM=null;                        // first-of-month being viewed
const SALES={};                     // 'YYYY-MM' -> {staff_id: accyNet} cache
function firstOf(d){return new Date(d.getFullYear(),d.getMonth(),1);}
function monthKey(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2);}
function monthISO(d){return monthKey(d)+'-01';}
function addMonths(d,n){return new Date(d.getFullYear(),d.getMonth()+n,1);}
function endOfMonth(d){return new Date(d.getFullYear(),d.getMonth()+1,0);}

async function salesFor(mon){
  const key=monthKey(mon);
  if(SALES[key])return SALES[key];
  const r=await sb.from('commission_sales').select('staff_id,accy_net')
    .gte('biz_date',monthISO(mon)).lte('biz_date',iso(endOfMonth(mon)));
  const agg={};(r.data||[]).forEach(x=>{if(x.staff_id==null)return;agg[x.staff_id]=(agg[x.staff_id]||0)+(Number(x.accy_net)||0);});
  return (SALES[key]=agg);
}

async function render(){
  if(!MM)MM=firstOf(new Date());
  $('#repBody').innerHTML='<div class="empty">Loading…</div>';
  const now=new Date(), curMon=firstOf(now);
  const isCur=monthKey(MM)===monthKey(curMon), isPast=MM<curMon, isFut=MM>curMon;
  const prevMon=addMonths(MM,-1);
  const [st,rs,gl,prevSales,monSales]=await Promise.all([
    sb.from('staff').select('id,display_name,home_store,role,active,avatar,avatar_color').eq('active',true),
    sb.from('commission_roster').select('staff_id,accy_goal,commission_active'),
    sb.from('commission_goals').select('staff_id,accy_goal,note').eq('month',monthISO(MM)),
    salesFor(prevMon),
    (isFut?Promise.resolve({}):salesFor(MM))
  ]);
  const roster={};(rs.data||[]).forEach(r=>{roster[r.staff_id]=r;});
  const goals={};(gl.data||[]).forEach(g=>{goals[g.staff_id]=g;});
  // who gets a goal: active, not the owner, and not switched off in the commission roster
  const people=(st.data||[]).filter(s=>s.role!=='owner'&&!(roster[s.id]&&roster[s.id].commission_active===false));
  const stores=[...new Set(people.map(p=>p.home_store).filter(Boolean))].sort((a,b)=>storeRank(a)-storeRank(b));

  const mlabel=MONL[MM.getMonth()]+' '+MM.getFullYear();
  const actHead=isCur?'This month so far':(isPast?'Actual':'—');
  let html='<div class="rephd"><div><h1>Monthly Goals</h1><div class="sub">Set each person’s accessory $ target for the month — hitting it pays their goal bonus. Blank = their standing default.</div></div>'
    +'<div class="wknav"><button class="arrow" data-mm="-1">‹</button><button class="lbl" data-mpick title="Pick a month">'+mlabel+' <span style="font-size:.6rem;color:var(--grey)">▾</span></button><button class="arrow" data-mm="1">›</button>'
    +(isCur?'':'<button data-mm="0" style="padding:0 12px;font-family:Nunito,sans-serif;font-weight:800;font-size:.76rem">This month</button>')+'</div></div>';

  if(!people.length){ html+='<div class="empty">No commission-active team members visible to you.</div>'; $('#repBody').innerHTML=html; wire(); return; }

  stores.forEach(store=>{
    const crew=people.filter(p=>p.home_store===store).sort((a,b)=>(a.display_name||'')<(b.display_name||'')?-1:1);
    if(!crew.length)return;
    const rows=crew.map(p=>{
      const def=roster[p.id]?Number(roster[p.id].accy_goal)||0:0;
      const g=goals[p.id]||null;
      const resolved=g?Number(g.accy_goal)||0:def;
      const prev=prevSales[p.id]||0;
      const act=(monSales&&monSales[p.id])||0;
      let actCell='<span class="muted">—</span>';
      if(isCur)actCell='<span class="money">'+money(act)+'</span>'+(resolved>0?'<span class="muted" style="font-size:.7rem"> / '+money(resolved)+'</span>':'');
      else if(isPast){const hit=resolved>0&&act>=resolved;
        actCell='<span class="money">'+money(act)+'</span> '+(resolved>0?'<span class="chip '+(hit?'c-hit':'c-miss')+'">'+(hit?'Hit':'Missed')+'</span>':'');}
      const src=g?'<span class="chip c-set">Set</span>':'<span class="chip c-def">Default</span>';
      const av='<span class="av" style="background:'+esc(p.avatar_color||avatarBg(p.id))+(p.avatar?';font-size:.85rem':'')+'">'+(p.avatar?esc(p.avatar):esc(initials(p.display_name)))+'</span>';
      const roleLbl=isMgr(p.role)?'Manager':'Tech';
      return '<tr>'
        +'<td><div class="emp">'+av+'<div><div class="nm">'+esc(p.display_name)+'</div><div class="rl">'+roleLbl+'</div></div></div></td>'
        +'<td class="num"><span class="money" style="color:var(--dark-grey)">'+money(prev)+'</span></td>'
        +'<td class="num">'+actCell+'</td>'
        +'<td class="num"><input type="number" min="0" step="50" class="gin" data-goal="'+p.id+'" value="'+(g?esc(g.accy_goal):'')+'" placeholder="'+esc(def||0)+'"> '+src+'</td>'
        +'<td><input class="nin" data-note="'+p.id+'" value="'+esc(g&&g.note||'')+'" placeholder="What was agreed / focus area"></td>'
        +'</tr>';
    }).join('');
    html+='<div class="board"><div class="board-hd"><span class="bar" style="background:#4FB0E3"></span><span class="nm">'+esc(shortStore(store))+'</span><span class="sub2">'+crew.length+' people</span></div>'
      +'<table class="g"><thead><tr><th>Employee</th><th class="num">'+esc(MON[prevMon.getMonth()])+' actual</th><th class="num">'+actHead+'</th><th class="num">'+esc(MON[MM.getMonth()])+' goal ($)</th><th>Meeting note</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  });
  html+='<div class="note"><b>How this works:</b> the goal you set here becomes that person’s accessory target for '+esc(mlabel)+' — their dashboard, the My Commission widget, and the payroll calculator all use it, including the <b>“hit your accessory goal” bonus</b>. Leave it blank to use their standing default (set in Settings › Team Member). Notes are private to managers.</div>';
  $('#repBody').innerHTML=html;
  wire();
}

function wire(){
  document.querySelectorAll('[data-mm]').forEach(b=>b.onclick=()=>{const n=Number(b.getAttribute('data-mm'));MM=(n===0)?firstOf(new Date()):addMonths(MM,n);render();});
  const mp=document.querySelector('[data-mpick]');if(mp)mp.onclick=ev=>{ev.stopPropagation();openMonthPicker(mp);};
  document.querySelectorAll('[data-goal]').forEach(inp=>inp.onchange=()=>saveGoal(Number(inp.getAttribute('data-goal'))));
  document.querySelectorAll('[data-note]').forEach(inp=>inp.onchange=()=>saveGoal(Number(inp.getAttribute('data-note'))));
}

async function saveGoal(staffId){
  const gin=document.querySelector('[data-goal="'+staffId+'"]'), nin=document.querySelector('[data-note="'+staffId+'"]');
  const gv=gin?String(gin.value).trim():'', nv=nin?String(nin.value).trim():'';
  const mISO=monthISO(MM);
  if(gv===''&&nv===''){
    const d=await sb.from('commission_goals').delete().eq('staff_id',staffId).eq('month',mISO);
    if(d.error){toast(d.error.message,true);return;}
    toast('Back to default goal');render();return;
  }
  // a note with no goal pins the current default so the row is self-contained
  const goalNum=gv===''?Number(gin&&gin.placeholder)||0:Number(gv)||0;
  const r=await sb.from('commission_goals').upsert({staff_id:staffId,month:mISO,accy_goal:goalNum,note:nv||null,set_by:ME.id,set_at:new Date().toISOString()},{onConflict:'staff_id,month'});
  if(r.error){toast(r.error.message,true);return;}
  toast('✓ Saved');render();
}

/* Month picker: 12-month grid with year paging (site convention). */
let MPOP=null;
function closeMonthPicker(){if(MPOP){MPOP.remove();MPOP=null;}}
function openMonthPicker(anchor){
  closeMonthPicker();
  let year=MM.getFullYear();
  const back=document.createElement('div');back.style.cssText='position:fixed;inset:0;z-index:1500';back.onclick=closeMonthPicker;
  const pop=document.createElement('div');pop.style.cssText='position:fixed;z-index:1501;width:252px;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 14px 34px rgba(45,45,59,.24);padding:10px';
  function draw(){
    const selY=MM.getFullYear(),selM=MM.getMonth();
    const grid=MON.map((mn,i)=>{const on=(year===selY&&i===selM);
      return '<button data-mo="'+i+'" style="padding:9px 0;border:1px solid '+(on?'#4FB0E3':'transparent')+';border-radius:8px;background:'+(on?'rgba(79,176,227,.14)':'transparent')+';color:'+(on?'#1E7AA8':'var(--dark)')+';font-family:Nunito,sans-serif;font-weight:800;font-size:.76rem;cursor:pointer">'+mn+'</button>';}).join('');
    pop.innerHTML='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><button data-py="-1" style="border:1px solid var(--border);background:#fff;border-radius:7px;width:28px;height:28px;cursor:pointer;font-weight:800;font-size:15px;color:var(--dark-grey)">‹</button><div style="flex:1;text-align:center;font-family:Nunito,sans-serif;font-weight:900;font-size:.9rem">'+year+'</div><button data-py="1" style="border:1px solid var(--border);background:#fff;border-radius:7px;width:28px;height:28px;cursor:pointer;font-weight:800;font-size:15px;color:var(--dark-grey)">›</button></div>'
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px">'+grid+'</div>';
    pop.querySelectorAll('[data-py]').forEach(b=>b.onclick=ev=>{ev.stopPropagation();year+=Number(b.getAttribute('data-py'));draw();});
    pop.querySelectorAll('[data-mo]').forEach(b=>b.onclick=()=>{MM=new Date(year,Number(b.getAttribute('data-mo')),1);closeMonthPicker();render();});
  }
  draw();
  document.body.appendChild(back);document.body.appendChild(pop);MPOP={remove(){back.remove();pop.remove();}};
  const r=anchor.getBoundingClientRect(),vw=window.innerWidth;
  pop.style.left=Math.max(10,Math.min(r.left,vw-262))+'px';pop.style.top=(r.bottom+6)+'px';
}

(async()=>{ try{ const s=(await sb.auth.getSession()).data.session; if(s) resolveMe(s); }catch(e){} })();
</script>
</body>
</html>
