<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Time Off · CPR Oregon</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--border:#E0E2EA;--green:#2E9E5B;--amber:#C9820B;}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0}
body{font-family:'Nunito Sans',sans-serif;color:var(--dark);background:var(--light-grey)}
.wrap{max-width:1000px;margin:0 auto;padding:22px 20px 60px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.6rem;letter-spacing:-.4px;margin:0}
.sub{font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.85rem;color:var(--grey);margin-top:4px}
.toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:18px 0 14px}
.seg{display:inline-flex;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.seg button{font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;border:none;background:#fff;color:var(--dark-grey);padding:8px 13px;cursor:pointer}
.seg button.on{background:var(--blue);color:#fff}
.seg .div{width:1px;background:var(--border)}
.pend{font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;color:#fff;background:var(--red);border-radius:999px;padding:2px 9px}
.totbl{background:#fff;border:1px solid var(--border);border-radius:13px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);text-align:left;padding:11px 14px;border-bottom:1px solid var(--border);background:#fafafa}
td{padding:11px 14px;border-bottom:1px solid var(--light-grey);font-size:.85rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;color:#fff;font-family:'Nunito',sans-serif;font-weight:900;flex:none}
.empname{display:flex;align-items:center;gap:9px}
.nmline{font-family:'Nunito',sans-serif;font-weight:800}
.tag{display:inline-block;font-family:'Nunito',sans-serif;font-weight:800;border-radius:999px}
.sbadge{display:inline-block;font-family:'Nunito',sans-serif;font-weight:800;font-size:.62rem;border-radius:999px;padding:3px 10px}
.hrs{font-family:'Nunito',sans-serif;font-weight:900;font-variant-numeric:tabular-nums}
.hrs .d{display:block;font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:.64rem;color:var(--grey);text-transform:uppercase;letter-spacing:.3px}
.flagchip{display:inline-flex;align-items:center;gap:5px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;border-radius:7px;padding:2px 7px;margin-top:4px}
.act button{font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;border-radius:8px;padding:6px 12px;cursor:pointer}
.act .appr{border:none;background:var(--green);color:#fff}
.act .deny{border:1.5px solid var(--border);background:#fff;color:var(--dark-grey);margin-right:6px}
.act .undo{border:none;background:none;color:var(--grey);text-decoration:underline}
.empty{padding:44px;text-align:center}
.empty .big{font-size:24px;margin-bottom:6px}
.empty .t{font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;color:var(--dark-grey)}
.note{font-family:'Nunito Sans',sans-serif;font-size:.9rem;color:var(--dark-grey);background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:20px}
/* lock */
.lock{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:3000;padding:20px}
.lkcard{width:320px;max-width:100%;background:#fff;border-radius:16px;padding:26px 24px;box-shadow:0 22px 60px rgba(0,0,0,.4)}
.lkcard h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.15rem;margin:0 0 4px}
.lkcard p{font-size:.82rem;color:var(--dark-grey);margin:0 0 16px}
.lkcard input{width:100%;font-family:'Nunito',sans-serif;font-size:1.1rem;letter-spacing:.3em;text-align:center;padding:12px;border:1.5px solid var(--border);border-radius:10px;outline:none}
.lkcard input:focus{border-color:var(--blue)}
.lkcard button{width:100%;margin-top:12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;border:none;border-radius:10px;padding:12px;background:var(--red);color:#fff;cursor:pointer}
.lkerr{color:var(--red);font-size:.76rem;font-weight:700;margin-top:9px;min-height:1em;text-align:center}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:.82rem;padding:10px 16px;border-radius:10px;opacity:0;pointer-events:none;transition:.2s;z-index:4000}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}
</style>
</head>
<body>

<div class="lock" id="lock" hidden>
  <div class="lkcard">
    <h2>Time Off</h2><p>Enter your PIN to continue.</p>
    <input id="lkPin" inputmode="numeric" autocomplete="off" placeholder="••••" maxlength="8">
    <button id="lkGo">Sign in</button>
    <div class="lkerr" id="lkErr"></div>
  </div>
</div>

<div class="wrap" id="app" hidden>
  <h1>Time Off</h1>
  <div class="sub">Review and decide time-off requests submitted from My Time.</div>
  <div id="gate" class="note" hidden>Time Off is for managers and the owner.</div>
  <div id="view"></div>
</div>
<div class="toast" id="toast"></div>

<script src="assets/pin-gate.js"></script>
<script src="assets/locations.js"></script>
<script src="assets/nav.js"></script>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SB_URL='https://xuvsehrevxackuhmbmry.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY';
const FN=SB_URL+'/functions/v1/cpr-auth';
const sb=createClient(SB_URL,ANON);
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function deviceId(){try{let d=localStorage.getItem('cpr_device_id');if(!d){d=(crypto.randomUUID?crypto.randomUUID():'dev-'+Date.now());localStorage.setItem('cpr_device_id',d);}return d;}catch(e){return 'dev-x';}}
function fn(body){return fetch(FN,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ANON,'apikey':ANON},body:JSON.stringify(body)}).then(r=>r.json().then(d=>({status:r.status,data:d}),()=>({status:r.status,data:{}})));}
function toast(m,err){const t=$('#toast');t.textContent=m;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2400);}
/* ---- shared bits (ported from Schedule Admin) ---- */
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TYPES={Vacation:'#4FB0E3',Personal:'#8B5CF6',Sick:'#DC282E'};
const AVPAL=['#DC282E','#2E9E5B','#4FB0E3','#C9820B','#7A6FD0','#2D2D3B','#1E7AA8','#C24E8E'];
function avatarBg(id){let h=0,s=String(id||'');for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return AVPAL[h%AVPAL.length];}
function initials(n){const p=String(n||'?').trim().split(/\s+/);return ((p[0]||'')[0]||'')+((p[1]||'')[0]||'')||'?';}
function hexA(hex,a){let h=String(hex||'#4FB0E3').replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');return 'rgba('+(parseInt(h.slice(0,2),16)||79)+','+(parseInt(h.slice(2,4),16)||176)+','+(parseInt(h.slice(4,6),16)||227)+','+a+')';}
function iso(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function shortStore(s){return window.CPRLocations?CPRLocations.display(s):String(s||'').replace(/^CPR\s*/,'');}
function fmtRange(s,e){const a=s.split('-').map(Number),b=e.split('-').map(Number);if(s===e)return MON[a[1]-1]+' '+a[2];if(a[1]===b[1])return MON[a[1]-1]+' '+a[2]+'–'+b[2];return MON[a[1]-1]+' '+a[2]+' – '+MON[b[1]-1]+' '+b[2];}
function dayNum(s,e){return Math.round((new Date(e)-new Date(s))/86400000)+1;}
function isMgr(role){return ['owner','admin','manager'].indexOf(role)>-1;}
function empById(id){return STAFF.filter(e=>e.id===id)[0];}
function avHtml(e,sz,fs){const bg=esc((e&&e.avatar_color)||avatarBg(e&&e.id)),face=e&&e.avatar?esc(e.avatar):esc(initials(e&&e.display_name));return '<span class="av" style="width:'+sz+'px;height:'+sz+'px;font-size:'+fs+';background:'+bg+'">'+face+'</span>';}
function statusStyle(st){return st==='approved'?'color:var(--green);background:#E6F4EC':st==='denied'?'color:var(--red);background:#FBE9EA':'color:var(--amber);background:#FCF3E3';}
function statusLabel(st){return st==='approved'?'Approved':st==='denied'?'Denied':'Pending';}
function overlapsFor(r){
  if(r.status!=='pending')return null;
  const hits=REQS.filter(o=>o.id!==r.id&&o.status!=='denied'&&o.start_date<=r.end_date&&o.end_date>=r.start_date);
  if(!hits.length)return null;
  return hits.map(o=>{const e=empById(o.staff_id);return (e?e.display_name.split(' ')[0]:'')+' · '+fmtRange(o.start_date,o.end_date);}).join(', ');
}

let AUTH=null, STAFF=[], REQS=[], TOSTATUS='pending', TOSCOPE='current';

/* ---- auth: pin-gate.js owns sign-in; here we only read the shared session.
   Plain getSession only — never setSession (it rotates the refresh token and
   races the pin-gate/nav clients, which was blocking these pages). ---- */
async function doLogin(){
  const pin=$('#lkPin').value,err=$('#lkErr');if(!pin){err.textContent='Enter your PIN';return;}
  $('#lkGo').disabled=true;err.textContent='Signing in…';
  try{
    const r=await fn({action:'login',pin,device_id:deviceId()});
    if(r.status!==200){const d=r.data||{};err.textContent=(r.status===423||d.locked)?'Locked — an owner must reset this device.':(d.error==='invalid'?('Wrong PIN.'+(d.remaining!=null?(' '+d.remaining+' left.'):'')):(d.error||'Login failed.'));$('#lkGo').disabled=false;return;}
    await sb.auth.setSession({access_token:r.data.access_token,refresh_token:r.data.refresh_token});
    const st=r.data.staff||{};AUTH={id:st.id,name:st.display_name,role:st.role};err.textContent='';$('#lkGo').disabled=false;unlock();
  }catch(e){$('#lkGo').disabled=false;err.textContent=String(e&&e.message||e);}
}
function unlock(){$('#lock').setAttribute('hidden','');$('#app').removeAttribute('hidden');load();}
async function initAuth(){
  $('#lkGo').onclick=doLogin;$('#lkPin').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  const sess=(await sb.auth.getSession()).data.session;
  if(sess){const sr=await sb.from('staff').select('id,display_name,role').eq('auth_uid',sess.user.id).maybeSingle();
    if(sr.data){AUTH={id:sr.data.id,name:sr.data.display_name,role:sr.data.role};unlock();return;}}
  $('#lock').removeAttribute('hidden');$('#lkPin').focus();
}

async function load(){
  if(!AUTH||!isMgr(AUTH.role)){$('#gate').hidden=false;$('#view').innerHTML='';return;}
  const [stR,rqR]=await Promise.all([
    sb.from('staff').select('id,display_name,home_store,role,avatar,avatar_color,active'),
    sb.from('time_off_requests').select('id,staff_id,store,type,start_date,end_date,status,note,submitted_at')
  ]);
  STAFF=(stR.data||[]); REQS=(rqR.data||[]);
  render();
}

function render(){
  const today=iso(new Date());
  const pending=REQS.filter(r=>r.status==='pending').length;
  const statusDefs=[['all','All'],['pending','Pending'],['approved','Approved'],['denied','Denied']];
  const scopeDefs=[['current','Current & upcoming'],['past','Past'],['all','All']];
  let html='<div class="toolbar"><span style="font-family:Nunito;font-weight:900;font-size:1.05rem">Requests</span>'+(pending?'<span class="pend">'+pending+' pending</span>':'')+'</div>'
    +'<div class="toolbar"><div class="seg">'+statusDefs.map(d=>'<button data-ts="'+d[0]+'"'+(d[0]===TOSTATUS?' class="on"':'')+'>'+d[1]+'</button>').join('')+'</div>'
    +'<div class="seg">'+scopeDefs.map(d=>'<button data-tc="'+d[0]+'"'+(d[0]===TOSCOPE?' class="on"':'')+'>'+d[1]+'</button>').join('')+'</div></div>';
  const rows=REQS.filter(r=>{
    if(TOSTATUS!=='all'&&r.status!==TOSTATUS)return false;
    if(TOSCOPE==='current'&&r.end_date<today)return false;
    if(TOSCOPE==='past'&&r.end_date>=today)return false;
    return true;
  }).sort((a,b)=>{const ap=a.status==='pending'?0:1,bp=b.status==='pending'?0:1;if(ap!==bp)return ap-bp;return ap===0?(a.start_date<b.start_date?-1:1):(a.start_date<b.start_date?1:-1);});
  const body=rows.map(r=>{const e=empById(r.staff_id)||{display_name:'?'};const c=TYPES[r.type]||'#B9BDCB';
    const ovl=overlapsFor(r), days=dayNum(r.start_date,r.end_date), hrs=days*8;
    const flags=ovl?'<div class="flagchip" style="color:#1E6FA8;background:#E3F0F7"><span>⧉</span> Overlaps '+esc(ovl)+'</div>':'';
    const sub=r.submitted_at?(MON[new Date(r.submitted_at).getMonth()]+' '+new Date(r.submitted_at).getDate()):'';
    const act=r.status==='pending'
      ? '<span class="act"><button class="deny" data-deny="'+r.id+'">Deny</button><button class="appr" data-appr="'+r.id+'">Approve</button></span>'
      : '<span class="act"><button class="undo" data-undo="'+r.id+'">Undo</button></span>';
    return '<tr style="background:'+(r.status==='pending'?'#FFFCF7':'#fff')+'"><td><div class="empname">'+avHtml(e,28,'.66rem')+'<div><div class="nmline" style="font-size:.84rem">'+esc(e.display_name)+'</div><div style="font-family:Nunito Sans;font-size:.68rem;color:var(--grey);font-weight:700">'+esc(shortStore(e.home_store))+'</div>'+flags+'</div></div></td>'
      +'<td><span class="tag" style="font-size:.56rem;color:'+c+';background:'+hexA(c,0.13)+';padding:2px 8px">'+esc(r.type)+'</span></td>'
      +'<td style="white-space:nowrap;font-weight:700;color:var(--dark-grey)">'+esc(fmtRange(r.start_date,r.end_date))+'</td>'
      +'<td style="white-space:nowrap"><span class="hrs">'+hrs+' hrs<span class="d">'+days+(days===1?' day':' days')+'</span></span></td>'
      +'<td style="white-space:nowrap;color:#9aa0b0;font-weight:700">'+esc(sub)+'</td>'
      +'<td><span class="sbadge" style="'+statusStyle(r.status)+'">'+statusLabel(r.status)+'</span></td>'
      +'<td style="text-align:right;white-space:nowrap">'+act+'</td></tr>';
  }).join('');
  html+='<div class="totbl"><table><thead><tr><th>Employee</th><th>Type</th><th>Dates</th><th>Hours</th><th>Requested</th><th>Status</th><th style="text-align:right">Actions</th></tr></thead><tbody>'+body+'</tbody></table>'
    +(rows.length?'':'<div class="empty"><div class="big">🗂️</div><div class="t">No requests match these filters</div><div class="sub" style="margin-top:2px">Try a different status or switch the range to Past or All.</div></div>')
    +'</div><div class="note" style="font-size:.82rem">Hours estimated at 8 per day. Coverage warnings (does approving leave a store short?) live on the Schedule Admin calendar.</div>';
  $('#view').innerHTML=html;
  $('#view').querySelectorAll('[data-ts]').forEach(b=>b.onclick=()=>{TOSTATUS=b.getAttribute('data-ts');render();});
  $('#view').querySelectorAll('[data-tc]').forEach(b=>b.onclick=()=>{TOSCOPE=b.getAttribute('data-tc');render();});
  $('#view').querySelectorAll('[data-appr]').forEach(b=>b.onclick=()=>decide(Number(b.getAttribute('data-appr')),'approved'));
  $('#view').querySelectorAll('[data-deny]').forEach(b=>b.onclick=()=>decide(Number(b.getAttribute('data-deny')),'denied'));
  $('#view').querySelectorAll('[data-undo]').forEach(b=>b.onclick=()=>decide(Number(b.getAttribute('data-undo')),'pending'));
}

async function decide(id,status){
  const r=REQS.filter(x=>x.id===id)[0];if(!r)return;const prev=r.status;r.status=status;render();
  const patch=status==='pending'?{status,decided_by:null,decided_at:null}:{status,decided_by:(AUTH&&AUTH.id)||null,decided_at:new Date().toISOString()};
  const res=await sb.from('time_off_requests').update(patch).eq('id',id);
  if(res.error){r.status=prev;render();toast(res.error.message||'Could not update',true);}
  else{const e=empById(r.staff_id);toast((status==='approved'?'Approved':status==='denied'?'Denied':'Reopened')+(e?' · '+e.display_name.split(' ')[0]:''));}
}

initAuth();
</script>
</body>
</html>
