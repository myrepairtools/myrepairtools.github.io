<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commission Calculator — CPR</title>
<link rel="icon" type="image/svg+xml" href="assets/images/myrepairtools-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="assets/commission-engine.js"></script>
<style>
:root{--red:#DC282E;--dark:#2D2D3B;--dark-grey:#4E4E50;--blue:#4FB0E3;--grey:#B9BDCB;--light-grey:#F3F2F2;--border:#E0E2EA;--green:#2E9E5B;--amber:#C9820B;--purple:#7c3aed;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--light-grey);font-family:'Nunito Sans',sans-serif;color:var(--dark);min-height:100vh}
main{max-width:none;margin:0;padding:24px 28px 80px}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:-.4px;line-height:1.05}
.sub{color:var(--dark-grey);font-size:.82rem;font-weight:600;margin-top:2px}
.hide{display:none!important}
.muted{color:var(--grey);font-weight:600}
.head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;border:none;border-radius:9px;padding:9px 16px;cursor:pointer;background:var(--red);color:#fff;white-space:nowrap}
.btn.alt{background:#fff;color:var(--dark);border:1.5px solid var(--border)}
.btn.alt:hover{border-color:var(--blue);color:var(--blue)}
.btn.sm{padding:7px 13px;font-size:.74rem}
.btn:disabled{opacity:.5;cursor:default}
a.btnlink{text-decoration:none}
input,select{font-family:'Nunito Sans',sans-serif;font-size:.86rem;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--dark)}
input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,176,227,.15)}
/* number inputs: no spinner arrows (hand-keyed payroll values) */
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
/* toolbar */
.bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.arrow{font-family:'Nunito';font-weight:800;color:var(--grey)}
/* tabs + pills */
.row2{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.tabs{display:inline-flex;gap:3px;background:var(--dark);border-radius:11px;padding:3px}
.tab{font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;padding:8px 16px;border-radius:8px;background:none;border:none;color:#D5D8E0;cursor:pointer}
.tab.on{background:#fff;color:var(--dark);font-weight:900}
.pills{display:inline-flex;gap:6px;flex-wrap:wrap}
.pill{font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;border:1.5px solid var(--border);border-radius:999px;padding:7px 14px;cursor:pointer;background:#fff;color:var(--dark-grey)}
.pill.on{background:#EAF6FD;border-color:#CDEAF8;color:#1E7AA8}
.status{margin-left:auto;font-size:.74rem;color:var(--grey);font-weight:700}
/* card */
.card{background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 3px rgba(45,45,59,.05);margin-bottom:16px;overflow:hidden}
.card-hd{display:flex;align-items:center;gap:9px;padding:13px 18px;border-bottom:1px solid var(--border)}
.card-hd::before{content:'';width:4px;height:18px;border-radius:2px;background:var(--accent,var(--red))}
.card-t{font-family:'Nunito',sans-serif;font-weight:900;font-size:.96rem}
.card-bd{padding:16px 18px}
.acc-red{--accent:var(--red)}.acc-blue{--accent:var(--blue)}.acc-green{--accent:var(--green)}.acc-dark{--accent:var(--dark)}
/* summary table */
table{width:100%;border-collapse:collapse;font-size:.86rem}
thead th{font-family:'Nunito',sans-serif;font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.7px;color:var(--grey);text-align:left;padding:8px 6px;border-bottom:1px solid var(--border)}
thead th.r{text-align:right}
tbody td{padding:9px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
td.r{text-align:right;white-space:nowrap}
.nm{font-family:'Nunito',sans-serif;font-weight:800}
.flag{font-family:'Nunito';font-weight:800;font-size:.56rem;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:999px;background:#FFF4E5;color:#8a5a00}
.split{font-size:.74rem;color:#5b3fb0;font-weight:700}
.gt{font-family:'Nunito';font-weight:900}
.tfoot td{border-top:2px solid var(--border);padding-top:10px;font-family:'Nunito';font-weight:900}
.copyv{cursor:pointer;border-radius:5px;padding:2px 5px;margin:-2px -5px}
.copyv:hover{background:#EAF6FD;color:#1E7AA8}
.copyv:active{background:#CDEAF8}
.warn{margin-top:12px;background:#FFF4E5;border:1px solid #FFD8A8;color:#8a5a00;padding:11px 14px;border-radius:9px;font-size:.84rem}
/* commission detail */
.crow{border-bottom:1px solid rgba(224,226,234,.7)}
.crow:last-child{border-bottom:none}
.cgrid{display:grid;grid-template-columns:1.6fr 96px 96px 96px 112px 92px;gap:8px;align-items:center;padding:11px 6px}
.chead{display:grid;grid-template-columns:1.6fr 96px 96px 96px 112px 92px;gap:8px;font-family:'Nunito';font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);padding:0 6px 8px;border-bottom:1px solid var(--border)}
.cgrid .v{text-align:center;font-family:'Nunito';font-weight:800;font-size:.86rem}
.chead .v{text-align:center}
.cgrid .tot{font-weight:900;font-size:.98rem;color:var(--green)}
.detbtn{font-family:'Nunito';font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;background:var(--light-grey);color:var(--dark-grey);border:1.5px solid var(--border);border-radius:6px;padding:5px 9px;cursor:pointer}
.det{background:#fafbfc;padding:14px 16px;border-top:1px solid var(--border)}
.detgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px}
.detg-t{font-family:'Nunito';font-weight:800;font-size:.78rem;border-bottom:1px solid var(--border);padding-bottom:3px;margin-bottom:5px}
.detrow{display:flex;justify-content:space-between;gap:14px;font-size:.8rem;color:var(--dark-grey);padding:2px 0}
.detrow .rv{font-weight:700;white-space:nowrap}
.manual{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.chargebox{margin-top:14px;background:#F6F4FB;border:1px solid #E6E0F4;border-radius:9px;padding:11px 13px}
.chargebox .h{font-family:'Nunito';font-weight:800;font-size:.66rem;text-transform:uppercase;letter-spacing:.6px;color:#5b3fb0;margin-bottom:6px}
.field>label{display:block;font-family:'Nunito';font-weight:800;font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey);margin-bottom:4px}
/* archive modal */
.avpick-back{position:fixed;inset:0;background:rgba(45,45,59,.45);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px}
.avpick{background:#fff;border-radius:16px;padding:18px 20px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.avpick-hd{display:flex;align-items:center;justify-content:space-between;font-family:'Nunito';font-size:1rem}
.avpick-x{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--grey);line-height:1}
.avpick-sub{font-size:.78rem;color:var(--grey);font-weight:600;margin:2px 0 12px}
.avpick-ft{margin-top:14px;display:flex;justify-content:flex-end}
/* toast + loading */
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--dark);color:#fff;font-family:'Nunito';font-weight:800;font-size:.84rem;padding:11px 18px;border-radius:10px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}.toast.err{background:var(--red)}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--light-grey);color:var(--grey);font-family:'Nunito';font-weight:800;z-index:50}
</style>
</head>
<body>
<main id="app" class="hide">
  <div class="head">
    <div>
      <h1>Commission Calculator</h1>
      <div class="sub">Daily RepairQ reports flow in automatically — pick a range, switch stores instantly.</div>
    </div>
    <a class="btnlink" href="settings.html"><button class="btn alt sm">⚙ Settings</button></a>
  </div>

  <div class="bar">
    <input type="date" id="start">
    <span class="arrow">→</span>
    <input type="date" id="end">
    <select id="quick"><option value="">Quick range…</option><option value="mtd">Month to date</option><option value="lastmonth">Last month</option></select>
    <button class="btn sm" id="run">Run</button>
  </div>

  <div class="row2">
    <div class="tabs" id="tabs">
      <button class="tab on" data-t="summary">Summary</button>
      <button class="tab" data-t="commissions">Commissions</button>
      <button class="tab" data-t="tips">Tips</button>
    </div>
    <div class="pills" id="pills"></div>
    <span class="status" id="status"></span>
  </div>

  <section id="view-summary"></section>
  <section id="view-commissions" class="hide"></section>
  <section id="view-tips" class="hide"></section>
</main>

<div id="loading">Loading…</div>
<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SB_URL='https://xuvsehrevxackuhmbmry.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1dnNlaHJldnhhY2t1aG1ibXJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTY4NjEsImV4cCI6MjA5NzI3Mjg2MX0.pURipAPZoVKFe3wdMQHBsw4Bd2mgG8OdzxaCJKGIqyY';
const sb=createClient(SB_URL,ANON);
const E=window.CommissionEngine, money=E.money, pct=E.pct;

const $=s=>document.querySelector(s), $all=s=>Array.prototype.slice.call(document.querySelectorAll(s));
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m,err){const t=$('#toast');t.textContent=m;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2400);}
function lsGet(k,d){try{const v=localStorage.getItem(k);return v==null?d:v;}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function shortStore(s){return window.CPRLocations?CPRLocations.display(s):String(s||'').replace(/^CPR\s*/,'');}
function isoToday(){const d=new Date();return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function monthStart(){const d=new Date();return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-01';}

const STATE={me:null,stores:[],store:lsGet('cc_store','all'),tab:lsGet('cc_tab','summary'),
  start:lsGet('cc_start',monthStart()),end:lsGet('cc_end',isoToday()),
  rates:{},rateLabels:{},rules:{},staffById:{},rosterById:{},
  report:[],manual:{},expanded:{},tips:{},tipsPeriod:'',loaded:false};

/* ---- session: adopt the shared front-door session so RLS sees the owner ---- */
async function ensureSession(){
  try{
    let s=(await sb.auth.getSession()).data.session; if(s)return s;
    const raw=localStorage.getItem('sb-xuvsehrevxackuhmbmry-auth-token'); if(!raw)return null;
    const o=JSON.parse(raw);
    const at=o.access_token||(o.currentSession&&o.currentSession.access_token);
    const rt=o.refresh_token||(o.currentSession&&o.currentSession.refresh_token);
    if(at&&rt){await sb.auth.setSession({access_token:at,refresh_token:rt});return (await sb.auth.getSession()).data.session;}
  }catch(e){}
  return null;
}
async function currentStaff(){
  try{const s=(await sb.auth.getSession()).data.session;if(!s)return null;
    const r=await sb.from('staff').select('id,display_name,role,home_store,authorized_stores').eq('auth_uid',s.user.id).maybeSingle();
    return r.data||null;
  }catch(e){return null;}
}
function allowedStores(all,me){
  if(!me||me.role==='owner')return all.slice();
  const set={};if(me.home_store)set[me.home_store]=1;(me.authorized_stores||[]).forEach(s=>set[s]=1);
  const a=all.filter(s=>set[s]);return a.length?a:all.slice();
}

/* ---- config (rates / rules / roster + staff) ---- */
const ROLE_ALIAS={owner:'owner',admin:'admin',manager:'admin',employee:'team_member',team_member:'team_member'};
const normRole=r=>ROLE_ALIAS[r]||r;
async function loadConfig(){
  const [rt,rl,rs,st,rr,pm,rp,ro]=await Promise.all([
    sb.from('commission_rates').select('*').order('sort'),
    sb.from('commission_rules').select('*'),
    sb.from('commission_roster').select('*'),
    sb.from('staff').select('id,display_name,home_store,role,active,authorized_stores'),
    sb.from('roles').select('id,key'),
    sb.from('permissions').select('id,key').like('key','commission.earn.%'),
    sb.from('role_permissions').select('role_id,permission_id'),
    sb.from('commission_role_overrides').select('*')
  ]);
  STATE.rates={};STATE.rateLabels={};
  (rt.data||[]).forEach(r=>{STATE.rates[r.sku]=(r.tiers&&r.tiers.goal)?{goal:Number(r.tiers.goal)||0,lo:Number(r.tiers.lo)||0,hi:Number(r.tiers.hi)||0}:(Number(r.amount)||0);STATE.rateLabels[r.sku]=r.label||r.sku;});
  STATE.rules={};STATE.storeRates={};(rl.data||[]).forEach(r=>{STATE.rules[r.store]=r.rules||{};STATE.storeRates[r.store]=r.rates||{};});
  STATE.staffById={};(st.data||[]).forEach(s=>{STATE.staffById[s.id]=s;});
  STATE.rosterById={};(rs.data||[]).forEach(r=>{STATE.rosterById[r.staff_id]=r;});
  // role -> {accessory,device,services} earning eligibility (from role_permissions)
  const roleKeyById={};(rr.data||[]).forEach(r=>{roleKeyById[r.id]=r.key;});
  const permStream={};(pm.data||[]).forEach(p=>{permStream[p.id]=p.key.split('.').pop();});
  STATE.roleEarns={};(rr.data||[]).forEach(r=>{STATE.roleEarns[r.key]={accessory:false,device:false,services:false};});
  (rp.data||[]).forEach(x=>{const rk=roleKeyById[x.role_id],s=permStream[x.permission_id];if(rk&&s&&STATE.roleEarns[rk])STATE.roleEarns[rk][s]=true;});
  // role-level rule/rate overrides (Store -> Role -> Person layering)
  STATE.roleOver={};(ro.data||[]).forEach(x=>{const rk=roleKeyById[x.role_id];if(rk)STATE.roleOver[rk]={rules:x.rules||{},rates:x.rates||{}};});
  // store universe = stores staff belong to (DB-normalized names, e.g. "CPR Clackamas").
  const sset={};(st.data||[]).forEach(s=>{if(s.home_store)sset[s.home_store]=1;(s.authorized_stores||[]).forEach(x=>{if(x)sset[x]=1;});});
  let allStores=Object.keys(sset);
  if(window.CPRLocations&&CPRLocations.sort)allStores=CPRLocations.sort(allStores);
  STATE.stores=allowedStores(allStores,STATE.me);
  if(STATE.store!=='all'&&STATE.stores.indexOf(STATE.store)<0)STATE.store='all';
}

/* ---- run report: aggregate commission_sales over the range, per employee ---- */
/* totals carry ServiceNet + categories too (unused here, but the month archive
   snapshots these totals and the dashboard renders both) */
function blankTotals(){return {Tickets:0,AccyUnits:0,NetAccySales:0,AccyGP:0,DeviceUnits:0,DeviceReturns:0,DeviceRev:0,DeviceGP:0,DeviceAttach:0,ServiceNet:0,services:{},categories:{}};}
function addInto(t,r){
  t.Tickets+=Number(r.tickets)||0;t.AccyUnits+=Number(r.accy_units)||0;t.NetAccySales+=Number(r.accy_net)||0;t.AccyGP+=Number(r.accy_gp)||0;
  t.DeviceUnits+=Number(r.device_units)||0;t.DeviceReturns+=Number(r.device_returns)||0;
  t.DeviceRev+=(Number(r.device_net)||0)+(Number(r.device_return_net)||0);
  t.DeviceGP+=(Number(r.device_gp)||0)+(Number(r.device_return_gp)||0);
  t.DeviceAttach+=(Number(r.device_attach)||0)-(Number(r.device_attach_return)||0);
  t.ServiceNet+=Number(r.service_net)||0;
  const sv=r.services||{};for(const k in sv){t.services[k]=(t.services[k]||0)+(Number(sv[k])||0);}
  const ct=r.categories||{};for(const k in ct){t.categories[k]=(t.categories[k]||0)+(Number(ct[k])||0);}
}
async function runReport(){
  const {start,end}=STATE;
  if(!start||!end){toast('Pick a date range',true);return;}
  $('#status').textContent='Loading…';
  const {data,error}=await sb.from('commission_sales').select('*').gte('biz_date',start).lte('biz_date',end);
  if(error){$('#status').textContent='Error';toast(error.message,true);return;}
  // meeting-set monthly goals for the range's month (pay periods live within one month)
  const mgRes=await sb.from('commission_goals').select('staff_id,accy_goal').eq('month',start.slice(0,7)+'-01');
  const monthGoals={};((mgRes&&mgRes.data)||[]).forEach(g=>{if(g.accy_goal!=null)monthGoals[g.staff_id]=Number(g.accy_goal)||0;});
  const byEmp={};
  (data||[]).forEach(r=>{
    const key=r.staff_id!=null?('sid:'+r.staff_id):('nm:'+r.employee);
    let e=byEmp[key];
    if(!e){const sf=r.staff_id!=null?STATE.staffById[r.staff_id]:null;
      e=byEmp[key]={staff_id:r.staff_id,name:(sf&&sf.display_name)||r.employee,home:(sf&&sf.home_store)||null,
        totals:blankTotals(),byStore:{},stores:new Set()};}
    addInto(e.totals,r);
    if(!e.byStore[r.store])e.byStore[r.store]={AccyGP:0,DeviceGP:0,services:{}};
    const b=e.byStore[r.store];b.AccyGP+=Number(r.accy_gp)||0;b.DeviceGP+=Number(r.device_gp)||0;
    const sv=r.services||{};for(const k in sv)b.services[k]=(b.services[k]||0)+(Number(sv[k])||0);
    e.stores.add(r.store);
  });
  STATE.report=Object.keys(byEmp).map(k=>{
    const e=byEmp[k];const ros=e.staff_id!=null?STATE.rosterById[e.staff_id]:null;
    const sf=e.staff_id!=null?STATE.staffById[e.staff_id]:null;
    const home=e.home||[...e.stores][0]||null;
    // earning eligibility: role defaults (via ROLE_ALIAS) merged with per-person override.
    // Unknown role falls back to earning everything so we never silently zero a payout.
    const roleKey=sf?normRole(sf.role):null;
    const roleE=(roleKey&&STATE.roleEarns[roleKey])?STATE.roleEarns[roleKey]:{accessory:true,device:true,services:true};
    const earns=E.resolveEarns(roleE, ros&&ros.earns_override);
    // layered effective rules & rates: Store(home) -> Role -> Person
    const roleOver=roleKey?STATE.roleOver[roleKey]:null;
    const rules=E.mergeRules(STATE.rules[home], roleOver&&roleOver.rules, ros&&ros.rules_override);
    const rates=E.mergeRates(STATE.rates, STATE.storeRates[home], roleOver&&roleOver.rates, ros&&ros.rates_override);
    // "In roster" = linked to an active team member; a commission_roster row only
    // customizes goal/earnings/rules. Active staff are in the roster by default.
    const goal=(e.staff_id!=null&&monthGoals[e.staff_id]!=null)?monthGoals[e.staff_id]:(ros?Number(ros.accy_goal)||0:0);
    return {staff_id:e.staff_id,name:e.name,store:home,stores:[...e.stores],byStore:e.byStore,totals:e.totals,
      earns:earns, rules:rules, rates:rates, goal:goal, inRoster:!!(sf&&sf.active)};
  });
  if(!STATE.tipsPeriod)STATE.tipsPeriod=start.slice(0,7);
  await loadTips();
  STATE.loaded=true;
  $('#status').textContent=STATE.report.length+' employees · '+start+' → '+end;
  render();
}

function calc(r){
  return E.computeCommission(r.totals,{accessoryGoal:r.goal,
    accDeviceUnits:(r.totals.DeviceAttach!=null?r.totals.DeviceAttach:''),
    rates:r.rates,earns:r.earns,rules:r.rules});
}
function inScope(){const all=STATE.store==='all';return STATE.report.filter(r=>all||r.store===STATE.store||r.stores.indexOf(STATE.store)>=0)
  .slice().sort((a,b)=>a.name<b.name?-1:1);}

/* ---- renderers ---- */
function render(){
  $all('#tabs .tab').forEach(b=>b.classList.toggle('on',b.dataset.t===STATE.tab));
  $('#view-summary').classList.toggle('hide',STATE.tab!=='summary');
  $('#view-commissions').classList.toggle('hide',STATE.tab!=='commissions');
  $('#view-tips').classList.toggle('hide',STATE.tab!=='tips');
  renderPills();
  if(STATE.tab==='summary')renderSummary();
  else if(STATE.tab==='commissions')renderCommissions();
  else renderTips();
}
function renderPills(){
  const list=['all'].concat(STATE.stores);
  $('#pills').innerHTML=list.map(s=>'<button class="pill'+(s===STATE.store?' on':'')+'" data-s="'+esc(s)+'">'+(s==='all'?'All':esc(shortStore(s)))+'</button>').join('');
  $all('#pills .pill').forEach(b=>b.onclick=()=>{STATE.store=b.dataset.s;lsSet('cc_store',STATE.store);render();});
}
function renderSummary(){
  const all=STATE.store==='all',rows=inScope();const onlyStore=all?null:STATE.store;
  let grandC=0,grandT=0,grandG=0;
  const body=rows.map(r=>{const c=calc(r);const tip=tipFor(r.name,onlyStore);const tot=c.total+tip;
    grandC+=c.total;grandT+=tip;grandG+=tot;
    const multi=r.stores.length>1;
    const split=multi?E.splitCharge(r.byStore,c,r.rates).map(p=>shortStore(p.store)+' '+money(p.amt)).join(' · '):'';

/* click-to-copy money cells: copies the bare number (no $ or commas) for QBO */
function copyable(n){const v=(Number(n)||0).toFixed(2);return '<span class="copyv" data-copy="'+v+'" title="Click to copy '+v+'">'+money(n)+'</span>';}
function copyText(v){
  const done=()=>toast('Copied '+v+' — paste into QBO');
  const fallback=()=>{const ta=document.createElement('textarea');ta.value=v;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');done();}catch(e){toast('Copy failed',true);}ta.remove();};
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(v).then(done,fallback);
  else fallback();
}

/* ---- month-end archive: freeze the range's month, as computed right here ----
   Enabled only when the range is exactly one full, finished calendar month. */
function archMonth(){
  const s=STATE.start,e=STATE.end;
  if(!s||!e||s.slice(8)!=='01')return null;
  const p=s.split('-').map(Number);
  const last=new Date(p[0],p[1],0);
  const lastISO=last.getFullYear()+'-'+('0'+(last.getMonth()+1)).slice(-2)+'-'+('0'+last.getDate()).slice(-2);
  if(e!==lastISO)return null;
  const n=new Date(),curISO=n.getFullYear()+'-'+('0'+(n.getMonth()+1)).slice(-2)+'-01';
  if(s>=curISO)return null; // still running (or future)
  const d=new Date(p[0],p[1]-1,1);
  return {monISO:s,label:d.toLocaleString('en-US',{month:'long',year:'numeric'}),mon:d.toLocaleString('en-US',{month:'long'})};
}

/* ---- tips ---- */
/* load saved tip pools + hours for the active pay period, keyed per store */
async function loadTips(){
  STATE.tips={};
  const period=STATE.tipsPeriod||STATE.start.slice(0,7);
  const {data}=await sb.from('commission_tips').select('*').eq('period',period);
  (data||[]).forEach(t=>{STATE.tips[t.store]={hours:t.hours||{},pool:Number(t.pool)||0};});
}
/* one employee's tip share = sum over stores of (their hrs / store hrs) * store pool.
   onlyStore limits it to a single store (used when the summary is filtered to one). */
function tipFor(name,onlyStore){
  let total=0;
  for(const store in STATE.tips){
    if(onlyStore&&store!==onlyStore)continue;
    const d=STATE.tips[store]||{},pool=+d.pool||0,hrs=d.hours||{};
    if(!pool)continue;
    let totHrs=0;for(const nm in hrs){const h=hrs[nm]||{};totHrs+=(+h.pp1||0)+(+h.pp2||0);}
    const h=hrs[name]||{},my=(+h.pp1||0)+(+h.pp2||0);
    if(totHrs>0&&my>0)total+=(my/totHrs)*pool;
  }
  return total;
}
/* worked hours per employee for the tips-period month, straight from QB Time
   (qbtime_timesheets daily rollups; PTO jobcode seconds excluded) */
function monthEndISO(period){const p=period.split('-').map(Number);const d=new Date(p[0],p[1],0);return period+'-'+('0'+d.getDate()).slice(-2);}
async function loadQboHours(){
  const period=STATE.tipsPeriod||STATE.start.slice(0,7);
  if(STATE.qboHrsPeriod===period&&STATE.qboHrs)return STATE.qboHrs;
  const [ts,jc]=await Promise.all([
    sb.from('qbtime_timesheets').select('staff_id,seconds,jobcodes').gte('biz_date',period+'-01').lte('biz_date',monthEndISO(period)),
    sb.from('qbtime_jobcodes').select('qbt_id,type').eq('type','pto')
  ]);
  const pto=new Set((((jc&&jc.data)||[])).map(x=>String(x.qbt_id)));
  const secs={};(((ts&&ts.data)||[])).forEach(r=>{
    if(r.staff_id==null)return;
    let s=Number(r.seconds)||0;const j=r.jobcodes||{};
    for(const k in j){if(pto.has(String(k)))s-=Number(j[k])||0;}
    secs[r.staff_id]=(secs[r.staff_id]||0)+Math.max(0,s);
  });
  const byName={};
  for(const sid in secs){const st=STATE.staffById[sid];if(!st)continue;byName[st.display_name]=Math.round(secs[sid]/3600*100)/100;}
  STATE.qboHrs=byName;STATE.qboHrsPeriod=period;return byName;
}
/* Square daily tips (tips_daily, fed by the square-tips function) for the period */
async function loadSquareTips(){
  const period=STATE.tipsPeriod||STATE.start.slice(0,7);
  if(STATE.sqPeriod===period&&STATE.sq)return STATE.sq;
  const r=await sb.from('tips_daily').select('store,biz_date,amount').gte('biz_date',period+'-01').lte('biz_date',monthEndISO(period));
  const by={};(((r&&r.data)||[])).forEach(x=>{const s=by[x.store]=by[x.store]||{sum:0,days:0,last:''};
    s.sum+=Number(x.amount)||0;s.days++;if(x.biz_date>s.last)s.last=String(x.biz_date).slice(0,10);});
  STATE.sq=by;STATE.sqPeriod=period;return by;
}

    +(sqs?'<div style="display:inline-flex;align-items:center;gap:8px;background:#EAF7EF;border:1px solid #BFE3CC;border-radius:999px;padding:6px 13px;font-family:Nunito;font-weight:800;font-size:.75rem;color:#1f7d45;margin-bottom:10px">⚡ Square: '+money(sqs.sum)+' in tips · '+sqs.days+' day'+(sqs.days===1?'':'s')+' through '+esc(sqs.last)+' — the pool updates automatically each morning</div>':'')
    +'<table><thead><tr><th>Employee</th><th class="r">Hours · '+esc(STATE.tipsPeriod||'month')+'</th><th class="r">Tips</th></tr></thead>'
    +'<tbody>'+(rows||'<tr><td colspan="3" class="muted" style="padding:18px 6px">Run a report first.</td></tr>')+'</tbody></table>'
    +'<div class="sub" style="margin-top:10px">One box per person — the whole month’s clocked hours, pre-filled from QuickBooks Time (PTO excluded). Adjust if needed, then Save. Tips split by hours across the store pool; pools roll up into the Summary tab’s Tips column.</div>'
    +'</div></div>';
  const setH=(name,val)=>{const d=ensure();d.hours[name]={pp1:val};renderTips();};
  $all('[data-tip]').forEach(inp=>inp.onchange=()=>setH(inp.getAttribute('data-tip'),+inp.value||0));
  const tp=$('#tipsPeriod');if(tp)tp.onchange=async()=>{STATE.tipsPeriod=tp.value;await loadTips();render();};
  const tpl=$('#tipsPool');if(tpl)tpl.onchange=()=>{ensure().pool=+tpl.value||0;renderTips();};
  const qf=$('#qboFill');if(qf)qf.onclick=()=>{const d=ensure();emps.forEach(e=>{if(qbo[e.name]!=null)d.hours[e.name]={pp1:qbo[e.name]};});renderTips();};
  const sv=$('#saveTips');if(sv)sv.onclick=()=>saveTips(store);
}
async function saveTips(store){
  const d=STATE.tips[store]||{hours:{},pool:0};
  const row={store,period:STATE.tipsPeriod||STATE.start.slice(0,7),pool:+d.pool||0,hours:d.hours||{}};
  const {error}=await sb.from('commission_tips').upsert(row,{onConflict:'store,period'});
  if(error)toast(error.message,true);else toast('Tips saved');
}

/* ---- payroll print ---- */
function downloadPayroll(rows){
  const all=STATE.store==='all',onlyStore=all?null:STATE.store;
  const byHome={};let grandC=0,grandT=0,grandG=0;
  rows.forEach(r=>{const c=calc(r);const tip=tipFor(r.name,onlyStore);grandC+=c.total;grandT+=tip;grandG+=c.total+tip;
    (byHome[r.store||'—']=byHome[r.store||'—']||[]).push({emp:r.name,lead:!(r.earns&&(r.earns.accessory||r.earns.device)),c,tip});});
  const w=window.open('','_blank');if(!w){toast('Allow pop-ups to download',true);return;}
  let body='';
  Object.keys(byHome).sort().forEach(home=>{let subC=0,subT=0;
    body+='<h2>'+esc(home)+'</h2><table><thead><tr><th>Employee</th><th class="r">Accessory</th><th class="r">Device</th><th class="r">Services</th><th class="r">Commission</th><th class="r">Tips</th><th class="r">Total</th></tr></thead><tbody>';
    byHome[home].slice().sort((a,b)=>a.emp<b.emp?-1:1).forEach(x=>{subC+=x.c.total;subT+=x.tip;
      body+='<tr><td>'+esc(x.emp)+(x.lead?' (lead)':'')+'</td><td class="r">'+money(x.c.accyComm)+'</td><td class="r">'+money(x.c.devComm)+'</td><td class="r">'+money(x.c.repairComm)+'</td><td class="r">'+money(x.c.total)+'</td><td class="r">'+(x.tip>0?money(x.tip):'—')+'</td><td class="r"><b>'+money(x.c.total+x.tip)+'</b></td></tr>';});
    body+='<tr class="sub"><td>Subtotal</td><td class="r"></td><td class="r"></td><td class="r"></td><td class="r">'+money(subC)+'</td><td class="r">'+money(subT)+'</td><td class="r">'+money(subC+subT)+'</td></tr></tbody></table>';});
  const css='<style>body{font-family:Arial,sans-serif;color:#1a1a1a;margin:32px}h1{font-size:20px;margin:0 0 2px;color:#DC282E}h2{font-size:15px;margin:22px 0 6px;border-bottom:2px solid #DC282E;padding-bottom:3px}table{width:100%;border-collapse:collapse;margin-bottom:6px;font-size:12px}th,td{border:1px solid #ccc;padding:6px 8px;text-align:left}th{background:#f3f2f2}td.r,th.r{text-align:right}tr.sub td{font-weight:bold;background:#faf7f7}.grand{font-size:14px;font-weight:bold;margin-top:10px}@media print{body{margin:12mm}}</style>';
  w.document.write('<html><head><title>Payroll summary '+esc(STATE.start)+' to '+esc(STATE.end)+'</title>'+css+'</head><body><h1>Commission payroll summary</h1><div style="color:#555;font-size:12px;margin-bottom:6px">'+esc(STATE.start)+' → '+esc(STATE.end)+' · tips '+esc(STATE.tipsPeriod)+'</div>'+body+'<div class="grand">Grand total: '+money(grandG)+' &nbsp;<span style="font-weight:normal;color:#555">('+money(grandC)+' commission + '+money(grandT)+' tips)</span></div></body></html>');
  w.document.close();setTimeout(()=>{try{w.focus();w.print();}catch(e){}},500);
}

/* ---- wiring ---- */
function wire(){
  $('#start').value=STATE.start;$('#end').value=STATE.end;
  $('#start').onchange=e=>{STATE.start=e.target.value;lsSet('cc_start',STATE.start);};
  $('#end').onchange=e=>{STATE.end=e.target.value;lsSet('cc_end',STATE.end);};
  $('#quick').onchange=e=>{const v=e.target.value,now=new Date(),y=now.getFullYear(),m=now.getMonth();
    const iso=d=>d.toISOString().slice(0,10);
    if(v==='mtd'){STATE.start=iso(new Date(y,m,1));STATE.end=iso(new Date());}
    else if(v==='lastmonth'){STATE.start=iso(new Date(y,m-1,1));STATE.end=iso(new Date(y,m,0));}
    if(v){$('#start').value=STATE.start;$('#end').value=STATE.end;lsSet('cc_start',STATE.start);lsSet('cc_end',STATE.end);runReport();}};
  $('#run').onclick=()=>runReport();
  $all('#tabs .tab').forEach(b=>b.onclick=()=>{STATE.tab=b.dataset.t;lsSet('cc_tab',STATE.tab);render();});
}

async function boot(){
  await ensureSession();
  STATE.me=await currentStaff();
  await loadConfig();
  STATE.tipsPeriod=STATE.start.slice(0,7);
  $('#loading').classList.add('hide');$('#app').classList.remove('hide');
  wire();render();await runReport();
}
boot().catch(e=>{$('#loading').textContent='Could not load: '+(e&&e.message||e);});
</script>
